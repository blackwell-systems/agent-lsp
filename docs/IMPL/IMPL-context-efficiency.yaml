            ## What to implement

            Create an ETag/conditional-response helper for file-scoped tools.
            Computes SHA-256 based ETags and supports if_none_match for cache hits.

            ### Files to create

            **1. `internal/tools/etag.go`**

            Three exported functions:

            ```go
            package tools

            import (
                "crypto/sha256"
                "encoding/hex"
                "fmt"
                "os"

                "github.com/blackwell-systems/agent-lsp/internal/types"
            )

            // ComputeFileETag returns a 16-char hex string derived from SHA-256
            // of the file's contents.
            func ComputeFileETag(filePath string) (string, error) {
                data, err := os.ReadFile(filePath)
                if err != nil {
                    return "", fmt.Errorf("computing etag for %s: %w", filePath, err)
                }
                return ComputeETag(data), nil
            }

            // ComputeETag returns a 16-char hex ETag from arbitrary content bytes.
            // Useful when file content is already in memory (avoids double read).
            func ComputeETag(content []byte) string {
                h := sha256.Sum256(content)
                return hex.EncodeToString(h[:8]) // 8 bytes = 16 hex chars
            }

            // CheckETagMatch checks if ifNoneMatch matches the current file's hash.
            // Returns:
            //   matched=true + not_modified ToolResult when etag matches
            //   matched=false + current etag string when no match (or empty ifNoneMatch)
            //   error if file cannot be read
            func CheckETagMatch(filePath string, ifNoneMatch string) (matched bool, result types.ToolResult, etag string, err error) {
                currentETag, err := ComputeFileETag(filePath)
                if err != nil {
                    return false, types.ToolResult{}, "", err
                }
                if ifNoneMatch != "" && ifNoneMatch == currentETag {
                    notModified := fmt.Sprintf(`{"status":"not_modified","etag":"%s"}`, currentETag)
                    return true, types.TextResult(notModified), currentETag, nil
                }
                return false, types.ToolResult{}, currentETag, nil
            }
            ```

