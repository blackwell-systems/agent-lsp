            **1. Create `internal/tools/context_meta.go`**

            This file adds token savings and etag support to get_editing_context:

            ```go
            package tools

            import (
                "context"
                "encoding/json"

                "github.com/blackwell-systems/agent-lsp/internal/lsp"
                "github.com/blackwell-systems/agent-lsp/internal/types"
            )

            // HandleGetEditingContextWithMeta wraps HandleGetEditingContext to add
            // ETag conditional response and token savings metadata.
            func HandleGetEditingContextWithMeta(ctx context.Context, client *lsp.LSPClient, args map[string]any) (types.ToolResult, error) {
                filePath, _ := args["file_path"].(string)
                ifNoneMatch, _ := args["if_none_match"].(string)

                // ETag check: if file hasn't changed, return short response
                if filePath != "" && ifNoneMatch != "" {
                    matched, result, _, err := CheckETagMatch(filePath, ifNoneMatch)
                    if err == nil && matched {
                        return result, nil
                    }
                }

                // Delegate to the core handler
                result, err := HandleGetEditingContext(ctx, client, args)
                if err != nil || result.IsError {
                    return result, err
                }

                // Add etag to the primary JSON response
                if filePath != "" {
                    etag, etagErr := ComputeFileETag(filePath)
                    if etagErr == nil {
                        result = injectETagField(result, etag)
                    }
                }

                // Add token savings metadata
                if filePath != "" {
                    result = AppendTokenMeta(result, filePath)
                }

                return result, nil
            }

            // injectETagField parses the JSON in Content[0].Text, adds "etag" field,
            // and re-marshals. If parsing fails, returns unchanged.
            func injectETagField(result types.ToolResult, etag string) types.ToolResult {
                if len(result.Content) == 0 || result.Content[0].Text == "" {
                    return result
                }
                var obj map[string]any
                if err := json.Unmarshal([]byte(result.Content[0].Text), &obj); err != nil {
                    return result
                }
                obj["etag"] = etag
                data, err := json.Marshal(obj)
                if err != nil {
                    return result
                }
                result.Content[0].Text = string(data)
                return result
            }
            ```

