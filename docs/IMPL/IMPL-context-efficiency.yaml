interface_contracts:
    - name: HandleGetEditingContext
      description: |
        Handler for the get_editing_context composite tool. Returns file symbols,
        callers partitioned by test/non-test, callees, and imports.
      definition: |
        func HandleGetEditingContext(ctx context.Context, client *lsp.LSPClient, args map[string]any) (types.ToolResult, error)

        Input args:
          file_path: string (required) - absolute path to the file
          language_id: string (optional) - auto-detected from extension

        Response JSON shape:
          {
            "file": "<path>",
            "imports": ["pkg1", "pkg2"],
            "symbols": [
              {
                "name": "FuncName",
                "kind": "Function",
                "signature": "func FuncName(x int) error",
                "line": 42,
                "callers": {
                  "test": [{"file": "...", "line": 10, "name": "TestX"}],
                  "non_test": [{"file": "...", "line": 20, "name": "main"}]
                },
                "callees": [{"name": "fmt.Println", "file": "..."}]
              }
            ]
          }
      location: internal/tools/context.go
    - name: EstimateTokenSavings
      description: |
        Computes approximate token savings by comparing returned text size
        to full file size. Returns metadata map.
      definition: |
        func EstimateTokenSavings(returnedText string, filePath string) map[string]int

        Returns map with keys: tokens_returned, tokens_full_file, tokens_saved.
        If file cannot be stat'd, returns only tokens_returned.
      location: internal/tools/token_savings.go
    - name: AppendTokenMeta
      description: |
        Wraps a ToolResult with token savings metadata as an additional content item.
      definition: |
        func AppendTokenMeta(result types.ToolResult, filePath string) types.ToolResult

        Appends a JSON content item with _meta.token_savings to the result.
        Returns unchanged if result.IsError or Content is empty.
      location: internal/tools/token_savings.go
    - name: ComputeFileETag
      description: |
        Computes a SHA-256 based ETag (truncated to 16 hex chars) for a file.
      definition: |
        func ComputeFileETag(filePath string) (string, error)

        Returns the first 16 hex characters of SHA-256(file contents).
        Error if file cannot be read.
      location: internal/tools/etag.go
    - name: ComputeETag
      description: |
        Computes ETag from in-memory content bytes (no disk read).
      definition: |
        func ComputeETag(content []byte) string

        Returns 16-char hex string from SHA-256 of content.
      location: internal/tools/etag.go
    - name: CheckETagMatch
      description: |
        Checks if a provided etag matches the current file hash.
      definition: |
        func CheckETagMatch(filePath string, ifNoneMatch string) (matched bool, result types.ToolResult, etag string, err error)

        If ifNoneMatch is empty or does not match, returns matched=false with current etag.
        If matched, returns matched=true with a short not_modified JSON response.
      location: internal/tools/etag.go
    - name: HandleGetEditingContextWithMeta
      description: |
        Wrapper that adds ETag and token savings to get_editing_context responses.
      definition: |
        func HandleGetEditingContextWithMeta(ctx context.Context, client *lsp.LSPClient, args map[string]any) (types.ToolResult, error)

        Checks if_none_match first; if matched returns short not_modified response.
        Otherwise delegates to HandleGetEditingContext, then appends etag and token meta.
      location: internal/tools/context_meta.go
