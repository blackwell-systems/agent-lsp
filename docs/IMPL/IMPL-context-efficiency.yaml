            ## What to implement

            Create the `get_editing_context` composite MCP tool (tool #61). This tool
            returns everything an agent needs before editing a file in a single call:
            symbols with signatures, callers partitioned into test/non-test, callees,
            and the file's imports.

            ### Files to create

            **1. `internal/tools/context.go`**

            Handler function:
            ```go
            func HandleGetEditingContext(ctx context.Context, client *lsp.LSPClient, args map[string]any) (types.ToolResult, error)
            ```

            Implementation steps:
            1. Validate `file_path` arg is present, call `ValidateFilePath`
            2. Extract `language_id` (default from `lsp.LanguageIDFromPath`)
            3. Call `WithDocument` to open the file, then `client.GetDocumentSymbols`
            4. For each exported/top-level symbol, call `client.GetReferencesRaw` to
               get callers. Partition using `isTestFile` (already in change_impact.go;
               same package, call directly).
            5. For each function/method symbol, call `client.PrepareCallHierarchy` then
               `client.GetOutgoingCalls` to get callees.
            6. Extract imports from the file content (read via os.ReadFile; parse import
               block with simple regex or go/parser for Go files; for other languages
               return raw import lines matching common patterns).
            7. Assemble JSON response and return via `types.TextResult`.

            Use parallel reference queries (like change_impact.go does) with a worker
            pool of 16 for the callers phase.

            The response JSON shape:
            ```json
            {
              "file": "/path/to/file.go",
              "imports": ["fmt", "context", "github.com/foo/bar"],
              "symbols": [
                {
                  "name": "HandleFoo",
                  "kind": "Function",
                  "signature": "func HandleFoo(ctx context.Context) error",
                  "line": 15,
                  "callers": {
                    "test": [{"file": "/path/test.go", "line": 10, "name": "TestFoo"}],
                    "non_test": [{"file": "/path/main.go", "line": 42, "name": "run"}]
                  },
                  "callees": [{"name": "fmt.Println", "file": "/path/fmt/print.go", "line": 1}]
                }
              ]
            }
            ```

            For the signature field: use `client.GetInfoOnLocation(ctx, uri, pos)` on
            the symbol's definition position to get the type signature string (returns
            string, error). If the result is empty, fall back to the symbol name + kind.

            **2. `internal/tools/context_test.go`**

            Test the handler with a nil client (returns error), and test the import
            extraction helper if you factor one out. Follow the pattern in other test
            files in internal/tools/ for nil-client tests.

            **3. `cmd/agent-lsp/tools_context.go`**

            Registration file following the exact pattern of `tools_analysis.go`:
            ```go
            package main

            import (
                "context"
                "github.com/blackwell-systems/agent-lsp/internal/tools"
                "github.com/modelcontextprotocol/go-sdk/mcp"
            )

            type GetEditingContextArgs struct {
                FilePath   string `json:"file_path" jsonschema:"Absolute path to the file to get editing context for"`
                LanguageID string `json:"language_id,omitempty" jsonschema:"Language identifier. Optional; auto-detected from file extension"`
            }

            func registerContextTools(d toolDeps) {
                addToolWithPhaseCheck(d, &mcp.Tool{
                    Name:        "get_editing_context",
                    Description: "Get complete editing context for a file in one call: all symbols with signatures, callers (test vs non-test), callees, and imports. Use before making changes to understand the file structure and blast radius without multiple round-trips.",
                    Annotations: &mcp.ToolAnnotations{
                        Title:           "Get Editing Context",
                        ReadOnlyHint:    true,
                        DestructiveHint: boolPtr(false),
                        OpenWorldHint:   boolPtr(false),
                    },
                }, func(ctx context.Context, req *mcp.CallToolRequest, args GetEditingContextArgs) (*mcp.CallToolResult, any, error) {
                    r, err := tools.HandleGetEditingContext(ctx, d.clientForFileWithAutoInit(args.FilePath), toolArgsToMap(args))
                    return makeCallToolResult(r), nil, err
                })
            }
            ```

