title: CI Tool Coverage Expansion
feature_slug: coverage-expansion
verdict: SUITABLE
suitability_assessment: |-
    Five independent workstreams with disjoint file ownership.

    1. get_change_impact test — new test functions in test/multi_lang_test.go using
       the Go fixture and gopls.

    2. get_cross_repo_references test — new test functions in test/multi_lang_test.go
       using two Go workspace folders.

    3. CI jobs — two new jobs in .github/workflows/ci.yml wiring workstreams 1+2 into CI.

    4. Lua Tier 2 expansion — lang_configs_test.go Lua config needs supportsFormatting
       enabled, renameSymbolLine/Column/Name populated. PHP and Ruby need
       highlightLine/renameSymbolLine/codeActionLine config fields added.
       Fixture fixtures/lua/person.lua must add a trailing-whitespace sentinel line.

    5. README table updates — update table rows for Lua, PHP, Ruby, Kotlin, CSharp
       and update tool coverage count (47 -> 49).

    File decomposition — 5 agents, disjoint files:
    - Agent A: test/multi_lang_test.go (append TestGetChangeImpact + TestGetCrossRepoReferences)
    - Agent A2: .github/workflows/ci.yml (append change-impact-test + cross-repo-references-test jobs)
    - Agent B: test/lang_configs_test.go (Lua + PHP/Ruby config enrichment)
    - Agent C: test/fixtures/lua/person.lua (add trailing-whitespace sentinel for apply_edit)
    - Agent D: README.md (update table rows; update 47->49 coverage note)

    Pre-implementation status check:
    - Workstream 1+2 (get_change_impact + get_cross_repo_references CI): README notes
      "will be added in a future CI run" — TODO, not done.
    - Workstream 3 (Lua Tier 2): Current config has supportsFormatting=false, renameSymbolLine=0.
      lua-language-server supports formatting and rename. Needs config + fixture fix — TODO.
    - Workstream 4 (PHP/Ruby gaps): PHP and Ruby have no renameSymbolLine, highlightLine,
      codeActionLine set. All config-only fixes — TODO.
    - Kotlin and CSharp: already have renameSymbolLine and highlightLine set — no changes needed.

    Parallelization value: HIGH. Build+test cycle ~2-4 min per worktree (go build + test).
    All five agents are fully independent. Single-wave execution.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~5 agents x ~8 min avg = ~8 min (parallel)
    - Merge and verification: ~5 min
    Total SAW time: ~28 min
    Sequential baseline: ~40 min
    Time savings: ~12 min (30% faster). Clear speedup.
test_command: GOWORK=off go test ./internal/... ./cmd/...
lint_command: GOWORK=off go vet ./...
