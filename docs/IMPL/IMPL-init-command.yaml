        - type: lint
          command: GOWORK=off go vet ./...
          required: true
          repo: agent-lsp
        - type: test
          command: GOWORK=off go test ./internal/... ./cmd/...
          required: true
          repo: agent-lsp
pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A calls HandleDetectLspServers (in internal/tools) instead of
            AutodetectServers (in internal/config). HandleDetectLspServers requires
            a live *lsp.LSPClient and workspace_dir string; passing nil client and no dir
            returns an error result struct (not a Go error), causing silent detection failure.
          likelihood: medium
          impact: high
          mitigation: |-
            Interface contract and task constraints call out both function names explicitly:
            "Use config.AutodetectServers(), NOT HandleDetectLspServers." The import list
            includes only internal/config, not internal/tools. Build would still succeed
            if wrong function is used, so the explicit naming is the primary guard.
        - scenario: |-
            Agent A defines runInit as `func runInit(args []string) error` while Agent B
            writes the call site expecting no return value. Both are in the same wave and
            cannot see each other's code. Compilation failure on merge.
          likelihood: low
          impact: medium
          mitigation: |-
            Interface contract specifies exact signature: `func runInit(args []string)` with
            no return value. Agent A task says "Does not return — uses os.Exit for fatal
            conditions." Agent B task shows the call site as `runInit(os.Args[2:])` with
            no return capture.
        - scenario: |-
            The Windsurf or Gemini CLI path is wrong. Windsurf uses
            ~/.codeium/windsurf/mcp_config.json; Gemini CLI uses
            .gemini/settings.json (project-local). If either is inverted
            (e.g., Gemini written to home dir), the config lands in the wrong place.
          likelihood: low
          impact: medium
          mitigation: |-
            resolveTargetPath choices 6 and 7 are specified precisely in the task:
            choice 6 (Windsurf) = homeDir path, choice 7 (Gemini) = cwd path.
            TestResolveTargetPath_ProjectFiles verifies choices 1, 4, 5, 7 produce
            cwd-relative paths. TestResolveTargetPath covers choice 8 custom path.
        - scenario: |-
            Agent B inserts the routing block before the --version check, causing
            `agent-lsp --version` to fall through to init routing and print usage errors.
          likelihood: low
          impact: low
          mitigation: |-
            Agent B task provides the exact verbatim text of the version-check block as
            anchor and specifies "insert AFTER the closing brace". Postcondition checks
            verify the routing line exists; manual smoke test of --version catches regression.
        - scenario: |-
            writeOrMergeConfig uses json.Unmarshal into map[string]interface{} instead
            of the typed mcpConfig struct. Non-string values in the existing config
            (e.g., nested objects for other tools) would be preserved but typed incorrectly,
            causing data corruption on re-marshal.
          likelihood: low
          impact: medium
          mitigation: |-
            Interface contract defines mcpConfig struct explicitly. TestWriteOrMergeConfig_ExistingFile
            verifies that an existing key ("other-tool") survives the merge intact.
        - scenario: |-
            Agent A imports `runtime` for GOOS detection in resolveTargetPath but
            the build system flags it as unused if the conditional is written with
            a build tag instead of a runtime check, causing `go vet` to fail.
          likelihood: low
          impact: low
          mitigation: |-
            The task explicitly specifies runtime.GOOS (runtime check, not build tag).
            The import list includes "runtime". go build and go vet gates will catch
            unused imports immediately.
state: SCOUT_PENDING
original_branch: main
injection_method: hook
