pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A accesses session.mu directly. The mu field is unexported but package-internal
            (manager.go and types.go share package session). If the agent incorrectly treats
            this as inaccessible and tries another approach (double-locking via SetStatus), it
            may introduce a deadlock because SetStatus also acquires mu.
          likelihood: low
          impact: high
          mitigation: |
            Brief explicitly states that mu is accessible within package session and instructs
            direct access. Brief also warns NOT to call SetStatus while holding mu.
        - scenario: |
            Agent C changes the ReopenDocument signature to accept an optional languageID
            parameter, causing compilation failures in internal/tools/analysis.go and
            internal/resources/resources.go (both call ReopenDocument with 2 args).
          likelihood: medium
          impact: high
          mitigation: |
            Brief explicitly instructs Agent C to keep the signature unchanged and implement
            the fix entirely inside the function body using languageIDFromURI. Callers are
            named explicitly as out-of-scope.
        - scenario: |
            Agent A's mu.Lock()/Unlock() around the status read in Evaluate conflicts with
            the immediately following SetStatus(StatusEvaluating) call (which also acquires mu).
            If the agent forgets the Unlock before SetStatus, it will deadlock.
          likelihood: low
          impact: high
          mitigation: |
            Brief uses explicit capture pattern (currentStatus := session.Status; session.mu.Unlock())
            with Unlock called before the if-guard, well before SetStatus is reached.
        - scenario: |
            Agent D deletes the deactivate method but the logging import in registry.go becomes
            unused if deactivate was providing coverage for a logging path not shared by Activate.
          likelihood: low
          impact: low
          mitigation: |
            Brief notes that Activate also calls logging.Log, so the import remains used.
            Agent should verify with go vet after deletion.
