waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Fix session locking races in manager.go

            ### What to implement

            Fix two independent bugs in `internal/session/manager.go`:

            **Bug 1 (Finding 1, manager.go:204): StatusEvaluating set before Acquire**

            In `Evaluate()`, `SetStatus(StatusEvaluating)` is called at line 204 BEFORE
            `m.executor.Acquire(ctx, session)` at line 207. If `Acquire` returns an error
            (e.g. context cancelled while waiting for the semaphore), the session is
            permanently stuck in `StatusEvaluating` — which is not an accepted state for any
            subsequent operation — making the session permanently unusable without `Destroy`.

            Fix: Move `session.SetStatus(StatusEvaluating)` to AFTER `Acquire` succeeds,
            i.e. immediately after line 209 (`defer m.executor.Release(session)`).

            Exact text to replace in `Evaluate()`:

            ```go
            	// Update status to evaluating.
            	session.SetStatus(StatusEvaluating)

            	// Acquire executor lock.
            	if err := m.executor.Acquire(ctx, session); err != nil {
            		return nil, fmt.Errorf("acquiring executor: %w", err)
            	}
            	defer m.executor.Release(session)
            ```

            Replace with:

            ```go
            	// Acquire executor lock before marking evaluating — a failed acquire must
            	// leave the session retryable (StatusMutated or StatusEvaluated), not
            	// permanently stuck in StatusEvaluating.
            	if err := m.executor.Acquire(ctx, session); err != nil {
            		return nil, fmt.Errorf("acquiring executor: %w", err)
            	}
            	defer m.executor.Release(session)

            	// Update status to evaluating only after acquisition succeeds.
            	session.SetStatus(StatusEvaluating)
            ```

            **Bug 2 (Finding 2, manager.go:199,319): session.Status read without lock**

            `session.Status` is read directly (without holding `session.mu`) in two places:
            - Lines 199-200: the state guard in `Evaluate()`
            - Lines 319-320: the state guard in `Commit()`

            `SetStatus()` acquires `session.mu` on writes. The symmetric reads must also be
            guarded. `IsTerminal()` and `IsDirty()` already lock correctly — use the same
            pattern here.

            For each of the two guards, wrap the `session.Status` read in a short-lived lock
            to capture the status value, then use it in the guard and the error message:

            In `Evaluate()`, replace:

            ```go
            	// Verify status is valid for evaluation.
            	if session.Status != StatusMutated && session.Status != StatusEvaluated {
            		return nil, fmt.Errorf("session %s cannot be evaluated in state %s", sessionID, session.Status)
            	}
            ```

            With:

            ```go
            	// Verify status is valid for evaluation — read under lock to avoid data race.
            	session.mu.Lock()
            	currentStatus := session.Status
            	session.mu.Unlock()
            	if currentStatus != StatusMutated && currentStatus != StatusEvaluated {
            		return nil, fmt.Errorf("session %s cannot be evaluated in state %s", sessionID, currentStatus)
            	}
            ```

            In `Commit()`, replace:

            ```go
            	// Verify status is valid for commit.
            	if session.Status != StatusMutated && session.Status != StatusEvaluated {
            		return nil, fmt.Errorf("session %s cannot be committed in state %s", sessionID, session.Status)
            	}
            ```

            With:

            ```go
            	// Verify status is valid for commit — read under lock to avoid data race.
            	session.mu.Lock()
            	currentStatus := session.Status
            	session.mu.Unlock()
            	if currentStatus != StatusMutated && currentStatus != StatusEvaluated {
            		return nil, fmt.Errorf("session %s cannot be committed in state %s", sessionID, currentStatus)
            	}
            ```

            Note: `mu` is an unexported field on `SimulationSession` in `internal/session/types.go`.
            `manager.go` is in the same package (`package session`), so direct access is valid.

            ### Tests to write

            Add a test to `internal/session/manager_test.go` that verifies Finding 1:
            call `Evaluate` with a pre-cancelled context and verify the session status
            remains `StatusMutated` (not `StatusEvaluating`) after the call returns an error.

            Finding 2 (race) is best caught by the Go race detector. Add a comment near
            the fix referring to `go test -race` to catch regressions.

            ### Verification gate

            ```bash
            env GOWORK=off go build ./internal/session/...
            env GOWORK=off go vet ./internal/session/...
            env GOWORK=off go test ./internal/session/...
            # Postcondition: SetStatus(StatusEvaluating) appears AFTER Acquire in Evaluate
            grep -A5 'executor.Acquire' internal/session/manager.go | grep -c 'StatusEvaluating'
            # Expected: 1 (SetStatus follows Acquire)
            # Postcondition: session.mu.Lock() appears before the status guard in Evaluate
            grep -c 'session.mu.Lock()' internal/session/manager.go
            # Expected: 2 (one in Evaluate, one in Commit)
            ```

            ### Constraints
            - Do NOT modify `internal/session/types.go` — `SimulationSession`, `SetStatus`,
              `IsTerminal`, and `IsDirty` are not in your ownership.
            - Do NOT modify files outside `internal/session/manager.go` and the test file.
            - The `mu` field on `SimulationSession` is unexported but accessible within
              `package session`. Access it directly as `session.mu.Lock()`.
          files:
            - internal/session/manager.go
        - id: B
          task: |
            ## Agent B — Fix missing Discard on Evaluate failure in simulation.go

            ### What to implement

            Fix Finding 3 in `internal/tools/simulation.go`.

            In `HandleSimulateEditAtomic`, `defer mgr.Destroy(ctx, sessionID)` is registered
            at line 315. The deferred `mgr.Discard(ctx, sessionID)` at line 332 reverts the
            LSP client's in-memory document back to the original on-disk content. However,
            when `Evaluate` fails (lines 325-327), the function returns early and `Discard`
            is never called. `Destroy` does NOT revert LSP state — it only removes the
            session map entry. The LSP client is left holding the modified file content.

            Fix: Add `_ = mgr.Discard(ctx, sessionID)` before the early return on Evaluate
            failure.

            Exact text to replace (lines 324-328):

            ```go
            	// Evaluate
            	evalResult, err := mgr.Evaluate(ctx, sessionID, scope, timeoutMs)
            	if err != nil {
            		return types.ErrorResult(fmt.Sprintf("evaluate failed: %s", err)), nil
            	}
            ```

            Replace with:

            ```go
            	// Evaluate
            	evalResult, err := mgr.Evaluate(ctx, sessionID, scope, timeoutMs)
            	if err != nil {
            		// Discard before returning to revert LSP in-memory state; Destroy
            		// (registered as defer above) does not revert LSP document content.
            		_ = mgr.Discard(ctx, sessionID)
            		return types.ErrorResult(fmt.Sprintf("evaluate failed: %s", err)), nil
            	}
            ```

            ### Tests to write

            No new test file needed. The fix is a correctness guard. Add a comment explaining
            the invariant: `Discard` must be called before any early return path so the LSP
            client does not retain stale in-memory content.

            If there is an existing test for `HandleSimulateEditAtomic` in
            `internal/tools/simulation_test.go` or similar, verify it passes. Do not modify
            test files not in your ownership.

            ### Verification gate

            ```bash
            env GOWORK=off go build ./internal/tools/...
            env GOWORK=off go vet ./internal/tools/...
            env GOWORK=off go test ./internal/tools/...
            # Postcondition: Discard is called before the early return on Evaluate failure
            grep -A3 'evaluate failed' internal/tools/simulation.go | grep -c 'Discard'
            # Expected: 1
            ```

            ### Constraints
            - Do NOT modify `internal/session/manager.go` or any file outside
              `internal/tools/simulation.go`.
            - The `mgr.Discard` call must be `_ = mgr.Discard(...)` (ignore error) to
              match the existing pattern at line 332, since the session is being
              cleaned up and the error is not actionable.
          files:
            - internal/tools/simulation.go
        - id: C
          task: |
            ## Agent C — Fix context timeout and language ID in client.go

            ### What to implement

            Fix two independent bugs in `internal/lsp/client.go`:

            **Bug 1 (Finding 4, client.go:290): context.Background() with no timeout**

            In the `"workspace/applyEdit"` dispatch branch, `ApplyWorkspaceEdit` is called
            with a plain `context.Background()` that has no deadline. File I/O and LSP
            notifications on large workspace edits can block the read loop indefinitely.

            Fix: Replace `context.Background()` with a 30-second timeout context, matching
            the `defaultTimeout` constant already defined in this file.

            Exact text to replace (around line 290):

            ```go
            			applyErr = c.ApplyWorkspaceEdit(context.Background(), p.Edit)
            ```

            Replace with:

            ```go
            			applyCtx, applyCancel := context.WithTimeout(context.Background(), defaultTimeout)
            			applyErr = c.ApplyWorkspaceEdit(applyCtx, p.Edit)
            			applyCancel()
            ```

            Note: `defaultTimeout` is `30 * time.Second`, defined at the top of `client.go`.
            No new import is needed — `context` is already imported.

            **Bug 2 (Finding 5, client.go:834): "plaintext" hardcoded language ID**

            In `ReopenDocument`, the untracked-URI fallback (disk open) uses a hardcoded
            `"plaintext"` language ID. Some LSP servers (e.g. gopls) silently ignore files
            opened with unrecognized language IDs, returning no diagnostics.

            Fix: Infer the language ID from the URI's file extension using a local helper
            function. Keep the `ReopenDocument` signature unchanged — all callers remain
            unmodified.

            Add a private function `languageIDFromURI` immediately before `ReopenDocument`:

            ```go
            // languageIDFromURI infers a language ID from a file:// URI by extension.
            // Mirrors the extension→language mapping in internal/lsp/manager.go inferLanguageID.
            // Falls back to "plaintext" for unknown extensions.
            func languageIDFromURI(uri string) string {
            	// Strip query/fragment and extract path.
            	lower := strings.ToLower(uri)
            	// Find last dot after the last slash.
            	if idx := strings.LastIndex(lower, "."); idx >= 0 {
            		ext := lower[idx+1:]
            		// Strip any fragment or query suffix.
            		if end := strings.IndexAny(ext, "?#"); end >= 0 {
            			ext = ext[:end]
            		}
            		switch ext {
            		case "go":
            			return "go"
            		case "ts", "tsx":
            			return "typescript"
            		case "js", "jsx":
            			return "javascript"
            		case "py":
            			return "python"
            		case "rs":
            			return "rust"
            		case "hs", "lhs":
            			return "haskell"
            		case "rb":
            			return "ruby"
            		case "cs":
            			return "csharp"
            		case "kt", "kts":
            			return "kotlin"
            		case "ml", "mli":
            			return "ocaml"
            		case "c":
            			return "c"
            		case "cpp", "cc", "cxx":
            			return "cpp"
            		case "java":
            			return "java"
            		}
            	}
            	return "plaintext"
            }
            ```

            Then in `ReopenDocument`, replace:

            ```go
            		return c.OpenDocument(ctx, uri, string(data), "plaintext")
            ```

            With:

            ```go
            		return c.OpenDocument(ctx, uri, string(data), languageIDFromURI(uri))
            ```

            ### Tests to write

            For Bug 2, add a test `TestLanguageIDFromURI` in `internal/lsp/client_test.go`
            (or whichever test file exists for `client.go`) verifying:
            - `languageIDFromURI("file:///foo/bar.go")` returns `"go"`
            - `languageIDFromURI("file:///foo/bar.ts")` returns `"typescript"`
            - `languageIDFromURI("file:///foo/bar.py")` returns `"python"`
            - `languageIDFromURI("file:///foo/bar.unknown")` returns `"plaintext"`
            - `languageIDFromURI("file:///foo/Makefile")` returns `"plaintext"`

            For Bug 1, no test is needed beyond verifying the build and vet pass — the
            context.WithTimeout fix is straightforward.

            ### Verification gate

            ```bash
            env GOWORK=off go build ./internal/lsp/...
            env GOWORK=off go vet ./internal/lsp/...
            env GOWORK=off go test ./internal/lsp/...
            # Postcondition: no bare context.Background() in workspace/applyEdit branch
            grep -A5 'workspace/applyEdit' internal/lsp/client.go | grep -c 'context.Background()'
            # Expected: 0 (replaced by context.WithTimeout)
            # Postcondition: languageIDFromURI function exists
            grep -c 'func languageIDFromURI' internal/lsp/client.go
            # Expected: 1
            # Postcondition: "plaintext" hardcode gone from ReopenDocument untracked branch
            grep -A8 'URI not tracked' internal/lsp/client.go | grep -c '"plaintext"'
            # Expected: 0
            ```

            ### Constraints
            - Do NOT change the signature of `ReopenDocument` — callers in
              `internal/tools/analysis.go` and `internal/resources/resources.go` are NOT
              in your ownership and must remain unmodified.
            - Do NOT modify any file outside `internal/lsp/client.go` and the existing
              `internal/lsp/client_test.go`.
            - `languageIDFromURI` must be unexported (lowercase). It is package-internal.
          files:
            - internal/lsp/client.go
        - id: D
          task: |
            ## Agent D — Delete dead deactivate method and its test in registry.go

            ### What to implement

            Fix Finding 6 in `internal/extensions/registry.go` and
            `internal/extensions/registry_test.go`.

            The `deactivate` method (lines 75-84 of `registry.go`) has no production callers.
            It was unexported in audit-2 (previously `Deactivate`). The only caller is the
            test `TestRegistry_Deactivate` in `registry_test.go`. Since runtime extension
            deactivation is not a planned feature, delete both.

            **In `internal/extensions/registry.go`:**

            Delete the entire `deactivate` method block. Exact text to remove:

            ```go
            // deactivate removes an extension from the registry.
            func (r *ExtensionRegistry) deactivate(languageID string) {
            	safe := sanitizeRE.ReplaceAllString(languageID, "")

            	r.mu.Lock()
            	delete(r.extensions, safe)
            	r.mu.Unlock()

            	logging.Log(logging.LevelInfo, "deactivated extension for language: "+safe)
            }
            ```

            **In `internal/extensions/registry_test.go`:**

            Delete the entire `TestRegistry_Deactivate` test function. Exact text to remove:

            ```go
            // TestRegistry_Deactivate verifies that handlers are no longer returned after
            // an extension has been deactivated.
            func TestRegistry_Deactivate(t *testing.T) {
            	resetFactories()

            	handler := func(ctx interface{}, args map[string]interface{}) (types.ToolResult, error) {
            		return types.TextResult("ok"), nil
            	}
            	RegisterFactory("python", func() types.Extension {
            		return &mockExtension{
            			toolHandlers: map[string]types.ToolHandler{
            				"run": handler,
            			},
            		}
            	})

            	r := NewRegistry()
            	if err := r.Activate("python"); err != nil {
            		t.Fatalf("unexpected error: %v", err)
            	}
            	if len(r.ToolHandlers()) != 1 {
            		t.Fatalf("expected 1 handler after activation")
            	}

            	r.deactivate("python")
            	if len(r.ToolHandlers()) != 0 {
            		t.Fatalf("expected 0 handlers after deactivation, got %d", len(r.ToolHandlers()))
            	}
            	if _, ok := r.extensions["python"]; ok {
            		t.Fatal("expected extension to be removed from registry after deactivation")
            	}
            }
            ```

            After deletion, verify the remaining tests still pass.

            ### Tests to write

            No new tests needed. This is dead code removal.

            ### Verification gate

            ```bash
            env GOWORK=off go build ./internal/extensions/...
            env GOWORK=off go vet ./internal/extensions/...
            env GOWORK=off go test ./internal/extensions/...
            # Postcondition: deactivate method gone
            grep -c 'func.*deactivate' internal/extensions/registry.go
            # Expected: 0
            # Postcondition: TestRegistry_Deactivate test gone
            grep -c 'TestRegistry_Deactivate' internal/extensions/registry_test.go
            # Expected: 0
            ```

            ### Constraints
            - Do NOT modify any file outside `internal/extensions/registry.go` and
              `internal/extensions/registry_test.go`.
            - Do NOT add a comment like "// reserved for future use" — the audit
              explicitly recommends deletion since runtime deactivation is not planned.
            - After deleting `deactivate`, check that the `logging` import in registry.go
              is still used by `Activate`. If `deactivate` was the only user of a specific
              log message pattern, the import is fine — `Activate` also calls
              `logging.Log`. Do not remove the import.
          files:
            - internal/extensions/registry.go
            - internal/extensions/registry_test.go
