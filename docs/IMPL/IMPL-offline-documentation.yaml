            **Required imports** (match build_tools_test.go exactly):
            ```go
            package main_test

            import (
                "context"
                "encoding/json"
                "fmt"
                "testing"

                "github.com/modelcontextprotocol/go-sdk/mcp"
            )
            ```

            **Test: TestGetSymbolDocumentation**

            This is a standalone test (not a subtest of TestMultiLanguage) that:
            1. Builds or finds the agent-lsp binary using `getMultilangBinary(t)`. Skip
               if binary unavailable.
            2. Starts the MCP server and creates a session (follow the pattern from
