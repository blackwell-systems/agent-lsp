title: Offline Symbol Documentation
feature_slug: offline-documentation
verdict: SUITABLE
suitability_assessment: |
    All five suitability criteria clear:

    1. File decomposition: At least 6 files change across disjoint ownership boundaries.
       Core dispatcher (internal/tools/documentation.go), server registration
       (cmd/agent-lsp/server.go), docs update (docs/tools.md), changelog
       (CHANGELOG.md), skill (skills/lsp-docs/SKILL.md), and integration test
       (test/documentation_test.go). No two tasks require conflicting modifications
       to the same file in the same wave.

    2. No investigation-first items: The pattern is established — exec-based language
       dispatch exactly mirrors run_build/run_tests in runner.go. No root-cause
       analysis needed.

    3. Interface discoverability: The DocResult struct and HandleGetSymbolDocumentation
       signature can be fully specified before any agent begins. The MCP args struct
       follows the established GetSymbolSourceArgs pattern verbatim.

    4. Pre-implementation status: Feature does not yet exist. No items are DONE or
       PARTIAL. The tools.md has no get_symbol_documentation entry; CHANGELOG has no
       mention of it; skills/ has no lsp-docs directory.

    5. Parallelization value: Go build + test cycle is ~10s (GOWORK=off go build + test
       ./internal/... ./cmd/...). Agent A (core tool, 2 files) and Agent B (docs +
       skill, 2 files) are fully independent — no shared types between them. Wave 1
       runs 2 agents in parallel. Agent C (integration test, 1 new file) waits for
       Wave 1 to confirm the tool is registered. Clear speedup vs sequential.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: Wave 1 ~15 min (2 agents x ~15 min each, parallel);
      Wave 2 ~10 min (1 agent)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min
    Sequential baseline: ~40 min (3 agents x ~13 min avg sequential)
    Time savings: ~10 min (25% faster)
    Recommendation: Clear speedup. The two Wave 1 agents are fully independent and
    benefit from parallel execution.

    multi_lang_test.go assessment: At 2106 lines, adding to it would push it further
    into unmaintainability. The new test belongs in test/documentation_test.go as a
    dedicated file. It shares the package (main_test), uses the same helpers
    (callTool, textFromResult, getMultilangBinary), and avoids the already-oversized
    multi_lang_test.go. This is consistent with how build_tools_test.go was split out.
test_command: GOWORK=off go test ./internal/... ./cmd/...
lint_command: GOWORK=off go vet ./...
