            ## What to implement

            ### Feature: `agent-lsp doctor` subcommand

            `agent-lsp doctor` is a diagnostic command. When run it:
            1. Auto-detects installed language servers (via config.AutodetectServers) OR
               accepts the same server spec args as the normal invocation (parsed via
               config.ParseArgs if args are present).
            2. For each server, starts it briefly (lsp.NewLSPClient + client.Initialize),
               calls GetServerInfo and GetCapabilities, then shuts it down.
            3. Prints a human-readable report to stdout: server name, version, startup
               status, and which LSP capabilities are supported (plus which MCP tools
               that enables).
            4. Exits 0 if all servers started OK; exits 1 if any server failed.

            The pattern to follow is `runInit` in cmd/agent-lsp/init.go — same package,
            same os.Exit-based error handling, same style.

            ### Step 1: Create cmd/agent-lsp/doctor.go

            ```go
            package main

            import (
                "context"
                "fmt"
                "os"
                "sort"
                "time"

                "github.com/blackwell-systems/agent-lsp/internal/config"
                "github.com/blackwell-systems/agent-lsp/internal/lsp"
                "github.com/blackwell-systems/agent-lsp/internal/tools"
            )

            // DoctorResult holds the diagnostic result for one language server.
            type DoctorResult struct {
                LanguageID    string
                Binary        string
                Status        string // "ok" | "failed"
                Error         string // non-empty when Status=="failed"
                ServerName    string
                ServerVersion string
                Capabilities  []string // sorted capability keys
                Tools         []string // MCP tool names enabled
            }
            ```

            Then implement `runDoctor(args []string)`:

            - If len(args) == 0: call `config.AutodetectServers()` to get the server list.
              If autodetect returns no servers, print a helpful message and exit 1.
            - If len(args) > 0: call `config.ParseArgs(args)` to parse them (same as main).
              Build the server list from the parsed config.
            - For each server entry, run `probeServer(entry)` which:
              - Creates a temp directory as the root dir (use `os.MkdirTemp("", "agent-lsp-doctor-*")`).
              - Calls `lsp.NewLSPClient(entry.Command[0], entry.Command[1:])`.
              - Calls `client.Initialize(ctx, tmpDir)` with a 30-second timeout context.
              - On success: calls `client.GetServerInfo()` and `client.GetCapabilities()`,
                derives the enabled tool list using the capabilityToolMap pattern from
                `internal/tools/capabilities.go` (read that file for the map), then calls
                `client.Shutdown(ctx)`.
              - On error: records Status="failed", Error=err.Error(), calls Shutdown best-effort.
              - Returns a DoctorResult.
            - Print results using `printDoctorReport(results []DoctorResult)`.
            - Exit 1 if any result has Status=="failed".

