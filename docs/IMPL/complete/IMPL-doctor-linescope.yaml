            Add the helper `toIntOptional` at the bottom of position_pattern.go:

            ```go
            // toIntOptional reads an integer arg, returning 0 and no error when absent.
            func toIntOptional(args map[string]interface{}, key string) (int, error) {
                v, ok := args[key]
                if !ok || v == nil {
                    return 0, nil
                }
                switch n := v.(type) {
                case float64:
                    return int(n), nil
                case int:
                    return n, nil
                case int64:
                    return int(n), nil
                }
                return 0, fmt.Errorf("%s must be an integer, got %T", key, v)
            }
            ```

            **Note on toInt:** The existing `toInt` function is in internal/tools/analysis.go
            (package-private, same package). You may call it directly, but it returns an
