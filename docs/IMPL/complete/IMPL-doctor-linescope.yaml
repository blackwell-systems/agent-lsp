pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A copies capabilityToolMap from internal/tools/capabilities.go but the
            local copy becomes stale when capabilities.go is updated in the future.
          likelihood: medium
          impact: low
          mitigation: |-
            Add a comment in doctorCapabilityMap referencing capabilities.go as the
            canonical source. The map is small (19 entries) and easy to diff. Accept
            the duplication as a deliberate trade-off to avoid exporting internal state.
        - scenario: |-
            Agent A's runDoctor starts real LSP servers during tests, making tests
            flaky or slow (gopls not installed in CI).
          likelihood: medium
          impact: medium
          mitigation: |-
            Task brief explicitly prohibits integration tests. All tests in doctor_test.go
            test only printDoctorReport (pure formatting) and buildDoctorEntries (pure
            data transformation). probeServer is not called from any test.
        - scenario: |-
            Agent B's resolveInContent helper has a subtle off-by-one when slicing
            lines: joining with "\n" produces content without trailing newline, causing
            line count to differ from the original file.
          likelihood: medium
          impact: medium
          mitigation: |-
            The line-translation formula (sliceLine + startLine - 1) compensates for
            the offset. Test TestResolvePositionPatternInRange_Basic exercises a match
            on line 3 of a 3-line file to validate the translation. If the formula is
            wrong, this test fails immediately.
        - scenario: |-
            Agent B adds toIntOptional to position_pattern.go but a function with
            the same name already exists elsewhere in package tools, causing a
            duplicate symbol compile error.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B must grep for "toIntOptional" in the package before writing. The
            name is distinctive and does not appear in the current codebase. The
            existing toInt (in analysis.go) returns an error on missing keys — it is
            intentionally different.
        - scenario: |-
            The doctor subcommand uses os.MkdirTemp as the LSP root, but some
            language servers reject a root directory with no project files and return
            an error during initialization.
          likelihood: medium
          impact: low
          mitigation: |-
            Status="failed" for servers that reject the empty root is acceptable output
            for a diagnostic tool. The report says which servers failed and why, which
            is useful information. Doctor is not a correctness guarantee — it is a
            health check. Consider using the user's cwd as a fallback root if tmpDir
            causes issues.
        - scenario: |-
            Agent B modifies the body of ResolvePositionPattern directly instead of
            extracting it into resolveInContent, producing code duplication.
          likelihood: low
          impact: low
          mitigation: |-
            Task brief prescribes the exact refactor: extract resolveInContent, have
            both ResolvePositionPattern and ResolvePositionPatternInRange call it.
            Postcondition check verifies 'func resolveInContent' exists in the file.
