    - type: build
      command: GOWORK=off go build ./...
      required: true
    - type: test
      command: GOWORK=off go test ./...
      required: true

pre_mortem:
  overall_risk: low
  rows:
    - scenario: |
        SubscribeHandler added without UnsubscribeHandler. SDK panics at startup.
      likelihood: low
      impact: high
      mitigation: Both handlers must be set together per SDK contract.
    - scenario: |
        NotifyFunc uses request ctx instead of context.Background(). Async
        notifications fail silently after the subscribe RPC completes.
      likelihood: medium
      impact: medium
      mitigation: Always use context.Background() inside the notify closure.
