            ## C2 — Set initialized = false in exit-monitor goroutine

            In the start() function, locate the exit-monitor goroutine body. The
            current body reads:
            ```
            		err := cmd.Wait()
            		exitErr := fmt.Errorf("lsp process exited: %w", err)
            		c.rejectPending(exitErr)
            		if err != nil {
            			c.stderrMu.Lock()
            			buf := string(c.stderrBuf)
            			c.stderrMu.Unlock()
            			logging.Log(logging.LevelError, fmt.Sprintf("LSP server exited with error. Last stderr:\n%s", buf))
            		}
            ```

            Insert three lines after c.rejectPending(exitErr) and before the if block:
            ```go
