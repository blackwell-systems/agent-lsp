pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent A registers the c.watcher = nil defer AFTER watcher.Close(), meaning
            Close runs first (LIFO). A subsequent addWatcherRoot call gets c.watcher
            pointing to a closed watcher and watcher.Add returns an error silently.
          likelihood: medium
          impact: high
          mitigation: |
            IMPL brief specifies exact defer order with LIFO explanation. The nil-assignment
            defer must be registered AFTER watcher.Close() so it runs FIRST. Postcondition
            grep cannot catch this; a test calling AddWorkspaceFolder twice would catch it.
        - scenario: |
            Agent B updates nameMap to compound key but forgets to update Pass 2 to use
            nameByBare for ContainerName lookup. Children never attach to parents.
          likelihood: medium
          impact: high
          mitigation: |
            IMPL brief explicitly specifies the Pass 2 change. Postcondition checks
            nameByBare count >= 3. An existing test exercising parent-child symbol wiring
            would catch this — Agent B should verify such a test exists or add one.
        - scenario: |
            Agent C's per-session mutex map grows unbounded as sessions are destroyed
            without cleanup, leaking memory over many sessions.
          likelihood: low
          impact: low
          mitigation: |
            Typical sessions <10 concurrent. Note in completion report as known limitation
            for a follow-up cleanup pass.
        - scenario: |
            Agent D defines utf16Offset in workspace.go instead of position_pattern.go,
            causing a duplicate function declaration when both files are compiled together.
          likelihood: low
          impact: medium
          mitigation: |
            IMPL brief explicitly specifies position_pattern.go as the definition location.
            The Go build will catch a duplicate declaration immediately.
        - scenario: |
            Agent G2's build fails because Agent A's wave-1 client.go changes are not
            yet merged when wave-2 quality gates run in isolation.
          likelihood: high
          impact: medium
          mitigation: |
            Expected ordering. Wave 2 runs after wave 1 merges. Post-wave-2 quality gate
            covers full build. Agent G2 notes this in their completion report.
        - scenario: |
            Agent A's L2 fix does not promptly return on ctx cancellation because
            sync.Cond.Wait does not select on ctx.Done(). The non-blocking select inside
            the loop only fires on each Broadcast wake, not immediately on cancellation.
          likelihood: low
          impact: low
          mitigation: |
            The 60s hard deadline still applies. True ctx-aware waking requires a separate
            goroutine signalling the Cond on ctx.Done(). Acceptable as a follow-up; document
            in completion report.
