            		c.initialized = false
            		c.mu.Unlock()
            ```

            ## C1 — Multi-root watcher (CRITICAL regression)

            AddWorkspaceFolder calls c.startWatcher(path) which stops the previous watcher
            goroutine and starts a new one watching only the new path. The original
            workspace root goes dark.

            Fix: store *fsnotify.Watcher on the struct so AddWorkspaceFolder can add
            directories to the running watcher without restarting it.

            ### Step 1: Add watcher field to LSPClient struct

            In the struct, after this exact text:
            ```
            	watcherMu   sync.Mutex // guards watcherStop (C2: prevents data race)
            	watcherStop chan struct{}
            ```

            Insert:
            ```go
            	watcher     *fsnotify.Watcher  // C1: held so addWatcherRoot can Add() new dirs
            ```

            ### Step 2: Update startWatcher to store c.watcher

            In startWatcher, the goroutine starts with:
            ```
            		watcher, err := fsnotify.NewWatcher()
            		if err != nil {
            			logging.Log(logging.LevelDebug, "auto-watcher: failed to create watcher: "+err.Error())
            			return
            		}
            		defer watcher.Close()
            ```

            Replace with:
            ```go
            		watcher, err := fsnotify.NewWatcher()
            		if err != nil {
            			logging.Log(logging.LevelDebug, "auto-watcher: failed to create watcher: "+err.Error())
            			return
            		}
            		// Register Close first so nil-assignment defer (registered after) runs first (LIFO).
            		defer watcher.Close()
            		c.watcherMu.Lock()
            		c.watcher = watcher
            		c.watcherMu.Unlock()
            		defer func() {
            			c.watcherMu.Lock()
            			c.watcher = nil
            			c.watcherMu.Unlock()
            		}()
            ```

            LIFO execution order: nil-assignment defer (registered last) runs first,
            then watcher.Close(). This ensures c.watcher is nil before the watcher is
            closed, preventing addWatcherRoot from calling Add on a closed watcher.

            ### Step 3: Implement addWatcherRoot

            Add a new method after stopWatcherLocked:
            ```go
            // addWatcherRoot adds path and its subdirectories to the existing running
            // watcher. It is a no-op if no watcher is running (c.watcher == nil).
            // This allows AddWorkspaceFolder to extend coverage without restarting
            // the watcher and losing the original workspace root.
            func (c *LSPClient) addWatcherRoot(path string) {
            	c.watcherMu.Lock()
            	w := c.watcher
            	c.watcherMu.Unlock()
            	if w == nil {
            		return
            	}
            	_ = filepath.WalkDir(path, func(p string, d os.DirEntry, err error) error {
            		if err != nil || !d.IsDir() {
            			return nil
            		}
            		if watcherSkipDirs[d.Name()] || (strings.HasPrefix(d.Name(), ".") && d.Name() != ".") {
            			return filepath.SkipDir
            		}
            		_ = w.Add(p)
            		return nil
            	})
            }
            ```

            ### Step 4: Update AddWorkspaceFolder

            Replace the c.startWatcher(path) call. The current code around line 1846-1849:
            ```
            	// Extend the auto-watcher to cover the new folder.
            	// H2: was incorrectly passing c.rootDir; pass path so the new folder is watched.
            	c.startWatcher(path)
            	return nil
            ```

            Change to:
            ```go
