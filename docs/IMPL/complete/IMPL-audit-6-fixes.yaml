            func diagnosticFingerprint(d types.LSPDiagnostic) string {
            	return fmt.Sprintf("%d\x00%d\x00%d\x00%d\x00%s\x00%d",
            		d.Range.Start.Line,
            		d.Range.Start.Character,
            		d.Range.End.Line,
