            ## H3 — UTF-16 column offsets

            LSP positions use UTF-16 code-unit offsets, not byte offsets:
            - ASCII (U+0000..U+007F): 1 byte = 1 UTF-16 unit
            - U+0080..U+FFFF: 2-4 UTF-8 bytes = 1 UTF-16 unit
            - U+10000+: 4 UTF-8 bytes = 2 UTF-16 units (surrogate pair)

            ### Step 1: Add utf16Offset to position_pattern.go

            Add "unicode/utf8" to the imports. Then add this function (can be placed
            after the existing imports, before ResolvePositionPattern):

            ```go
            // utf16Offset returns the number of UTF-16 code units that precede
            // byteOffset in the UTF-8 string line, per LSP spec §3.4.
            // byteOffset must fall on a rune boundary within line.
            func utf16Offset(line string, byteOffset int) int {
            	units := 0
            	i := 0
            	for i < byteOffset {
            		r, size := utf8.DecodeRuneInString(line[i:])
            		if r >= 0x10000 {
            			units += 2 // surrogate pair in UTF-16
            		} else {
            			units++
            		}
            		i += size
            	}
            	return units
            }
            ```

            ### Step 2: Update ResolvePositionPattern column calculation

            Current code (around line 43-49):
            ```
            	// col is 1-indexed: distance from the last newline before offset
            	lastNL := strings.LastIndex(fileContent[:offset], "\n")
            	if lastNL < 0 {
            		// no newline before offset means we're on the first line
            		col = offset + 1
            	} else {
            		col = offset - lastNL
            	}
            ```

            Replace with:
            ```go
            // col is 1-indexed UTF-16 code-unit offset from the start of the line.
            var lineStart int
            lastNL := strings.LastIndex(fileContent[:offset], "\n")
            if lastNL < 0 {
            	lineStart = 0
            } else {
            	lineStart = lastNL + 1
            }
            lineContent := fileContent[lineStart:offset]
            col = utf16Offset(lineContent, len(lineContent)) + 1
            ```

