            Replace the entire contents of executor.go:

            ```go
            package session

            import (
            	"context"
            	"sync"
            )

            // SerializedExecutor serializes operations per-session using a per-session
            // mutex map. Independent sessions do not block each other, unlike the
            // previous global semaphore approach.
            type SerializedExecutor struct {
            	mu           sync.Mutex
            	sessionLocks map[string]*sync.Mutex
            }

            // NewSerializedExecutor creates a new SerializedExecutor.
            func NewSerializedExecutor() *SerializedExecutor {
            	return &SerializedExecutor{
            		sessionLocks: make(map[string]*sync.Mutex),
            	}
            }

            // lockFor returns the per-session mutex for s, creating it if needed.
            func (e *SerializedExecutor) lockFor(s *SimulationSession) *sync.Mutex {
            	e.mu.Lock()
            	defer e.mu.Unlock()
            	if m, ok := e.sessionLocks[s.ID]; ok {
            		return m
            	}
            	m := &sync.Mutex{}
            	e.sessionLocks[s.ID] = m
            	return m
            }

            // Acquire locks the per-session mutex for exclusive session access.
            // Returns ctx.Err() if the context is cancelled before the lock is acquired.
            func (e *SerializedExecutor) Acquire(ctx context.Context, s *SimulationSession) error {
            	m := e.lockFor(s)
            	acquired := make(chan struct{}, 1)
            	go func() {
            		m.Lock()
            		acquired <- struct{}{}
            	}()
            	select {
            	case <-acquired:
            		return nil
            	case <-ctx.Done():
            		// Drain the goroutine and immediately unlock to avoid a leaked lock.
            		<-acquired
            		m.Unlock()
            		return ctx.Err()
            	}
            }

            // Release unlocks the per-session mutex after the operation completes.
            func (e *SerializedExecutor) Release(s *SimulationSession) {
            	e.mu.Lock()
            	m := e.sessionLocks[s.ID]
            	e.mu.Unlock()
            	if m != nil {
            		m.Unlock()
            	}
            }
            ```

