            	// C1: addWatcherRoot adds the new path to the existing watcher goroutine
            	// so the original workspace root remains watched.
            	c.addWatcherRoot(path)
            	return nil
            ```

            ## L2 — Replace 100ms busy-poll with condition variable

            waitForWorkspaceReady polls progressTokens every 100ms. Replace with a
            sync.Cond so handleProgress signals waiters immediately when the last
            token is removed.

            ### Step 1: Add progressCond field

            In the struct, after this exact text:
