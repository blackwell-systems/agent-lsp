            ## H2 — Per-session locking

            IMPORTANT: Do not reuse SimulationSession.mu from types.go for executor
            locking — that mutex is used by MarkDirty, IsDirty, IsTerminal, SetStatus
            and would deadlock if held by the executor. You cannot modify types.go
