interface_contracts:
    - name: ModulePath
      description: |
        The Go module path changes from the old value to the new value. All import
        strings in every .go file that reference internal packages must be updated
        to match the new module path declared in go.mod.
      definition: |
        Old: github.com/blackwell-systems/lsp-mcp-go
        New: github.com/blackwell-systems/agent-lsp

        Example old import block:
          import (
            "github.com/blackwell-systems/lsp-mcp-go/internal/lsp"
            "github.com/blackwell-systems/lsp-mcp-go/internal/types"
          )

        Example new import block:
          import (
            "github.com/blackwell-systems/agent-lsp/internal/lsp"
            "github.com/blackwell-systems/agent-lsp/internal/types"
          )
      location: go.mod
    - name: CmdDirectoryRename
      description: |
        The cmd entry-point directory is renamed from cmd/lsp-mcp-go to cmd/agent-lsp.
        Agent A must perform this as a git mv before editing the files within it.
      definition: |
        git mv cmd/lsp-mcp-go cmd/agent-lsp
        # Then update import paths inside cmd/agent-lsp/main.go and cmd/agent-lsp/server.go
      location: cmd/lsp-mcp-go/
    - name: BinaryName
      description: |
        The compiled binary name changes from lsp-mcp-go to agent-lsp. References in
        .goreleaser.yml, .mcp.json, saw.config.json, and docs must all be updated.
      definition: |
        Old binary name: lsp-mcp-go
        New binary name: agent-lsp

        .goreleaser.yml changes (all occurrences):
          project_name: lsp-mcp-go  ->  project_name: agent-lsp
          id: lsp-mcp-go            ->  id: agent-lsp
          main: ./cmd/lsp-mcp-go    ->  main: ./cmd/agent-lsp
          binary: lsp-mcp-go        ->  binary: agent-lsp
          archives ids: lsp-mcp-go  ->  agent-lsp
          release name: lsp-mcp-go  ->  name: agent-lsp

        .mcp.json:
          "command": "/Users/dayna.blackwell/go/bin/lsp-mcp-go"
          -> "command": "/Users/dayna.blackwell/go/bin/agent-lsp"

        saw.config.json:
          "name": "lsp-mcp-go"  ->  "name": "agent-lsp"
      location: .goreleaser.yml
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Module path + cmd/ directory rename agent for the lsp-mcp-go -> agent-lsp rename.

            ## Repo
            Work in `/Users/dayna.blackwell/code/LSP-MCP-GO`.

            ## What to implement

            ### Step 1: Update go.mod module path
            Run these commands in the repo root:
              go mod edit -module github.com/blackwell-systems/agent-lsp
              env GOWORK=off go mod tidy

            ### Step 2: Rename the cmd directory
            Run:
              git mv cmd/lsp-mcp-go cmd/agent-lsp

            This moves the files to `cmd/agent-lsp/main.go` and `cmd/agent-lsp/server.go`.

            ### Step 3: Update import paths inside cmd/agent-lsp/main.go and cmd/agent-lsp/server.go
            In both files, replace every occurrence of:
              github.com/blackwell-systems/lsp-mcp-go
            with:
              github.com/blackwell-systems/agent-lsp

            Use text-match (string search) mode.

            ### Step 4: Update bare string literals in cmd/agent-lsp/server.go and cmd/agent-lsp/main.go
            These files contain bare `"lsp-mcp-go"` string literals (not import paths) that must
            also be renamed. Examples:
            - `Name: "lsp-mcp-go"` in a struct literal (clientInfo or similar)
            - Log message strings containing `lsp-mcp-go`
            - Usage/description strings containing `lsp-mcp-go`
            - main.go usage message strings (4 occurrences around lines 26-29)

            For each file, after replacing the import path, also run:
              grep -n '"lsp-mcp-go"' cmd/agent-lsp/server.go cmd/agent-lsp/main.go
            Replace every remaining `"lsp-mcp-go"` occurrence with `"agent-lsp"`.

            ### Step 4: Scoped build check
            Run only the scoped build — NOT ./... — other agents are mid-edit on other packages:
              env GOWORK=off go build ./cmd/agent-lsp/...

            ## Verification gate
            ```
            grep "module github.com/blackwell-systems/agent-lsp" go.mod
            # Expect: 1 match

            grep -r "blackwell-systems/lsp-mcp-go" cmd/agent-lsp/
            # Expect: 0 matches

            ls cmd/
            # Expect: agent-lsp listed, lsp-mcp-go NOT present

            env GOWORK=off go build ./cmd/agent-lsp/...
            # Expect: exit 0
            ```

            ## Constraints
            - Do NOT modify any files outside: go.mod, cmd/agent-lsp/main.go, cmd/agent-lsp/server.go
            - Do NOT touch internal/ packages — those are owned by Agents B, C, C2, D, D2
            - Do NOT run go build ./... — other agents have not finished their import updates
          files:
            - go.mod
            - cmd/lsp-mcp-go/main.go
            - cmd/lsp-mcp-go/server.go
