pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A runs go build ./... before other agents have updated their import paths.
            The build fails because internal packages still reference the old module path.
            Agent A may then try to fix other packages, stomping on other agents' ownership.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A task explicitly instructs: build only ./cmd/agent-lsp/... not ./...
            The verification gate uses the scoped build command. The full ./... build runs
            only post-merge as a quality gate.
        - scenario: |
            Agent A creates cmd/agent-lsp/ manually instead of using git mv, leaving the
            old cmd/lsp-mcp-go/ directory still present. This would cause a duplicate
            binary build configuration in .goreleaser.yml until Agent F updates it.
          likelihood: low
          impact: medium
          mitigation: |
            Agent A task explicitly specifies `git mv cmd/lsp-mcp-go cmd/agent-lsp` as
            the required rename step. Postcondition check verifies `ls cmd/` does not
            list lsp-mcp-go.
        - scenario: |
            Agent G modifies docs/IMPL/ historical records, corrupting completed IMPL
            records for earlier features.
          likelihood: low
          impact: low
          mitigation: |
            Agent G task explicitly states "Do NOT modify docs/IMPL/".
            Agent G2 task includes the same constraint.
        - scenario: |
            Agent F updates .goreleaser.yml but misses the `ids:` array entry
            (- lsp-mcp-go under archives) leaving a mismatched build/archive reference
            that breaks GoReleaser.
          likelihood: medium
          impact: low
          mitigation: |
            Agent F task lists every specific occurrence to replace in .goreleaser.yml
            including the ids array entry. The verification gate greps for any remaining
            occurrences across all owned files.
        - scenario: |
            After all agents complete, go build ./... fails because a file was missed
            — for example a test helper file in internal/tools that imports the module
            path but was not confirmed in the grep scan.
          likelihood: low
          impact: low
          mitigation: |
            The post-merge quality gate runs env GOWORK=off go build ./... and will
            immediately surface any missed import path replacement. Per-agent grep
            postcondition checks also provide early detection within each package scope.
