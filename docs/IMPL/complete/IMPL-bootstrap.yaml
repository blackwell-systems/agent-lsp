          task: |-
            ## Role
            Implement the MCP resource handlers and subscription system in `internal/resources/`.
            This covers 4 MCP resource types (lsp-diagnostics, lsp-hover, lsp-completions),
            live subscription support for diagnostics, and the resource list generator.

            ## Package
            `package resources` in `internal/resources/`
            Import path: `github.com/blackwell-systems/lsp-mcp-go/internal/resources`

            ## Files to Create
            - `internal/resources/resources.go` — resource read handlers and resource list generator
            - `internal/resources/subscriptions.go` — subscription/unsubscription handlers
            - `internal/resources/resources_test.go` — unit tests

            ## Imports to Use
            ```go
            import (
                "github.com/blackwell-systems/lsp-mcp-go/internal/lsp"
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
                "github.com/blackwell-systems/lsp-mcp-go/internal/logging"
            )
            ```

            ## Interfaces to Implement

            ### resources.go
            ```go
            // ResourceResult is returned by resource read handlers.
            type ResourceResult struct {
                URI      string `json:"uri"`
                MIMEType string `json:"mimeType"`
                Text     string `json:"text"`
            }

            // HandleDiagnosticsResource handles lsp-diagnostics:// reads.
            // If the URI has a non-root path (e.g. lsp-diagnostics:///path/to/file),
            // returns diagnostics for that file. If path is empty or "/", returns all.
            func HandleDiagnosticsResource(ctx context.Context, client *lsp.LSPClient, uri string) (ResourceResult, error)

            // HandleHoverResource handles lsp-hover:// reads.
            // URI format: lsp-hover:///path/to/file?line=N&column=N&language_id=X
            func HandleHoverResource(ctx context.Context, client *lsp.LSPClient, uri string) (ResourceResult, error)

            // HandleCompletionsResource handles lsp-completions:// reads.
            // URI format: lsp-completions:///path/to/file?line=N&column=N&language_id=X
            func HandleCompletionsResource(ctx context.Context, client *lsp.LSPClient, uri string) (ResourceResult, error)

            // GenerateResourceList returns the dynamic list of available resources
            // based on currently open documents. Returns nil if client is nil.
            func GenerateResourceList(client *lsp.LSPClient) []ResourceEntry

            // ResourceEntry describes a single available MCP resource.
            type ResourceEntry struct {
                URI         string `json:"uri"`
                Name        string `json:"name"`
                Description string `json:"description"`
                Subscribe   bool   `json:"subscribe"`
                Template    bool   `json:"template,omitempty"`
            }

            // ResourceTemplates returns the static resource template definitions
            // for the MCP server's resources/templates/list response.
            func ResourceTemplates() []ResourceTemplate

            type ResourceTemplate struct {
                Name        string `json:"name"`
                URITemplate string `json:"uriTemplate"`
                Description string `json:"description"`
            }
            ```

            ### subscriptions.go
            ```go
            // SubscriptionContext holds state for an active resource subscription.
            type SubscriptionContext struct {
                Callback types.DiagnosticUpdateCallback
            }

            // NotifyFunc is called by the subscription handler to send resource update notifications.
            // The caller (Wave 2 server.go) provides the actual MCP notification function.
            type NotifyFunc func(uri string)

            // HandleSubscribeDiagnostics sets up a diagnostic subscription.
            // Returns a SubscriptionContext to pass to HandleUnsubscribeDiagnostics.
            func HandleSubscribeDiagnostics(
                ctx context.Context,
                client *lsp.LSPClient,
                uri string,
                notify NotifyFunc,
            ) (*SubscriptionContext, error)

            // HandleUnsubscribeDiagnostics removes a diagnostic subscription.
            func HandleUnsubscribeDiagnostics(
                ctx context.Context,
                client *lsp.LSPClient,
                uri string,
                sub *SubscriptionContext,
            ) error
            ```

            ## URI Parsing Requirements (from src/resources/index.ts)
            - Parse resource URIs with `net/url.Parse`
            - lsp-diagnostics path: URL.Path — normalize to remove leading slash when path is "/"
            - For hover and completions: extract `line`, `column`, `language_id` query params
            - line and column are 1-indexed in URI; convert to 0-based for LSP calls
            - language_id query param is required for hover and completions

            ## Behavioral Requirements

            ### HandleDiagnosticsResource
            - If path is non-empty and not "/": reopen that specific file, wait for diagnostics,
              return JSON of {fileURI: diagnostics[]}
            - If path is empty or "/": reopen all documents, wait for all open URIs,
              return JSON of {uri: diagnostics[]} for open documents only

            ### HandleHoverResource
            - Read file from disk, open document, call client.GetInfoOnLocation
            - Return the hover text directly (not JSON-wrapped)

            ### HandleCompletionsResource
            - Read file from disk, open document, call client.GetCompletion
            - Return JSON.Marshal of completions array

            ### Subscription
            - Subscribe by calling client.SubscribeToDiagnostics with a callback
            - Callback calls notify(uri) when a diagnostic update arrives for the subscribed URI
            - For "all files" subscription (path="/" or empty): call notify for any open file update
            - Store callback in SubscriptionContext for unsubscription

            ### GenerateResourceList
            - Returns "lsp-diagnostics://" as a static "all diagnostics" resource
            - For each open document (URI starting with "file://"):
              - Convert URI to file path, get base name
              - Add: lsp-diagnostics:///filePath (subscribe=true)
              - Add: lsp-hover:///filePath?line={line}&column={column}&language_id={language_id} (template=true)
              - Add: lsp-completions:///filePath?line={line}&column={column}&language_id={language_id} (template=true)

            ## Tests to Write
            1. TestHandleDiagnosticsResource_AllFiles — nil path returns all open document diagnostics
            2. TestHandleDiagnosticsResource_SpecificFile — path returns only that file's diagnostics
            3. TestGenerateResourceList_EmptyClient — nil client returns nil
            4. TestGenerateResourceList_WithOpenDocs — one open doc produces 3 resource entries + 1 static
            5. TestHandleSubscribeDiagnostics_FileSpecific — subscription callback fires for correct URI
            6. TestHandleUnsubscribeDiagnostics — after unsubscribe, callback not called

