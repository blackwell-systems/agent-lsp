            - `internal/extensions/registry_test.go` — unit tests
            - `extensions/haskell/haskell.go` — Haskell extension (stub, returns nil handlers)

            ## Imports to Use
            ```go
            import (
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
                "github.com/blackwell-systems/lsp-mcp-go/internal/logging"
            )
            ```

            ## Interface to Implement

            ### registry.go
            ```go
            // ExtensionRegistry manages per-language extension plugins.
            // Thread-safe via sync.RWMutex.
            type ExtensionRegistry struct {
                mu         sync.RWMutex
                extensions map[string]types.Extension
            }

            // NewRegistry creates an empty ExtensionRegistry.
            func NewRegistry() *ExtensionRegistry

            // Activate loads and registers an extension for the given language ID.
            // If no extension exists for the language, returns nil (not an error).
            // Language IDs are sanitized to alphanumeric + hyphens only.
            func (r *ExtensionRegistry) Activate(languageID string) error

            // Deactivate removes an extension from the registry.
            func (r *ExtensionRegistry) Deactivate(languageID string)

            // ToolHandlers returns the merged map of all tool handlers across active extensions.
            // Keys are prefixed with "<languageID>." to avoid conflicts.
            func (r *ExtensionRegistry) ToolHandlers() map[string]types.ToolHandler

            // ResourceHandlers returns the merged map of all resource handlers across active extensions.
            // Keys are prefixed with "<languageID>." to avoid conflicts.
            func (r *ExtensionRegistry) ResourceHandlers() map[string]types.ResourceHandler
            ```

            ### Extension Loading Strategy (Go port of TypeScript dynamic import)
            Since Go does not have runtime dynamic imports, extensions are registered
            via a compile-time factory map. The registry looks up the language ID in
            a built-in factory table:

            ```go
            // In registry.go, define a package-level factory map.
            // Extensions register themselves by calling RegisterFactory at init() time.
            var factories = map[string]func() types.Extension{}

            // RegisterFactory registers an extension factory for a language ID.
            // Called from extension packages' init() functions.
            func RegisterFactory(languageID string, factory func() types.Extension)
            ```

            Extensions (e.g., extensions/haskell/haskell.go) call `extensions.RegisterFactory`
            in their `init()` function. The cmd/main.go (Wave 2) blank-imports all known
            extension packages to trigger their init() calls.

            ### extensions/haskell/haskell.go
            ```go
            package haskell

            import (
                "github.com/blackwell-systems/lsp-mcp-go/internal/extensions"
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
            )

            func init() {
                extensions.RegisterFactory("haskell", func() types.Extension { return &HaskellExtension{} })
            }

            type HaskellExtension struct{}

            func (h *HaskellExtension) ToolHandlers() map[string]types.ToolHandler     { return nil }
            func (h *HaskellExtension) ResourceHandlers() map[string]types.ResourceHandler { return nil }
            ```

            ## Tests to Write
            1. TestNewRegistry_Empty — new registry has no extensions
            2. TestRegistry_Activate_UnknownLanguage — Activate("cobol") returns nil, no error
            3. TestRegistry_Activate_KnownLanguage — after RegisterFactory, Activate creates extension
            4. TestRegistry_ToolHandlers_Prefixed — registered extension handler appears with language prefix
            5. TestRegistry_Deactivate — after Deactivate, handlers no longer returned

            ## Verification Gate
            ```bash
            go build ./internal/extensions/... ./extensions/...
            go vet ./internal/extensions/... ./extensions/...
            go test ./internal/extensions/... -v -timeout 30s
            # Postconditions:
            grep -c "func NewRegistry" internal/extensions/registry.go  # expected: 1
            grep -c "func RegisterFactory" internal/extensions/registry.go  # expected: 1
            grep -c "func init" extensions/haskell/haskell.go  # expected: 1
            ```

            ## Constraints
            - Do NOT define types.Extension, types.ToolHandler, or types.ResourceHandler —
              those are scaffold-owned.
            - Do NOT import from internal/tools, internal/lsp, or internal/resources — the
              extensions package only depends on internal/types and internal/logging.
            - Do NOT touch go.mod.
            - The haskell.go init() function must import `_ "github.com/blackwell-systems/lsp-mcp-go/internal/extensions"`
              to trigger its RegisterFactory call — the blank import is intentional.
            - Factories map must be protected by a sync.RWMutex or initialized at package-init time
              only (no concurrent writes after startup).
          files:
            - internal/extensions/registry.go
            - internal/extensions/registry_test.go
            - extensions/haskell/haskell.go
