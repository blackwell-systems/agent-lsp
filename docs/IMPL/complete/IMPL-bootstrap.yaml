            go vet ./internal/resources/...
            go test ./internal/resources/... -v -timeout 30s
            # Postconditions:
            grep -c "func HandleDiagnosticsResource" internal/resources/resources.go   # expected: 1
            grep -c "func HandleSubscribeDiagnostics" internal/resources/subscriptions.go  # expected: 1
            grep -c "func GenerateResourceList" internal/resources/resources.go  # expected: 1
            ```

