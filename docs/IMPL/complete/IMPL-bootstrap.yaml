pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Go MCP SDK API surface unknown — mcp.AddTool, mcp.NewServer, transport setup
            may differ from what Agent E assumes. The SDK is v1.4.1 and the exact function
            signatures may require adjustment after `go get`.
          likelihood: high
          impact: medium
          mitigation: |-
            Agent E must run `go get github.com/modelcontextprotocol/go-sdk@v1.4.1` and
            then read the SDK package docs (`go doc`) before writing server.go. Tool
            registration pattern in the task is illustrative — agent should verify
            actual mcp.AddTool signature from the SDK source.
        - scenario: |-
            Logging scaffold stubs conflict with logging_impl.go. Go does not allow
            duplicate function declarations in the same package, even across files.
          likelihood: high
          impact: medium
          mitigation: |-
            Agent E is explicitly told: if function redeclaration fails, edit logging.go
            directly. Scaffold stubs have empty bodies so they are safe to replace.
            Alternatively, the logging.go scaffold can be changed to declare only the
            type and constants (not function stubs) and let logging_impl.go declare the
            functions entirely.
        - scenario: |-
            LSP subprocess framing bug: Content-Length byte count vs UTF-16 code units.
            The TypeScript reference specifically calls out this bug fix.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent A's constraints explicitly state byte-based buffer (Buffer in Go =
            []byte). The framing.go FrameReader must use len(body) for Content-Length,
            not len(string(body)). TestFrameReader_MultiByteUnicode test catches this.
        - scenario: |-
            Race condition on `initialized` flag: setting it AFTER sending `initialized`
            notification (reversed from TypeScript fix).
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent A's behavioral requirements explicitly state: "Set initialized = true
            BEFORE sending the initialized notification." This mirrors the TypeScript
            race fix from src/lspClient.ts line 566.
        - scenario: |-
            Types package circular import: internal/logging imports internal/types,
            but internal/types might need to import logging for error formatting.
          likelihood: low
          impact: high
          mitigation: |-
            The scaffold types.go contains no logging references. All logging calls
            flow through internal/logging only. types package must never import logging.
        - scenario: |-
            Extension factory map concurrent write: RegisterFactory called at init() from
            multiple goroutines if extensions are in separate goroutines.
          likelihood: low
          impact: low
          mitigation: |-
            init() functions in Go run sequentially (not concurrently). Factory map
            writes during init() are safe without locks. Reads during runtime are read-only
            after init() completes. Agent D's constraints document this.
        - scenario: |-
            withDocument in tools package needs to import from lsp package, creating
            a potential import cycle if lsp imports tools.
          likelihood: low
          impact: high
          mitigation: |-
            Dependency direction is strictly: cmd -> tools -> lsp -> types <- logging.
            tools imports lsp; lsp does NOT import tools. resources also imports lsp.
            No cycles are possible given this directed graph.
