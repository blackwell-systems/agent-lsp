waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Role
            Implement the LSP subprocess client in `internal/lsp/`. This is the core I/O layer
            that communicates with the language server process over stdin/stdout using the
            Content-Length framing protocol (JSON-RPC 2.0).

            ## Package
            `package lsp` in `internal/lsp/`
            Import path: `github.com/blackwell-systems/lsp-mcp-go/internal/lsp`

            ## Files to Create
            - `internal/lsp/framing.go` — Content-Length encode/decode
            - `internal/lsp/client.go` — LSPClient struct and all public methods
            - `internal/lsp/client_test.go` — unit tests
            - `internal/lsp/diagnostics.go` — WaitForDiagnostics helper
            - `internal/lsp/diagnostics_test.go` — diagnostics tests

            ## Imports to Use
            ```go
            import (
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
                "github.com/blackwell-systems/lsp-mcp-go/internal/logging"
            )
            ```

            ## Interface to Implement (exact signatures — binding contract)

            ### framing.go
            ```go
            // EncodeMessage encodes a JSON-RPC message with Content-Length header.
            // Returns "Content-Length: N\r\n\r\n" + JSON body as bytes.
            func EncodeMessage(body []byte) []byte

            // FrameReader reads Content-Length-framed messages from an io.Reader.
            type FrameReader struct { /* unexported */ }
            func NewFrameReader(r io.Reader) *FrameReader
            // ReadMessage blocks until a complete message is available.
            // Returns raw JSON body bytes or error.
            func (fr *FrameReader) ReadMessage() ([]byte, error)
            ```

            ### client.go (all methods matching LSPClient interface contract)
            ```go
