            ## Argument Validation (mirror TypeScript Zod schemas from src/types/index.ts)
            All position args use 1-indexed line/column (≥1). Validate at handler entry:
            - Positions: line >= 1, column >= 1
            - Ranges: start_line >= 1, start_column >= 1, end_line >= 1, end_column >= 1;
              start must not be after end (same rule as Zod refine in FormatRangeArgsSchema)
            - Required string fields: reject empty string with descriptive error
            - Use `types.ErrorResult(msg)` for validation errors (not Go error returns)

            ## Coordinate Conversion (1-indexed → 0-indexed for LSP)
            ```
            lsp.Position{Line: line-1, Character: col-1}
            ```
            All LSP calls use 0-based positions. All formatted output uses 1-based positions.

            ## Response Formatting
            - All tools return `{ content: [{ type: "text", text: <JSON string> }] }`
            - Navigation tools (go_to_definition, go_to_type_definition, go_to_implementation,
              go_to_declaration, get_references): format locations as types.FormattedLocation
              (1-indexed, file path not URI — use URIToFilePath)
            - get_diagnostics: JSON marshal the map[uri][]LSPDiagnostic
            - get_info_on_location: return raw hover string (not JSON-wrapped)

            ## Tool-Specific Behavioral Requirements

            ### start_lsp
            - If existing client is non-nil, call Shutdown before creating new one
            - On error: return types.ErrorResult (isError=true), do NOT return Go error
            - Required arg: root_dir (string)
            - On success: setClient(newClient), return success text

            ### get_diagnostics
            - If file_path provided: call ReopenDocument then WaitForDiagnostics, then GetDiagnostics
            - If file_path absent: call ReopenAllDocuments, get all open URIs, WaitForDiagnostics for all,
              then GetAllDiagnostics filtered to only open documents
            - Import `lsp.WaitForDiagnostics` from the lsp package

            ### get_references
            - Uses WithDocument — the LSPClient.GetReferences internally calls waitForWorkspaceReady
              before the LSP request (already in lsp package)

            ### restart_lsp_server
            - Optional arg: root_dir (string). If absent, restart with same root.
            - Delegates to client.Restart(ctx, rootDir)

            ### set_log_level
            - Valid levels: debug, info, notice, warning, error, critical, alert, emergency
            - Calls logging.SetLevel(level)

