            ### diagnostics.go
            ```go
            // WaitForDiagnostics waits for diagnostic stabilisation for all uris.
            // Ignores initial snapshot, requires one fresh notification per URI, then
            // waits for a 500ms quiet window. Resolves on timeout without error.
            func WaitForDiagnostics(ctx context.Context, client *LSPClient, uris []string, timeoutMs int) error
            ```

            ## Behavioral Requirements (from TypeScript reference src/lspClient.ts)

            ### Framing
            - Buffer must be byte-based (Content-Length is a UTF-8 byte count, not a UTF-16 code unit count)
            - Max buffer size: 10MB — discard entire buffer on overflow to prevent mid-message parse corruption
            - Header separator: `\r\n\r\n` (4 bytes)
            - Parse header as ASCII, body as UTF-8

            ### Request/Response Correlation
            - Requests use auto-incrementing integer IDs starting at 1
            - Store pending promises in a map[int]chan; reject all on process close/error
            - Per-method timeouts (see TypeScript REQUEST_TIMEOUTS map):
              - initialize: 300s (JVM servers are slow)
              - textDocument/references: 120s
              - all others: 30s

            ### Server-Initiated Requests (must be handled before workspace loads)
            - `window/workDoneProgress/create`: pre-register token in activeProgressTokens, respond null
            - `workspace/configuration`: respond with array of nulls (one per requested item)
            - `client/registerCapability`: respond null
            - Unknown server requests: respond null to unblock gopls

            ### Progress Tracking (workspace readiness)
            - Track `$/progress` begin/end tokens in a set
            - `GetReferences` calls `waitForWorkspaceReady()` before the LSP request
            - `waitForWorkspaceReady` blocks until activeProgressTokens is empty or timeout (60s)

            ### Initialization
            - Set `initialized = true` BEFORE sending the `initialized` notification (race fix)
            - Send `initialized` notification immediately after setting the flag
            - Client capabilities must include: hover, completion, references, definition,
              implementation, typeDefinition, declaration, codeAction, signatureHelp,
              documentSymbol, rename, formatting, publishDiagnostics (relatedInformation, tagSupport)
            - `workspace.configuration: true` (required for gopls)
            - `window.workDoneProgress: true` (required for progress tracking)

            ### Document Management
            - Track open documents in a set, versions in a map (start at 1)
            - If document already open on OpenDocument: send didChange (full update), increment version
            - Store filePath and languageID per URI for reopening
            - ReopenDocument: close (didClose without removing metadata), re-read from disk, re-open

            ### ApplyWorkspaceEdit
            - Supports both `changes` (map<uri, TextEdit[]>) and `documentChanges` (TextDocumentEdit[])
            - Apply edits in reverse order (bottom-to-top) to preserve character offsets
            - After writing: send didChange with new content for each modified file
            - Multi-line edit: split by "\n", splice lines array, rejoin with "\n"

            ### Process Lifecycle
            - Stderr: buffer last 4KB for crash diagnostics; log at debug level during normal operation
            - On process close with non-zero code: log last stderr buffer; reject pending promises
            - On process error event: reject all pending promises with the error
            - EPIPE prevention: attach error handlers to stdin/stdout/stderr pipes

            ### LocationLink normalization
            - GetDefinition, GetTypeDefinition, GetImplementation, GetDeclaration:
              if response item has `targetUri`, return `{uri: loc.targetUri, range: loc.targetRange}`
              Otherwise use item as-is.

            ### Capability checks
            - Before each LSP request, check relevant serverCapabilities field
            - If capability missing, return empty result (not error) and log at debug level
            - prepareRename additionally checks `renameProvider.prepareProvider` boolean

            ## Tests to Write
            1. TestFrameReader_SingleMessage — encode then decode a message, verify roundtrip
            2. TestFrameReader_MultiByteUnicode — body containing multi-byte UTF-8 chars (→, •)
            3. TestFrameReader_BufferFlush — partial message followed by completion
            4. TestLSPClient_ServerRequestHandling — mock process that sends window/workDoneProgress/create,
               verify token pre-registered and null response sent
            5. TestLSPClient_ProgressTracking — begin/end tokens update activeProgressTokens correctly
            6. TestWaitForDiagnostics_SettlesAfterQuietWindow — mock LSPClient, fire two callbacks, verify resolves
            7. TestWaitForDiagnostics_Timeout — fire no callbacks, verify resolves after timeout

            ## Verification Gate
            ```bash
            go build ./internal/lsp/...
            go vet ./internal/lsp/...
            go test ./internal/lsp/... -v -timeout 60s
            # Postconditions:
            grep -c "func NewLSPClient" internal/lsp/client.go  # expected: 1
            grep -c "func WaitForDiagnostics" internal/lsp/diagnostics.go  # expected: 1
            grep -c "func EncodeMessage" internal/lsp/framing.go  # expected: 1
            ```

            ## Constraints
            - Do NOT define types.LSPDiagnostic, types.Position, types.Range, types.Location,
              types.DiagnosticUpdateCallback, or types.FileChangeEvent — these are in the scaffold.
            - Do NOT implement any MCP SDK registration — that is Wave 2's job (Agent E).
            - Do NOT touch go.mod — it is owned by the Scaffold Agent.
            - Use `sync.Mutex` for all shared state; the client will be called from multiple goroutines.
            - Run LSP subprocess with `os/exec.Cmd` + explicit `StdinPipe/StdoutPipe/StderrPipe`.
            - Do NOT add recovery from panics inside goroutines — that is handled by the server wrapper in Wave 2.
            - The `initialized` field must be set to `true` BEFORE sending the `initialized` notification.
          files:
