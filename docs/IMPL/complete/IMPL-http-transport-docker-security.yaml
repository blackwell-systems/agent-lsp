pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Agent A imports internal/httpauth before Agent B has merged. In isolated
            worktrees, the package does not exist on Agent A's branch, causing
            compilation failure. Agent A may stub the function itself, creating a
            duplicate declaration at merge time.
          likelihood: high
          impact: high
          mitigation: |-
            The scaffold (internal/httpauth/auth.go with the stub signature) is
            created before Wave 1 launches. Agent A compiles against the scaffold.
            Agent B's branch replaces the scaffold with the real implementation.
            Both branches see the symbol; merge produces one definition.
        - scenario: |-
            Agent A changes Run's signature (adds 3 new parameters) but the call
            site in runWithRecovery in main.go is not updated to match, causing
            a compile error on merge.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent A owns both main.go and server.go. Both call sites and the
            function definition are in A's ownership. The task explicitly instructs
            A to update runWithRecovery and its call in main.go.
        - scenario: |-
            Docker USER nonroot breaks the entrypoint because the entrypoint writes
            to /var/cache/lsp-servers as root, which nonroot cannot access.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent C's task explicitly adds "chown -R nonroot:nonroot /var/cache/lsp-servers"
            to the RUN directive creating that directory, and sets /workspace ownership.
            Verified by grep postconditions.
        - scenario: |-
            entrypoint.sh whitelist misses the GOPATH-prefixed go install command
            used by gopls in lsp-servers.yaml: "GOPATH=/usr/local go install ...".
            The default "go install *" pattern would not match.
          likelihood: high
          impact: medium
          mitigation: |-
            Agent D's task lists "GOPATH=/usr/local go install "* as an explicit
            case before the plain "go install "* case, mirroring what appears in
            docker/lsp-servers.yaml line 9.
        - scenario: |-
            mcp.StreamableHTTPHandler DNS rebinding protection rejects all
            non-localhost requests when the server is exposed on 0.0.0.0 with
            a non-localhost Host header (SDK default: reject if Host != loopback
            but bound to loopback).
          likelihood: low
          impact: medium
          mitigation: |-
            The SDK's DisableLocalhostProtection only kicks in when the local
            listener address IS loopback (127.0.0.1 or [::1]). If agent-lsp binds
            to 0.0.0.0 (addr "":8080"), the protection does not trigger.
            Agent A uses addr fmt.Sprintf(":%d", httpPort) which binds to 0.0.0.0,
            so the protection is inactive. Document in RunHTTP comment.
        - scenario: |-
            docker-compose.yml command list uses ${AGENT_LSP_TOKEN:-} as a bare
            value and Docker passes it as an empty string argument to agent-lsp,
            but ParseArgs doesn't expect a --token flag with an empty value.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent A's ParseArgs implementation must treat --token "" (empty token)
            as equivalent to no --token flag (HTTPToken = ""). BearerTokenMiddleware
            already treats empty token as no-op passthrough. Explicitly stated in
            Agent A's task.
