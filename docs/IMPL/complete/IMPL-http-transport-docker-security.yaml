        # run_install_command() {
        #   cmd="$1"
        #   case "${cmd}" in
        #     "go install "*)      go install ... ;;
        #     "GOPATH=/usr/local go install "*)  GOPATH=/usr/local go install ... ;;
        #     "npm install -g "*)  npm install -g ... ;;
        #     "apt-get update"*)   sh -c "${cmd}" ;;  # apt is multi-step; use sh -c for apt only
        #     "cargo install "*)   cargo install ... ;;
        #     "pip install "*)     pip install ... ;;
