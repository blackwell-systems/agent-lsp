suitability_assessment: |-
    File decomposition: 5 distinct change areas with disjoint ownership.
    - Agent A: CLI flag parsing + transport routing in cmd/agent-lsp (main.go, server.go)
    - Agent B: internal/httpauth package (new file: bearer token middleware)
    - Agent C: Dockerfile hardening (non-root user, EXPOSE)
    - Agent D: entrypoint.sh whitelist replacement (no eval)
    - Agent E: docker-compose.yml update
    All agents work on disjoint files. Wave 1 runs A, B, C, D, E in parallel
    since the Docker/entrypoint/compose changes are independent of Go code, and
    B (httpauth middleware) has no dependency on A's server wiring (A will import
    from B). A integration wave wires A's imports of B into the final binary.

    SDK verification: go-sdk v1.4.1 exports mcp.NewStreamableHTTPHandler (the
    preferred 2025-spec transport) and mcp.NewSSEHandler (legacy 2024 spec).
    StreamableHTTPHandler takes func(*http.Request)*mcp.Server and
    *mcp.StreamableHTTPOptions. Token auth is implemented as an http.Handler
    middleware wrapping the StreamableHTTPHandler — the SDK has no built-in
    Bearer token validation, so Agent B creates a thin net/http middleware.

    Investigation-first items: None. Root transport type and auth approach are
    fully determined from SDK source.

    Parallelization value: High. Go build+test cycle ~3-5s, agents touch
    3-6 files each, and the Go work (CLI flags + transport routing) is independent
    of the Docker work.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~5 agents x 8 min avg, runs as single wave = ~8 min wall-clock
    - Integration wave: ~5 min
    - Merge and verification: ~5 min
    Total SAW time: ~28 min
    Sequential baseline: ~5 x 12 min = ~60 min
    Time savings: ~32 min (~53% faster)
