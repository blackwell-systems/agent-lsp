interface_contracts:
    - name: BearerTokenMiddleware
      description: |-
        net/http middleware that validates the Authorization: Bearer <token> header.
        If token is empty string, the middleware is a no-op passthrough.
        Returns 401 with JSON body {"error":"unauthorized"} on mismatch.
      definition: |-
        // Package httpauth provides HTTP authentication middleware for agent-lsp.
        package httpauth

        import (
            "encoding/json"
            "net/http"
            "strings"
        )

        // BearerTokenMiddleware returns an http.Handler that enforces Bearer token
        // authentication when token is non-empty. Requests without a matching
        // Authorization header receive HTTP 401. When token is empty, all requests
        // pass through without validation (useful for local/stdio mode).
        func BearerTokenMiddleware(token string, next http.Handler) http.Handler
      location: internal/httpauth/auth.go
    - name: RunHTTP
      description: |-
        Runs the MCP server over HTTP/SSE (StreamableHTTPHandler) on the given
        address, wrapping the handler in token middleware when token is non-empty.
        Called by Run when --http flag is present.
      definition: |-
        // RunHTTP starts an HTTP server exposing the MCP server via the go-sdk's
        // StreamableHTTPHandler. addr is "host:port" (e.g. ":8080").
        // token is the Bearer token required by clients; empty means no auth.
        // ctx cancellation triggers graceful shutdown.
        func RunHTTP(ctx context.Context, server *mcp.Server, addr string, token string) error
      location: cmd/agent-lsp/server.go
    - name: ParseArgs (extended)
      description: |-
        ParseArgs is unchanged in signature but its output ParseResult gains three
        new fields: HTTPMode bool, HTTPPort int, HTTPToken string.
        Flags parsed: --http (bool), --port <int> (default 8080), --token <string>.
        These flags are consumed before the existing positional argument parsing.
      definition: |-
        // ParseResult extended fields (added to existing struct in config/parse.go):
        //   HTTPMode  bool   // true when --http flag present
        //   HTTPPort  int    // port number from --port flag (default 8080)
        //   HTTPToken string // bearer token from --token flag (empty = no auth)
        //
        // ParseArgs signature is unchanged:
        // func ParseArgs(args []string) (ParseResult, error)
      location: internal/config/parse.go
    - name: AllowedCommands whitelist
      description: |-
        Replaces the eval "${install_cmd}" call in entrypoint.sh with a
        whitelist-based dispatcher. The whitelist covers all package managers
        that appear in lsp-servers.yaml: go install, npm install -g, apt-get,
        gem install, pip install, dotnet tool install, cargo install.
        Unknown commands print a warning and are skipped (not executed).
      definition: |-
