            ## Task: Fix SerializedExecutor context propagation (Finding 2)

            ### What to implement

            File: internal/session/executor.go

            The current implementation uses sync.Mutex which ignores the context passed
            to Acquire. Replace it with a buffered channel semaphore pattern so that
            Acquire returns ctx.Err() when the context is cancelled before the lock is
            available.

            **Exact changes to executor.go:**

            Replace the entire file contents. The new file must be:

            ```go
            package session

            import (
                "context"
            )

            // SerializedExecutor is the V1 implementation of SessionExecutor.
            // It serializes all session operations through a single buffered-channel
            // semaphore, ensuring only one session mutates LSP state at a time.
            // Unlike a bare sync.Mutex, this implementation respects context cancellation:
            // Acquire returns ctx.Err() if the context is cancelled while waiting.
            type SerializedExecutor struct {
                sem chan struct{}
            }

            // NewSerializedExecutor creates a new SerializedExecutor.
            func NewSerializedExecutor() *SerializedExecutor {
                return &SerializedExecutor{sem: make(chan struct{}, 1)}
            }

            // Acquire locks the executor for exclusive session access.
            // Returns ctx.Err() if the context is cancelled before the lock is acquired.
            func (e *SerializedExecutor) Acquire(ctx context.Context, s *SimulationSession) error {
                select {
                case e.sem <- struct{}{}:
                    return nil
                case <-ctx.Done():
                    return ctx.Err()
                }
            }

            // Release unlocks the executor after session operation completes.
            func (e *SerializedExecutor) Release(s *SimulationSession) {
                <-e.sem
            }
            ```

            Key changes from the original:
            - `mu sync.Mutex` removed; replaced with `sem chan struct{}`
            - `sync` import removed (only `context` is needed)
            - Acquire uses a select statement to respect ctx cancellation
            - Release drains the channel instead of calling Unlock

            ### New test file: internal/session/executor_test.go

            Create `internal/session/executor_test.go` in `package session`.

            Write two test functions:
            - `TestSerializedExecutor_AcquireRelease`: verify a normal Acquire+Release
              cycle succeeds and a second Acquire succeeds after Release.
            - `TestSerializedExecutor_AcquireCancelledContext`: hold the semaphore (Acquire
              once without releasing), then call Acquire again with a pre-cancelled context
              and verify it returns a non-nil error matching context.Canceled.

            Pattern from manager_test.go: use `t.Fatal` / `t.Fatalf` for assertions,
            no third-party test libraries.

            ### Constraints
            - Do NOT modify any file outside your ownership list (executor.go, executor_test.go).
            - Do NOT add a mutex to the struct alongside the channel. The sync.Mutex must be
              fully removed.
            - The sem channel capacity must be exactly 1 (buffered channel semaphore).

            ### Verification gate
            ```
            env GOWORK=off go build ./internal/session/
            env GOWORK=off go vet ./internal/session/
            env GOWORK=off go test ./internal/session/ -run TestSerializedExecutor
            grep -c "sync.Mutex" internal/session/executor.go
            # Expected output: 0
            grep -c "sem chan struct" internal/session/executor.go
            # Expected output: 1
            ```
