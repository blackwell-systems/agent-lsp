    rows:
        - scenario: |-
            Agent A forgets to remove the sync import after removing sync.Mutex, causing
            a compile error ("imported and not used: sync").
          likelihood: medium
          impact: high
          mitigation: |-
            The verification gate runs go build; the unused import error will surface
            immediately. The task prompt explicitly instructs removal of the sync import.
        - scenario: |-
            Agent B introduces a new import for logging or fmt that is already present,
            causing a compile error ("imported and not used").
          likelihood: low
          impact: high
          mitigation: |-
            Both logging and fmt are already imported in client.go. The task prompt
            explicitly states "do not add new imports." The agent should verify with
            go build before completing.
        - scenario: |-
            Agent C renames Deactivate in registry.go but misses the call site in
            registry_test.go, causing a compile error.
          likelihood: medium
          impact: high
          mitigation: |-
            registry_test.go is explicitly in Agent C's ownership list. The prompt
            provides the exact call site to update as a verbatim code block.
        - scenario: |-
            Agent D deletes the dead dynamic list function from resources.go but
            leaves references to it in the test file, causing a compile error.
          likelihood: medium
          impact: high
          mitigation: |-
            The task prompt explicitly names the three test functions to delete and
            the one test function to update. The verification gate runs go test
            which catches any remaining reference.
        - scenario: |-
            Agent D inserts the AddResourceTemplate loop at the wrong location in
            server.go.
          likelihood: low
          impact: low
          mitigation: |-
            The task prompt provides the exact verbatim insertion point comment
            ("// Subscribe to diagnostic updates for logging purposes...").
        - scenario: |-
            Agent C's initWarning flush in Log() creates a data race under the
            race detector, since initWarning is read/written without holding mu.
          likelihood: low
          impact: medium
          mitigation: |-
            The initWarning variable is written once in init() (before any goroutines
            start) and flushed by the first Log() call. This is safe in practice.
            If the race detector flags it, the agent may guard initWarning under mu
            or use sync/atomic. The prompt does not require this as the trade-off
            for simplicity is acceptable.
