            #### File 3: cmd/lsp-mcp-go/server.go

            Wire ResourceTemplates into the MCP server after the three existing
            AddResource calls. Search for this exact text to locate the insertion point:
            ```go
            	// Subscribe to diagnostic updates for logging purposes (all managed clients).
            	for _, c := range resolver.AllClients() {
            ```

            Insert immediately before that line:
            ```go
            	// Register URI templates for dynamic resource discovery.
            	for _, tmpl := range resources.ResourceTemplates() {
            		t := tmpl // capture loop variable
            		server.AddResourceTemplate(&mcp.ResourceTemplate{
            			Name:        t.Name,
            			URITemplate: t.URITemplate,
            			Description: t.Description,
            		}, func(ctx context.Context, req *mcp.ReadResourceRequest) (*mcp.ReadResourceResult, error) {
            			return nil, mcp.ResourceNotFoundError(req.Params.URI)
            		})
            	}

            ```

            Both packages are already imported in server.go (check the import block).
            The mcp.ResourceTemplate struct fields Name, URITemplate, Description are
