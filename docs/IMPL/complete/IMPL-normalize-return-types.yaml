    1. File decomposition: Three distinct layers change: types (internal/types/types.go),
       LSP client (internal/lsp/client.go), and callers (internal/tools/analysis.go +
       internal/resources/resources.go). Each layer is owned by one agent. Disjoint
       ownership is achievable with 3 sequential waves.

    2. Investigation-first: No unknown root cause. The interface{} return types are
       already identified; the concrete types (DocumentSymbol, CompletionItem/CompletionList,
       CodeAction) are well-specified by the LSP 3.16 spec and follow the project's
       existing patterns (SymbolInformation, CallHierarchyItem, etc.).

    3. Interface discoverability: All contracts can be defined before implementation.
       The JSON field names are known from the LSP spec; existing typed structs in
       internal/types/types.go provide the model.

    4. Pre-implementation check: All three target functions (GetCompletion, GetCodeActions,
       GetDocumentSymbols) currently return []interface{}. The concrete types do not yet
       exist in internal/types/types.go. No work is already done; all items are TODO.

    5. Parallelization value: Wave 1 (types) → Wave 2 (client) → Wave 3 (2 parallel
       callers) provides meaningful parallelism. Build/test cycle is moderate (GOWORK=off
       go build + test). Breaking changes are explicitly acceptable per user context —
       no backwards-compatibility wrappers needed.

    Verdict: SUITABLE. 3 waves, 4 agents. Sequential waves required due to strict
    dependency chain (types → client → callers). Wave 3 has 2 parallel agents.

    Estimated times:
    - Scout phase: ~10 min (completed)
    - Agent execution: ~15 min (4 agents × ~4 min avg, Wave 3 parallel)
    - Merge & verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~20 min (4 agents × 5 min sequential)
    Time savings: marginal in absolute terms; value is correctness and coordination.

    Recommendation: Clear speedup for Wave 3; audit trail value throughout.
