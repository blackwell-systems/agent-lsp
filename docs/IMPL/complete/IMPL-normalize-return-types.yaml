interface_contracts:
    - name: DocumentSymbol
      description: |-
        Concrete type for an LSP DocumentSymbol (textDocument/documentSymbol response item).
        Matches LSP 3.16 DocumentSymbol. Note: LSP servers may return either
        DocumentSymbol[] or SymbolInformation[] from this request; the DocumentSymbol
        type handles the richer nested form.
      definition: |
        // DocumentSymbol represents a symbol in a document (LSP DocumentSymbol).
        type DocumentSymbol struct {
            Name           string         `json:"name"`
            Detail         *string        `json:"detail,omitempty"`
            Kind           SymbolKind     `json:"kind"`
            Tags           []SymbolTag    `json:"tags,omitempty"`
            Deprecated     *bool          `json:"deprecated,omitempty"`
            Range          Range          `json:"range"`
            SelectionRange Range          `json:"selectionRange"`
            Children       []DocumentSymbol `json:"children,omitempty"`
        }
      location: internal/types/types.go
    - name: CompletionItem
      description: |-
        Concrete type for an LSP completion item. Captures the fields that the MCP
        server exposes to callers. Additional LSP fields (textEdit, additionalTextEdits,
        command) are omitted for now — they can be added without breaking changes.
      definition: |
        // CompletionItem represents a single completion suggestion (LSP CompletionItem).
        type CompletionItem struct {
            Label            string   `json:"label"`
            Kind             *int     `json:"kind,omitempty"`
            Detail           *string  `json:"detail,omitempty"`
            Documentation    *string  `json:"documentation,omitempty"`
            Deprecated       *bool    `json:"deprecated,omitempty"`
            Preselect        *bool    `json:"preselect,omitempty"`
            SortText         *string  `json:"sortText,omitempty"`
            FilterText       *string  `json:"filterText,omitempty"`
            InsertText       *string  `json:"insertText,omitempty"`
            InsertTextFormat *int     `json:"insertTextFormat,omitempty"`
        }
      location: internal/types/types.go
    - name: CodeAction
      description: |-
        Concrete type for an LSP code action (textDocument/codeAction response item).
        LSP servers may return either Command or CodeAction objects from codeAction
        requests; this type handles the CodeAction form. The Diagnostics field
        links the action to its triggering diagnostic(s).
      definition: |
        // CodeActionKind is a string-typed code action category (e.g. "quickfix", "refactor").
        type CodeActionKind string

        // CodeAction represents a code action or refactoring suggestion (LSP CodeAction).
        type CodeAction struct {
            Title       string          `json:"title"`
            Kind        *CodeActionKind `json:"kind,omitempty"`
            Diagnostics []LSPDiagnostic `json:"diagnostics,omitempty"`
            IsPreferred *bool           `json:"isPreferred,omitempty"`
            Disabled    *struct {
                Reason string `json:"reason"`
            } `json:"disabled,omitempty"`
            Data        interface{}     `json:"data,omitempty"`
        }
      location: internal/types/types.go
    - name: LSPClient.GetCompletion
      description: |-
        Updated signature: returns ([]types.CompletionItem, error) instead of
        ([]interface{}, error). The parseInterfaceArray helper is replaced by a new
        typed parseCompletionItems function that handles both CompletionList and plain
        []CompletionItem responses from the LSP server.
      definition: |
        func (c *LSPClient) GetCompletion(ctx context.Context, uri string, pos types.Position) ([]types.CompletionItem, error)
      location: internal/lsp/client.go
    - name: LSPClient.GetCodeActions
      description: |-
        Updated signature: returns ([]types.CodeAction, error) instead of
        ([]interface{}, error). A new typed parseCodeActions function replaces
        parseInterfaceArray for this call path.
      definition: |
        func (c *LSPClient) GetCodeActions(ctx context.Context, uri string, rng types.Range) ([]types.CodeAction, error)
      location: internal/lsp/client.go
    - name: LSPClient.GetDocumentSymbols
      description: |-
        Updated signature: returns ([]types.DocumentSymbol, error) instead of
        ([]interface{}, error). A new typed parseDocumentSymbols function replaces
        parseInterfaceArray for this call path. Note: some LSP servers return
        SymbolInformation[] instead of DocumentSymbol[]; the parser should attempt
        DocumentSymbol[] first, then fall back to converting SymbolInformation to
        DocumentSymbol (Name, Kind, Range, SelectionRange=Range fields).
      definition: |
        func (c *LSPClient) GetDocumentSymbols(ctx context.Context, uri string) ([]types.DocumentSymbol, error)
      location: internal/lsp/client.go
    - name: parseCompletionItems
      description: |-
        New private helper in internal/lsp/client.go replacing the use of
        parseInterfaceArray for completion responses. Handles both CompletionList
        {"isIncomplete":bool,"items":[...]} and plain []CompletionItem responses.
      definition: |
        func parseCompletionItems(raw json.RawMessage) []types.CompletionItem
      location: internal/lsp/client.go
    - name: parseCodeActions
      description: |-
        New private helper in internal/lsp/client.go replacing the use of
        parseInterfaceArray for codeAction responses. Handles []CodeAction.
        LSP servers may also return Command objects; those are silently skipped
        (they lack the "title" + "kind" CodeAction fields in a distinctive way —
        a Command has a "command" string field and no "diagnostics").
      definition: |
        func parseCodeActions(raw json.RawMessage) []types.CodeAction
      location: internal/lsp/client.go
    - name: parseDocumentSymbols
      description: |-
        New private helper in internal/lsp/client.go replacing the use of
        parseInterfaceArray for documentSymbol responses. Attempts to unmarshal as
        []DocumentSymbol first (nested form), then falls back to []SymbolInformation
        and converts to DocumentSymbol (using Name, Kind, and Location.Range as both
        Range and SelectionRange). Returns empty slice on failure.
      definition: |
        func parseDocumentSymbols(raw json.RawMessage) []types.DocumentSymbol
      location: internal/lsp/client.go
