            ### parseCompletionItems

            Handles two LSP response shapes:
            - CompletionList: `{"isIncomplete": bool, "items": [...]}`
            - Plain array: `[CompletionItem, ...]`

            ```go
            func parseCompletionItems(raw json.RawMessage) []types.CompletionItem {
                if raw == nil || string(raw) == "null" {
                    return []types.CompletionItem{}
                }
                // Try CompletionList form first: {"isIncomplete":..., "items":[...]}
                var list struct {
                    Items []types.CompletionItem `json:"items"`
                }
                if err := json.Unmarshal(raw, &list); err == nil && list.Items != nil {
                    return list.Items
                }
                // Plain array form
                var items []types.CompletionItem
                if err := json.Unmarshal(raw, &items); err == nil {
                    return items
                }
                return []types.CompletionItem{}
            }
            ```

            ### parseCodeActions

            Handles `[]CodeAction` response (LSP servers may also return Command objects;
            those unmarshal with zero-value Title which is acceptable — they will marshal
            back fine). A clean unmarshal with tolerant zero-values is fine here.

            ```go
            func parseCodeActions(raw json.RawMessage) []types.CodeAction {
                if raw == nil || string(raw) == "null" {
                    return []types.CodeAction{}
                }
                var actions []types.CodeAction
                if err := json.Unmarshal(raw, &actions); err == nil {
                    return actions
                }
                return []types.CodeAction{}
            }
            ```

            ### parseDocumentSymbols

            Attempts DocumentSymbol[] first (the richer nested form). Falls back to
            SymbolInformation[] and converts: use Name, Kind, Location.Range as both
            Range and SelectionRange, nil for Detail/Tags/Children/Deprecated.

            ```go
            func parseDocumentSymbols(raw json.RawMessage) []types.DocumentSymbol {
                if raw == nil || string(raw) == "null" {
                    return []types.DocumentSymbol{}
                }
                // Try DocumentSymbol[] first (richer nested form)
                var syms []types.DocumentSymbol
                if err := json.Unmarshal(raw, &syms); err == nil && len(syms) > 0 {
                    return syms
                }
                // Fall back: some servers return SymbolInformation[]
                var infos []types.SymbolInformation
                if err := json.Unmarshal(raw, &infos); err == nil && len(infos) > 0 {
                    result := make([]types.DocumentSymbol, len(infos))
                    for i, si := range infos {
                        result[i] = types.DocumentSymbol{
                            Name:           si.Name,
                            Kind:           si.Kind,
                            Range:          si.Location.Range,
                            SelectionRange: si.Location.Range,
                        }
                    }
                    return result
                }
                return []types.DocumentSymbol{}
            }
            ```

