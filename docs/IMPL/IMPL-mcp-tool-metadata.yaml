            grep -c "Annotations:" cmd/agent-lsp/tools_analysis.go
            # Expected: 13

            # Every Args struct field has jsonschema tag
            grep -c 'jsonschema:"' cmd/agent-lsp/tools_analysis.go
            # Expected: >= 55 (all fields across all structs)
            ```

            ## Constraints
            - Do NOT modify the Description field text on any tool
            - Do NOT modify function bodies or handler logic
            - Do NOT add boolPtr to this file — it lives in helpers.go (scaffold)
            - Do NOT modify files outside your ownership list
