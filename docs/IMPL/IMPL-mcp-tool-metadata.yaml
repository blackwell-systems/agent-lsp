title: Complete MCP Tool Metadata — Annotations, Parameter Descriptions, and Improved Tool Descriptions
feature_slug: mcp-tool-metadata
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 4 tool files + 1 new helper file = 5 files. Each file is
       independently modifiable (no cross-file type dependencies for this change).
       4 agents can work in parallel on disjoint files.

    2. Investigation-first items: None. The ToolAnnotations struct, jsonschema tag
       format, and all tool definitions are fully visible and understood.

    3. Interface discoverability: The only shared artifact is the boolPtr helper
       function. Its signature is trivial: func boolPtr(b bool) *bool. All agents
       can import it from a scaffold or it can be placed in one agent's file and
       referenced by others in subsequent waves. Since all 4 tool files are in the
       same package (package main), a helper defined in any file is visible to all.
       However, to avoid compilation failure during parallel execution, the helper
       must exist before agents run.

    4. Pre-implementation status: No existing annotations, no jsonschema tags on
       any Args struct, no boolPtr helper. All work is greenfield additions to
       existing files. 0% already implemented.

    5. Parallelization value: 4 independent agents modifying ~200-400 lines each.
       Build/test cycle is ~10s (go build + go test). Files per agent: 1 each.
       Task complexity: moderate (must classify each tool correctly, write accurate
       descriptions for every parameter). All agents are wave 1 (fully parallel)
       after scaffold. Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~8 min (4 agents x 8 min avg, fully parallel)
    - Merge & verification: ~3 min
    Total SAW time: ~16 min

    Sequential baseline: ~32 min (4 files x 8 min avg)
    Time savings: ~16 min (50% faster)

    Recommendation: Clear speedup. Proceed.
test_command: GOWORK=off go test ./internal/... ./cmd/...
lint_command: GOWORK=off go vet ./...
file_ownership:
