pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent uses wrong jsonschema tag syntax (e.g. jsonschema:"desc=..." or starts with WORD=)
          likelihood: low
          impact: medium
          mitigation: Task prompts explicitly state the constraint; build will succeed regardless (runtime schema issue only)
        - scenario: Agent forgets boolPtr helper is in scaffold and defines it locally
          likelihood: low
          impact: high
          mitigation: Constraint explicitly listed in every agent task; go build would catch duplicate
        - scenario: Agent accidentally modifies Description text while adding Annotations
          likelihood: medium
          impact: low
          mitigation: Constraint clearly stated; description changes are functionally harmless but undesirable
        - scenario: Agent misclassifies a tool (e.g. marks apply_edit as ReadOnly)
          likelihood: low
          impact: medium
          mitigation: Classification table provided per-tool in each agent task with explicit annotation blocks
