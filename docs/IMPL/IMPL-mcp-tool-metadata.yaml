        - id: A
          task: |
            ## What to implement

            Add MCP tool annotations, jsonschema parameter descriptions, and improved
            tool descriptions to all 13 tools in `cmd/agent-lsp/tools_analysis.go`.

            ### 1. Add Annotations to every mcp.Tool{} literal

            For ALL 13 tools in this file (get_info_on_location, get_completions,
            get_signature_help, get_code_actions, get_document_symbols,
            get_workspace_symbols, get_references, get_inlay_hints,
            get_semantic_tokens, get_symbol_source, get_symbol_documentation,
            get_change_impact, get_cross_repo_references), add:

            ```go
            Annotations: &mcp.ToolAnnotations{
                Title:           "<Human-readable title>",
                ReadOnlyHint:    true,
                DestructiveHint: boolPtr(false),
                OpenWorldHint:   boolPtr(false),
            },
            ```

            Title examples: "Get Hover Info", "Get Completions", "Get Signature Help",
            "Get Code Actions", "Get Document Symbols", "Get Workspace Symbols",
            "Find References", "Get Inlay Hints", "Get Semantic Tokens",
            "Get Symbol Source", "Get Symbol Documentation", "Get Change Impact",
            "Get Cross-Repo References"

            ### 2. Add jsonschema struct tags to every Args struct field

            Add `jsonschema:"description text"` tags to EVERY field in EVERY Args struct.
            The description must NOT start with "WORD=" pattern. Place the jsonschema tag
            after the json tag, separated by a space.

            Example transformation:
            ```go
            // Before:
            FilePath string `json:"file_path"`
            // After:
            FilePath string `json:"file_path" jsonschema:"Absolute path to the source file to analyze"`
            ```

            Args structs to annotate:
            - GetInfoOnLocationArgs (5 fields)
            - GetCompletionsArgs (4 fields)
            - GetSignatureHelpArgs (4 fields)
            - GetCodeActionsArgs (6 fields)
            - GetDocumentSymbolsArgs (3 fields)
            - GetWorkspaceSymbolsArgs (4 fields)
            - GetReferencesArgs (6 fields)
            - GetInlayHintsArgs (6 fields)
            - GetSemanticTokensArgs (6 fields)
            - GetSymbolSourceArgs (5 fields)
            - GetSymbolDocumentationArgs (4 fields)
            - GetChangeImpactArgs (2 fields)
            - GetCrossRepoReferencesArgs (5 fields)

            Common field descriptions:
            - FilePath: "Absolute path to the source file"
            - LanguageID: "Language identifier (e.g. go, typescript, python). Optional; auto-detected from file extension"
            - Line: "1-indexed line number in the file"
            - Column: "1-indexed column (character offset) in the line"
            - PositionPattern: "Alternative to line/column: use @@pattern@@ syntax to match text near the target position"
            - StartLine/EndLine: "1-indexed start/end line of the range"
            - StartColumn/EndColumn: "1-indexed start/end column of the range"

            ### 3. Keep existing Description text (do NOT rewrite descriptions)

            The existing descriptions in this file are already high-quality. Do NOT
            modify the Description field values. Only add Annotations and struct tags.

            ## Interfaces

            Uses `boolPtr(b bool) *bool` from `cmd/agent-lsp/helpers.go` (scaffold).

            ## Verification

            ```bash
            cd /Users/dayna.blackwell/code/agent-lsp && GOWORK=off go build ./...
            cd /Users/dayna.blackwell/code/agent-lsp && GOWORK=off go vet ./...
            ```

