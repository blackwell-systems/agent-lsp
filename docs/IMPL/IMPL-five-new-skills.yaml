interface_contracts:
    - name: SKILL.md frontmatter schema
      description: |
        Every SKILL.md must have valid YAML frontmatter with these fields.
        install.sh auto-discovers skills from this frontmatter — the format
        must be exact.
      definition: |
        ---
        name: lsp-<skill-name>
        description: "<one sentence, ≤250 chars>"
        argument-hint: "[optional: hint shown in skill picker]"
        allowed-tools: mcp__lsp__<tool1> mcp__lsp__<tool2> ...
        ---
      location: skills/*/SKILL.md
    - name: references/patterns.md content
      description: |
        Copy of the canonical shared patterns file from lsp-rename. All five new
        skills must include this file verbatim — it documents the @@ position
        marker, LineScope, the start_lsp guard pattern, and diagnostic diff format.
      definition: |
        Full content from skills/lsp-rename/references/patterns.md — copy
        without modification. Agents must not edit this file's content.
      location: skills/lsp-rename/references/patterns.md
    - name: mcp tool name prefix convention
      description: |
        All tool names in allowed-tools frontmatter use the mcp__lsp__ prefix.
        Tool names without prefix appear in prose steps. Both forms are used
        in existing skills — follow the same convention.
      definition: |
        Frontmatter: mcp__lsp__get_diagnostics mcp__lsp__apply_edit ...
        Prose steps:  mcp__lsp__get_diagnostics({ ... })
      location: skills/lsp-verify/SKILL.md
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — lsp-fix-all skill

            Create the `/lsp-fix-all` skill. This skill applies available quick-fix
            code actions for all current diagnostics in a file, one at a time,
            re-collecting diagnostics between each fix because line numbers shift
            after each application.

            ### Files to create

            1. `skills/lsp-fix-all/SKILL.md`
            2. `skills/lsp-fix-all/references/patterns.md`

            ### File 1: skills/lsp-fix-all/SKILL.md

            Write a complete skill file with this exact frontmatter:

            ```markdown
            ---
            name: lsp-fix-all
            description: Apply available quick-fix code actions for all current diagnostics in a file, one at a time with re-collection between each fix. Use to bulk-resolve errors and warnings the language server can fix automatically.
            argument-hint: "[file-path]"
            allowed-tools: mcp__lsp__get_diagnostics mcp__lsp__get_code_actions mcp__lsp__apply_edit mcp__lsp__open_document mcp__lsp__format_document
            ---
            ```

            The skill body must cover:

            **Differentiation from lsp-safe-edit:** Open with a clear statement that
            this skill fixes PRE-EXISTING diagnostics in a file, not post-edit
            errors. `/lsp-safe-edit` has a code-action step in its Step 7 for
            fixing errors introduced by a specific edit — this skill is for
            systematic bulk-fixing of existing issues before or independent of
            any edit session.

            **When to use vs. not use:**
            - Use: file has accumulated errors/warnings you want to resolve automatically
            - Do NOT use: you just made an edit and want to fix new errors (use `/lsp-safe-edit`)
            - Do NOT use: you want to apply structural refactors (see code action filtering below)

            **Input:** `file_path` (absolute path to the file to fix)

            **Step 1 — Open and collect initial diagnostics**

            Call `mcp__lsp__open_document` then `mcp__lsp__get_diagnostics`.
            If zero diagnostics: report "No diagnostics found — file is clean." and stop.

            **Step 2 — Classify and filter code actions**

            For EACH diagnostic (process one at a time, not in batch):
            - Call `mcp__lsp__get_code_actions` at the diagnostic's position/range
            - Filter to quick-fix kind only: `kind == "quickfix"` or `kind` starts with `"quickfix."`
            - SKIP actions with kind `"refactor"`, `"refactor.extract"`, `"refactor.inline"`,
              `"source"`, or no kind field (unknown/structural actions)
            - If no quick-fix actions available for a diagnostic: skip it, note in summary

            **Decision gate table (embed in skill):**

            | Action kind | Apply? |
            |-------------|--------|
            | `quickfix` | YES |
            | `quickfix.*` | YES |
            | `refactor` | NO — structural change |
            | `refactor.extract` | NO — structural change |
            | `source.organizeImports` | YES — safe formatting |
            | `source.*` (others) | NO — skip unless organizeImports |
            | (no kind / empty) | NO — unknown, skip |

            **Step 3 — Apply one fix and re-collect (the core loop)**

            This is the critical correctness constraint: NEVER apply all fixes
            at once. After applying one `apply_edit`, line numbers in the file
            shift. Always re-call `get_diagnostics` before processing the next
            diagnostic.

            Loop until no applicable quick-fixes remain:
            1. Get current diagnostics
            2. Find first diagnostic with an available quick-fix
            3. Apply the fix via `mcp__lsp__apply_edit`
            4. Return to step 1

            Exit loop when: diagnostics list is empty, OR no remaining diagnostic
            has an applicable quick-fix action.

            **Step 4 — Verify and format**

            After loop exits: call `mcp__lsp__get_diagnostics` for final state.
            If errors remain that had no quick-fix: list them with explanation.
            Call `mcp__lsp__format_document` to clean up any indentation drift
            from applied edits.

            **Output format:**

            ```
            ## lsp-fix-all Summary

            File: /path/to/file.go
            Initial diagnostics: N errors, M warnings
            Fixes applied: K
            Remaining (no auto-fix available): J

            ### Fixed
            - line X: <message> → applied: <action title>

            ### Skipped (no quick-fix available)
            - line Y: <message>
            ```

            **Safety rules (embed as bullet list):**
            - Never apply more than one code action per loop iteration
            - Always re-collect diagnostics after each `apply_edit` before the next fix
            - Never apply refactor or structural code actions — quick-fix only
            - If apply_edit returns an error, stop the loop and report the failure
            - Maximum iterations: 50 (safety guard against infinite loops in
              edge cases where a fix introduces a new fixable diagnostic)

            ### File 2: skills/lsp-fix-all/references/patterns.md

            Copy the EXACT contents of skills/lsp-safe-edit/references/patterns.md
            verbatim into this file. Do not add, remove, or modify any content.

            ### Constraints
            - Do NOT modify any file outside skills/lsp-fix-all/
            - Do NOT replicate the "post-edit code action" workflow from lsp-safe-edit
            - Do NOT use `execute_command` in this skill — apply_edit is sufficient
              for quick-fixes; execute_command is for generator workflows (lsp-generate)
            - The allowed-tools frontmatter must use mcp__lsp__ prefixed names
              (space-separated, no commas)
          files:
            - skills/lsp-fix-all/SKILL.md
            - skills/lsp-fix-all/references/patterns.md
        - id: B
          task: |
            ## Agent B — lsp-refactor skill

            Create the `/lsp-refactor` meta-skill. This skill sequences the full
            edit lifecycle end-to-end: blast-radius analysis → speculative preview
            → apply → verify build → run affected tests. Since skills cannot call
            other skills at runtime, this skill inlines the key tool sequences from
            lsp-impact, lsp-safe-edit, lsp-verify, and lsp-test-correlation into
            a single coordinated workflow.

            ### Files to create

            1. `skills/lsp-refactor/SKILL.md`
            2. `skills/lsp-refactor/references/patterns.md`

            ### File 1: skills/lsp-refactor/SKILL.md

            Write a complete skill file with this exact frontmatter:

            ```markdown
            ---
            name: lsp-refactor
            description: End-to-end safe refactor workflow — blast-radius analysis, speculative preview, apply to disk, verify build, run affected tests. Inlines lsp-impact + lsp-safe-edit + lsp-verify + lsp-test-correlation into one coordinated sequence.
            argument-hint: "[symbol-or-file] [intent]"
            allowed-tools: mcp__lsp__get_change_impact mcp__lsp__simulate_edit_atomic mcp__lsp__simulate_chain mcp__lsp__get_diagnostics mcp__lsp__run_build mcp__lsp__run_tests mcp__lsp__get_tests_for_file mcp__lsp__apply_edit mcp__lsp__open_document mcp__lsp__format_document Edit Write
            ---
            ```

            The skill body must cover:

            **Differentiation from existing skills:** Open with a clear statement
            that this skill does NOT replace lsp-safe-edit (which wraps a single
            edit with diagnostic comparison) or lsp-impact (read-only analysis).
            lsp-refactor sequences ALL four of those workflows in order for a
            complete refactor operation. Use it when you know the target and
            intent up front and want the full workflow without switching skills.

            **Input:**
            - `target`: symbol name (dot notation) OR file path
            - `intent`: description of the change to make
            - `workspace_root`: absolute path to workspace

            **Phase 1 — Blast-radius analysis (inlined from lsp-impact)**

            Call `mcp__lsp__get_change_impact` with `changed_files` set to the
            file containing the target symbol:
            ```
            mcp__lsp__get_change_impact({
              "changed_files": ["/abs/path/to/file"],
              "include_transitive": false
            })
            ```
            Display: affected symbol count, test callers (with test function names),
            non-test callers, reference count. If reference count > 20, require
            explicit user confirmation before proceeding ("High blast radius: N
            callers. Proceed? y/n").

            **Phase 2 — Speculative preview (inlined from lsp-safe-edit)**

            Capture baseline diagnostics:
            ```
            mcp__lsp__open_document({ "file_path": "...", "language_id": "..." })
            mcp__lsp__get_diagnostics({ "file_path": "..." })
            ```

            For a single-file change: use `simulate_edit_atomic`.
            For multi-file changes: use `simulate_chain`.

            Display the speculative result using the Diagnostic Diff Output Format
            from references/patterns.md. If net_delta > 0 (errors introduced): stop
            and report the errors. Do NOT apply to disk.

            **Phase 3 — Apply to disk**

            Only reached if Phase 2 net_delta <= 0.
            Apply using Edit or Write tool, OR `mcp__lsp__apply_edit` if the edit
            was computed by simulation. Format the file:
            ```
            mcp__lsp__format_document({ "file_path": "..." })
            ```

            **Phase 4 — Verify build (inlined from lsp-verify)**

            Run in this order (same as lsp-verify Layer 1 and Layer 2):
            ```
            mcp__lsp__get_diagnostics({ "file_path": "..." })
            mcp__lsp__run_build({ "workspace_root": "..." })
            ```
            If build fails: display errors and stop. Do not proceed to test phase.

            **Phase 5 — Run affected tests (inlined from lsp-test-correlation)**

            For each file changed in Phase 3:
            ```
            mcp__lsp__get_tests_for_file({ "file_path": "..." })
            ```
            Run only the correlated test files:
            ```
            mcp__lsp__run_tests({ "workspace_root": "...", "test_files": [...] })
            ```
            If no correlated test files found: note "No test correlation found —
            run full suite manually to confirm."

            **Output format:**

            ```
            ## lsp-refactor Complete

            ### Phase 1 — Blast Radius
            Affected symbols: N
            Test callers: M  (list each with enclosing test function)
            Non-test callers: K

            ### Phase 2 — Speculative Preview
            [Diagnostic Diff Output Format from patterns.md]
            net_delta: 0 → safe to apply

            ### Phase 3 — Applied
            Files changed: [list]

            ### Phase 4 — Build Verification
            Diagnostics: N errors (0 new)
            Build: PASS

            ### Phase 5 — Test Results
            Test files run: [list]
            Result: PASS / FAIL
            ```

            **Abort conditions (embed as explicit list):**
            - Phase 1: blast radius > 20 callers AND user does not confirm → abort
            - Phase 2: net_delta > 0 (simulation introduced errors) → abort, show errors
            - Phase 4: build fails → abort, show build output
            - Any phase: LSP returns unexpected error → abort, report tool output

            ### File 2: skills/lsp-refactor/references/patterns.md

            Copy the EXACT contents of skills/lsp-safe-edit/references/patterns.md
            verbatim into this file. Do not add, remove, or modify any content.

            ### Constraints
            - Do NOT call other skills from within this skill — inline all tool sequences
            - Do NOT skip Phase 1 even for "small" refactors — blast radius check is mandatory
            - Do NOT apply to disk if Phase 2 simulation shows net_delta > 0
            - Do NOT modify any file outside skills/lsp-refactor/
          files:
            - skills/lsp-refactor/SKILL.md
            - skills/lsp-refactor/references/patterns.md
        - id: C
          task: |
            ## Agent C — lsp-extract-function skill

            Create the `/lsp-extract-function` skill. This skill extracts a selected
            code block into a named function. The primary path uses the language
            server's extract-function code action if available; the manual fallback
            applies when no code action is offered.

            ### Files to create

            1. `skills/lsp-extract-function/SKILL.md`
            2. `skills/lsp-extract-function/references/patterns.md`

            ### File 1: skills/lsp-extract-function/SKILL.md

            Write a complete skill file with this exact frontmatter:

            ```markdown
            ---
            name: lsp-extract-function
            description: Extract a selected code block into a named function. Primary path uses the language server's extract-function code action; falls back to manual extraction when no code action is available. Validates captured variables, scope shadowing, and compilation after extraction.
            argument-hint: "[file-path] [start-line] [end-line] [new-function-name]"
            allowed-tools: mcp__lsp__get_document_symbols mcp__lsp__get_code_actions mcp__lsp__execute_command mcp__lsp__apply_edit mcp__lsp__get_diagnostics mcp__lsp__open_document mcp__lsp__format_document mcp__lsp__get_server_capabilities
            ---
            ```

            The skill body must cover:

            **Differentiation from lsp-generate:** Open with a clear statement.
            lsp-extract-function RESTRUCTURES existing code (takes code that already
            exists and moves it into a new function). lsp-generate creates NEW code
            that does not yet exist (stubs, mocks, interface implementations). Use
            this skill when the code is already written; use lsp-generate when you
            need to generate code from scratch.

            **Input:**
            - `file_path`: absolute path to the file
            - `start_line`, `end_line`: line range of code to extract (1-indexed)
            - `new_function_name`: desired name for the extracted function

            **Step 1 — Get context (document symbols)**

            Call `mcp__lsp__open_document` then `mcp__lsp__get_document_symbols`
            to understand the containing function and scope. This establishes:
            - Which function contains the selection
            - Whether `new_function_name` already exists in the file (name collision check)

            If `new_function_name` already exists as a symbol: report conflict and stop.

            **Step 2 — Check server capabilities**

            Call `mcp__lsp__get_server_capabilities`. Check for `codeActionProvider`.
            Note whether `execute_command` is listed in `executeCommandProvider.commands`.

            **Step 3 — Primary path: LSP code action**

            Call `mcp__lsp__get_code_actions` with the selection range:
            ```
            mcp__lsp__get_code_actions({
              "file_path": "...",
              "start_line": N,
              "start_column": 1,
              "end_line": M,
              "end_column": 999
            })
            ```

            Filter for extract-function actions: kind contains `"refactor.extract"`
            or title contains "Extract" and "function" (case-insensitive).

            If extract-function action found:
            - Display the action title and ask for confirmation if it proposes a
              different name than `new_function_name`
            - Execute via `mcp__lsp__execute_command` if the action has a `command`
              field, OR apply directly via `mcp__lsp__apply_edit` if it has an edit
            - Skip to Step 5

            If no extract-function action found: fall through to Step 4.

            **Step 4 — Manual fallback**

            When no code action is available, guide the agent through manual extraction:

            a) Read the selected lines to identify:
               - Variables used inside the selection that are declared outside (→ parameters)
               - Variables declared inside the selection that are used outside (→ return values)
               - Return statements inside the selection (→ wrap in function)

            b) Construct the extracted function signature based on captured variables.
               Display the proposed signature to the user for confirmation before writing.

            c) Apply the extraction:
               - Insert new function definition after the containing function's closing brace
               - Replace the selected lines with a call to the new function

            d) Use `mcp__lsp__apply_edit` for the replacements. Apply the call-site
               replacement first, then insert the new function — order matters to preserve
               line numbers during editing.

            **Step 5 — Validate**

            After extraction (either path):
            1. `mcp__lsp__get_diagnostics` — check for errors
            2. If errors: show them; common causes listed below
            3. `mcp__lsp__format_document` — clean up indentation

            **Common post-extraction errors and their causes (embed as table):**

            | Error type | Likely cause | Fix |
            |------------|--------------|-----|
            | Undefined variable | Captured var not passed as parameter | Add parameter |
            | Type mismatch | Return type inferred incorrectly | Adjust return type in signature |
            | Name shadows outer | New function name matches outer scope | Choose different name |
            | Unused variable | Return value not captured at call site | Add variable at call site |

            **Language-specific notes:**
            - **Go:** gopls may offer "Extract function" in code actions for selection ranges
            - **TypeScript/JavaScript:** tsserver may offer "Extract to function in global scope"
            - **Python:** pylsp and pyright-langserver typically do NOT offer extract-function
              code actions — manual fallback required

            ### File 2: skills/lsp-extract-function/references/patterns.md

            Copy the EXACT contents of skills/lsp-safe-edit/references/patterns.md
            verbatim into this file. Do not add, remove, or modify any content.

            ### Constraints
            - Do NOT use this skill for generating new code from scratch (that is lsp-generate)
            - Do NOT apply the name-collision check as optional — it is mandatory
            - Do NOT batch the call-site replacement and function insertion into a single
              apply_edit if the edits are in different line regions; apply sequentially
            - Do NOT modify any file outside skills/lsp-extract-function/
          files:
            - skills/lsp-extract-function/SKILL.md
            - skills/lsp-extract-function/references/patterns.md
        - id: D
          task: |
            ## Agent D — lsp-generate skill

            Create the `/lsp-generate` skill. This skill triggers language server
            code generation: interface stubs, test skeletons, missing method stubs,
            mock types. It uses `get_code_actions` to surface generator options and
            `execute_command` to run them.

            ### Files to create

            1. `skills/lsp-generate/SKILL.md`
            2. `skills/lsp-generate/references/patterns.md`

            ### File 1: skills/lsp-generate/SKILL.md

            Write a complete skill file with this exact frontmatter:

            ```markdown
            ---
            name: lsp-generate
            description: Trigger language server code generation — implement interface stubs, generate test skeletons, add missing methods, generate mock types. Uses get_code_actions to surface generator options and execute_command to run them.
            argument-hint: "[file-path:line:col] [generation-intent]"
            allowed-tools: mcp__lsp__get_code_actions mcp__lsp__execute_command mcp__lsp__apply_edit mcp__lsp__format_document mcp__lsp__get_diagnostics mcp__lsp__open_document mcp__lsp__get_server_capabilities mcp__lsp__go_to_symbol
            ---
            ```

            The skill body must cover:

            **Differentiation from lsp-extract-function:** Open with a clear
            statement. lsp-generate creates NEW code that does not yet exist in the
            file — stubs, mocks, implementations of interfaces, test functions.
            lsp-extract-function restructures code that already exists. Use
            lsp-generate when you want the language server to write something new.

            **Input:**
            - `file_path`: absolute path to the target file
            - `line`, `column` (or `position_pattern`): position in the file where
              generation is triggered (e.g., the line with the unimplemented interface,
              the missing method error, the type declaration)
            - `intent`: description of what to generate (e.g., "implement io.Reader",
              "generate test skeleton", "add missing methods", "generate mock for Handler")

            **Step 1 — Open document and locate position**

            Call `mcp__lsp__open_document`. If using `position_pattern`, use the
            @@ marker convention from references/patterns.md.

            **Step 2 — Get code actions at target position**

            ```
            mcp__lsp__get_code_actions({
              "file_path": "...",
              "start_line": N,
              "start_column": C,
              "end_line": N,
              "end_column": C
            })
            ```

            Filter for generator actions: kind `"quickfix"` with titles matching
            the intent (e.g., "Implement interface", "Generate", "Add stub",
            "Create test"), OR kind `"source"` for source-level generation.

            If no matching action found: report "No generator action available at
            this position for the given intent" and suggest manual approach.

            **Step 3 — Select and confirm action**

            Display available generator actions to the user. If multiple match
            the intent, list all and ask which to apply. Confirm the selected
            action before executing.

            **Step 4 — Execute generator**

            If action has `command` field: run via `mcp__lsp__execute_command`.
            If action has `edit` field: apply via `mcp__lsp__apply_edit`.
            Some actions produce both — apply edit first, then run command.

            **Step 5 — Format and verify**

            ```
            mcp__lsp__format_document({ "file_path": "..." })
            mcp__lsp__get_diagnostics({ "file_path": "..." })
            ```

            Report remaining diagnostics. Stub methods typically leave TODO
            comments or `panic("not implemented")` bodies — this is expected.

            **Per-language generator patterns (embed as table):**

            | Language | Generator | Trigger location | Code action kind |
            |----------|-----------|-----------------|-----------------|
            | Go (gopls) | Implement interface | Line with `var _ MyInterface = (*MyType)(nil)` or type declaration | `quickfix` — "Implement interface" |
            | Go (gopls) | Generate test file | Any .go file without _test.go counterpart | `source` — "Generate unit tests" |
            | Go (gopls) | Add missing method | Line with `undefined: method` error | `quickfix` |
            | TypeScript (tsserver) | Implement interface | Class declaration | `quickfix` — "Implement interface members" |
            | TypeScript (tsserver) | Add missing method | Method call with no definition | `quickfix` — "Add missing function declaration" |
            | Python (pyright) | Add import | Name not defined | `quickfix` — "Add import" |
            | Rust (rust-analyzer) | Implement trait | `impl Trait for Type {}` | `quickfix` — "Add missing impl members" |

            **Fallback when no code action available:**

            If `get_code_actions` returns no generator actions: explain that the
            language server at this workspace may not support server-side generation
            for this intent. Suggest manual implementation with guidance specific
            to the intent (e.g., for interface implementation: list the methods
            the interface requires by looking up the interface definition first
            using `go_to_symbol`).

            ### File 2: skills/lsp-generate/references/patterns.md

            Copy the EXACT contents of skills/lsp-safe-edit/references/patterns.md
            verbatim into this file. Do not add, remove, or modify any content.

            ### Constraints
            - Do NOT batch execute_command calls — one generator at a time
            - Do NOT skip user confirmation when multiple generator actions are available
            - Do NOT modify any file outside skills/lsp-generate/
            - The allowed-tools frontmatter must use mcp__lsp__ prefixed names
          files:
