        - id: E
          task: |
            ## Agent E — lsp-understand skill

            Create the `/lsp-understand` skill. This skill builds a complete picture
            of unfamiliar code — given a symbol OR a file, it synthesizes hover info,
            implementations, call hierarchy (bounded to 2 levels), all references,
            and source — into a structured "Code Map" the user can navigate.

            ### Files to create

            1. `skills/lsp-understand/SKILL.md`
            2. `skills/lsp-understand/references/patterns.md`

            ### File 1: skills/lsp-understand/SKILL.md

            Write a complete skill file with this exact frontmatter:

            ```markdown
            ---
            name: lsp-understand
            description: Deep-dive exploration of unfamiliar code — given a symbol or file, builds a complete Code Map showing type info, implementations, call hierarchy (2-level depth limit), all references, and source. Broader than lsp-explore: accepts files, synthesizes multi-symbol relationships, and produces a navigable dependency map.
            argument-hint: "[symbol-name | file-path]"
            allowed-tools: mcp__lsp__get_info_on_location mcp__lsp__go_to_implementation mcp__lsp__call_hierarchy mcp__lsp__get_references mcp__lsp__get_symbol_source mcp__lsp__get_document_symbols mcp__lsp__open_document mcp__lsp__go_to_symbol mcp__lsp__get_server_capabilities
            ---
            ```

            The skill body must cover:

            **Differentiation from lsp-explore:** Open with an explicit comparison.
            `/lsp-explore` is a single-symbol pass — given one symbol name, it runs
            hover + implementations + call hierarchy + references and produces a
            per-symbol report. `/lsp-understand` is broader in three ways:
            (1) accepts a FILE PATH as input and explores all exported symbols in
            that file as a group, (2) synthesizes cross-symbol relationships to
            produce a dependency map rather than isolated per-symbol reports, and
            (3) enforces a 2-level call hierarchy depth limit to prevent infinite
            recursion in deeply connected code. Use lsp-explore for quick "what is
            this one thing" questions; use lsp-understand for "how does this module
            work as a whole."

            **Input — two modes:**

            Mode A (symbol): User provides a symbol name in dot notation
            (e.g., `"codec.Encode"`, `"Handler.ServeHTTP"`).

            Mode B (file): User provides an absolute file path. All exported
            symbols in the file become the entry points.

            **Step 1 — Entry point resolution**

            Mode A: Call `mcp__lsp__go_to_symbol` to locate the symbol definition.
            Obtain `file_path`, `line`, `column`.

            Mode B: Call `mcp__lsp__open_document` then `mcp__lsp__get_document_symbols`.
            Filter to exported symbols (uppercase first letter in Go, `export` keyword
            in TypeScript, `pub` in Rust, etc.). Collect all as entry points.
            Cap at 10 exported symbols maximum — if more, focus on the top-level
            functions and types (skip constants and variables).

            **Step 2 — Per-symbol analysis (for each entry point)**

            Run these tool calls. Where possible, parallelize calls within each step:

            a) **Type info and docs:** `mcp__lsp__get_info_on_location`
               Use `position_pattern` with @@ marker from references/patterns.md.

            b) **Implementations (if interface/abstract type):**
               `mcp__lsp__go_to_implementation` — list concrete types.
               Skip if server reports `implementationProvider: false`.

            c) **Call hierarchy — bounded to 2 levels:**
               `mcp__lsp__call_hierarchy` with direction `"incoming"`.
               Level 1: direct callers of this symbol.
               For each Level 1 caller: call `mcp__lsp__call_hierarchy` once more
               to get Level 2 (callers of the caller).
               STOP at Level 2 — do not recurse further.

            d) **Outgoing calls (what this symbol calls):**
               `mcp__lsp__call_hierarchy` with direction `"outgoing"`.
               Level 1 only — no recursion.

            e) **All references:** `mcp__lsp__get_references`
               Returns every usage site across the workspace.

            f) **Source:** `mcp__lsp__get_symbol_source`
               Read the implementation body.

            **Step 3 — Synthesize relationships**

            After analyzing all entry points: identify cross-symbol relationships:
            - Which entry points call each other (from outgoing calls)?
            - Which entry points are called by the same callers?
            - Which entry points implement the same interface?

            This synthesis step is what distinguishes lsp-understand from multiple
            lsp-explore calls.

            **Step 4 — Output: Code Map**

            Produce a structured Code Map with these sections:

            ```
            ## Code Map: <target>

            ### Summary
            <2-3 sentence description of what this code does, synthesized from
            hover docs and source reading>

            ### Symbols (<N> analyzed)

            #### <SymbolName>
            - **Type:** <type signature from hover>
            - **Source:** <file:line>
            - **Incoming callers (L1):** <list; count only if > 5>
            - **Incoming callers (L2):** <summarized; e.g., "called by 3 HTTP handlers">
            - **Outgoing calls:** <what this symbol calls>
            - **Implements:** <interface name, if applicable>
            - **References:** N sites across M files

            ### Dependency Relationships
            <symbols that call each other, as a simple text diagram or list>
            e.g.:
              HandlerA → Parse → Validate
              HandlerB → Parse

            ### Entry Points to This Code
            <top-level callers that are NOT in this file — where does outside code
            call in?>

            ### Depth-limit Note
            Call hierarchy stopped at 2 levels. <N> additional callers exist beyond
            Level 2 — use /lsp-explore on specific symbols to drill deeper.
            ```

            **Depth control rules (embed explicitly):**
            - Call hierarchy recursion stops at Level 2 for INCOMING calls
            - Outgoing calls: Level 1 only, no recursion
            - If Level 2 callers > 10: summarize by count and file, do not list individually
            - Do NOT follow call chains beyond these limits under any circumstances

            **Capability checks:**
            Before Step 2, call `mcp__lsp__get_server_capabilities`. Skip steps
            requiring missing capabilities:
            - `go_to_implementation`: skip 2b if `implementationProvider: false`
            - `call_hierarchy`: skip 2c/2d if `callHierarchyProvider: false`; note in output

            ### File 2: skills/lsp-understand/references/patterns.md

            Copy the EXACT contents of skills/lsp-safe-edit/references/patterns.md
            verbatim into this file. Do not add, remove, or modify any content.

            ### Constraints
            - Do NOT recurse call hierarchy beyond 2 levels — this is a hard limit
            - Do NOT analyze more than 10 exported symbols per file in Mode B
            - Do NOT replicate the lsp-explore single-symbol report format — the
              output must be a Code Map showing cross-symbol relationships
            - Do NOT modify any file outside skills/lsp-understand/
          files:
            - skills/lsp-understand/SKILL.md
            - skills/lsp-understand/references/patterns.md
