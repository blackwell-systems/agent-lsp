title: Five New LSP Agent Skills
feature_slug: five-new-skills
verdict: SUITABLE
suitability_assessment: |
    All five questions resolve cleanly.

    1. File decomposition: Each skill lives in its own directory (skills/lsp-fix-all/,
       skills/lsp-refactor/, skills/lsp-extract-function/, skills/lsp-generate/,
       skills/lsp-understand/). All five skill-creation agents have fully disjoint
       file ownership. The doc-update agent owns only documentation files.
       No file is shared across Wave 1 agents.

    2. No investigation-first items. Skills are new markdown prompt files — no
       root cause analysis required.

    3. Interface contracts: Each SKILL.md requires valid frontmatter (name,
       description, argument-hint, allowed-tools) and a references/patterns.md
       copy. These contracts are fully specifiable before any agent writes code.

    4. Pre-implementation status: All five skills are confirmed absent from the
       skills/ directory. ROADMAP.md lists lsp-fix-all, lsp-extract-function,
       lsp-generate, and lsp-refactor as planned. lsp-understand is not listed
       (new addition). All are TODO.

    5. Parallelization value: 5 independent skill agents in Wave 1 all run
       simultaneously. Build/test cycle is fast (GOWORK=off go test ./...) but
       each agent creates 2 files and writes substantial skill prose — meaningful
       parallelization gain.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~25 min (5 agents x ~5 min avg, fully parallel Wave 1; +5 min Wave 2)
    - Merge & verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~60 min (6 agents x ~10 min sequential)
    Time savings: ~20 min (33% faster)

    Recommendation: Clear speedup for Wave 1. Proceed.
