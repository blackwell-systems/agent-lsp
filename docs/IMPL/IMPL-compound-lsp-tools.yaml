pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A or B references AnalyzeSymbolResult/ExploreFileResult fields incorrectly (wrong field names, wrong types)
          likelihood: low
          impact: medium
          mitigation: Scaffold file (compound_types.go) defines exact types before Wave 1 launches. Both agents import from the same package and compile against the same types. No room for mismatch.
        - scenario: Agent B inserts tool registrations at wrong location in server.go, causing syntax error or overwriting existing tools
          likelihood: medium
          impact: medium
          mitigation: Agent B task includes exact 10-line text anchor (get_semantic_tokens closing block + resources comment). Use Edit tool with verbatim context.
        - scenario: HandleAnalyzeSymbol or HandleExploreFile fail to handle Content array correctly (assumes Content[0] exists when result is error, or doesn't cast to TextContent)
          likelihood: medium
          impact: medium
          mitigation: Both agent tasks warn about type assertion and graceful error handling. Check result.IsError AND len(Content) > 0 before casting to *types.TextContent.
        - scenario: Tests in compound_test.go fail because HandleExploreFile doesn't exist yet when Agent A writes tests
          likelihood: high
          impact: low
          mitigation: Agent A writes stub tests for both tools (TestHandleExploreFile_NilClient, TestHandleExploreFile_MissingFilePath). These tests only check error cases and don't call the real implementation — they will compile and pass even if HandleExploreFile is not implemented yet.
        - scenario: go build fails due to missing imports in compound.go or compound_explore.go
          likelihood: low
          impact: low
          mitigation: Both agent tasks list required imports explicitly (context, encoding/json, fmt, internal/lsp, internal/types). Copy-paste from task prompt.
state: REVIEWED
