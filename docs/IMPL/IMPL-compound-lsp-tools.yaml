            ## Context
            Repository: /Users/dayna.blackwell/code/LSP-MCP-GO
            Files: internal/tools/compound.go (new), internal/tools/compound_test.go (new)
            Shared types: internal/tools/compound_types.go (scaffold, already exists)

            ## What to implement

            Create the `analyze_symbol` compound tool handler and tests. The shared types
            (AnalyzeSymbolArgs, AnalyzeSymbolResult, etc.) are already defined in
            compound_types.go via scaffold — do not create or modify that file.

            ### Step 1: Create compound.go with HandleAnalyzeSymbol

            Create `internal/tools/compound.go` with the `HandleAnalyzeSymbol` function.

            Required imports:
            ```go
            import (
                "context"
                "encoding/json"
                "fmt"

                "github.com/blackwell-systems/lsp-mcp-go/internal/lsp"
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
            )
            ```

            Implementation guidance:

            1. **Extract position from args** using the existing `extractPosition` helper
            2. **Call HandleGetInfoOnLocation** internally to get hover text
            3. **Call HandleGetReferences** internally to get all references
            4. **Call HandleCallHierarchy** internally to get call hierarchy
            5. **Compose results** into AnalyzeSymbolResult
            6. **Handle errors gracefully**: if hover fails, set empty string; if refs fail,
               set empty array; if call hierarchy fails, set nil (don't fail entire request)
            7. **Marshal to JSON** and return as types.TextResult

            Function signature:
            ```go
            func HandleAnalyzeSymbol(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)
            ```

            Pattern to follow (compose existing handlers, not raw LSP calls):

            ```go
            func HandleAnalyzeSymbol(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error) {
                if err := CheckInitialized(client); err != nil {
                    return types.ErrorResult(err.Error()), nil
                }

                // Extract common fields
                filePath, ok := args["file_path"].(string)
                if !ok || filePath == "" {
                    return types.ErrorResult("file_path is required"), nil
                }

                line, col, err := extractPosition(args)
                if err != nil {
                    return types.ErrorResult(err.Error()), nil
                }

                languageID, _ := args["language_id"].(string)
                if languageID == "" {
                    languageID = "plaintext"
                }

                result := AnalyzeSymbolResult{}

                // 1. Get hover info (graceful failure)
                hoverResult, _ := HandleGetInfoOnLocation(ctx, client, args)
                if !hoverResult.IsError && len(hoverResult.Content) > 0 {
                    if textContent, ok := hoverResult.Content[0].(*types.TextContent); ok {
                        result.Hover = textContent.Text
                    }
                }

                // 2. Get references (graceful failure)
                refsResult, _ := HandleGetReferences(ctx, client, args)
                if !refsResult.IsError && len(refsResult.Content) > 0 {
                    if textContent, ok := refsResult.Content[0].(*types.TextContent); ok {
                        var refs []types.FormattedLocation
                        _ = json.Unmarshal([]byte(textContent.Text), &refs)
                        result.References = refs
                    }
                }

                // 3. Get call hierarchy (graceful failure)
                chArgs := map[string]interface{}{
                    "file_path":   filePath,
                    "language_id": languageID,
                    "line":        line,
                    "column":      col,
                }
                if dir, ok := args["call_hierarchy_direction"].(string); ok && dir != "" {
                    chArgs["direction"] = dir
                }
                chResult, _ := HandleCallHierarchy(ctx, client, chArgs)
                if !chResult.IsError && len(chResult.Content) > 0 {
                    if textContent, ok := chResult.Content[0].(*types.TextContent); ok {
                        var chData CallHierarchyData
                        _ = json.Unmarshal([]byte(textContent.Text), &chData)
                        result.CallHierarchy = &chData
                    }
                }

                // Marshal and return
                data, mErr := json.Marshal(result)
                if mErr != nil {
                    return types.ErrorResult(fmt.Sprintf("marshaling result: %s", mErr)), nil
                }
                return types.TextResult(string(data)), nil
            }
            ```

            **Note:** The Content field in ToolResult is `[]types.Content`, which is an interface.
            Cast to `*types.TextContent` before accessing `.Text`. Handle cast failure gracefully.

            ### Step 2: Create compound_test.go

            Create `internal/tools/compound_test.go` with unit tests for HandleAnalyzeSymbol.

            Required imports:
