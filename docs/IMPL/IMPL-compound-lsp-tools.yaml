            ## What to implement

            Create the `explore_file` compound tool handler and register both compound tools
            in server.go. The shared types (ExploreFileArgs, ExploreFileResult) are already
            defined in compound_types.go via scaffold — do not create or modify that file.

            ### Step 1: Create compound_explore.go with HandleExploreFile

            Create `internal/tools/compound_explore.go` with the `HandleExploreFile` function.

            Required imports:
            ```go
            import (
                "context"
                "encoding/json"
                "fmt"

                "github.com/blackwell-systems/lsp-mcp-go/internal/lsp"
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
            )
            ```

            Implementation guidance:

            1. **Extract file_path and language_id from args**
            2. **Call HandleGetDocumentSymbols** internally to get file structure
            3. **Call HandleGetDiagnostics** internally to get errors/warnings
            4. **Compose results** into ExploreFileResult
            5. **Handle errors gracefully**: if symbols fail, set empty array; if diagnostics fail, set empty array
            6. **Marshal to JSON** and return as types.TextResult

            Function signature:
            ```go
            func HandleExploreFile(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)
            ```

            Pattern to follow:

            ```go
            func HandleExploreFile(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error) {
                if err := CheckInitialized(client); err != nil {
                    return types.ErrorResult(err.Error()), nil
                }

                filePath, ok := args["file_path"].(string)
                if !ok || filePath == "" {
                    return types.ErrorResult("file_path is required"), nil
                }

                result := ExploreFileResult{}

                // 1. Get document symbols (graceful failure)
                symbolsResult, _ := HandleGetDocumentSymbols(ctx, client, args)
                if !symbolsResult.IsError && len(symbolsResult.Content) > 0 {
                    if textContent, ok := symbolsResult.Content[0].(*types.TextContent); ok {
                        var symbols []interface{}
                        _ = json.Unmarshal([]byte(textContent.Text), &symbols)
                        result.Symbols = symbols
                    }
                }

                // 2. Get diagnostics (graceful failure)
                diagResult, _ := HandleGetDiagnostics(ctx, client, args)
                if !diagResult.IsError && len(diagResult.Content) > 0 {
                    if textContent, ok := diagResult.Content[0].(*types.TextContent); ok {
                        var diagMap map[string][]types.LSPDiagnostic
                        _ = json.Unmarshal([]byte(textContent.Text), &diagMap)
                        fileURI := CreateFileURI(filePath)
                        if diags, ok := diagMap[fileURI]; ok {
                            result.Diagnostics = diags
                        }
                    }
                }

                // Marshal and return
                data, mErr := json.Marshal(result)
                if mErr != nil {
                    return types.ErrorResult(fmt.Sprintf("marshaling result: %s", mErr)), nil
                }
                return types.TextResult(string(data)), nil
            }
            ```

            ### Step 2: Register both compound tools in server.go

            Read `cmd/lsp-mcp-go/server.go` and find the section where tools are registered.
            The last tool is `get_semantic_tokens` (line ~450).

            **Insert after the get_semantic_tokens registration** (before the "Register resources" comment):

            Find this exact text:

            ```
            	mcp.AddTool(server, &mcp.Tool{
            		Name:        "get_semantic_tokens",
            		Description: "Get semantic tokens for a range in a file. Returns each token's type (function, variable, keyword, parameter, type, etc.) and modifiers (readonly, static, deprecated, etc.) with 1-based line/character positions. Use this to understand the syntactic role of code elements — distinct from hover which gives documentation. Only available when the language server supports textDocument/semanticTokens.",
            	}, func(ctx context.Context, req *mcp.CallToolRequest, args GetSemanticTokensArgs) (*mcp.CallToolResult, any, error) {
            		r, err := tools.HandleGetSemanticTokens(ctx, cs.get(), toolArgsToMap(args))
            		return makeCallToolResult(r), nil, err
            	})

            	// ------- Register resources -------
            ```

            Insert between the closing `})` of get_semantic_tokens and the resources comment:

            ```go

            	mcp.AddTool(server, &mcp.Tool{
            		Name:        "analyze_symbol",
            		Description: "Compound tool: Get hover info, references, and call hierarchy for a symbol in one call. Reduces round trips from 3 sequential calls to 1. Returns partial results if any sub-operation fails (e.g., empty references array if server doesn't support textDocument/references).",
            	}, func(ctx context.Context, req *mcp.CallToolRequest, args tools.AnalyzeSymbolArgs) (*mcp.CallToolResult, any, error) {
            		r, err := tools.HandleAnalyzeSymbol(ctx, clientForFile(resolver, cs, args.FilePath), toolArgsToMap(args))
            		return makeCallToolResult(r), nil, err
            	})

            	mcp.AddTool(server, &mcp.Tool{
            		Name:        "explore_file",
            		Description: "Compound tool: Get document symbols and diagnostics for a file in one call. Use this when opening a file for the first time to understand its structure and errors. Reduces round trips from 2 sequential calls to 1.",
            	}, func(ctx context.Context, req *mcp.CallToolRequest, args tools.ExploreFileArgs) (*mcp.CallToolResult, any, error) {
            		r, err := tools.HandleExploreFile(ctx, clientForFile(resolver, cs, args.FilePath), toolArgsToMap(args))
            		return makeCallToolResult(r), nil, err
            	})
            ```

            Use the Edit tool with exact text anchors from above.

