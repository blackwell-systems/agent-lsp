        package tools

        import "github.com/blackwell-systems/lsp-mcp-go/internal/types"

        // AnalyzeSymbolArgs is the input for analyze_symbol compound tool.
        type AnalyzeSymbolArgs struct {
            FilePath               string `json:"file_path"`
            LanguageID             string `json:"language_id,omitempty"`
            Line                   int    `json:"line"`
            Column                 int    `json:"column"`
            IncludeDeclaration     bool   `json:"include_declaration,omitempty"`
            CallHierarchyDirection string `json:"call_hierarchy_direction,omitempty"` // "incoming", "outgoing", "both" (default)
        }

        // AnalyzeSymbolResult is the output for analyze_symbol compound tool.
        type AnalyzeSymbolResult struct {
            Hover         string                            `json:"hover"`
            References    []types.FormattedLocation         `json:"references"`
            CallHierarchy *CallHierarchyData                `json:"call_hierarchy,omitempty"`
        }

        // CallHierarchyData contains call hierarchy items and calls.
        type CallHierarchyData struct {
            Items    []types.CallHierarchyItem         `json:"items"`
