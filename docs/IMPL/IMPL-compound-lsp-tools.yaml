title: Compound LSP Tools for Reduced Round Trips
feature_slug: compound-lsp-tools
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    Conservative scope: Adding 2 compound tools (analyze_symbol, explore_file)
    that bundle proven high-frequency call sequences. Skipping prepare_refactor
    until concrete evidence of friction emerges from real usage.

    **Validated pain points:**
    1. analyze_symbol: AI agents commonly call hover → refs → call_hierarchy when
       investigating a function or type. This 3-call sequence appears in every
       "explain this function" or "find all uses" workflow.
    2. explore_file: When opening a file for the first time, agents need both
       document symbols (structure) and diagnostics (errors). Currently requires
       2 sequential calls; bundling reduces latency.

    **File decomposition:** 3 new files created (2 handlers + 1 test), 1 file
    modified (server.go for registration), 1 scaffold file (shared types). Each
    compound tool handler is self-contained. Server registration is append-only.
    Fully disjoint ownership across 2 agents.

    **Interface discoverability:** All compound tools compose existing atomic
    tool handlers (HandleGetInfoOnLocation, HandleGetReferences,
    HandleCallHierarchy, HandleGetDocumentSymbols, HandleGetDiagnostics). No
    new LSP protocol calls. Interfaces are fully defined before implementation.

    **Pre-implementation status:** No existing compound tools. This is net-new
    functionality that augments (not replaces) the atomic tool set.

    **Parallelization value check:**
    - Build/test cycle length: ~5-8s for Go builds on this codebase (moderate benefit)
    - Files per agent: Agent A owns 2 files (handler + test), Agent B owns 2
      files (handler + registration), both can run simultaneously
    - Agent independence: Fully independent (single wave, no dependencies)
    - Task complexity: Moderate — new tool handlers + tests + registration,
      not trivial find-and-replace

    **High parallelization value:** Agents are independent AND tasks involve
    non-trivial logic (composition, error handling, JSON marshaling).

    **Caveats:**
    1. This work is speculative — we do not have empirical data on AI agent
       round-trip frequencies for this specific MCP server. The compound pattern
       is validated by CodeMCP's experience (60-70% reduction), but lsp-mcp-go
       is a different domain.
    2. Atomic tools remain unchanged. Compound tools are convenience shortcuts,
       not replacements. If agents don't use them, there's no regression.
    3. No batch operations (batchGet, batchSearch) — those are out of scope per
       the coordinator's guidance.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~4 min (2 agents × 4 min avg, accounting for parallelism)
    - Merge & verification: ~2 min
    Total SAW time: ~14 min

    Sequential baseline: ~12 min (2 agents × 6 min avg sequential time)
    Time savings: Marginal (~2 min, 17% faster)

    Recommendation: Proceed as SUITABLE WITH CAVEATS. The value is not primarily
    speed (parallelization savings are marginal) but coordination and audit trail.
    The IMPL doc serves as a spec for the compound tools and a progress tracker.
test_command: go build ./... && go test ./internal/tools -short
