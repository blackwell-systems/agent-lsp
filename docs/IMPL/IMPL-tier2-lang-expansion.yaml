        - id: F
          task: |
            ## Task
            Create Dockerfile fixture in `test/fixtures/dockerfile/` following a multi-stage pattern.

            ## What to implement
            Create 1 file:
            1. **Dockerfile** — A multi-stage Dockerfile with named stages and standard instructions

            The dockerfile-language-server-nodejs provides hover and diagnostics for Dockerfile
            syntax. Use a multi-stage build with named stages (e.g., `AS builder`) to provide
