            ## Interfaces consumed
            Dockerfile fixtures don't follow the Person/Greeter pattern (no cross-file references).
            Create a minimal Dockerfile with:
            - Multi-stage build (at least 2 stages)
            - Named stages (`AS builder`, `AS runtime`)
