quality_gates:
    level: standard
    gates:
        - type: build
          command: GOWORK=off go build ./...
          required: true
        - type: lint
          command: GOWORK=off go vet ./...
          required: true
        - type: test
          command: GOWORK=off go test -v -run TestMultiLanguage ./test/ -timeout 15m
          required: true
pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A creates C++ fixtures with C syntax instead of C++ syntax (typedef struct instead of class)
          likelihood: medium
          impact: low
          mitigation: Agent A brief explicitly states "use C++ syntax (classes instead of typedef struct)". If this occurs, Agent A can fix in isolation (no cascade).
        - scenario: Agent G adds langConfig entries with incorrect line/column numbers before reviewing actual fixtures
          likelihood: high
          impact: medium
          mitigation: Agent G brief includes explicit instruction to review fixture files after Wave 1 completes and adjust line numbers. Incorrect positions cause test failures but do not block merge (tests are skipped on failure).
        - scenario: CI install steps for npm packages (yaml-language-server, vscode-json-language-server, dockerfile-language-server-nodejs) fail due to npm registry timeout
          likelihood: low
          impact: medium
          mitigation: CI job has 15m timeout. If installs fail, tests skip gracefully. Post-merge, retry CI run or debug npm install locally.
