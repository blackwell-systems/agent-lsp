title: Add 6 Tier 2 Languages to Integration Test Harness
feature_slug: tier2-lang-expansion
verdict: SUITABLE
suitability_assessment: |
    This work adds 6 new languages (C++, JavaScript, Ruby, YAML, JSON, Dockerfile) to the
    integration test harness, expanding from 7 CI-tested languages to 13. Each language needs:
    1. Fixture files following the existing Person/Greeter pattern
    2. langConfig entry in test/multi_lang_test.go
    3. CI install step in .github/workflows/ci.yml
    4. README.md and docs/language-support.md updates

    **Suitability assessment:**
    1. **File decomposition:** 6 agents, fully disjoint file ownership. Each agent owns:
       - A new fixture directory (test/fixtures/<lang>/)
       - No conflicts between agents (each works in separate directories)
    2. **Investigation-first items:** None. All language servers have documented install
       patterns and the fixture pattern is established across 7 existing languages.
    3. **Interface discoverability:** The langConfig struct is stable and fully defined.
       No cross-agent interfaces needed — each agent adds independent entries.
    4. **Pre-implementation status:** All 6 languages are new additions (TODO).
    5. **Parallelization value:** High. Each agent creates 3-5 files with independent
       language server CI installs. No cross-wave dependencies. Build/test cycle is
       ~60s (go test + multi-lang test). 6 agents can run simultaneously.

    **Time-to-value estimate:**
    - Scout phase: ~8 min (dependency analysis, fixture pattern extraction, IMPL doc)
    - Agent execution: ~5 min (6 agents × 4 min avg, fully parallel in wave 1)
    - Merge & verification: ~3 min (CI validation with all 13 language servers)
    Total SAW time: ~16 min

    Sequential baseline: ~30 min (6 agents × 5 min avg sequential time)
    Time savings: ~14 min (47% faster)

    Recommendation: Clear speedup. Full parallelism in wave 1, no coordination overhead.
test_command: GOWORK=off go test -v -run TestMultiLanguage ./test/ -timeout 15m
lint_command: GOWORK=off go vet ./...
