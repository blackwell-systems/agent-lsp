interface_contracts:
    - name: langConfig struct extension
      description: |-
        Each new language must provide a langConfig entry compatible with the
        existing struct in test/multi_lang_test.go. The struct is stable and
        fully defined (lines 19-46).
      definition: |
        type langConfig struct {
          name               string   // Display name (e.g., "C++")
          id                 string   // LSP language ID (e.g., "cpp")
          binary             string   // Language server binary name
          serverArgs         []string // Args to pass to server
          javaHome           string   // Optional, Java only
          fixture            string   // Absolute path to fixture dir
          file               string   // Absolute path to primary source file
          hoverLine          int      // Line number for hover test (1-based)
          hoverColumn        int      // Column number for hover test (1-based)
          definitionLine     int      // Expected definition line
          definitionColumn   int      // Expected definition column
          callSiteLine       int      // Line with cross-file call
          callSiteColumn     int      // Column of cross-file call
          callSiteFile       string   // File with cross-file call (optional)
          referenceLine      int      // Line to query references from
          referenceColumn    int      // Column for references
          completionLine     int      // Line for completion test
          completionColumn   int      // Column for completion test
          completionFile     string   // File for completion (optional)
          workspaceSymbol    string   // Symbol to search for (e.g., "Person")
          supportsFormatting bool     // Whether server formats
          secondFile         string   // Cross-file fixture path
          symbolName         string   // Symbol name for document symbols test
          declarationLine    int      // Optional, for go_to_declaration
          declarationColumn  int      // Optional, for go_to_declaration
        }
      location: test/multi_lang_test.go:19-46
    - name: Fixture pattern
      description: |-
        Every language fixture must follow the Person/Greeter cross-file pattern:
        - Primary file defines a Person class/struct with name and age fields
        - Primary file defines an add() function for completions
        - Secondary file (greeter) imports Person and uses it
        This ensures cross-file definition, references, and workspace symbol tests pass.
      definition: |
        Primary file:
        - Person type (struct/class/interface) with name and age
        - add(x, y) function
        - Hover target at Person declaration
        - Completion target inside add() or similar

        Secondary file (greeter):
        - Import Person from primary file
        - Use Person in a function or class
        - Call site for go_to_definition test
      location: test/fixtures/python/, test/fixtures/c/, test/fixtures/typescript/
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Task
            Create C++ fixture files in `test/fixtures/cpp/` following the Person/Greeter pattern.

            ## What to implement
            Create 4 files:
            1. **person.h** — Header declaring `Person` struct and `create_person()` function
            2. **person.cpp** — Implementation of `create_person()` and `add()` function
            3. **greeter.cpp** — Cross-file consumer that includes person.h and calls functions
            4. **compile_commands.json** — Clangd compilation database (minimal, single entry)

            ## Interfaces consumed
            Follow the existing C fixture pattern (test/fixtures/c/). C++ uses the same
            structure but with C++ syntax (classes instead of typedef struct, std::string
            instead of char*, namespaces optional).

            ## Testing strategy
            After creating files, verify:
            1. `person.h` declares `Person` struct (or class) and `create_person()` function
            2. `greeter.cpp` includes `person.h` and calls `create_person()`
            3. `compile_commands.json` contains at least one valid entry for clangd

            Postcondition checks (run after implementation):
            ```bash
            # Check Person type exists in header
            grep -c "struct Person\|class Person" test/fixtures/cpp/person.h
            # Expected: 1

            # Check cross-file include in greeter
            grep -c '#include "person.h"' test/fixtures/cpp/greeter.cpp
            # Expected: 1

            # Check compilation database exists and is valid JSON
            jq . test/fixtures/cpp/compile_commands.json > /dev/null && echo "pass"
            # Expected: pass
            ```

            ## Verification gate
            ```bash
            # Build check
            GOWORK=off go build ./...

            # Lint check
            GOWORK=off go vet ./...

            # Postconditions (run after implementation)
            grep -c "struct Person\|class Person" test/fixtures/cpp/person.h  # expect 1
            grep -c '#include "person.h"' test/fixtures/cpp/greeter.cpp      # expect 1
            jq . test/fixtures/cpp/compile_commands.json > /dev/null && echo "pass"  # expect pass
            ```

            ## Constraints
            - Do NOT modify files outside your ownership list
            - Do NOT add langConfig entry (Agent G owns test/multi_lang_test.go)
            - Use C++11 or later syntax (clangd default)
            - Keep fixtures minimal (no complex templates or STL beyond std::string)

            ## Files owned
            - test/fixtures/cpp/person.h
            - test/fixtures/cpp/person.cpp
            - test/fixtures/cpp/greeter.cpp
            - test/fixtures/cpp/compile_commands.json
          files:
            - test/fixtures/cpp/person.h
            - test/fixtures/cpp/person.cpp
            - test/fixtures/cpp/greeter.cpp
            - test/fixtures/cpp/compile_commands.json
        - id: B
          task: |
            ## Task
            Create JavaScript fixture files in `test/fixtures/javascript/src/` following the
            Person/Greeter pattern.

            ## What to implement
            Create 2 files:
            1. **example.js** — Exports `Person` class and `add()` function
            2. **consumer.js** — Imports and uses `Person` and `add()` from example.js

            Use ES6 module syntax (`export`, `import`). The typescript-language-server handles
            `.js` files natively (no tsconfig needed for JavaScript mode).

            ## Interfaces consumed
            Follow the existing TypeScript fixture pattern (test/fixtures/typescript/src/) but
            remove type annotations. JavaScript fixtures use plain JS syntax.

            ## Testing strategy
            After creating files, verify:
            1. `example.js` exports `Person` class and `add()` function
            2. `consumer.js` imports from `'./example'` (or `'./example.js'`)
            3. Both files use ES6 syntax (no CommonJS `require`)

            Postcondition checks (run after implementation):
            ```bash
            # Check Person class exists
            grep -c "export class Person\|export.*Person" test/fixtures/javascript/src/example.js
            # Expected: 1

            # Check cross-file import
            grep -c "import.*from.*example" test/fixtures/javascript/src/consumer.js
            # Expected: 1

            # Check no TypeScript syntax (no type annotations)
            ! grep -E ": (string|number|boolean)" test/fixtures/javascript/src/example.js && echo "pass"
            # Expected: pass
            ```

            ## Verification gate
            ```bash
            # Build check
            GOWORK=off go build ./...

            # Lint check
            GOWORK=off go vet ./...

            # Postconditions
            grep -c "export class Person\|export.*Person" test/fixtures/javascript/src/example.js  # expect 1
            grep -c "import.*from.*example" test/fixtures/javascript/src/consumer.js  # expect 1
            ! grep -E ": (string|number|boolean)" test/fixtures/javascript/src/example.js && echo "pass"  # expect pass
            ```

            ## Constraints
            - Do NOT modify files outside your ownership list
            - Do NOT add langConfig entry (Agent G owns test/multi_lang_test.go)
            - Use ES6 syntax only (no TypeScript, no CommonJS)
            - Keep fixtures minimal (no npm dependencies, no bundler config)

            ## Files owned
            - test/fixtures/javascript/src/example.js
            - test/fixtures/javascript/src/consumer.js
          files:
            - test/fixtures/javascript/src/example.js
            - test/fixtures/javascript/src/consumer.js
        - id: C
          task: |
            ## Task
            Create Ruby fixture files in `test/fixtures/ruby/` following the Person/Greeter pattern.

            ## What to implement
            Create 2 files:
            1. **person.rb** — Defines `Person` class with `initialize(name, age)` and `greet` method
            2. **greeter.rb** — Requires `person` and defines `Greeter` class that uses `Person`

            Use standard Ruby syntax (classes, `require_relative`, `attr_reader`).

            ## Interfaces consumed
            Follow the existing Python fixture pattern (test/fixtures/python/) but adapt to Ruby
            syntax (`require_relative` instead of `import`, `initialize` instead of `__init__`,
            `attr_reader` for fields).

            ## Testing strategy
            After creating files, verify:
            1. `person.rb` defines `Person` class with `initialize` method
            2. `greeter.rb` requires `person` and uses `Person`
            3. No syntax errors (ruby -c should pass)

            Postcondition checks (run after implementation):
            ```bash
            # Check Person class exists
            grep -c "^class Person" test/fixtures/ruby/person.rb
            # Expected: 1

            # Check cross-file require
            grep -c "require_relative.*person" test/fixtures/ruby/greeter.rb
            # Expected: 1

            # Check Ruby syntax validity
            ruby -c test/fixtures/ruby/person.rb 2>&1 | grep -q "Syntax OK" && echo "pass"
            # Expected: pass
            ```

            ## Verification gate
            ```bash
            # Build check
            GOWORK=off go build ./...

            # Lint check
            GOWORK=off go vet ./...

            # Postconditions
            grep -c "^class Person" test/fixtures/ruby/person.rb  # expect 1
            grep -c "require_relative.*person" test/fixtures/ruby/greeter.rb  # expect 1
            ruby -c test/fixtures/ruby/person.rb 2>&1 | grep -q "Syntax OK" && echo "pass"  # expect pass
            ```

            ## Constraints
            - Do NOT modify files outside your ownership list
            - Do NOT add langConfig entry (Agent G owns test/multi_lang_test.go)
            - Use standard Ruby (no Rails, no gems beyond standard library)
            - Keep fixtures minimal (no complex metaprogramming)

            ## Files owned
            - test/fixtures/ruby/person.rb
            - test/fixtures/ruby/greeter.rb
          files:
            - test/fixtures/ruby/person.rb
            - test/fixtures/ruby/greeter.rb
        - id: D
          task: |
            ## Task
            Create YAML fixture files in `test/fixtures/yaml/` following a schema-validated pattern.

            ## What to implement
            Create 2 files:
            1. **workflow.yml** — A GitHub Actions workflow file with named keys and steps
            2. **.schema.json** — JSON Schema for the workflow (or reference to GitHub Actions schema)

            The yaml-language-server validates against JSON Schema. Use a known schema
            (GitHub Actions workflow) so hover and completions work without manual schema setup.

            ## Interfaces consumed
            YAML fixtures don't follow the Person/Greeter pattern (no cross-file references).
            Instead, create a valid workflow with:
            - Named keys that can be hovered (e.g., `name`, `on`, `jobs`)
            - Schema validation targets (e.g., valid GitHub Actions syntax)

            ## Testing strategy
            After creating files, verify:
            1. `workflow.yml` is valid YAML (can parse)
            2. `.schema.json` exists or workflow.yml references GitHub Actions schema via comment
            3. File contains named keys suitable for hover tests

            Postcondition checks (run after implementation):
            ```bash
            # Check workflow.yml is valid YAML
            python3 -c "import yaml; yaml.safe_load(open('test/fixtures/yaml/workflow.yml'))" && echo "pass"
            # Expected: pass

            # Check workflow has named jobs
            grep -c "^jobs:" test/fixtures/yaml/workflow.yml
            # Expected: 1

            # Check schema file exists OR workflow references schema
            test -f test/fixtures/yaml/.schema.json || grep -q "yaml-language-server" test/fixtures/yaml/workflow.yml && echo "pass"
            # Expected: pass
            ```

            ## Verification gate
            ```bash
            # Build check
            GOWORK=off go build ./...

            # Lint check
            GOWORK=off go vet ./...

            # Postconditions
            python3 -c "import yaml; yaml.safe_load(open('test/fixtures/yaml/workflow.yml'))" && echo "pass"  # expect pass
            grep -c "^jobs:" test/fixtures/yaml/workflow.yml  # expect 1
            test -f test/fixtures/yaml/.schema.json || grep -q "yaml-language-server" test/fixtures/yaml/workflow.yml && echo "pass"  # expect pass
            ```

            ## Constraints
            - Do NOT modify files outside your ownership list
            - Do NOT add langConfig entry (Agent G owns test/multi_lang_test.go)
            - Use GitHub Actions workflow schema (well-known, no manual schema setup needed)
            - Keep fixture minimal (single job, 2-3 steps)

            ## Files owned
