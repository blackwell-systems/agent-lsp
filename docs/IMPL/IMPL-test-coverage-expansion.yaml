title: Expand Integration Test Coverage for Missing Tier 2 Tools
feature_slug: test-coverage-expansion
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    All additions go into a single file (test/multi_lang_test.go) and are strictly
    additive: new struct fields, new testXxx functions, an expanded tier2Results
    slice, an updated printMultiLangSummary format string, and a new standalone
    TestSpeculativeSessions function. No existing code is modified except the four
    bounded insertion points documented below. There are no cross-agent type
    dependencies, so a single-agent wave is correct and does not violate I1.

    Suitability questions:
    1. File decomposition: One file. A single agent owns it entirely; no disjoint
       split is possible or necessary. This is a coordination document for one
       focused agent, not a parallelism exercise. Value is the audit trail and
       implementation spec.
    2. Investigation-first items: None. All tool signatures are known and stable;
       fixture positions can be determined from the fixture files.
    3. Interface discoverability: All tool argument schemas are defined in
       cmd/lsp-mcp-go/server.go and handlers are in internal/tools/. No ambiguity.
    4. Pre-implementation status: No tests exist for any of the listed tools in
       test/multi_lang_test.go. All are TODO.
    5. Parallelization value: Single agent, single file. Coordination value
       comes from the spec, fixture position mapping, and insertion anchors —
       not from parallelism.

    Verdict: SUITABLE WITH CAVEATS (single agent, coordination value only).

    Estimated times:
    - Scout phase: ~15 min (reading 1188-line test harness, fixture files, tool impls)
    - Agent execution: ~20 min (single agent, additive code, no build deps)
    - Merge and verification: ~2 min
    Total SAW time: ~37 min
    Sequential baseline: ~20 min (no parallelism benefit; value is the spec)
    Recommendation: Proceed; the spec and insertion anchors prevent agent
    hallucination errors that would otherwise require multiple correction rounds.
test_command: GOWORK=off go test ./internal/... ./cmd/...
lint_command: GOWORK=off go vet ./internal/... ./cmd/...
file_ownership:
    - file: test/speculative_test.go
      agent: A
      wave: 1
      action: new
    - file: test/multi_lang_test.go
      agent: A
      wave: 1
      action: modify
interface_contracts:
    - name: langConfig (extended fields)
      description: |
        New fields to add to the langConfig struct for the new tools.
        Agent must add these fields to the existing struct — do not redefine
        the struct; insert after the last existing field (typeHierarchyColumn).
      definition: |
        // New fields for Tier 2 expansion tools.
        highlightLine        int    // position-based; reuse hoverLine if 0
        highlightColumn      int    // reuse hoverColumn if 0
        inlayHintStartLine   int    // range start for get_inlay_hints; defaults to 1
        inlayHintEndLine     int    // range end; defaults to hoverLine+5 if 0
        renameSymbolLine     int    // position for rename_symbol / prepare_rename
        renameSymbolColumn   int    // position for rename_symbol / prepare_rename
        renameSymbolName     string // new_name arg for rename_symbol (e.g. "RenamedPerson")
        codeActionLine       int    // start of range for get_code_actions; reuse hoverLine if 0
        codeActionEndLine    int    // end of range for get_code_actions; defaults to codeActionLine+1
      location: test/multi_lang_test.go
    - name: testGetDocumentHighlights
      description: |
        Test function for get_document_highlights. Position-based, returns
        read/write/text occurrence kinds. Skip if highlightLine==0.
      definition: |
        func testGetDocumentHighlights(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Args sent to callTool:
          "file_path":   lang.file
          "language_id": lang.id
          "line":        lang.highlightLine (fall back to lang.hoverLine if 0)
          "column":      lang.highlightColumn (fall back to lang.hoverColumn if 0)

        Validation: result is a JSON array ([]map[string]any); skip if IsError=true
        (server may not support documentHighlights). Skip is acceptable — many
        servers support this but some do not.
        Return pass if len(items) >= 1; skip if IsError or empty array.
      location: test/multi_lang_test.go
    - name: testGetInlayHints
      description: |
        Test function for get_inlay_hints. Range-based. Use start_line=1,
        start_column=1, end_line computed from lang. Skip if server returns IsError.
      definition: |
        func testGetInlayHints(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Args sent to callTool:
          "file_path":    lang.file
          "language_id":  lang.id
          "start_line":   1
          "start_column": 1
          "end_line":     lang.inlayHintEndLine (default: lang.hoverLine + 5, min 5)
          "end_column":   120

        Validation: result is JSON array. Skip if IsError=true (not supported) or
        empty array (no hints in range — valid for many languages). Pass if
        len(hints) >= 1.
      location: test/multi_lang_test.go
    - name: testGetCodeActions
      description: |
        Test function for get_code_actions. Range-based. The TypeScript fixture
        has intentional diagnostic errors on lines 36-44 which are good targets.
        For other languages, use hoverLine as a range start. Skip if IsError=true.
      definition: |
        func testGetCodeActions(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Args sent to callTool:
          "file_path":    lang.file
          "language_id":  lang.id
          "start_line":   lang.codeActionLine (fall back to lang.hoverLine if 0)
          "start_column": 1
          "end_line":     lang.codeActionEndLine (default: codeActionLine + 1)
          "end_column":   120

        Validation: result is JSON array. Skip if IsError=true (not all servers
        support codeActionProvider). Pass if len(actions) >= 0 and no error
        (empty array is valid — no actions for that range). Fail only on error.
      location: test/multi_lang_test.go
    - name: testPrepareRename
      description: |
        Test function for prepare_rename. Validates that a rename is possible at
        the given position before commit. Skip if renameSymbolLine==0.
      definition: |
        func testPrepareRename(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Args sent to callTool:
          "file_path":   lang.file
          "language_id": lang.id
          "line":        lang.renameSymbolLine
          "column":      lang.renameSymbolColumn

        Validation: Skip if renameSymbolLine==0 or IsError=true (server may not
        support prepareRename). Pass if result is non-empty, non-null, non-"{}".
      location: test/multi_lang_test.go
    - name: testRenameSymbol
      description: |
        Test function for rename_symbol. Returns a WorkspaceEdit (does NOT apply it).
        Skip if renameSymbolLine==0 or renameSymbolName=="".
      definition: |
        func testRenameSymbol(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Args sent to callTool:
          "file_path":   lang.file
          "language_id": lang.id
          "line":        lang.renameSymbolLine
          "column":      lang.renameSymbolColumn
          "new_name":    lang.renameSymbolName

        Validation: result is a JSON object (WorkspaceEdit). Skip if IsError=true.
        Pass if result is non-empty and contains "changes" or "documentChanges" key.
      location: test/multi_lang_test.go
    - name: testGetServerCapabilities
      description: |
        Test function for get_server_capabilities. No position args; callable for
        every language. Returns ServerCapabilitiesResult JSON.
      definition: |
        func testGetServerCapabilities(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Args: {} (no args required)

        Validation: result is a JSON object with "supported_tools" array and
        "capabilities" map. Pass if supported_tools is non-empty and contains
        at least "start_lsp". Fail if IsError=true.
      location: test/multi_lang_test.go
    - name: testWorkspaceFolders
      description: |
        Test function for workspace folder lifecycle: list, add, remove.
        Tests list_workspace_folders, add_workspace_folder, remove_workspace_folder
        in sequence. Uses lang.fixture as the folder path.
      definition: |
        func testWorkspaceFolders(t *testing.T, ctx context.Context,
            session *mcp.ClientSession, lang langConfig) toolResult

        Sequence:
          1. list_workspace_folders — verify initial folders present
          2. add_workspace_folder {path: lang.fixture + "/tmp-extra-folder"} —
             create the dir first with os.MkdirTemp; pass if result has
             "added" key
          3. remove_workspace_folder {path: <same path>} — pass if result has
             "removed" key; skip if IsError=true (not all servers support
             didChangeWorkspaceFolders)

        Return pass if all three operations succeed, skip if add returns IsError.
      location: test/multi_lang_test.go
    - name: TestSpeculativeSessions
      description: |
        Standalone test function (top-level, not a testXxx helper) for the
        speculative/simulation session lifecycle. Tests create, simulate_edit_atomic,
        evaluate_session, commit_session, and discard_session using the Go fixture.
        Separate from the per-language matrix because it tests session lifecycle,
        not per-language behavior.
      definition: |
        func TestSpeculativeSessions(t *testing.T)

        Uses the Go fixture (test/fixtures/go). Skips if gopls not on PATH.
        Build the binary using getMultilangBinary(t). Start with lang id "go".

        Sequence:
          1. start_lsp {root_dir: goFixture}
          2. create_simulation_session {workspace_root: goFixture, language: "go"}
             — capture session_id from response
          3. simulate_edit_atomic {session_id, file_path: main.go, start_line: 20,
             start_column: 1, end_line: 20, end_column: 1,
             new_text: "\t// speculative comment\n"}
             — verify net_delta >= 0, no compile errors
          4. evaluate_session {session_id} — verify result is non-error
          5. discard_session {session_id} — verify success

        Also test a commit path:
          6. create a second session, apply a trivial edit, commit_session — verify ok

        Skip entire test gracefully if any session tool returns IsError=true
        (servers may not support speculative sessions).
      location: test/speculative_test.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context

            You are expanding the multi-language integration test harness in
            `test/multi_lang_test.go` (currently 1188 lines). The file is a
            test-only file in package `main_test`. All changes are additive — you
            add new struct fields, new helper functions, and update two existing
            function bodies. Do NOT modify any file outside `test/multi_lang_test.go`.

            ## What to implement

            ### 1. Add new fields to the `langConfig` struct

            The struct currently ends with:
            ```go
            	typeHierarchyLine   int // Java and TypeScript only
            	typeHierarchyColumn int // Java and TypeScript only
            }
            ```

            Insert the following fields immediately before the closing `}`:
            ```go
            	// Fields for Tier 2 expansion tools.
            	highlightLine      int    // for get_document_highlights; uses hoverLine if 0
            	highlightColumn    int    // for get_document_highlights; uses hoverColumn if 0
            	inlayHintEndLine   int    // end line for get_inlay_hints range; computed from hoverLine if 0
            	renameSymbolLine   int    // for rename_symbol / prepare_rename
            	renameSymbolColumn int    // for rename_symbol / prepare_rename
            	renameSymbolName   string // new_name for rename_symbol
            	codeActionLine     int    // start line for get_code_actions range; uses hoverLine if 0
            	codeActionEndLine  int    // end line for get_code_actions range; codeActionLine+1 if 0
            ```

            ### 2. Set fixture positions in `buildLanguageConfigs`

            For each language config in `buildLanguageConfigs`, add the new fields.
            Use the positions below (all 1-based line/column). If a language
            does not support a tool, leave the field as zero — the test function
            will skip it.

            **Go** (main.go):
            - highlightLine=6, highlightColumn=6 (type Person declaration)
            - inlayHintEndLine=20 (covers the struct and methods)
            - renameSymbolLine=6, renameSymbolColumn=6, renameSymbolName="RenamedPerson"
            - codeActionLine=6, codeActionEndLine=9

            **TypeScript** (example.ts):
            - highlightLine=11, highlightColumn=18 (Person interface)
            - inlayHintEndLine=35
            - renameSymbolLine=11, renameSymbolColumn=18, renameSymbolName="RenamedPerson"
            - codeActionLine=36, codeActionEndLine=38 (missing return type diagnostic)

            **Python** (main.py):
            - highlightLine=4, highlightColumn=7 (Person class)
            - inlayHintEndLine=16
            - renameSymbolLine=4, renameSymbolColumn=7, renameSymbolName="RenamedPerson"
            - codeActionLine=4, codeActionEndLine=7

            **Rust** (src/main.rs):
            - highlightLine=2, highlightColumn=8 (Person struct)
            - inlayHintEndLine=20
            - renameSymbolLine=2, renameSymbolColumn=8, renameSymbolName="RenamedPerson"
            - codeActionLine=2, codeActionEndLine=5

            **Java** (Person.java):
            - highlightLine=6, highlightColumn=14
            - inlayHintEndLine=20
            - renameSymbolLine=6, renameSymbolColumn=14, renameSymbolName="RenamedPerson"
            - codeActionLine=6, codeActionEndLine=8

            **C** (person.c):
            - highlightLine=3, highlightColumn=1
            - inlayHintEndLine=15
            - renameSymbolLine=3, renameSymbolColumn=1, renameSymbolName="renamed_person"
            - codeActionLine=3, codeActionEndLine=5

            **PHP**, **C++**, **JavaScript**, **Ruby** — set renameSymbolLine=0 (skip rename),
            codeActionLine=0 (skip). Set highlightLine=0 (reuse hover position logic
            in testGetDocumentHighlights). Set inlayHintEndLine=0 for all three.

            **YAML**, **JSON**, **Dockerfile** — set all new fields to 0 (skip all new tools).

            ### 3. Add the new test helper functions

            Add the following functions after `testGetSignatureHelp` (ends at line 1105)
            and before `statusIcon` (line 1107). Insert between those two functions.

            The exact text anchor for the insertion point:
            ```go
            	return toolResult{tool: "get_signature_help", status: "pass"}
            }

            // statusIcon returns a visual icon for a tool result status.
            ```

            Insert the new functions between the closing `}` of `testGetSignatureHelp`
            and the comment `// statusIcon returns a visual icon for a tool result status.`

            **a. testGetDocumentHighlights**
            ```go
            // testGetDocumentHighlights tests the get_document_highlights tool.
            func testGetDocumentHighlights(t *testing.T, ctx context.Context, session *mcp.ClientSession, lang langConfig) toolResult {
            	t.Helper()
            	line := lang.highlightLine
            	col := lang.highlightColumn
            	if line == 0 {
            		line = lang.hoverLine
            		col = lang.hoverColumn
            	}
            	if line == 0 {
            		return toolResult{tool: "get_document_highlights", status: "skip", detail: "no position configured"}
            	}
            	res, err := callTool(ctx, session, "get_document_highlights", map[string]any{
            		"file_path":   lang.file,
            		"language_id": lang.id,
            		"line":        line,
            		"column":      col,
            	})
            	if err != nil {
            		return toolResult{tool: "get_document_highlights", status: "fail", detail: err.Error()}
            	}
            	if res.IsError {
            		return toolResult{tool: "get_document_highlights", status: "skip",
            			detail: fmt.Sprintf("server does not support documentHighlights: %v", res.Content)}
            	}
            	text, err := textFromResult(res)
            	if err != nil {
            		return toolResult{tool: "get_document_highlights", status: "fail",
            			detail: fmt.Sprintf("failed to parse response: %v", err)}
            	}
            	var items []map[string]any
            	if err := json.Unmarshal([]byte(text), &items); err != nil {
            		return toolResult{tool: "get_document_highlights", status: "fail",
            			detail: fmt.Sprintf("failed to unmarshal response: %s", text)}
            	}
            	if len(items) == 0 {
            		return toolResult{tool: "get_document_highlights", status: "skip", detail: "no highlights returned"}
            	}
            	return toolResult{tool: "get_document_highlights", status: "pass"}
            }
            ```

            **b. testGetInlayHints**
            ```go
            // testGetInlayHints tests the get_inlay_hints tool over a range.
            func testGetInlayHints(t *testing.T, ctx context.Context, session *mcp.ClientSession, lang langConfig) toolResult {
            	t.Helper()
            	endLine := lang.inlayHintEndLine
            	if endLine == 0 {
            		endLine = lang.hoverLine + 5
            	}
            	if endLine < 5 {
            		endLine = 5
            	}
            	res, err := callTool(ctx, session, "get_inlay_hints", map[string]any{
            		"file_path":    lang.file,
            		"language_id":  lang.id,
            		"start_line":   1,
            		"start_column": 1,
            		"end_line":     endLine,
            		"end_column":   120,
            	})
            	if err != nil {
            		return toolResult{tool: "get_inlay_hints", status: "fail", detail: err.Error()}
            	}
            	if res.IsError {
            		return toolResult{tool: "get_inlay_hints", status: "skip",
            			detail: fmt.Sprintf("server does not support inlayHints: %v", res.Content)}
            	}
            	text, err := textFromResult(res)
            	if err != nil {
            		return toolResult{tool: "get_inlay_hints", status: "fail",
            			detail: fmt.Sprintf("failed to parse response: %v", err)}
            	}
            	var hints []map[string]any
            	if err := json.Unmarshal([]byte(text), &hints); err != nil {
            		return toolResult{tool: "get_inlay_hints", status: "fail",
            			detail: fmt.Sprintf("failed to unmarshal response: %s", text)}
            	}
            	if len(hints) == 0 {
            		return toolResult{tool: "get_inlay_hints", status: "skip", detail: "no inlay hints returned"}
            	}
            	return toolResult{tool: "get_inlay_hints", status: "pass"}
            }
            ```

