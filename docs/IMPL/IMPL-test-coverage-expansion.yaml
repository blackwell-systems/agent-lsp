        - scenario: |
            TestSpeculativeSessions fails with "undefined: create_simulation_session"
            because the tool name does not match server registration.
          likelihood: low
          impact: medium
          mitigation: |
            The tool names are verified against cmd/lsp-mcp-go/server.go. The test
            uses the same callTool() helper; mismatched tool names return IsError=true
            from the server, which the test handles as a skip, not a hard failure.
        - scenario: |
            The inlayHintEndLine default logic in testGetInlayHints produces a
            range where end < start (e.g., hoverLine=0 and inlayHintEndLine=0 both
            fallback to 5, which is fine; but if hoverLine+5 < 5, the guard
            "if endLine < 5 { endLine = 5 }" prevents this).
