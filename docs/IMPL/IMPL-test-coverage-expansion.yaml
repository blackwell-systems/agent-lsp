        - scenario: |
            The printMultiLangSummary column count mismatch — header has N columns
            but row format string has N±1 arguments, causing a misaligned table.
          likelihood: medium
          impact: low
          mitigation: |
            The exact format strings are provided verbatim in the task. Agent should
            count % verbs in header and row format strings and confirm they match.
