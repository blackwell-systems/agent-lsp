waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Clojure Fixture

            Create the Clojure fixture files for the clojure-lsp integration test.

            ### Files to create

            **test/fixtures/clojure/deps.edn**

            clojure-lsp requires a deps.edn at the project root to recognize it as a
            Clojure project. Create this file with exactly this content (an empty map):

            ```
            {}
            ```

            **test/fixtures/clojure/src/fixture/core.clj**

            Create this file with exactly this content:

            ```clojure
            (ns fixture.core)

            (defn greet [name]
              (str "Hello, " name))

            (defn main []
              (println (greet "Alice")))
            ```

            ### Position calibration notes (do NOT change this content)

            The langConfig consumer (applied post-merge) uses these 1-based positions:
            - Line 3 `(defn greet [name]`: `greet` starts at column 7
              (`(=1 d=2 e=3 f=4 n=5 _=6 g=7`)
            - Line 7 `  (println (greet "Alice"))`: `greet` starts at column 13
              (`__=1,2 (=3 p=4 r=5 i=6 n=7 t=8 l=9 n=10 _=11 (=12 g=13`)

            The fixture content must match exactly. Do not add extra blank lines,
            comments, or whitespace — positions are calibrated to this exact layout.

            ### What NOT to do
            - Do NOT create a project.clj (that is Leiningen, not tools.deps)
            - Do NOT add any other source files
            - Do NOT create a .clj-kondo/ config directory
            - Do NOT modify any existing files

            ### Verification gate
            ```bash
            test -f test/fixtures/clojure/deps.edn || exit 1
            test -f test/fixtures/clojure/src/fixture/core.clj || exit 1
            grep -q "defn greet" test/fixtures/clojure/src/fixture/core.clj || exit 1
            grep -q "fixture.core" test/fixtures/clojure/src/fixture/core.clj || exit 1
            # Verify exactly 7 lines in core.clj (no accidental extra content)
            test "$(wc -l < test/fixtures/clojure/src/fixture/core.clj)" -eq 7 || exit 1
            GOWORK=off go build ./...
            ```
          files:
            - test/fixtures/clojure/deps.edn
            - test/fixtures/clojure/src/fixture/core.clj
        - id: B
          task: |
            ## Agent B — Nix Fixture

            Create the Nix fixture file for the nil language server integration test.

            ### Files to create

            **test/fixtures/nix/flake.nix**

            nil recognizes any `.nix` file without requiring additional project config.
            Create this file with exactly this content:

            ```nix
            {
              description = "fixture";

              outputs = { self }: {
                helper = name: "Hello, ${name}";

                greeting = self.helper "Alice";
              };
            }
            ```

            ### Position calibration notes (do NOT change this content)

            The langConfig consumer (applied post-merge) uses these 1-based positions:
            - Line 5 `    helper = name: "Hello, ${name}";`:
              `helper` starts at column 5 (4 leading spaces, then `h`)
            - Line 7 `    greeting = self.helper "Alice";`:
              `helper` (in `self.helper`) starts at column 21:
              `____g=5 r=6 e=7 e=8 t=9 i=10 n=11 g=12 _=13 ==14 _=15 s=16 e=17 l=18 f=19 .=20 h=21`

            The fixture must be exactly 9 lines matching the above layout.

            ### What NOT to do
            - Do NOT create a default.nix or any other .nix files
            - Do NOT create a flake.lock file
            - Do NOT modify any existing files

            ### Verification gate
            ```bash
            test -f test/fixtures/nix/flake.nix || exit 1
            grep -q "helper" test/fixtures/nix/flake.nix || exit 1
            grep -q "self.helper" test/fixtures/nix/flake.nix || exit 1
            # Verify exactly 9 lines
            test "$(wc -l < test/fixtures/nix/flake.nix)" -eq 9 || exit 1
            GOWORK=off go build ./...
            ```
          files:
            - test/fixtures/nix/flake.nix
        - id: C
          task: |
            ## Agent C — Dart Fixture

            Create the Dart fixture files for the dart analysis-server integration test.

            ### Files to create

            **test/fixtures/dart/pubspec.yaml**

            ```yaml
            name: fixture
            description: Dart fixture for agent-lsp integration tests
            version: 1.0.0
            environment:
              sdk: ">=3.0.0 <4.0.0"
            ```

            **test/fixtures/dart/lib/fixture.dart**

            ```dart
            class Greeter {
              String greet(String name) {
                return 'Hello, $name';
              }
            }
            ```

            **test/fixtures/dart/lib/caller.dart**

            ```dart
            import 'fixture.dart';

            void main() {
              final g = Greeter();
              print(g.greet('Alice'));
            }
            ```

            ### Position calibration notes (do NOT change this content)

            The langConfig consumer (applied post-merge) uses these 1-based positions:

            fixture.dart:
            - Line 1 `class Greeter {`: `Greeter` starts at column 7
              (`c=1 l=2 a=3 s=4 s=5 _=6 G=7`)
            - Line 2 `  String greet(String name) {`: `greet` starts at column 10
              (`_=1 _=2 S=3 t=4 r=5 i=6 n=7 g=8 _=9 g=10`)

            caller.dart:
            - Line 4 `  final g = Greeter();`: `Greeter` starts at column 13
              (`_=1 _=2 f=3 i=4 n=5 a=6 l=7 _=8 g=9 _=10 ==11 _=12 G=13`)
            - Line 5 `  print(g.greet('Alice'));`: `greet` starts at column 11
              (`_=1 _=2 p=3 r=4 i=5 n=6 t=7 (=8 g=9 .=10 g=11`)

            fixture.dart must be exactly 5 lines. caller.dart must be exactly 6 lines.

            ### What NOT to do
            - Do NOT add a `main()` function to fixture.dart (keep it a library file)
            - Do NOT run `dart pub get` or generate any lockfiles
            - Do NOT create any other files in the dart fixture directory
            - Do NOT modify any existing files

            ### Verification gate
            ```bash
            test -f test/fixtures/dart/pubspec.yaml || exit 1
            test -f test/fixtures/dart/lib/fixture.dart || exit 1
            test -f test/fixtures/dart/lib/caller.dart || exit 1
            grep -q "class Greeter" test/fixtures/dart/lib/fixture.dart || exit 1
            grep -q "Greeter()" test/fixtures/dart/lib/caller.dart || exit 1
            test "$(wc -l < test/fixtures/dart/lib/fixture.dart)" -eq 5 || exit 1
            test "$(wc -l < test/fixtures/dart/lib/caller.dart)" -eq 6 || exit 1
            GOWORK=off go build ./...
            ```
          files:
            - test/fixtures/dart/pubspec.yaml
            - test/fixtures/dart/lib/fixture.dart
            - test/fixtures/dart/lib/caller.dart
        - id: D
          task: |
            ## Agent D — CI Jobs

            Append three new CI job definitions to `.github/workflows/ci.yml`.

            ### Confirmed last job

            The current last job in ci.yml is `multi-lang-sql`. Its last step is:

            ```yaml
                - name: Run SQL tests
                  run: GOWORK=off go test -v -run "TestMultiLanguage/^SQL$" ./test/ -timeout 10m
            ```

            The file ends immediately after this step with a trailing newline.
            Do NOT modify any existing content.

            ### Content to append

            Use the Edit tool to add the following block at the end of the file, after the
            existing SQL job's last step. Match the exact indentation style (2-space indent
            for job names, 4-space for steps keys, 6-space for step values):

            ```yaml

              # Clojure via clojure-lsp (native binary, no JVM needed)
              multi-lang-clojure:
                runs-on: ubuntu-latest
                steps:
                  - uses: actions/checkout@v4

                  - uses: actions/setup-go@v5
                    with:
                      go-version-file: 'go.mod'
                      cache: true

                  - name: Build
                    run: GOWORK=off go build ./...

                  - name: Install clojure-lsp
                    run: |
                      CLOJURE_LSP_VERSION=$(curl -fsSL https://api.github.com/repos/clojure-lsp/clojure-lsp/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
                      wget -q "https://github.com/clojure-lsp/clojure-lsp/releases/download/${CLOJURE_LSP_VERSION}/clojure-lsp-native-linux-amd64.zip" -O /tmp/clojure-lsp.zip
                      sudo unzip -q /tmp/clojure-lsp.zip -d /usr/local/bin
                      sudo chmod +x /usr/local/bin/clojure-lsp

                  - name: Run Clojure tests
                    run: GOWORK=off go test -v -run "TestMultiLanguage/^Clojure$" ./test/ -timeout 10m

              # Nix via nil language server
              multi-lang-nix:
                runs-on: ubuntu-latest
                steps:
                  - uses: actions/checkout@v4

                  - uses: actions/setup-go@v5
                    with:
                      go-version-file: 'go.mod'
                      cache: true

                  - name: Build
                    run: GOWORK=off go build ./...

                  - name: Install nil (Nix language server)
                    run: |
                      NIL_VERSION=$(curl -fsSL https://api.github.com/repos/oxalica/nil/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
                      wget -q "https://github.com/oxalica/nil/releases/download/${NIL_VERSION}/nil-x86_64-unknown-linux-musl.tar.gz" -O /tmp/nil.tar.gz
                      sudo tar -xzf /tmp/nil.tar.gz -C /usr/local/bin --strip-components=1
                      sudo chmod +x /usr/local/bin/nil

                  - name: Run Nix tests
                    run: GOWORK=off go test -v -run "TestMultiLanguage/^Nix$" ./test/ -timeout 10m

              # Dart via dart analysis-server
              multi-lang-dart:
                runs-on: ubuntu-latest
                steps:
                  - uses: actions/checkout@v4

                  - uses: actions/setup-go@v5
                    with:
                      go-version-file: 'go.mod'
                      cache: true

                  - name: Build
                    run: GOWORK=off go build ./...

                  - name: Install Dart SDK
                    run: |
                      sudo apt-get install -y apt-transport-https
                      wget -qO- https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/dart.gpg
                      echo 'deb [signed-by=/usr/share/keyrings/dart.gpg arch=amd64] https://storage.googleapis.com/download.dartlang.org/linux/debian stable main' | sudo tee /etc/apt/sources.list.d/dart_stable.list
                      sudo apt-get update
                      sudo apt-get install -y dart

                  - name: Run Dart tests
                    run: GOWORK=off go test -v -run "TestMultiLanguage/^Dart$" ./test/ -timeout 10m
            ```

            ### What NOT to do
            - Do NOT modify any existing job definitions
            - Do NOT change indentation of existing content
            - Do NOT add `continue-on-error: true` (these are first-class tests)
            - Do NOT touch any file other than .github/workflows/ci.yml

            ### Verification gate
            ```bash
            grep -q "multi-lang-clojure:" .github/workflows/ci.yml || exit 1
            grep -q "multi-lang-nix:" .github/workflows/ci.yml || exit 1
            grep -q "multi-lang-dart:" .github/workflows/ci.yml || exit 1
            grep -q "clojure-lsp-native-linux-amd64" .github/workflows/ci.yml || exit 1
            grep -q "oxalica/nil" .github/workflows/ci.yml || exit 1
            grep -q "dartlang.org" .github/workflows/ci.yml || exit 1
            # Confirm existing last job still present and unchanged
            grep -q "multi-lang-sql:" .github/workflows/ci.yml || exit 1
            GOWORK=off go build ./...
            ```
          files:
            - .github/workflows/ci.yml
