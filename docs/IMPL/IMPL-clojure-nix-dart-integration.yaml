pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Column positions in the langConfig entries are wrong because the fixture file content differs from what was specified (extra blank line, different whitespace). The most common mistake is the fixture agent adding a trailing newline that shifts line numbers, or using different indentation than specified.
          likelihood: medium
          impact: medium
          mitigation: |
            Each agent task specifies exact line counts via wc -l verification gates. fixture.dart must be exactly 5 lines, caller.dart exactly 6, core.clj exactly 7, flake.nix exactly 9. If line counts are wrong, the column derivations in the post_merge_checklist entry will be incorrect.
        - scenario: |
            The nil tar.gz does not have a top-level directory, so --strip-components=1 in the CI install step extracts wrongly or errors out.
          likelihood: low
          impact: low
          mitigation: |
            If nil's release asset structure changes, the install step will fail loudly. Agent D can add a fallback: extract to /tmp/nil-extract/ then cp the binary. Acceptable to leave as-is for now since it fails loudly and is easy to fix.
        - scenario: |
            clojure-lsp release asset name is versioned differently (e.g. includes the version string in the zip filename, so extracting to /usr/local/bin/clojure-lsp does not work because the zip contains a differently-named binary).
          likelihood: low
          impact: medium
          mitigation: |
            The unzip -d /usr/local/bin will extract whatever is in the zip. If the binary inside the zip is named differently from "clojure-lsp", the PATH lookup will fail. Agent D should verify the zip contents name — the current release at time of writing uses "clojure-lsp" as the binary name inside the zip.
        - scenario: |
            Dart SDK apt PPA is unavailable on the ubuntu-latest runner (currently Ubuntu 24.04). The dart.dev PPA may require an apt-get update that takes too long or fails.
          likelihood: low
          impact: medium
          mitigation: |
            The install script uses the official Dart storage.googleapis.com PPA which is the canonical method per dart.dev. If it fails, add `continue-on-error: true` to the multi-lang-dart job as a fallback, matching the pattern used by multi-lang-scala and multi-lang-prisma.
        - scenario: |
            post_merge_checklist edit inserts at the wrong location — for example, inside the SQL struct literal rather than after its closing brace. The two trailing braces (`},` then `}` then `}`) are easy to miscount.
          likelihood: low
          impact: high
          mitigation: |
            The post_merge_checklist entry includes verbatim context (last two SQL fields plus closing braces) as an exact-match anchor. Use the Edit tool with exact string matching on the multi-line anchor. Verify with grep -q after editing.
