            ## Task 2: Update the footnote sentence

            Find this sentence in the paragraph after the table. The sentence to find starts with:
            ```
            Clojure (`clojure-lsp`), Nix (`nil`), Dart (`dart language-server`), and MongoDB (`mongodb-language-server`) were added in the 29–30 language expansion; Tier 2 results shown after first CI run.
