pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            MongoDB language server fails to start in stdio mode outside VS Code
            extension host. The languageServer.js was designed to be launched by VS Code
            and may require extension host APIs (the vscode module) at startup, causing
            node to crash with "Cannot find module 'vscode'" or similar.
          likelihood: high
          impact: medium
          mitigation: |
            The MongoDB CI job already has continue-on-error: true. If the server fails to
            start, the test harness skips (exec.LookPath finds the binary but start_lsp
            returns IsError=true, which causes t.Skipf). If MongoDB consistently fails,
            Agent D should update the README row to show "skip" rather than "pass" for
            MongoDB Tier 1. The job remains informational-only in that case.
        - scenario: |
            Nix installer action times out or fails on ubuntu-latest, causing the nil
            install to fail and the test to skip rather than pass.
          likelihood: medium
          impact: low
          mitigation: |
            The job has continue-on-error: true (added by Agent B). If it times out, the
            job shows as "passed with warnings" in CI and does not block the overall workflow.
            The Nix installer + nix profile approach is the simplest correct method since
            nil has no binary release assets on GitHub.
        - scenario: |
            Agent B and Agent C both modify ci.yml in separate waves. The wave 1 merge of
            Agent C's changes to the MongoDB section conflicts with Agent B's wave 2 changes
            to the Nix section, requiring manual merge resolution.
          likelihood: low
          impact: low
          mitigation: |
            The jobs are in different YAML blocks (multi-lang-mongodb vs multi-lang-nix)
            with non-overlapping line ranges. Standard git merge should auto-resolve. If
            conflicts occur, the fix is trivial: manually apply the Nix PATH step and
            continue-on-error to the merged ci.yml.
        - scenario: |
            clojure-lsp starts but hover at line 3 col 7 returns empty because the server
            needs more than 8 seconds to analyze deps.edn and build its project analysis
            cache on first run.
          likelihood: medium
          impact: medium
          mitigation: |
            clojure-lsp is a native binary (no JVM) so it starts fast. The 8-second default
            initWait in the test harness is likely sufficient for a minimal deps.edn with
            one source file. If it fails, the langConfig timeout could be extended by
            modifying test/lang_configs_test.go to add a per-language initWait override for
            clojure, but that is out of scope for this IMPL.
        - scenario: |
            The Dart fixture bin/main.dart uses package: import prefix which requires
            dart pub get to have run. Without pub get, the analysis server may fail to
            resolve the import, causing Tier 1 to fail.
          likelihood: low
          impact: low
          mitigation: |
            Agent A's task explicitly requires using a relative import
            (import '../lib/fixture.dart') rather than a package: import. Relative imports
            work without dart pub get. The existing lib/caller.dart already uses relative
            imports (import 'fixture.dart') for the same reason.
