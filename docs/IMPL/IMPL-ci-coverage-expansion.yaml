            | Clojure | pass | pass | pass | pass | pass | pass | pass | — | — | pass | — | — | — |
            | Nix | pass | pass | — | — | pass | pass | — | — | — | pass | — | — | — |
            | Dart | pass | pass | pass | pass | pass | pass | pass | — | — | pass | — | — | — |
            | MongoDB | pass | — | — | — | pass | pass | — | — | — | pass | — | — | — |
