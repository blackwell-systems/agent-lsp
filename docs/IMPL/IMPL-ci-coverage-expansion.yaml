            Column mapping (Tier 1 | symbols | definition | references | completions | workspace | format | declaration | type_hierarchy | hover | call_hier | sem_tok | sig_help):
            - Clojure (clojure-lsp): Tier 1 pass, supports symbols/definition/references/completions/workspace/format/hover
            - Nix (nil): Tier 1 pass, supports symbols/completions/workspace/hover; no definition/references/format
            - Dart (dart language-server): Tier 1 pass, supports symbols/definition/references/completions/workspace/format/hover
