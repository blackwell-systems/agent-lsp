            ## Role
            Fix the path-traversal vulnerability in HandleGetDiagnostics and the
            dropped-context bug in StartForLanguage.

            ## Files
            - internal/tools/analysis.go
            - internal/lsp/manager.go

            ## What to implement

            ### Fix 1: ValidateFilePath in HandleGetDiagnostics (analysis.go)

            Finding: `HandleGetDiagnostics` calls `CreateFileURI(filePath)` without
            first calling `ValidateFilePath`. Every other handler (see helpers.go,
            session.go, symbol_source.go) validates before any disk access.

            In `HandleGetDiagnostics`, when `filePath != ""`, add a `ValidateFilePath`
            call before the `CreateFileURI` call. Use the client's root dir for the
            workspace constraint. Return a `types.ErrorResult` if validation fails.

            Current code block (insert after the `filePath, _ := args["file_path"].(string)` line):
            ```go
            if filePath != "" {
                fileURI := CreateFileURI(filePath)
            ```

            Replace with:
            ```go
            if filePath != "" {
                cleanPath, err := ValidateFilePath(filePath, client.RootDir())
                if err != nil {
                    return types.ErrorResult(fmt.Sprintf("invalid file path: %s", err)), nil
                }
                fileURI := CreateFileURI(cleanPath)
            ```

            Ensure the rest of the block uses `fileURI` as before (no other changes needed).

            ### Fix 2: Context propagation in StartForLanguage (manager.go)

            Finding: line 190 in manager.go calls `e.client.Shutdown(context.Background())`
            inside `StartForLanguage(ctx, ...)`, dropping the caller's context.

            Locate this exact code:
            ```go
                if e.client != nil {
                    _ = e.client.Shutdown(context.Background())
                }
            ```

            Replace `context.Background()` with `ctx`:
            ```go
                if e.client != nil {
                    _ = e.client.Shutdown(ctx)
                }
            ```

            ### Fix 3: Missing extensions in LanguageIDFromPath (manager.go)

            `LanguageIDFromPath` (internal/lsp/manager.go, around line 257) is missing
            `.c`, `.cpp`, `.cc`, `.cxx`, and `.java`. Files with these extensions are
            currently mapped to `"plaintext"`.

            Locate this exact block in the switch statement:
            ```go
            case ".ml", ".mli":
                return "ocaml"
            default:
                return "plaintext"
            ```

            Insert before the `default:` case:
            ```go
            case ".c":
                return "c"
            case ".cpp", ".cc", ".cxx":
                return "cpp"
            case ".java":
                return "java"
            ```

            ## Tests
            No new test files. Build + vet confirms the changes are correct.

            ## Verification gate
            ```
            GOWORK=off go build ./...
            GOWORK=off go vet ./...
            GOWORK=off go test ./internal/tools/... ./internal/lsp/...
