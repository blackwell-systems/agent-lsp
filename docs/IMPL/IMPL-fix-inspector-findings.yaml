            grep -c "ValidateFilePath" /Users/dayna.blackwell/code/agent-lsp/internal/tools/analysis.go
            # Expected: 1
            # Postcondition: context.Background() no longer in StartForLanguage shutdown block
            grep -n "context.Background()" /Users/dayna.blackwell/code/agent-lsp/internal/lsp/manager.go
            # Expected: should NOT appear on a line that also contains Shutdown within StartForLanguage
            # Postcondition: .c/.cpp/.java cases exist in LanguageIDFromPath
            grep -c '".c"' /Users/dayna.blackwell/code/agent-lsp/internal/lsp/manager.go
            # Expected: 1
            ```

            ## Constraints
            - Do NOT modify files outside your ownership list (analysis.go, manager.go).
            - Do NOT add ValidateFilePath to the else branch (all-files path) — that
              path uses `client.ReopenAllDocuments` which already operates on open
              documents without a caller-supplied file path.
            - Do NOT change the exported signature of any function.
