    - name: ValidateFilePath
      description: Existing function in internal/tools/helpers.go — Agent A calls it in HandleGetDiagnostics before CreateFileURI.
      definition: |
        func ValidateFilePath(filePath, rootDir string) (string, error)
      location: internal/tools/helpers.go
    - name: LanguageIDFromPath (extended)
      description: Add .c/.cpp/.java cases to the existing switch in manager.go. No signature change.
      definition: |
        // Additional cases to add to LanguageIDFromPath in internal/lsp/manager.go:
        case ".c":
            return "c"
        case ".cpp", ".cc", ".cxx":
            return "cpp"
        case ".java":
            return "java"
      location: internal/lsp/manager.go
    - name: DirtyError
      description: |
        New method on SimulationSession. Returns DirtyErr only when Status==StatusDirty;
        returns nil for any other status. Callers in manager.go that read .DirtyErr directly
        must be updated to call .DirtyError() instead.
      definition: |
        func (s *SimulationSession) DirtyError() error {
            s.mu.Lock()
            defer s.mu.Unlock()
            if s.Status == StatusDirty {
                return s.DirtyErr
            }
            return nil
        }
      location: internal/session/types.go
    - name: SetLevelFromEnv
      description: |
        New exported function in internal/logging. Reads LOG_LEVEL env var and calls
        SetLevel. Called explicitly from main() instead of init(). The init() body
        is removed (or left as a no-op comment). Package-level state is unchanged.
      definition: |
        func SetLevelFromEnv() {
            if envLevel := os.Getenv("LOG_LEVEL"); envLevel != "" {
                if _, ok := logLevelPriority[envLevel]; ok {
                    SetLevel(envLevel)
                } else {
                    fmt.Fprintf(os.Stderr, "agent-lsp: invalid LOG_LEVEL %q, defaulting to \"info\"\n", envLevel)
                }
            }
        }
      location: internal/logging/logging.go
