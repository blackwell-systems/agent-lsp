title: Fix Inspector Findings (lsp-mcp-go-audit-7)
feature_slug: fix-inspector-findings
verdict: SUITABLE
suitability_assessment: |
    11 concrete, actionable findings across 7 files. All fixes are independent:
    security patch (ValidateFilePath), context propagation, language ID extension
    coverage, error surfacing, two error-wrapping improvements, init side-effect
    removal, two test coverage additions, and one accessor guard. No investigation
    required — all root causes are known and file-level. Cross-agent interfaces
    are trivially defined (no new exported types that cross boundaries; the new
    DirtyError() accessor and SetLevelFromEnv() function are used only within
    their own packages). Disjoint file ownership is achievable with 5 agents.

    Finding #9 (parseBuildErrors tests): inspector listed TypeScript, Rust, Python,
    C#, Swift, Zig, Kotlin. Tests for C#, Swift, Zig, Kotlin already exist in
    build_test.go (TestParseBuildErrors_CSharp, _Swift, _Zig, _Kotlin). Only
    TypeScript, Rust, and Python are missing — those three are assigned to Agent E.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~25 min (5 agents parallel, ~5 min avg)
    - Merge & verification: ~5 min
    Total SAW time: ~45 min

    Sequential baseline: ~50 min
    Recommendation: Clear parallelization value given 5+ independent fix sites.
