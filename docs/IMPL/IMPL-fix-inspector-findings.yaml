                mu.Lock()
                defer mu.Unlock()
                currentLevel = level
            }
            ```

            New function to add immediately after:
            ```go
            // SetLevelFromEnv reads LOG_LEVEL from the environment and applies it
            // via SetLevel. Call this explicitly at binary startup instead of relying
            // on init(). Emits a warning to stderr if LOG_LEVEL is set to an
            // unrecognized value.
            func SetLevelFromEnv() {
                if envLevel := os.Getenv("LOG_LEVEL"); envLevel != "" {
                    if _, ok := logLevelPriority[envLevel]; ok {
                        SetLevel(envLevel)
                    } else {
                        fmt.Fprintf(os.Stderr, "agent-lsp: invalid LOG_LEVEL %q, defaulting to \"info\"\n", envLevel)
                    }
                }
            }
            ```

            Step 2: Replace the body of the existing `init()` function with a comment:
            Locate:
            ```go
            func init() {
                // Initialize level from LOG_LEVEL env var.
                if envLevel := os.Getenv("LOG_LEVEL"); envLevel != "" {
                    if _, ok := logLevelPriority[envLevel]; ok {
                        currentLevel = envLevel
                    } else {
                        initWarning = fmt.Sprintf("agent-lsp: invalid LOG_LEVEL %q, defaulting to \"info\"\n", envLevel)
                    }
                }
            }
            ```

            Replace with:
            ```go
            func init() {
                // Level initialization is performed by SetLevelFromEnv(), called
                // explicitly at binary startup. This init() is intentionally a no-op.
            }
            ```

            Note: the `initWarning` variable and its flush in `Log()` can remain; they
            are used by other paths. However, since `init()` no longer sets `initWarning`,
            the flush path will naturally become dead code over time. Do NOT remove
            `initWarning` machinery in this PR — that is a separate cleanup.

            ### Fix 2: DirtyError() accessor (types.go)

            Add a `DirtyError() error` method to `SimulationSession` in
            internal/session/types.go. Insert it after the existing `IsDirty()` method.

            Locate the exact block:
            ```go
            // IsDirty reports whether the session is in dirty state.
            func (s *SimulationSession) IsDirty() bool {
                s.mu.Lock()
                defer s.mu.Unlock()
                return s.Status == StatusDirty
            }
            ```

            Add immediately after:
            ```go
            // DirtyError returns the error that caused the session to enter dirty
            // state, or nil if the session is not dirty. This is the safe accessor
            // for DirtyErr: reading DirtyErr directly on a non-dirty session yields
            // nil with no signal that the session is healthy vs. dirty.
            func (s *SimulationSession) DirtyError() error {
                s.mu.Lock()
                defer s.mu.Unlock()
                if s.Status == StatusDirty {
                    return s.DirtyErr
                }
                return nil
            }
            ```

