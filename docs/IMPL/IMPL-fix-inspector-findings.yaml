            ## What to implement

            ### Fix 1: Remove init() side effects (logging.go)

            The `init()` function in internal/logging/logging.go (line 54) reads
            `LOG_LEVEL` and mutates `currentLevel`. This is an init side effect.

            Step 1: Add a new exported `SetLevelFromEnv()` function AFTER the existing
