            ## What to implement

            ### Fix 1: WaitForFileIndexed tests (diagnostics_test.go)

            `WaitForFileIndexed` (internal/lsp/client.go, ~line 1048) has no tests.
            `WaitForDiagnostics` has 6 tests as the reference pattern (client_test.go
            and diagnostics_test.go). Add three tests to diagnostics_test.go following
            the same pattern (use `newTestClient(t)` from client_test.go, which is in
            the same package `lsp`).

            **Test 1: timeout path**
            ```go
            // TestWaitForFileIndexed_Timeout verifies that WaitForFileIndexed returns
            // nil (not an error) after the timeout elapses with no notifications.
            func TestWaitForFileIndexed_Timeout(t *testing.T) {
                c, serverW, _ := newTestClient(t)
                _ = serverW

                ctx := context.Background()
                uri := "file:///missing.go"

                start := time.Now()
                err := c.WaitForFileIndexed(ctx, uri, 200)
                elapsed := time.Since(start)

                if err != nil {
                    t.Errorf("expected nil error on timeout, got: %v", err)
                }
                if elapsed < 190*time.Millisecond {
                    t.Errorf("resolved too early: %v (expected >= 190ms)", elapsed)
                }
                if elapsed > 700*time.Millisecond {
                    t.Errorf("resolved too late: %v (expected <= 700ms)", elapsed)
                }
            }
            ```

            **Test 2: context cancellation**
            ```go
            // TestWaitForFileIndexed_ContextCancelled verifies that WaitForFileIndexed
            // returns context.Canceled when the context is cancelled.
            func TestWaitForFileIndexed_ContextCancelled(t *testing.T) {
                c, serverW, _ := newTestClient(t)
                _ = serverW

                ctx, cancel := context.WithCancel(context.Background())
                uri := "file:///never.go"

                done := make(chan error, 1)
                go func() {
                    done <- c.WaitForFileIndexed(ctx, uri, 30000)
                }()

                time.Sleep(20 * time.Millisecond)
                cancel()

                select {
                case err := <-done:
                    if err != context.Canceled {
                        t.Errorf("expected context.Canceled, got: %v", err)
                    }
                case <-time.After(500 * time.Millisecond):
                    t.Error("timeout: expected WaitForFileIndexed to return on cancel")
                }
            }
            ```

            **Test 3: stability window reset**

            The stability window is 1500ms. Send multiple notifications 100ms apart;
            verify that WaitForFileIndexed does NOT return until 1500ms after the last
            notification. Use a short overall timeout to keep the test fast — the
            stability window is internal, so we test the reset by sending a second
            notification shortly after the first and verifying the call does not
            settle until after both stop.

            ```go
            // TestWaitForFileIndexed_StabilityWindowReset verifies that each new
            // notification resets the 1500ms stability window.
            func TestWaitForFileIndexed_StabilityWindowReset(t *testing.T) {
                c, serverW, _ := newTestClient(t)

                ctx := context.Background()
                uri := "file:///a.go"

                done := make(chan error, 1)
                go func() {
                    // Use a 6s timeout to give the stability window room.
                    done <- c.WaitForFileIndexed(ctx, uri, 6000)
                }()

                // Send first notification.
                time.Sleep(50 * time.Millisecond)
                if err := writeMsg(serverW, map[string]interface{}{
                    "jsonrpc": "2.0",
                    "method":  "textDocument/publishDiagnostics",
                    "params":  map[string]interface{}{"uri": uri, "diagnostics": []interface{}{}},
                }); err != nil {
                    t.Fatalf("write first notification: %v", err)
                }

                // Send second notification 200ms later (within stability window).
                time.Sleep(200 * time.Millisecond)
                if err := writeMsg(serverW, map[string]interface{}{
                    "jsonrpc": "2.0",
                    "method":  "textDocument/publishDiagnostics",
                    "params":  map[string]interface{}{"uri": uri, "diagnostics": []interface{}{}},
                }); err != nil {
                    t.Fatalf("write second notification: %v", err)
                }

                // Should NOT settle before ~1500ms after the second notification.
                select {
                case err := <-done:
                    if err != nil {
                        t.Errorf("unexpected error: %v", err)
                    }
                case <-time.After(5 * time.Second):
                    t.Error("timeout: WaitForFileIndexed did not settle within 5s")
                }
            }
            ```

            ### Fix 2: parseBuildErrors tests for TypeScript, Rust, Python (build_test.go)

            The existing tests in build_test.go cover Go, C#, Swift, Zig, Kotlin.
            Add table-driven tests for TypeScript, Rust, and Python with synthetic
            compiler output strings. Append these tests after the existing
            `TestParseBuildErrors_NewLanguages_NoErrors` test.

            ```go
            // TestParseBuildErrors_TypeScript verifies TypeScript compiler error parsing.
            func TestParseBuildErrors_TypeScript(t *testing.T) {
                input := []byte("src/index.ts(5,3): error TS2322: Type 'string' is not assignable to type 'number'\n")
                errors := parseBuildErrors("typescript", input)
                if len(errors) != 1 {
                    t.Fatalf("expected 1 error, got %d", len(errors))
                }
                if errors[0].File != "src/index.ts" {
                    t.Errorf("expected File=src/index.ts, got %q", errors[0].File)
                }
                if errors[0].Line != 5 {
                    t.Errorf("expected Line=5, got %d", errors[0].Line)
                }
                if errors[0].Column != 3 {
                    t.Errorf("expected Column=3, got %d", errors[0].Column)
                }
            }

            // TestParseBuildErrors_Rust verifies Rust compiler error parsing.
            func TestParseBuildErrors_Rust(t *testing.T) {
                input := []byte("error[E0308]: mismatched types\n --> src/main.rs:10:5\n")
                errors := parseBuildErrors("rust", input)
