pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A duplicates symbolKindName. The function is unexported and defined in
            analysis.go (same package). If Agent A defines it again in symbol_source.go,
            the package will fail to compile with "symbolKindName redeclared".
          likelihood: medium
          impact: high
          mitigation: |-
            Task brief explicitly states "Do NOT define symbolKindName". Postcondition grep
            checks that the function does NOT appear in symbol_source.go.
        - scenario: |-
            Agent A misses the character-to-column alias. ExtractPositionWithPattern reads
            args["column"], but the MCP parameter is "character". If Agent A calls
            ExtractPositionWithPattern without aliasing, character input is silently ignored
            and the handler always defaults to column=1 regardless of input.
          likelihood: medium
          impact: medium
          mitigation: |-
            Task brief includes the exact aliasing code block with explanation. The aliasing
            pattern is explicitly required in step (c) of the algorithm.
        - scenario: |-
            Agent B's isolated build fails because HandleGetSymbolSource is undefined
            (Agent A's file not yet merged). Agent B modifies analysis.go to add a stub.
          likelihood: low
          impact: high
          mitigation: |-
            Constraints section explicitly warns Agent B that the undefined-symbol build
            error is expected. Agent B is instructed to use go vet (not go build) for
            isolated verification.
        - scenario: |-
            findInnermostSymbol returns a pointer to the range-loop variable, causing
            the returned symbol to always reflect the last element evaluated.
          likelihood: medium
          impact: medium
          mitigation: |-
            Task brief includes the explicit copy pattern with comment "copy, not loop
            variable reference" and shows the correct local variable assignment.
known_issues:
    - title: finalize-scout validate_briefs false positives for Agent B
      description: |-
        validate_briefs reports GoToSymbolArgs, GetSymbolSourceArgs, and get_symbol_source
        as missing from server.go. GoToSymbolArgs is defined inside the RegisterTools function
        body (not a top-level symbol), so the validator does not find it. GetSymbolSourceArgs
        and get_symbol_source are new symbols that Agent B will CREATE; they do not
        exist yet by design. All other finalize-scout gates passed (schema, e35_gaps,
        test_cascade, wave_structure).
      status: known
      workaround: Proceed with wave execution. The symbols will exist after Agent B merges.
