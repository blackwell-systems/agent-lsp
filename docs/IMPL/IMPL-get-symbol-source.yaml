title: Add get_symbol_source MCP Tool
feature_slug: get-symbol-source
verdict: SUITABLE
suitability_assessment: |-
    File decomposition: 2 files change with disjoint ownership — new handler file
    (Agent A owns symbol_source.go + symbol_source_test.go), server registration
    (Agent B owns server.go). No two agents touch the same file.

    The optional Tier 2 integration test addition (test/multi_lang_test.go) is excluded
    from wave agents because multi_lang_test.go has 2065 lines, exceeding the 2000-line
    per-agent file budget (V048). It is recorded in post_merge_checklist for manual
    addition after Wave 1 completes.

    Interface discoverability: All contracts are fully specifiable now. The new handler
    composes existing primitives (GetDocumentSymbols, os.ReadFile, ExtractPositionWithPattern)
    with no new LSP methods required. All referenced helpers confirmed in internal/tools/.

    Investigation-first: No root cause analysis required; this is a new additive feature.

    Pre-implementation status: No part of get_symbol_source exists yet. All items are TODO.

    Parallelization value: Agents A and B are fully independent (disjoint files, zero
    shared symbols at write time). Build/test cycle (GOWORK=off go test ./internal/... ./cmd/...)
    runs in parallel. Clear speedup over sequential for 2 independent agents plus the
    coordination value of pinning the position-conversion convention (1-based in, 0-based
    comparison) and response shape before agents start.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~2 agents x ~10 min avg, fully parallel = ~10 min
    - Merge and verification: ~3 min
    Total SAW time: ~23 min

    Sequential baseline: ~2 agents x 12 min = ~24 min
    Time savings: ~1 min (marginal speed; coordination and audit trail are primary value)

    Recommendation: Proceed. The interface contracts pin the character-to-column aliasing
    convention and the containsPosition semantics before agents start, preventing the most
    likely divergence between handler logic and server wiring.
