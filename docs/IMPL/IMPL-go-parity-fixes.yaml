            ```go
            	result, err := c.sendRequest(ctx, "textDocument/codeAction", map[string]interface{}{
            		"textDocument": map[string]interface{}{"uri": uri},
            		"range":        rng,
            		"context":      map[string]interface{}{"diagnostics": []interface{}{}},
