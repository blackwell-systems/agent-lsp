    overall_risk: low
    rows:
        - scenario: |-
            Agent C's F13 fix uses `nil` as the context argument when calling OpenDocument
            in the fallback path, which could panic at runtime if OpenDocument dereferences ctx.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent C's task explicitly says to use `ctx` (the function parameter) not `nil`.
            The constraint section repeats this. Verify with grep after implementation.
        - scenario: |-
            Agent D's aggregation methods call ext.SubscriptionHandlers() and
            ext.PromptHandlers() before Agent A's interface change has merged, causing
            a compile error "HaskellExtension does not implement Extension".
          likelihood: low
          impact: low
          mitigation: |-
            All agents are in Wave 1 (parallel). Merges happen before post-merge
            quality gates run. Agent D's brief notes the dependency and includes a
            fallback instruction. The issue only manifests if agents are run
            sequentially before merge; the wave executor merges all branches before
            running quality gates.
        - scenario: |-
            Agent C's F6 hover type-switch does not handle the MarkedString single-object
            case (a plain {language, value} object, not wrapped in an array).
          likelihood: low
          impact: low
          mitigation: |-
            The LSP spec defines hover.contents as string | MarkupContent | MarkedString |
            MarkedString[]. The `map[string]interface{}` arm covers both MarkupContent
            (has "value") and single MarkedString (also has "value"). The fix correctly
            handles both via the value key extraction.
        - scenario: |-
            F11 removes the len(rawChanges) == 0 guard. An empty changes array now
            reaches the for loop which is a no-op, then calls DidChangeWatchedFiles
            with an empty slice. This is correct per LSP spec but callers that passed
            empty arrays expecting an error will silently succeed.
          likelihood: low
          impact: low
          mitigation: |-
            Per LSP spec an empty changes array is valid. The change is intentional.
            No callers in this repo pass empty arrays in tests.
        - scenario: |-
            Agent C's F9 replay fires callbacks while holding the write lock (diagMu),
            potentially deadlocking if a callback tries to call SubscribeToDiagnostics
            again or read the diags map.
          likelihood: low
          impact: high
          mitigation: |-
            Agent C's task spec copies the snapshot under the lock then releases
            the lock before firing callbacks. The replacement code uses `c.diagMu.Unlock()`
            before iterating the snapshot. This avoids the deadlock. Review the
            replacement carefully to ensure the unlock happens before the callback loop.
