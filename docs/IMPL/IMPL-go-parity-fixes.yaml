            MarkedString array shapes.

            Find this exact text:
            ```go
            	return fmt.Sprintf("%v", hover.Contents), nil
            }
            ```
            Replace with:
            ```go
            	switch v := hover.Contents.(type) {
            	case string:
            		return v, nil
            	case map[string]interface{}:
            		// MarkupContent: {kind: "markdown"|"plaintext", value: "..."}
            		if val, ok := v["value"].(string); ok {
            			return val, nil
            		}
            		return fmt.Sprintf("%v", v), nil
            	case []interface{}:
            		// MarkedString array: each element is string or {language, value}
            		var parts []string
            		for _, item := range v {
            			switch s := item.(type) {
            			case string:
            				parts = append(parts, s)
            			case map[string]interface{}:
            				if val, ok := s["value"].(string); ok {
            					parts = append(parts, val)
            				}
            			}
            		}
            		return strings.Join(parts, "\n"), nil
            	default:
            		return fmt.Sprintf("%v", hover.Contents), nil
            	}
            }
            ```
            Note: `strings` is already imported in client.go.

            ### F8 — GetCodeActions empty context.diagnostics (client.go:830)
            In `GetCodeActions`, replace the hardcoded empty diagnostics in the request
            with a filtered slice from the stored diagnostics map.

            The current code sends `"context": map[string]interface{}{"diagnostics": []interface{}{}}`.

