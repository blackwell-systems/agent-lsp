        - id: B
          task: |-
            ## Context
            File: internal/lsp/diagnostics.go
            Repo: /Users/dayna.blackwell/code/LSP-MCP-GO
            Run all commands with GOWORK=off.

            ## What to implement

            Fix E4: WaitForDiagnostics does not skip the initial cached-replay snapshot.

            The TypeScript reference tracks a "sawInitialSnapshot" flag per URI and
            skips the first callback for each URI (the cached-replay notification from
            SubscribeToDiagnostics), requiring a subsequent fresh notification before
            marking a URI as received. The Go implementation has no equivalent skip.

            ### Implementation

            Add a snapshot-skip tracking map and modify the callback closure to discard
            the first notification per URI before counting it as received.

            In WaitForDiagnostics, find the existing code block:
            ```go
            var mu sync.Mutex

            // Track which URIs have received at least one fresh notification.
            received := make(map[string]bool, len(uris))
            for _, uri := range uris {
                received[uri] = false
            }

            var lastEvent time.Time
            lastEvent = time.Now()

            allReceived := func() bool {
                for _, ok := range received {
                    if !ok {
                        return false
                    }
                }
                return true
            }

            notify := make(chan struct{}, len(uris)+1)

            cb := types.DiagnosticUpdateCallback(func(uri string, _ []types.LSPDiagnostic) {
                mu.Lock()
                if _, tracked := received[uri]; tracked {
                    received[uri] = true
                }
                lastEvent = time.Now()
                mu.Unlock()
                select {
                case notify <- struct{}{}:
                default:
                }
            })
            ```

            Replace with:
            ```go
            var mu sync.Mutex

            // Track which URIs have received at least one fresh notification.
            received := make(map[string]bool, len(uris))
            for _, uri := range uris {
                received[uri] = false
            }

            // seenInitial tracks whether the initial cached-replay notification has
            // been skipped per URI, matching the TypeScript sawInitialSnapshot logic.
            seenInitial := make(map[string]bool, len(uris))

            var lastEvent time.Time
            lastEvent = time.Now()

            allReceived := func() bool {
                for _, ok := range received {
                    if !ok {
                        return false
                    }
                }
                return true
            }

            notify := make(chan struct{}, len(uris)+1)

            cb := types.DiagnosticUpdateCallback(func(uri string, _ []types.LSPDiagnostic) {
                mu.Lock()
                if _, tracked := received[uri]; tracked {
                    if !seenInitial[uri] {
                        // Skip the first callback per URI: it is the cached-replay
                        // snapshot from SubscribeToDiagnostics, not a fresh notification.
                        seenInitial[uri] = true
                        mu.Unlock()
                        return
                    }
                    received[uri] = true
                }
                lastEvent = time.Now()
                mu.Unlock()
                select {
                case notify <- struct{}{}:
                default:
                }
            })
            ```

            Also update the doc comment at the top of WaitForDiagnostics from:
            ```go
            // WaitForDiagnostics waits for diagnostic stabilisation for all uris.
            // It ignores the initial snapshot, requires one fresh notification per URI,
            // then waits for a 500ms quiet window. Resolves on timeout without error.
            ```
            To:
            ```go
            // WaitForDiagnostics waits for diagnostic stabilisation for all uris.
            // It skips the initial cached-replay notification per URI (matching the
            // TypeScript sawInitialSnapshot logic), requires one fresh notification
            // per URI after that, then waits for a 500ms quiet window.
            // Resolves on timeout without error.
            ```

            ## Verification gate
            ```
            GOWORK=off go build ./internal/lsp/...
            GOWORK=off go vet ./internal/lsp/...
            grep -c 'seenInitial' /Users/dayna.blackwell/code/LSP-MCP-GO/internal/lsp/diagnostics.go
            # Expected: at least 3 (declaration, init, two usages in callback)
            ```

            ## Constraints
            - Do NOT modify any test files or anything under test/.
            - Do NOT modify files outside internal/lsp/diagnostics.go.
            - Do NOT change the function signature of WaitForDiagnostics.
          files:
            - internal/lsp/diagnostics.go
