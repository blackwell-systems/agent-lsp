            ## Context
            File: internal/lsp/client.go
            Repo: /Users/dayna.blackwell/code/LSP-MCP-GO
            Run all commands with GOWORK=off.

            ## What to implement

            Fix five issues in internal/lsp/client.go. Read the file before editing.

            ### Fix 1 (E3): Silent unmarshal discards

            Four functions contain `_ = json.Unmarshal(result, &v)` which silently
            discards unmarshal errors. Change each to propagate the error.

            The four functions are: GetSignatureHelp, RenameSymbol, PrepareRename,
            and ExecuteCommand.

            In each function, find and replace this three-line pattern:
            ```go
            var v interface{}
            _ = json.Unmarshal(result, &v)
            return v, nil
            ```
            with:
            ```go
            var v interface{}
            if err := json.Unmarshal(result, &v); err != nil {
                return nil, fmt.Errorf("unmarshal response: %w", err)
            }
            return v, nil
            ```

            Apply this replacement in all four functions. Each occurrence follows
            the same `result == nil` guard, so find each `_ = json.Unmarshal` line
            and replace it.

            ### Fix 2 (W2): Remove dead docVers field

            The LSPClient struct has a field `docVers map[string]int` that is
            declared and initialized in NewLSPClient but never read or written anywhere
            in the codebase. Version tracking uses `docMeta.version` inside `openDocs`
            instead.

            Step A: Remove the field from the struct. The struct has two adjacent fields:
            ```go
            openDocs  map[string]docMeta // uri -> meta
            docVers   map[string]int     // uri -> version
            ```
            Delete the `docVers` line.

            Step B: Remove the initialization in NewLSPClient. Find:
            ```go
            openDocs:       make(map[string]docMeta),
            docVers:        make(map[string]int),
            ```
            Delete the `docVers:` line.

            ### Fix 3 (W4): Add missing Initialize capabilities

            In the Initialize method, the initParams map is built. Two additions needed:

            Addition A: Add a "clientInfo" map entry as a top-level key in initParams. Find the block:
            ```go
            initParams := map[string]interface{}{
                "processId": os.Getpid(),
                "rootUri":   rootURI,
                "rootPath":  rootDir,
                "capabilities": map[string]interface{}{
            ```
            Insert after `"rootPath": rootDir,`:
            ```go
                "clientInfo": map[string]interface{}{
                    "name":    "lsp-mcp-go",
                    "version": "0.1.0",
                },
            ```

            Addition B: Add two keys to the `"workspace"` sub-map inside capabilities.
            Find the workspace map which currently ends with:
            ```go
            "workspaceEdit": map[string]interface{}{
                "documentChanges": true,
            },
            ```
            After that closing brace, add:
            ```go
            "didChangeConfiguration": map[string]interface{}{
                "dynamicRegistration": true,
            },
            "didChangeWatchedFiles": map[string]interface{}{
                "dynamicRegistration": true,
            },
            ```

            ### Fix 4 (W7): Wrap Shutdown error

            In the Shutdown method, find:
            ```go
            _, err := c.sendRequest(ctx, "shutdown", nil)
            if err != nil {
                return err
            }
            ```
            Change to:
            ```go
            _, err := c.sendRequest(ctx, "shutdown", nil)
            if err != nil {
                return fmt.Errorf("shutdown request: %w", err)
            }
            ```

            ### Fix 5 (W9): Update WaitForFileIndexed doc comment

            Find the existing doc comment that reads:
            ```go
            // WaitForFileIndexed waits until the URI has received at least one diagnostic
            // notification, then waits for a 1500ms quiet window with no further
            // notifications.
            ```
            Replace with:
            ```go
            // WaitForFileIndexed waits until the URI has received at least one diagnostic
            // notification (or fires immediately if diagnostics are already cached for
            // the URI via SubscribeToDiagnostics replay), then waits for a 1500ms quiet
            // window with no further notifications.
            ```

