suitability_assessment: |-
    All 14 findings (5 errors + 9 warnings) from the parity inspection are
    well-bounded edits to distinct files. Each fix touches at most one file
    per agent with no cross-agent type dependencies.

    File decomposition: 8 files change across 8 agents -- fully disjoint
    ownership. No investigation-first items; all root causes are identified
    in the inspection report.

    Interface discoverability: the only structural change (LSPDiagnostic.Code
    string to interface{}) is a standalone type change; callers already treat
    the field as opaque JSON, so no cascade updates are needed.

    Parallelization value: 8 independent agents, Go build/test cycle is
    ~10-15s. Clear speedup over sequential (~8 x 5 min = 40 min sequential
    vs ~5 min parallel + 3 min merge = 8 min total).

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~5 min (8 agents in parallel)
    - Merge and verification: ~3 min
    Total SAW time: ~23 min

    Sequential baseline: ~40 min
    Time savings: ~17 min (43% faster)

    Constraint from user: do NOT touch test files or the test/ directory.
