            ## Role
            Create the GitHub Actions Docker build and push workflow.

            ## Context
            - Existing workflows: ci.yml (CI tests), release.yml (GoReleaser binary release)
            - This workflow is ENTIRELY SEPARATE — do not modify ci.yml or release.yml
            - Registry: ghcr.io (GitHub Container Registry), uses GITHUB_TOKEN
            - Image: ghcr.io/blackwell-systems/agent-lsp
            - Per-language matrix: 18 languages (see interface_contracts.docker_workflow_matrix)
            - Triggers: push to main (edge tag), push of v* tags (version tags)
            - Combo tags: web (typescript+python), backend (go+python+rust), fullstack (go+typescript+python)
            - Layer caching: GitHub Actions cache (type=gha)

            ## What to implement

            Create `/Users/dayna.blackwell/code/agent-lsp/.github/workflows/docker.yml`:

            ### Workflow structure

            ```yaml
            name: Docker

            on:
              push:
                branches: [main]
                tags: ['v*']

            permissions:
              contents: read
              packages: write

            env:
              REGISTRY: ghcr.io
              IMAGE: ghcr.io/blackwell-systems/agent-lsp

            jobs:
              # Job 1: Build and push the base image
              base:
                runs-on: ubuntu-latest
                outputs:
                  base-digest: ${{ steps.push.outputs.digest }}
                steps:
                  - uses: actions/checkout@v4
                  - uses: docker/setup-buildx-action@v3
                  - uses: docker/login-action@v3
                    with:
                      registry: ghcr.io
                      username: ${{ github.actor }}
                      password: ${{ secrets.GITHUB_TOKEN }}
                  - name: Docker metadata
                    id: meta
                    uses: docker/metadata-action@v5
                    with:
                      images: ${{ env.IMAGE }}
                      tags: |
                        type=raw,value=base
                        type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
                        type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
                        type=semver,pattern={{version}}
                        type=semver,pattern={{major}}.{{minor}}
                  - name: Build and push base
                    id: push
                    uses: docker/build-push-action@v6
                    with:
                      context: .
                      file: Dockerfile
                      push: true
                      tags: ${{ steps.meta.outputs.tags }}
                      cache-from: type=gha
                      cache-to: type=gha,mode=max

              # Job 2: Per-language matrix builds
              per-language:
                runs-on: ubuntu-latest
                needs: base
                strategy:
                  fail-fast: false
                  matrix:
                    include:
                      - lang: go
                        lsp_package: golang.org/x/tools/gopls@latest
                        lsp_binary: gopls
                        package_mgr: go
                      - lang: typescript
                        lsp_package: "typescript-language-server typescript"
                        lsp_binary: typescript-language-server
                        package_mgr: npm
                      - lang: python
                        lsp_package: pyright
                        lsp_binary: pyright-langserver
                        package_mgr: npm
                      - lang: ruby
                        lsp_package: solargraph
                        lsp_binary: solargraph
                        package_mgr: gem
                      - lang: cpp
                        lsp_package: clangd
                        lsp_binary: clangd
                        package_mgr: apt
                      - lang: csharp
                        lsp_package: csharp-ls
                        lsp_binary: csharp-ls
                        package_mgr: dotnet
                      - lang: php
                        lsp_package: intelephense
                        lsp_binary: intelephense
                        package_mgr: npm
                      - lang: dart
                        lsp_package: dart
                        lsp_binary: dart
                        package_mgr: apt
                steps:
                  - uses: actions/checkout@v4
                  - uses: docker/setup-buildx-action@v3
                  - uses: docker/login-action@v3
                    with:
                      registry: ghcr.io
                      username: ${{ github.actor }}
                      password: ${{ secrets.GITHUB_TOKEN }}
                  - name: Build and push ${{ matrix.lang }}
                    uses: docker/build-push-action@v6
                    with:
                      context: .
                      file: Dockerfile.lang
                      push: true
                      tags: ${{ env.IMAGE }}:${{ matrix.lang }}
                      build-args: |
                        BASE_TAG=base
                        LANG=${{ matrix.lang }}
                        LSP_PACKAGE=${{ matrix.lsp_package }}
                        PACKAGE_MGR=${{ matrix.package_mgr }}
                        LSP_BINARY=${{ matrix.lsp_binary }}
                      cache-from: type=gha
                      cache-to: type=gha,mode=max

            Note: Languages requiring `manual` package manager (rust, java, kotlin, swift,
            scala, haskell, lua, elixir, clojure, zig) are intentionally excluded from the
            per-language matrix because Dockerfile.lang exits 1 for PACKAGE_MGR=manual.
            These languages are best served via the LSP_SERVERS runtime install mechanism
            in the base image. Document this in a YAML comment in the matrix.

              # Job 3: Combo images (web, backend, fullstack)
              # Each combo image is a multi-stage build that copies binaries from the
              # individual per-language images. OR: build fresh from base with multiple
              # package installs. Choose the simpler approach: build from base, install
              # all needed servers in one RUN block.
              combos:
                runs-on: ubuntu-latest
                needs: [base, per-language]
                strategy:
                  matrix:
                    include:
                      - tag: web
                        servers: "typescript python"
                        packages_npm: "typescript-language-server typescript pyright"
                        description: "TypeScript + Python language servers"
                      - tag: backend
                        servers: "go python"
                        packages_npm: "pyright"
                        description: "Go + Python language servers"
                      - tag: fullstack
                        servers: "go typescript python"
                        packages_npm: "typescript-language-server typescript pyright"
                        description: "Go + TypeScript + Python language servers"
                steps:
                  - uses: actions/checkout@v4
                  - uses: docker/setup-buildx-action@v3
                  - uses: docker/login-action@v3
                    ...
                  - name: Build and push ${{ matrix.tag }}
                    uses: docker/build-push-action@v6
                    with:
                      context: .
                      file: Dockerfile
                      push: true
                      tags: ${{ env.IMAGE }}:${{ matrix.tag }}
                      # Use a build-arg or inline Dockerfile for combo installs
                      # Simplest: use LSP_SERVERS in a FROM+RUN pattern

            For combos, the simplest approach is an inline Dockerfile approach using
            heredoc syntax in the workflow or a dedicated Dockerfile.combo. Recommended:
            use `docker buildx build` with `--build-arg LSP_SERVERS=...` against the
            base image Dockerfile, overriding the CMD so the install runs at build time
            (not runtime). Actually the cleanest approach for combos: write three small
            Dockerfile.{web,backend,fullstack} files — but the design spec says "no extra
            files". Instead, use a `--build-arg EXTRA_SERVERS=...` in a modified version
            of the base Dockerfile that optionally pre-installs servers. Or use `docker build`
            with stdin heredoc.

            The cleanest approach that requires no new Dockerfile files: in the combo job,
            use `docker/build-push-action` with a `dockerfile-inline` option:
            ```yaml
            - name: Build combo ${{ matrix.tag }}
              uses: docker/build-push-action@v6
              with:
                push: true
                tags: ${{ env.IMAGE }}:${{ matrix.tag }}
                file: Dockerfile.lang  # or use inline
            ```

            Best approach for combos: use Dockerfile.lang for each language, then combine
            via a multi-stage FROM scratch approach, or just build a small inline Dockerfile
            for each combo that installs the needed npm packages in one layer:

            Use inline Dockerfile in the workflow for combos — this is supported by
            docker/build-push-action via the `file` argument pointing at a temp file,
            or via `context: ${{ runner.temp }}`. The pragmatic approach: write the combo
            build as a plain `docker build` step using a bash heredoc, then push with
            `docker push`. This avoids the complexity of inline build-push-action files.

              # Job 4: Full image
              full:
                runs-on: ubuntu-latest
                needs: base
                steps:
                  - uses: actions/checkout@v4
                  - uses: docker/setup-buildx-action@v3
                  - uses: docker/login-action@v3
                    ...
                  - name: Build and push full
                    uses: docker/build-push-action@v6
                    with:
                      context: .
                      file: Dockerfile.full
                      push: true
                      tags: |
                        ${{ env.IMAGE }}:full
                      build-args: BASE_TAG=base
                      cache-from: type=gha
                      cache-to: type=gha,mode=max
            ```

            Write the actual complete YAML workflow file. Where the description above
