pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A's Dockerfile does not include the COPY for lsp-servers.yaml to
            /etc/agent-lsp/lsp-servers.yaml. The entrypoint.sh (Agent C) depends on this
            file being present. Agent C leaves a comment about this but Agent A may not
            see it since agents work in isolation.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent A's task explicitly notes the COPY line required. Additionally, the
            verification gate for Agent C checks that the entrypoint references the
            registry path. The post-merge integration test (docker build) will catch
            the missing COPY at build time, not runtime.
        - scenario: |-
            Dockerfile.lang's case statement for package_mgr=go installs golang-go from
            apt (Debian's Go package, which may be an older version) instead of the
            upstream Go toolchain. gopls requires a recent Go version; the Debian package
            may be too old.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent B's task notes this concern and instructs using `golang-go` from apt with
            awareness that it may be an older version. For production use, the gopls image
            would ideally install via the official Go installer. The task notes that users
            with strict version requirements should build from source. A TODO comment in
            Dockerfile.lang documents this.
        - scenario: |-
            Agent D's workflow uses `docker/build-push-action@v6` which may not exist
            (current stable is v5). Using a non-existent action version causes workflow
            failures.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent D should use `docker/build-push-action@v5` (verified stable as of 2026).
            The task description uses v6 as an example; the agent must use the latest stable
            version. Cross-check: use the same major version as docker/setup-buildx-action
            and docker/login-action (all v3 as of 2026).
        - scenario: |-
            The combo image jobs in the workflow are complex — inline Dockerfile approach
            in GitHub Actions YAML is tricky. Agent D may produce invalid YAML or use
            a mechanism (heredoc in workflow) that GitHub Actions doesn't support cleanly.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent D's task provides guidance to use the simplest possible approach. If
            inline Dockerfiles prove complex, the combo jobs can use a simple `docker buildx
            build` shell command with bash heredoc as a `run:` step, followed by `docker push`.
            This is less elegant but straightforward. The task explicitly allows this fallback.
        - scenario: |-
            Agent F inserts the Docker section into README.md at the wrong position, either
            duplicating content, breaking the existing badge table, or inserting in the middle
            of an existing section.
          likelihood: low
          impact: low
          mitigation: |-
            Agent F is instructed to read README.md before editing and use a verbatim text
            anchor for the Edit tool. The exact surrounding context is identified: the Docker
            section goes before "## Installation". Agent F's verification gate checks that
            the Docker section exists and that ghcr.io URLs are present.
        - scenario: |-
            The entrypoint.sh uses awk/grep to parse YAML, which is fragile. If the
            lsp-servers.yaml format has any inconsistency (extra spaces, quoted values with
            different quoting), the install_command extraction will silently fail.
          likelihood: low
          impact: low
          mitigation: |-
            Agent C defines a strict YAML format for lsp-servers.yaml (all install_command
            values double-quoted, consistent indentation) and the awk pattern matches the
            exact format. The entrypoint prints a warning if install_command is empty.
            Users hitting issues can fall back to manual installation.
