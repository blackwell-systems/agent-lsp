title: Tiered Docker Image Distribution for agent-lsp
feature_slug: docker-distribution
verdict: SUITABLE
suitability_assessment: |
    The work decomposes cleanly across 6 agents with fully disjoint file ownership.
    Every file being created is new (except DOCKER.md and README.md which are grouped
    together under one agent). There are no investigation-first blockers — the design
    spec is complete and all interface points (entrypoint env vars, image tag naming,
    workflow trigger rules) are specified upfront.

    File decomposition: 9 new files + 2 modified files split across 6 agents in 2 waves.
    No two agents touch the same file. Cross-agent interface: the base image tag
    (ghcr.io/blackwell-systems/agent-lsp:base) is defined by Agent A and referenced by
    Agents B and C — this is a naming contract, not a code contract, and is fully
    specifiable before implementation starts.

    Parallelization value: High. Wave 1 has 5 independent agents creating distinct new
    files; they can run fully in parallel. Wave 2 (documentation) depends only on the
    final file names and tag names being fixed, which they are from the design spec.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~25 min (5 Wave 1 agents x ~5 min avg, parallelized; 1 Wave 2 agent x ~5 min)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~35 min (6 agents x ~6 min avg sequential)
    Time savings: ~15 min (38% faster). Recommendation: Clear speedup from Wave 1 parallelism.
test_command: GOWORK=off go build ./...
lint_command: go vet ./...
file_ownership:
    - file: Dockerfile
      agent: A
      wave: 1
      action: new
    - file: Dockerfile.lang
      agent: B
      wave: 1
      action: new
    - file: Dockerfile.full
      agent: B
      wave: 1
      action: new
    - file: docker/entrypoint.sh
      agent: C
      wave: 1
      action: new
    - file: docker/lsp-servers.yaml
      agent: C
      wave: 1
      action: new
    - file: .github/workflows/docker.yml
      agent: D
      wave: 1
      action: new
    - file: docker-compose.yml
      agent: E
      wave: 1
      action: new
    - file: .env.example
      agent: E
      wave: 1
      action: new
    - file: .dockerignore
      agent: E
      wave: 1
      action: new
    - file: DOCKER.md
      agent: F
      wave: 2
      action: modify
      depends_on:
        - A
        - B
        - C
        - D
        - E
    - file: README.md
      agent: F
      wave: 2
      action: modify
      depends_on:
        - A
        - B
        - C
        - D
        - E
interface_contracts:
    - name: base_image_tag
      description: |-
        The base image tag used as FROM in per-language and full images.
        This naming contract must be consistent across all Dockerfiles and the workflow.
      definition: |
        ghcr.io/blackwell-systems/agent-lsp:base
        # Used as the FROM line in Dockerfile.lang and Dockerfile.full.
        # In the GitHub Actions workflow, built first, then per-language images built FROM it.
        # In local builds (docker-compose), references the locally-built base image.
      location: Dockerfile
    - name: LSP_SERVERS_env_var
      description: |-
        Runtime environment variable read by docker/entrypoint.sh to install language
        servers on first container start. Comma-separated list of server binary names
        matching entries in docker/lsp-servers.yaml.
      definition: |
        LSP_SERVERS=gopls,typescript-language-server,pyright
        # The entrypoint script reads this variable, looks up each name in
        # docker/lsp-servers.yaml to find the install command, installs it if not
        # already on PATH, caches to /var/cache/lsp-servers/, then exec's agent-lsp.
      location: docker/entrypoint.sh
    - name: lsp_servers_yaml_schema
      description: |-
        Schema for docker/lsp-servers.yaml: the registry of all supported language
        servers with install metadata. Used by entrypoint.sh for runtime install and
        by DOCKER.md for documentation.
      definition: |
        servers:
          - name: gopls                          # binary name on PATH
            language: go
            package_manager: go                  # go | npm | apt | gem | pip | cargo | manual
            install_command: "go install golang.org/x/tools/gopls@latest"
            binary: gopls
          - name: typescript-language-server
            language: typescript
            package_manager: npm
            install_command: "npm install -g typescript-language-server typescript"
            binary: typescript-language-server
          # ... one entry per supported server
      location: docker/lsp-servers.yaml
    - name: LANG_ARG
      description: |-
        Build ARG in Dockerfile.lang that selects which language server to install.
        Three args are passed together to enable a single parameterized Dockerfile.
      definition: |
        ARG LANG           # e.g. "go", "typescript", "python"
        ARG LSP_PACKAGE    # e.g. "golang.org/x/tools/gopls@latest", "typescript-language-server typescript"
        ARG LSP_BINARY     # e.g. "gopls", "typescript-language-server"
        ARG PACKAGE_MGR    # e.g. "go", "npm", "apt"
      location: Dockerfile.lang
    - name: docker_workflow_matrix
      description: |-
        GitHub Actions matrix strategy for per-language image builds. Each entry maps
        to one docker/build-push-action call building Dockerfile.lang with the given ARGs.
        The workflow also builds base, full, and combo images outside the matrix.
      definition: |
        strategy:
          matrix:
            include:
              - lang: go
                lsp_package: golang.org/x/tools/gopls@latest
                lsp_binary: gopls
                package_mgr: go
              - lang: typescript
                lsp_package: "typescript-language-server typescript"
                lsp_binary: typescript-language-server
                package_mgr: npm
              - lang: python
                lsp_package: pyright
                lsp_binary: pyright-langserver
                package_mgr: npm
              - lang: rust
                lsp_package: rust-analyzer
                lsp_binary: rust-analyzer
                package_mgr: cargo-binstall
              - lang: java
                lsp_package: jdtls
                lsp_binary: jdtls
                package_mgr: manual
              - lang: ruby
                lsp_package: solargraph
                lsp_binary: solargraph
                package_mgr: gem
              - lang: cpp
                lsp_package: clangd
                lsp_binary: clangd
                package_mgr: apt
              - lang: csharp
                lsp_package: csharp-ls
                lsp_binary: csharp-ls
                package_mgr: dotnet
              - lang: kotlin
                lsp_package: kotlin-language-server
                lsp_binary: kotlin-language-server
                package_mgr: manual
              - lang: php
                lsp_package: intelephense
                lsp_binary: intelephense
                package_mgr: npm
              - lang: scala
                lsp_package: metals
                lsp_binary: metals
                package_mgr: coursier
              - lang: lua
                lsp_package: lua-language-server
                lsp_binary: lua-language-server
                package_mgr: manual
              - lang: elixir
                lsp_package: elixir-ls
                lsp_binary: elixir-ls
                package_mgr: manual
              - lang: clojure
                lsp_package: clojure-lsp
                lsp_binary: clojure-lsp
                package_mgr: manual
              - lang: dart
                lsp_package: dart
                lsp_binary: dart
                package_mgr: apt
              - lang: zig
                lsp_package: zls
                lsp_binary: zls
                package_mgr: manual
              - lang: haskell
                lsp_package: haskell-language-server
                lsp_binary: haskell-language-server-wrapper
                package_mgr: ghcup
              - lang: swift
                lsp_package: sourcekit-lsp
                lsp_binary: sourcekit-lsp
                package_mgr: manual
      location: .github/workflows/docker.yml
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Create the multi-stage base Dockerfile for agent-lsp.

            ## Context
            - Module: github.com/blackwell-systems/agent-lsp (from go.mod)
            - Go version in go.mod: 1.25.0 (use this exact version in the builder stage)
            - Binary entrypoint: reads no special env vars itself — env var handling is
              in docker/entrypoint.sh (written by Agent C), which exec's agent-lsp
            - Final image must be debian:bookworm-slim (not alpine — some LSP servers
              need glibc)
            - The base image must NOT install any language servers; those go in
              Dockerfile.lang and Dockerfile.full
            - The entrypoint script will be at /usr/local/bin/entrypoint.sh in the image

            ## What to implement

            Create `/Users/dayna.blackwell/code/agent-lsp/Dockerfile` with:

            1. **Builder stage** (`FROM golang:1.25-bookworm AS builder`):
               - Set WORKDIR to /src
               - Copy go.mod and go.sum first (for layer caching)
               - Run `go mod download`
               - Copy the full source
               - Build: `CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags="-s -w" -o /out/agent-lsp ./cmd/agent-lsp/`
               - The `-trimpath -ldflags="-s -w"` flags produce a stripped static binary

            2. **Final stage** (`FROM debian:bookworm-slim`):
               - Install runtime dependencies: `ca-certificates curl git` (minimal; needed for some LSP runtime installs via entrypoint)
               - Copy the binary: `COPY --from=builder /out/agent-lsp /usr/local/bin/agent-lsp`
               - Copy the entrypoint script: `COPY docker/entrypoint.sh /usr/local/bin/entrypoint.sh`
               - `RUN chmod +x /usr/local/bin/entrypoint.sh`
               - Create the LSP server cache dir: `RUN mkdir -p /var/cache/lsp-servers`
               - Set ENV HOME=/root (some language servers require HOME)
               - Set WORKDIR to /workspace
               - ENTRYPOINT: `["/usr/local/bin/entrypoint.sh"]`
               - CMD: `[]` (no default; agent-lsp requires args specifying language servers;
                 users pass args at `docker run` time or in docker-compose command:)

            3. Add a comment block at the top:
               ```
               # agent-lsp base image
               # No language servers installed — use LSP_SERVERS env var at runtime
               # or use per-language tags: ghcr.io/blackwell-systems/agent-lsp:<lang>
               # See DOCKER.md for full usage.
               ```

            ## Verification gate
            ```bash
            # 1. File exists
            test -f /Users/dayna.blackwell/code/agent-lsp/Dockerfile
            # 2. Builder stage uses correct Go version
            grep -q "FROM golang:1.25" /Users/dayna.blackwell/code/agent-lsp/Dockerfile
            # 3. Final stage uses debian:bookworm-slim
            grep -q "FROM debian:bookworm-slim" /Users/dayna.blackwell/code/agent-lsp/Dockerfile
            # 4. CGO disabled
            grep -q "CGO_ENABLED=0" /Users/dayna.blackwell/code/agent-lsp/Dockerfile
            # 5. Entrypoint is the shell script
            grep -q "entrypoint.sh" /Users/dayna.blackwell/code/agent-lsp/Dockerfile
            # 6. Go build still succeeds (not affected, but confirm no go.mod changes made)
            cd /Users/dayna.blackwell/code/agent-lsp && GOWORK=off go build ./...
            ```

            ## Constraints
            - Do NOT modify any Go source files, go.mod, or existing workflows
            - Do NOT install language servers in this Dockerfile — base is language-server-free
            - Do NOT use alpine — use debian:bookworm-slim for glibc compatibility
            - Do NOT pin the golang builder to a digest; use the `golang:1.25-bookworm` tag
          files:
            - Dockerfile
        - id: B
          task: |
            ## Role
            Create the parameterized per-language Dockerfile and the full-image Dockerfile.

            ## Context
            - Base image tag: `ghcr.io/blackwell-systems/agent-lsp:base`
              (this is what Dockerfile and Dockerfile.full extend FROM in production;
              for local builds docker-compose will build them from context)
            - Dockerfile.lang uses three build ARGs: LANG, LSP_PACKAGE, PACKAGE_MGR, LSP_BINARY
            - The 18 supported per-language tags (from design spec):
              go, typescript, python, rust, java, ruby, cpp, csharp, swift, kotlin,
              php, scala, haskell, lua, elixir, clojure, dart, zig
            - Dockerfile.full installs ALL language servers that can be installed
              via package managers on debian:bookworm-slim

            ## What to implement

            ### File 1: `/Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang`

            Structure:
            ```dockerfile
            # agent-lsp per-language image
            # Build with: docker build -f Dockerfile.lang --build-arg LANG=go \
            #   --build-arg LSP_PACKAGE="golang.org/x/tools/gopls@latest" \
            #   --build-arg PACKAGE_MGR=go \
            #   --build-arg LSP_BINARY=gopls \
            #   -t ghcr.io/blackwell-systems/agent-lsp:go .

            ARG BASE_TAG=base
            FROM ghcr.io/blackwell-systems/agent-lsp:${BASE_TAG}

            ARG LANG
            ARG LSP_PACKAGE
            ARG PACKAGE_MGR
            ARG LSP_BINARY

            # Install language server based on package manager
            RUN set -eux; \
                case "${PACKAGE_MGR}" in \
                  npm) \
                    apt-get update && apt-get install -y --no-install-recommends nodejs npm && \
                    npm install -g ${LSP_PACKAGE} ;; \
                  go) \
                    apt-get update && apt-get install -y --no-install-recommends golang-go && \
                    go install ${LSP_PACKAGE} ;; \
                  apt) \
                    apt-get update && apt-get install -y --no-install-recommends ${LSP_PACKAGE} ;; \
                  gem) \
                    apt-get update && apt-get install -y --no-install-recommends ruby-full && \
                    gem install ${LSP_PACKAGE} ;; \
                  pip) \
                    apt-get update && apt-get install -y --no-install-recommends python3-pip && \
                    pip3 install --break-system-packages ${LSP_PACKAGE} ;; \
                  dotnet) \
                    apt-get update && apt-get install -y --no-install-recommends dotnet-sdk-8.0 && \
                    dotnet tool install -g ${LSP_PACKAGE} ;; \
                  *) \
                    echo "PACKAGE_MGR=${PACKAGE_MGR}: manual install not supported in Dockerfile.lang; use entrypoint LSP_SERVERS instead" && exit 1 ;; \
                esac && \
                rm -rf /var/lib/apt/lists/*

            # Set language label
            LABEL org.opencontainers.image.description="agent-lsp with ${LANG} language server"
            ```

            Note: The `manual` package manager (rust-analyzer, jdtls, kotlin-ls, lua-ls,
            elixir-ls, clojure-lsp, zls, sourcekit-lsp) requires custom build steps that
            can't be parameterized. The workflow handles these with custom Dockerfile sections
            or by using the entrypoint LSP_SERVERS mechanism. In Dockerfile.lang, emit an
            error for `manual` with the guidance above — this is intentional.

            For `go` package manager: use the Go toolchain already in the builder stage path
            if available, otherwise install via apt. Actually, the base image (debian:bookworm-slim)
            does NOT have Go — only the builder stage does. For the `go` PACKAGE_MGR case in
            Dockerfile.lang, you need to install Go first. Use:
            ```
            apt-get update && apt-get install -y --no-install-recommends golang-go && \
            GOPATH=/usr/local go install ${LSP_PACKAGE}
            ```
            Set `PATH=$PATH:/usr/local/bin` via ENV so the installed binary is on PATH.

            ### File 2: `/Users/dayna.blackwell/code/agent-lsp/Dockerfile.full`

            ```dockerfile
            # agent-lsp full image — ALL supported language servers
            # WARNING: This image is 2-3 GB. For zero-setup use only.
            # For targeted use, prefer per-language tags: ghcr.io/blackwell-systems/agent-lsp:<lang>
            #
            # Pull: docker pull ghcr.io/blackwell-systems/agent-lsp:full

            ARG BASE_TAG=base
            FROM ghcr.io/blackwell-systems/agent-lsp:${BASE_TAG}

            # Install Node.js (needed for npm-based servers)
            RUN apt-get update && apt-get install -y --no-install-recommends \
                nodejs npm \
                && rm -rf /var/lib/apt/lists/*

            # npm-based language servers
            RUN npm install -g \
                typescript-language-server typescript \
                pyright \
                intelephense \
                yaml-language-server \
                vscode-langservers-extracted \
                dockerfile-language-server-nodejs \
                @prisma/language-server \
                && npm cache clean --force

            # Go + gopls
            RUN apt-get update && apt-get install -y --no-install-recommends golang-go \
                && GOPATH=/usr/local go install golang.org/x/tools/gopls@latest \
                && rm -rf /var/lib/apt/lists/*

            # Ruby + solargraph
            RUN apt-get update && apt-get install -y --no-install-recommends ruby-full \
                && gem install solargraph \
                && rm -rf /var/lib/apt/lists/*

            # C/C++ via clangd
            RUN apt-get update && apt-get install -y --no-install-recommends clangd \
                && rm -rf /var/lib/apt/lists/*

            # .NET + csharp-ls
            RUN apt-get update && apt-get install -y --no-install-recommends dotnet-sdk-8.0 \
                && dotnet tool install -g csharp-ls \
                && rm -rf /var/lib/apt/lists/*

            LABEL org.opencontainers.image.description="agent-lsp with all supported language servers (~2-3 GB)"
            ```

            Note for Dockerfile.full: Java (jdtls), Kotlin (kotlin-ls), Scala (metals),
            Swift (sourcekit-lsp), Rust (rust-analyzer), Elixir (elixir-ls), Clojure
            (clojure-lsp), Dart, Haskell (hls), Lua (lua-ls), Zig (zls), and Terraform
            (terraform-ls) all require complex installation steps or platform-specific tools.
            Add a comment section at the bottom of Dockerfile.full:
            ```
            # The following language servers require platform-specific installation and are
            # NOT included in the full image. Use LSP_SERVERS or install manually:
            # - rust-analyzer (Rust): rustup component add rust-analyzer
            # - jdtls (Java): see https://download.eclipse.org/jdtls/snapshots/
            # - kotlin-language-server (Kotlin): see https://github.com/fwcd/kotlin-language-server/releases
            # - sourcekit-lsp (Swift): ships with Xcode on macOS only
            # - elixir-ls (Elixir): build from source
            # - clojure-lsp (Clojure): binary release from GitHub
            # - dart language-server (Dart): install Dart SDK
            # - lua-language-server (Lua): binary release from GitHub
            # - zls (Zig): match Zig version exactly
            # - metals (Scala): requires sbt compilation
            # - haskell-language-server (Haskell): install via GHCup
            # - terraform-ls (Terraform): binary release from hashicorp.com
            ```

            ## Verification gate
            ```bash
            # 1. Files exist
            test -f /Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang
            test -f /Users/dayna.blackwell/code/agent-lsp/Dockerfile.full
            # 2. Dockerfile.lang has the four ARGs
            grep -q "ARG LANG" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang
            grep -q "ARG LSP_PACKAGE" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang
            grep -q "ARG PACKAGE_MGR" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang
            grep -q "ARG LSP_BINARY" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang
            # 3. Dockerfile.full has the size warning
            grep -q "2-3 GB" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.full
            # 4. Dockerfile.full has npm-based servers
            grep -q "typescript-language-server" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.full
            # 5. Both reference base image
            grep -q "agent-lsp" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.lang
            grep -q "agent-lsp" /Users/dayna.blackwell/code/agent-lsp/Dockerfile.full
            ```

            ## Constraints
            - Do NOT modify any Go source files or existing Docker/workflow files
            - Do NOT create a separate Dockerfile per language — exactly ONE Dockerfile.lang
              with ARG parameterization
            - The base tag should be configurable via BASE_TAG ARG (defaults to "base") so
              local builds can override without modifying the file
            - Do NOT add a case for "manual" that silently succeeds — fail loudly so the
              workflow author knows to handle those languages separately
          files:
            - Dockerfile.lang
            - Dockerfile.full
        - id: C
          task: |
            ## Role
            Create the entrypoint script and the LSP server registry YAML.

            ## Context
            - Entrypoint must be POSIX sh compatible (#!/bin/sh, not #!/bin/bash)
            - Cache dir: /var/cache/lsp-servers/
            - lsp-servers.yaml is the source of truth for install commands
            - The entrypoint is the ENTRYPOINT in the base image; it reads LSP_SERVERS
              env var, installs missing servers, then exec's agent-lsp with all args
            - The binary path is /usr/local/bin/agent-lsp

            ## What to implement

            ### File 1: `/Users/dayna.blackwell/code/agent-lsp/docker/entrypoint.sh`

            POSIX sh script that:
            1. If `LSP_SERVERS` env var is empty, exec agent-lsp directly with "$@"
            2. If set, split on commas and for each server name:
               a. Check if already on PATH (`command -v "$server" > /dev/null 2>&1`)
               b. Check cache dir: `/var/cache/lsp-servers/$server/.installed` marker file
               c. If neither: look up the server in /etc/agent-lsp/lsp-servers.yaml
                  (parsed via grep/awk — no yq/python dependency), find install_command
               d. Run the install command
               e. Create the cache marker: `touch /var/cache/lsp-servers/$server/.installed`
            3. After processing all servers, exec agent-lsp with "$@"

            The registry file path in the container is `/etc/agent-lsp/lsp-servers.yaml`
            (it will be COPY'd there by the Dockerfile). The Dockerfile.lang and base image
            should include: `COPY docker/lsp-servers.yaml /etc/agent-lsp/lsp-servers.yaml`
            (note this in a comment in entrypoint.sh so Agent A knows to add this COPY line
            to the base Dockerfile).

            YAML parsing approach: the lsp-servers.yaml format uses a simple structure.
            Parse it with a shell function using grep and awk:
            ```sh
            get_install_command() {
              server_name="$1"
              # Extract the install_command for the matching server name block
              awk "/^  - name: ${server_name}$/,/^  - name:/" /etc/agent-lsp/lsp-servers.yaml \
                | grep "install_command:" \
                | head -1 \
                | sed 's/.*install_command: *"\(.*\)"/\1/'
            }
            ```

            Full script structure:
            ```sh
            #!/bin/sh
            set -e

            CACHE_DIR=/var/cache/lsp-servers
            REGISTRY=/etc/agent-lsp/lsp-servers.yaml

            if [ -n "${LSP_SERVERS}" ]; then
              # Split LSP_SERVERS on commas
              echo "agent-lsp: installing requested language servers: ${LSP_SERVERS}"
              # ... (use IFS or tr for splitting in POSIX sh)
              # For each server: check PATH, check cache, install if needed
            fi

            exec /usr/local/bin/agent-lsp "$@"
            ```

            Use `printf '%s\n' "$LSP_SERVERS" | tr ',' '\n'` for comma-splitting in POSIX sh.

            Add a header comment block:
            ```sh
            # agent-lsp entrypoint
            # Reads LSP_SERVERS env var (comma-separated server names) and installs
            # any requested language servers not already present, using the registry
            # at /etc/agent-lsp/lsp-servers.yaml. Caches installs to /var/cache/lsp-servers/.
            # Then exec's agent-lsp with all passed arguments.
            #
            # NOTE: The Dockerfile must include:
            #   COPY docker/lsp-servers.yaml /etc/agent-lsp/lsp-servers.yaml
            ```

            ### File 2: `/Users/dayna.blackwell/code/agent-lsp/docker/lsp-servers.yaml`

            Registry of all 18 supported language servers. Schema:
            ```yaml
            # agent-lsp language server registry
            # Used by docker/entrypoint.sh for runtime LSP_SERVERS installs.
            # package_manager: npm | go | apt | gem | pip | dotnet | cargo | manual

            servers:
              - name: gopls
                language: go
                package_manager: go
                install_command: "GOPATH=/usr/local go install golang.org/x/tools/gopls@latest"
                binary: gopls
              - name: typescript-language-server
                language: typescript
                package_manager: npm
                install_command: "npm install -g typescript-language-server typescript"
                binary: typescript-language-server
              - name: pyright-langserver
                language: python
                package_manager: npm
                install_command: "npm install -g pyright"
                binary: pyright-langserver
              - name: rust-analyzer
                language: rust
                package_manager: cargo
                install_command: "cargo install rust-analyzer"
                binary: rust-analyzer
              - name: clangd
                language: cpp
                package_manager: apt
                install_command: "apt-get update && apt-get install -y --no-install-recommends clangd && rm -rf /var/lib/apt/lists/*"
                binary: clangd
              - name: solargraph
                language: ruby
                package_manager: gem
                install_command: "gem install solargraph"
                binary: solargraph
              - name: intelephense
                language: php
                package_manager: npm
                install_command: "npm install -g intelephense"
                binary: intelephense
              - name: csharp-ls
                language: csharp
                package_manager: dotnet
                install_command: "dotnet tool install -g csharp-ls"
                binary: csharp-ls
              - name: lua-language-server
                language: lua
                package_manager: manual
                install_command: "echo 'Install lua-language-server from https://github.com/LuaLS/lua-language-server/releases and add to PATH'"
                binary: lua-language-server
              - name: zls
                language: zig
