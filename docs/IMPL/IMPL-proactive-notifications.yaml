title: Proactive Server Notifications
feature_slug: proactive-notifications
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: The work decomposes into 5+ distinct new files plus modifications
       to 2-3 existing files. Notification channels (diagnostics, workspace-ready, process-health,
       stale-references) are logically independent subsystems that can be built in parallel.

    2. Investigation-first items: None. All LSP notification paths are well-understood from
       client.go. The MCP SDK notification API (ServerSession.Log, Server.ResourceUpdated,
       ServerSession.NotifyProgress) is documented and stable.

    3. Interface discoverability: Yes. The NotificationHub interface and per-channel emitter
       signatures can be fully defined before implementation.

    4. Pre-implementation status: The diagnostic subscriber system already exists
       (SubscribeToDiagnostics). The $/progress tracking exists. The file watcher exists.
       None of the four notification channels currently push to MCP clients proactively.

    5. Parallelization value: High. Four independent notification channels can be built
       simultaneously. Build/test cycle is ~15s (Go). Each agent touches 2-3 files.
       Single wave of 4 agents is feasible.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~8 min (4 agents x 5 min avg, single wave)
    - Merge and verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~25 min (4 agents x 6 min avg + overhead)
    Time savings: ~6 min (24% faster)

    Recommendation: Clear speedup from parallel execution of independent channels.
