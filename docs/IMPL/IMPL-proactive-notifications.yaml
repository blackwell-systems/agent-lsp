interface_contracts:
    - name: NotificationSender
      description: |
        Interface abstracting MCP notification dispatch. Allows the notify package
        to send notifications without depending on the MCP SDK directly.
      definition: |
        type NotificationSender interface {
            SendLog(level, logger, message string) error
            SendResourceUpdated(uri string) error
        }
      location: internal/notify/hub.go
    - name: Hub
      description: |
        Central coordinator for all proactive notification channels. Created once
        during server startup, holds the sender reference, and provides methods
        for each channel to emit notifications.
      definition: |
        type Hub struct {
            mu     sync.RWMutex
            sender NotificationSender
            stopFuncs []func()
            closed atomic.Bool
        }

        func NewHub(sender NotificationSender) *Hub
        func (h *Hub) SetSender(s NotificationSender)
        func (h *Hub) Send(level, logger, message string)
        func (h *Hub) SendResourceUpdate(uri string)
        func (h *Hub) Close()
      location: internal/notify/hub.go
    - name: DiagDebouncer
      description: |
        Debounces diagnostic notifications during initial indexing flood.
        Coalesces rapid publishDiagnostics updates into periodic summary notifications.
      definition: |
        type diagDebouncer struct {
            mu       sync.Mutex
            pending  map[string]diagState
            timer    *time.Timer
            interval time.Duration
            emit     func(updates []DiagUpdate)
        }

        func newDiagDebouncer(interval time.Duration, emit func([]DiagUpdate)) *diagDebouncer
        func (d *diagDebouncer) OnDiagnostic(uri string, diags []types.LSPDiagnostic)
        func (d *diagDebouncer) Stop()
      location: internal/notify/diagnostics.go
    - name: mcpNotificationSender
      description: |
        Concrete implementation of NotificationSender using the MCP ServerSession.
        Created in InitializedHandler when the session is captured.
      definition: |
        type mcpNotificationSender struct {
            ss     *mcp.ServerSession
            server *mcp.Server
        }

        func (s *mcpNotificationSender) SendLog(level, logger, message string) error
        func (s *mcpNotificationSender) SendResourceUpdated(uri string) error
      location: cmd/agent-lsp/notifications.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Notification Hub Core

            ### What to implement

            Create the `internal/notify` package with the central Hub type that coordinates
            all notification channels. The Hub holds a NotificationSender interface and
            provides lifecycle management for subscriptions.

            **Files to create:**
            - `internal/notify/doc.go` - package documentation
            - `internal/notify/hub.go` - Hub struct, NewHub, SetSender, SubscribeToClient, Close
            - `internal/notify/hub_test.go` - unit tests

            **Hub implementation details:**

            1. `NotificationSender` interface with two methods:
               - `SendLog(level, logger, message string) error`
               - `SendResourceUpdated(uri string) error`

            2. `Hub` struct:
               - `mu sync.RWMutex` protects sender
               - `sender NotificationSender` (may be nil; calls are no-ops when nil)
               - `stopFuncs []func()` for teardown of per-client subscriptions
               - `closed atomic.Bool`

            3. `NewHub(sender NotificationSender) *Hub` constructor

            4. `SetSender(s NotificationSender)` - atomically replaces the sender
               (called when MCP client reconnects or a new session initializes)

            5. `AddStopFunc(fn func())` - registers a cleanup function called on Close

            6. `Close()` - calls all stopFuncs, sets closed=true, subsequent sends are no-ops

            7. `Send(level, logger, message string)` exported helper that checks nil sender
               and closed state before calling SendLog. Silently drops on error (best-effort).

            8. `SendResourceUpdate(uri string)` same pattern for ResourceUpdated.

            9. `DiagnosticSubscriber` interface (used by Agent B):
               ```go
               type DiagnosticSubscriber interface {
                   SubscribeToDiagnostics(cb types.DiagnosticUpdateCallback)
                   UnsubscribeFromDiagnostics(cb types.DiagnosticUpdateCallback)
               }
               ```

            ### Interface contracts

            ```go
            type NotificationSender interface {
                SendLog(level, logger, message string) error
                SendResourceUpdated(uri string) error
            }

            type DiagnosticSubscriber interface {
                SubscribeToDiagnostics(cb types.DiagnosticUpdateCallback)
                UnsubscribeFromDiagnostics(cb types.DiagnosticUpdateCallback)
            }
            ```

            ### Tests

            - TestHub_NilSender: verify sends are no-ops with nil sender
            - TestHub_SetSender: verify sender replacement works
            - TestHub_Close: verify sends are no-ops after Close
            - TestHub_ConcurrentAccess: parallel SetSender + Send calls (race detector)

            ### Verification gate

            ```bash
            GOWORK=off go build ./internal/notify/...
            GOWORK=off go test ./internal/notify/ -run TestHub -v
            grep -c "NotificationSender" internal/notify/hub.go  # expect >= 1
            ```

            ### Constraints

            - Do NOT import the MCP SDK from this package. The interface abstraction
              keeps the notify package decoupled from the SDK.
            - Do NOT import internal/lsp. Use interfaces to avoid import cycles.
            - Do NOT modify files outside your ownership list.
          files:
            - internal/notify/hub.go
            - internal/notify/hub_test.go
            - internal/notify/doc.go
        - id: B
          task: |
            ## Agent B: Diagnostic Notification Channel

            ### What to implement

            Create the diagnostic debouncing and notification channel. When gopls emits
            publishDiagnostics, this channel coalesces rapid-fire updates (especially
            during initial indexing) and emits periodic summary notifications via the Hub.

            **Files to create:**
            - `internal/notify/diagnostics.go`
            - `internal/notify/diagnostics_test.go`

            **Implementation details:**

            1. `diagState` struct: holds ErrorCount and WarnCount per URI

            2. `DiagUpdate` exported struct:
               ```go
               type DiagUpdate struct {
                   URI        string `json:"uri"`
                   ErrorCount int    `json:"errors"`
                   WarnCount  int    `json:"warnings"`
               }
               ```

            3. `diagDebouncer` struct:
               - `mu sync.Mutex`
               - `pending map[string]diagState`
               - `timer *time.Timer` (nil when no pending flush)
               - `interval time.Duration` (default 2 seconds)
               - `emit func(updates []DiagUpdate)` callback for flushing

            4. `newDiagDebouncer(interval time.Duration, emit func([]DiagUpdate)) *diagDebouncer`

            5. `(d *diagDebouncer) OnDiagnostic(uri string, diags []types.LSPDiagnostic)`:
               - Count errors (severity==1) and warnings (severity==2)
               - Update pending map for this URI
               - Reset/start the debounce timer
               - On timer fire: collect all pending, clear map, call emit()

            6. `(d *diagDebouncer) Stop()` - stops timer, flushes remaining

            7. `SubscribeDiagnostics(hub *Hub, subscriber DiagnosticSubscriber) func()`:
               - Creates a diagDebouncer with 2s interval
               - The emit callback formats a JSON log message via hub.Send("info", "diagnostics", msg):
                 ```json
                 {"type":"diagnostics","updates":[{"uri":"file:///...","errors":3,"warnings":1}]}
                 ```
               - Registers the debouncer's OnDiagnostic via subscriber.SubscribeToDiagnostics
               - Returns a stop function that unsubscribes and stops the debouncer

            **Import:** `github.com/blackwell-systems/agent-lsp/internal/types` for
            `types.LSPDiagnostic` and `types.DiagnosticUpdateCallback`.

            ### Interface contracts

            Uses `DiagnosticSubscriber` interface defined by Agent A in hub.go:
            ```go
            type DiagnosticSubscriber interface {
                SubscribeToDiagnostics(cb types.DiagnosticUpdateCallback)
                UnsubscribeFromDiagnostics(cb types.DiagnosticUpdateCallback)
            }
            ```

            ### Tests

            - TestDiagDebouncer_Coalesces: send 10 rapid updates for same URI, verify single emit
            - TestDiagDebouncer_MultipleURIs: updates to different URIs coalesced into one flush
            - TestDiagDebouncer_Stop: verify flush on stop
            - TestDiagDebouncer_ErrorCounting: verify severity 1=error, 2=warning counting
            - TestSubscribeDiagnostics: integration with mock subscriber and mock hub sender

            ### Verification gate

            ```bash
            GOWORK=off go build ./internal/notify/...
            GOWORK=off go test ./internal/notify/ -run TestDiag -v
            grep -c "diagDebouncer" internal/notify/diagnostics.go  # expect >= 3
            ```

            ### Constraints

            - Do NOT modify hub.go (owned by Agent A). Import from the same package.
            - Do NOT import the MCP SDK.
            - Do NOT modify files outside your ownership list.
          files:
            - internal/notify/diagnostics.go
            - internal/notify/diagnostics_test.go
        - id: C
          task: |
            ## Agent C: Workspace Ready and Process Health Channels

            ### What to implement

            Create two notification channels:
            1. Workspace ready: notifies when all $/progress tokens are done
            2. Process health: notifies when the language server crashes or restarts

            **Files to create:**
            - `internal/notify/workspace.go`
            - `internal/notify/workspace_test.go`
            - `internal/notify/health.go`
            - `internal/notify/health_test.go`

            **Workspace Ready implementation:**

            1. `WorkspaceReadySubscriber` interface:
               ```go
               type WorkspaceReadySubscriber interface {
                   IsWorkspaceLoaded() bool
               }
               ```

            2. `SubscribeWorkspaceReady(hub *Hub, client WorkspaceReadySubscriber, pollInterval time.Duration) func()`:
               - If client.IsWorkspaceLoaded() is already true, emit immediately and return no-op stop func
               - Otherwise, start a goroutine that polls IsWorkspaceLoaded() every pollInterval
               - When it becomes true, emit via hub.Send("info", "workspace", JSON):
                 ```json
                 {"type":"workspace_ready","message":"Language server indexing complete"}
                 ```
               - Returns stop function that cancels the polling goroutine (via channel close)
               - Timeout: stop polling after 5 minutes regardless

            **Process Health implementation:**

            1. `HealthChecker` interface:
               ```go
               type HealthChecker interface {
                   IsAlive() bool
               }
               ```

            2. `SubscribeHealth(hub *Hub, checker HealthChecker, pollInterval time.Duration) func()`:
               - Start a goroutine that polls IsAlive() every pollInterval (default 5s)
               - Track previous state (starts as alive=true)
               - When IsAlive() returns false (was previously true), emit:
                 ```json
                 {"type":"process_health","status":"crashed","message":"Language server process exited unexpectedly"}
                 ```
               - When IsAlive() returns true (was previously false), emit:
                 ```json
                 {"type":"process_health","status":"recovered","message":"Language server process recovered"}
                 ```
               - Returns stop function

            ### Tests

            - TestSubscribeWorkspaceReady_AlreadyLoaded: immediate emit, no goroutine
            - TestSubscribeWorkspaceReady_WaitsForReady: polls and emits when ready
            - TestSubscribeWorkspaceReady_Timeout: stops after 5 min (use short timeout in test)
            - TestSubscribeHealth_CrashDetection: emits on crash
            - TestSubscribeHealth_Recovery: emits on recovery
            - TestSubscribeHealth_Stop: clean shutdown

            ### Verification gate

            ```bash
            GOWORK=off go build ./internal/notify/...
            GOWORK=off go test ./internal/notify/ -run "TestSubscribeWorkspace|TestSubscribeHealth" -v
            grep -c "workspace_ready" internal/notify/workspace.go  # expect >= 1
            grep -c "process_health" internal/notify/health.go      # expect >= 1
            ```

            ### Constraints

            - Do NOT modify hub.go (owned by Agent A) or diagnostics.go (owned by Agent B).
            - Do NOT import the MCP SDK or internal/lsp. Use the interfaces defined here.
            - Do NOT modify files outside your ownership list.
          files:
            - internal/notify/workspace.go
            - internal/notify/workspace_test.go
            - internal/notify/health.go
            - internal/notify/health_test.go
        - id: D
          task: |
            ## Agent D: Stale References Channel

            ### What to implement

            Create the stale-references notification channel. When the file watcher detects
            source file changes on disk, notify that cached reference results may be outdated.

            **Files to create:**
            - `internal/notify/stale.go`
            - `internal/notify/stale_test.go`

            **Implementation details:**

            1. `FileChange` struct:
               ```go
               type FileChange struct {
                   URI        string `json:"uri"`
                   ChangeType int    `json:"type"` // 1=created, 2=changed, 3=deleted
               }
               ```

            2. `StaleNotifier` struct:
               - `hub *Hub`
               - `mu sync.Mutex`
               - `pending []FileChange`
               - `timer *time.Timer`
               - `interval time.Duration` (default 3 seconds)
               - `stopped atomic.Bool`

            3. `NewStaleNotifier(hub *Hub, interval time.Duration) *StaleNotifier`

            4. `(n *StaleNotifier) OnFileChange(changes []FileChange)`:
               - Append to pending list
               - Reset debounce timer
               - On timer fire: emit via hub.SendResourceUpdate("lsp-references://")
                 AND via hub.Send("info", "file_watcher", JSON):
                 ```json
                 {"type":"stale_references","files_changed":5,"message":"Source files changed on disk; cached references may be outdated"}
                 ```
               - Clear pending list

            5. `(n *StaleNotifier) Stop()` - stop timer, flush

            6. `AdaptFileChangeEvents(changes []types.FileChangeEvent) []FileChange`:
               - Converts from types.FileChangeEvent to FileChange
               - Pure function, no state

            ### Tests

            - TestStaleNotifier_Debounce: rapid changes coalesced into one emission
            - TestStaleNotifier_Emits: verify log message format
            - TestStaleNotifier_ResourceUpdate: verify SendResourceUpdate called with correct URI
            - TestStaleNotifier_Stop: clean shutdown, final flush
            - TestAdaptFileChangeEvents: conversion from types.FileChangeEvent

            ### Verification gate

            ```bash
            GOWORK=off go build ./internal/notify/...
            GOWORK=off go test ./internal/notify/ -run "TestStale|TestAdapt" -v
            grep -c "stale_references" internal/notify/stale.go  # expect >= 1
            ```

            ### Constraints

            - Do NOT modify hub.go, diagnostics.go, workspace.go, or health.go.
            - Do NOT import internal/lsp. Import types from internal/types only.
            - Do NOT modify files outside your ownership list.
          files:
            - internal/notify/stale.go
            - internal/notify/stale_test.go
        - id: F
          task: |
            ## Agent F: LSPClient Notification Hooks

            Create `internal/lsp/client_notify.go` with receiver methods on `*LSPClient`
