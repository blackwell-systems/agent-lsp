        - id: E
          task: |
            ## Agent E: MCP Wiring and Integration

            ### What to implement

            Wire the notification Hub into the MCP server lifecycle. Create the concrete
            NotificationSender implementation and hook all channels into the existing
            client/session management.

            **Files to create:**
            - `cmd/agent-lsp/notifications.go` - wiring code
            - `cmd/agent-lsp/notifications_test.go` - integration tests

            **Files to modify (minimal additions):**
            - `cmd/agent-lsp/server.go` - add hub creation + wiring in InitializedHandler
            - `internal/lsp/client.go` - add SubscribeToFileChanges callback support

            **Implementation details:**

            1. `mcpNotifySender` struct in notifications.go (implements notify.NotificationSender):
               ```go
               type mcpNotifySender struct {
                   ss     *mcp.ServerSession
                   server *mcp.Server
               }

               func (s *mcpNotifySender) SendLog(level, logger, message string) error {
                   data, _ := json.Marshal(message)
                   return s.ss.Log(context.Background(), &mcp.LoggingMessageParams{
                       Level:  mcp.LoggingLevel(level),
                       Logger: logger,
                       Data:   json.RawMessage(data),
                   })
               }

               func (s *mcpNotifySender) SendResourceUpdated(uri string) error {
                   return s.server.ResourceUpdated(context.Background(), &mcp.ResourceUpdatedNotificationParams{
                       URI: uri,
                   })
               }
               ```

            2. `setupNotificationHub(server *mcp.Server) *notify.Hub`:
               - Create Hub with nil sender (no session yet)
               - Return the hub

            3. `wireNotificationsToClient(hub *notify.Hub, client *lsp.LSPClient)`:
               - Call notify.SubscribeDiagnostics(hub, client) - store stop func via hub.AddStopFunc
               - Call notify.SubscribeWorkspaceReady(hub, client, 2*time.Second) - store stop func
               - Call notify.SubscribeHealth(hub, client, 5*time.Second) - store stop func
               - Create notify.NewStaleNotifier(hub, 3*time.Second)
               - Hook stale notifier into client via client.SubscribeToFileChanges

            4. **Modifications to cmd/agent-lsp/server.go:**

               In the Run() function, after `phaseTracker := phase.NewTracker(...)` (around line 318),
               insert:
               ```go
               notifyHub := setupNotificationHub(server)
               defer notifyHub.Close()
               ```

               In the InitializedHandler (line 312), after `logging.MarkServerInitialized()`, add:
               ```go
               notifyHub.SetSender(&mcpNotifySender{ss: req.Session, server: server})
               if c := cs.get(); c != nil {
                   wireNotificationsToClient(notifyHub, c)
               }
               ```

               In the start_lsp handler (tools_workspace.go), after `d.cs.set(client)` is called
               indirectly via HandleStartLsp, add notification wiring. The cleanest way: modify
               the existing clientState.set() method to accept an optional callback, or add a
               post-set hook. Simplest approach: in the start_lsp tool handler (line ~200), after
               the HandleStartLsp call succeeds, add:
               ```go
               if c := d.cs.get(); c != nil && notifyHub != nil {
                   wireNotificationsToClient(notifyHub, c)
               }
               ```
               This requires notifyHub to be accessible from the tool handler. Add it to toolDeps:
               ```go
               type toolDeps struct {
                   // ... existing fields ...
                   notifyHub *notify.Hub
               }
               ```

            5. **Modifications to internal/lsp/client.go:**

               Add a field to LSPClient struct (after line 199, after the watcher fields):
               ```go
               fileChangeCbs []func([]types.FileChangeEvent)
               ```

               Add a public method:
               ```go
               // SubscribeToFileChanges registers a callback invoked after each watcher flush.
               // Thread-safe; may be called at any time after client creation.
               func (c *LSPClient) SubscribeToFileChanges(cb func([]types.FileChangeEvent)) {
                   c.watcherMu.Lock()
                   c.fileChangeCbs = append(c.fileChangeCbs, cb)
                   c.watcherMu.Unlock()
               }
               ```

               In the watcher flush() function (around line 2451), after the
               `c.DidChangeWatchedFiles(changes)` call, add:
               ```go
               c.watcherMu.Lock()
               cbs := make([]func([]types.FileChangeEvent), len(c.fileChangeCbs))
               copy(cbs, c.fileChangeCbs)
               c.watcherMu.Unlock()
               for _, cb := range cbs {
                   cb(changes)
               }
               ```

            6. **LSPClient.IsAlive() method** for process health checking:
               ```go
               // IsAlive returns true if the language server process is running.
               func (c *LSPClient) IsAlive() bool {
                   c.mu.Lock()
                   defer c.mu.Unlock()
                   if c.cmd == nil || c.cmd.Process == nil {
                       return c.isDaemon || c.isPassive // daemon/passive modes are always "alive"
                   }
                   // Check if process has exited
                   return c.cmd.ProcessState == nil
               }
               ```

            7. **LSPClient.IsWorkspaceLoaded() method** (already exists as `workspaceLoaded.Load()`):
               The existing `c.workspaceLoaded` atomic.Bool field already tracks this.
               Add a public accessor if not present:
               ```go
               func (c *LSPClient) IsWorkspaceLoaded() bool {
                   return c.workspaceLoaded.Load()
               }
               ```

