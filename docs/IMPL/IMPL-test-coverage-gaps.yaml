pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A's sub-case A/B parse the list_workspace_folders result to look for
            tmpDir, but some LSP servers return folder URIs as "file:///tmp/..." rather than
            bare paths, so strings.Contains(listText, tmpDir) may miss the entry.
          likelihood: medium
          impact: low
          mitigation: |
            Agent A's brief uses both `filepath.Base(tmpDir)` and `tmpDir` in the Contains
            check. The full URI will contain the base name. If neither matches, the function
            logs a warning (t.Logf) rather than failing, since folder-list shape is
            server-dependent and not under test here.
        - scenario: |
            Agent B/D/E compile-smoke tests call methods on nil interface values after the
            t.Skip. If t.Skip is placed after the nil method calls (incorrect order), the
            test panics instead of skipping.
          likelihood: low
          impact: medium
          mitigation: |
            Agent briefs explicitly show t.Skip as the FIRST statement in the function body,
            before all variable declarations. Verification gate runs the test and checks for
            `--- SKIP` in output, not FAIL or panic.
        - scenario: |
            Agent C appends to test/multi_lang_test.go after Agent A's changes but the
            merge may shift line numbers, causing the "append after TestGetCrossRepoReferences"
            instruction to miss if the agent uses line numbers.
          likelihood: low
          impact: low
          mitigation: |
            Agent C's brief uses text search ("find TestGetCrossRepoReferences and its closing
            }") rather than line numbers. The function name is unique and stable.
        - scenario: |
            Agent D's session_test.go imports internallsp.ClientResolver but
            pubsession.NewSessionManager is typed as func(lsp.ClientResolver) where lsp
            refers to internal/lsp. The assignment var newMgrFn func(internallsp.ClientResolver)
            *pubsession.SessionManager = pubsession.NewSessionManager should compile because
            they are the same type, but the Go compiler may reject it if the import paths differ.
          likelihood: low
          impact: medium
          mitigation: |
            Since pkg/session/session.go uses internallsp.ClientResolver (from internal/session's
            import of internal/lsp), and Agent D also imports internal/lsp directly, the types
            are identical. The assignment is a direct function variable binding, not an interface
            assertion, so import path matching is exact. This is safe.
        - scenario: |
            The README prose line with "47/50" may not exist verbatim (it may have already
            been updated in a prior IMPL or the line may differ in whitespace).
          likelihood: low
          impact: low
          mitigation: |
            Agent F's brief provides a fallback: if the exact text is not found, search for
            `47/50` anywhere in the file. If that is also absent, add an HTML comment footnote
            rather than failing.
