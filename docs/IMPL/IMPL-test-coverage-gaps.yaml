title: 'Test Coverage Gaps: Workspace Folders, pkg/ API Smoke Tests, Fuzzy Position E2E, README Badge'
feature_slug: test-coverage-gaps
verdict: SUITABLE
suitability_assessment: |
    Three independent workstreams plus a trivial README badge fix, all suitable for
    parallel execution:

    1. Workspace folder gap fill (Easy) — Adds sub-cases to testWorkspaceFolders in
       test/multi_lang_test.go. The function is self-contained (no cross-agent type
       dependencies) and the gaps are well-defined.

    2. pkg/ API smoke tests (Medium) — Creates three new test files (pkg/lsp/lsp_test.go,
       pkg/session/session_test.go, pkg/types/types_test.go). All three pkg/ packages
       are read-only re-export wrappers; the tests only need to compile against the
       existing type alias declarations. No new types or functions are defined.

    3. Fuzzy position fallback e2e (Medium) — Adds TestFuzzyPositionFallback to
       test/multi_lang_test.go. This overlaps in file with workstream 1, but the
       changes are append-only: workstream 1 modifies the body of testWorkspaceFolders
       (an existing function) while workstream 3 adds a brand-new top-level function.
       These are non-overlapping line ranges. Agent C is in Wave 2 (depends on Agent A
       merge) to avoid any cross-wave diff conflict in the shared file.

    4. README badge fix — Single-line change to README.md; assigned to Agent F as its
       own small Wave 1 agent to satisfy the per-agent line budget.

    File decomposition check (I1 self-check):
    - Wave 1: test/multi_lang_test.go owned by A only; README.md owned by F only;
      pkg/lsp/lsp_test.go by B; pkg/session/session_test.go by D; pkg/types/types_test.go
      by E. No overlap within Wave 1.
    - Wave 2: test/multi_lang_test.go owned by C only. No overlap.

    Pre-implementation status: all gaps are TODO (no existing test files in pkg/).

    Estimated times:
    - Scout phase: ~15 min (LSP analysis of signatures and test harness patterns)
    - Agent execution: ~8 min (5 Wave 1 agents run in parallel + 1 Wave 2 agent)
    - Merge and verification: ~5 min
    Total SAW time: ~28 min
    Sequential baseline: ~30 min (6 tasks × 5 min avg)
    Recommendation: Clear speedup for Wave 1 (5-way parallel). Proceed.
