            				rmRes, rmErr := callTool(ctx, session, "remove_workspace_folder", map[string]any{
            					"path": extraDir,
            				})
            				if rmErr != nil || rmRes.IsError {
            					t.Logf("[workspace_folders] multi-folder remove failed for %s", filepath.Base(extraDir))
            				}
            			}
            		}
            	}
            ```

