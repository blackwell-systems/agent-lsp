    Nine inspection findings: the normalize.go implementation bug is already fixed in production;
    only the test assertion update and the remaining eight findings require implementation.
    All changes are localized and independent: no cross-agent type sharing, no new
    exported types, no interface renames. File ownership is fully disjoint across
    six agents running in a single wave.

    File decomposition: 6 agents with disjoint ownership. Largest agent (C) owns
    server.go plus new extracted tool-group files — all new files, no conflict risk.

    Investigation-first: No root cause analysis needed. All bugs are pinpointed
    with exact line numbers and fix instructions.

    Interface discoverability: Agent D introduces LanguageIDFromPath as a new
    exported function in internal/lsp; Agent D also updates the sole caller in
    change_impact.go. No other agents depend on this export.

    Pre-implementation check: All 9 findings are confirmed TODO by inspection.

    Parallelization value: GOWORK=off go test ./internal/... ./cmd/... is the
    full test suite. With 6 independent agents each compiling and testing their
    own package scope, parallelization saves real wall-clock time.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~6 agents x ~8 min avg = ~48 min, running in parallel ~10 min wall
    - Merge and verification: ~5 min
    Total SAW time: ~25 min
    Sequential baseline: ~48 min
    Time savings: ~23 min (~48% faster)
    Recommendation: Clear speedup. Proceed.
