interface_contracts:
    - name: LanguageIDFromPath
      description: |
        Exported function in internal/lsp package that maps a file path's extension
        to an LSP language ID. Replaces the duplicate langIDFromPath in change_impact.go.
        Agent D defines it in manager.go and updates change_impact.go to call it.
        No other agents reference this function.
      definition: |
        // LanguageIDFromPath maps a file extension to an LSP language ID.
        // Canonical implementation; replaces langIDFromPath in internal/tools.
        func LanguageIDFromPath(path string) string
      location: internal/lsp/manager.go
    - name: URIToFilePath (updated delegation)
      description: |
        tools.URIToFilePath in helpers.go delegates to uri.URIToPath instead of
        re-implementing URL parsing. Callers in the tools package are unaffected —
        the function signature (string, error) is preserved. The error behavior
        changes slightly: uri.URIToPath never returns an error (it returns the raw
        string on failure), so URIToFilePath now returns (path, nil) for all valid
        file:// URIs, consistent with the existing happy path. The invalid-prefix
        guard ("not a file URI") is retained.
      definition: |
        func URIToFilePath(uri string) (string, error)
      location: internal/tools/helpers.go
