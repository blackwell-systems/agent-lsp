            ## What to implement

            ### Update URIToFilePath to delegate to uri.URIToPath

            Current implementation (lines 84-94 of helpers.go):
            ```go
            // URIToFilePath converts a file:// URI to an absolute path.
            func URIToFilePath(uri string) (string, error) {
            	if !strings.HasPrefix(uri, "file://") {
            		return "", fmt.Errorf("not a file URI: %s", uri)
            	}
            	u, err := url.Parse(uri)
            	if err != nil {
            		return "", fmt.Errorf("parsing URI %s: %w", uri, err)
            	}
            	return u.Path, nil
            }
            ```

            Replace with:
            ```go
            // URIToFilePath converts a file:// URI to an absolute path.
            // Delegates to uri.URIToPath — canonical shared implementation (M3).
