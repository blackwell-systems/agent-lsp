pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A misdiagnoses the normalize bug. The pointer chain (symPtrs[i],
            nameByBare, and Pass 2 mutation) is subtle. Agent may apply the wrong fix
            and still see failing tests.
          likelihood: medium
          impact: medium
          mitigation: |
            Task brief instructs agent to run the test first to reproduce, then trace
            through the pointer chain step by step. The test is authoritative — if it
            passes after the fix, the fix is correct. Agent should not change the
            function signature or restructure the algorithm.
        - scenario: |
            Agent B introduces a panic recovery defer in the wrong position in
            startWatcher. The goroutine has two existing defers in LIFO order;
            adding the recovery defer AFTER them (not before) would mean it runs
            first and misses panics from the cleanup defers.
          likelihood: low
          impact: low
          mitigation: |
            Task brief explicitly states: insert recovery defer as FIRST statement
            in the goroutine closure, before fsnotify.NewWatcher(). LIFO ordering
            explained with rationale.
        - scenario: |
            Agent C misses moving some inline arg type definitions from Run() to the
            new files, causing duplicate type declarations at package scope (both in
            server.go and a new file).
          likelihood: medium
          impact: medium
          mitigation: |
            Task brief lists every arg type and which file it belongs to. Agent must
            remove all inline type definitions from Run() and add them as package-level
            types in the new files. Build gate will catch duplicate declarations.
        - scenario: |
            Agent C leaves tool registration closures that capture variables (resolver,
            serverPath, serverArgs, cs) by closure. Extracting to functions breaks
            the closure capture — these must be passed explicitly via toolDeps.
          likelihood: medium
          impact: high
          mitigation: |
            toolDeps struct includes all required fields (serverPath, serverArgs, cs,
            resolver, clientForFileWithAutoInit, sessionMgr). Task brief is explicit
            about this. Agent must pass deps parameter through to each registration call.
        - scenario: |
            Agent D forgets to remove the "path/filepath" import from change_impact.go
            after deleting langIDFromPath, causing a build failure (unused import).
          likelihood: medium
          impact: low
          mitigation: |
            Task brief explicitly calls this out and instructs agent to run go build
            to catch unused imports. The build quality gate will also catch this.
        - scenario: |
            Agent E removes the "not a file URI" prefix guard when delegating to
            uri.URIToPath, causing URIToFilePath to silently return non-file paths.
          likelihood: low
          impact: medium
          mitigation: |
            Task brief explicitly says "preserve the not a file URI guard." The
            existing test TestURIToFilePath_InvalidURI verifies this behavior.
        - scenario: |
            Agent F wraps an error in the wrong place (e.g., wraps the IsTerminal
            check instead of the GetSession error) resulting in misleading error messages.
          likelihood: low
          impact: low
          mitigation: |
            Task brief shows exact current code context and the exact replacement.
            Only the GetSession error returns are wrapped; subsequent error returns
            in Discard/Destroy already have context.
