            ### Finding 3: readLoop goroutine — add panic recovery (around line 240)

            Add `runtime/debug` to the import block. Then add a deferred recover at
            the top of the readLoop function body:

            Current code:
            ```go
            // readLoop reads and dispatches all incoming messages.
            func (c *LSPClient) readLoop() {
            	for {
            		raw, err := c.frameReader.ReadMessage()
            ```

            Insert after the opening brace of readLoop:
            ```go
            	defer func() {
            		if r := recover(); r != nil {
            			logging.Log(logging.LevelError, fmt.Sprintf("readLoop panic: %v\n%s", r, debug.Stack()))
            		}
            	}()
            ```

            The existing imports already include `"fmt"`. Add `"runtime/debug"` to the
            import block. The import block is at lines 3-22 of client.go.

            ### Finding 4: startWatcher goroutine — add panic recovery (around line 1966)

            The startWatcher goroutine already has two deferred calls (watcher.Close
            and the watcherMu nil-assignment). Add a recovery defer BEFORE those
            existing defers, so it runs LAST (LIFO order = outermost protection).

            Current code at the top of the goroutine closure (line 1966):
            ```go
            	go func() {
            		watcher, err := fsnotify.NewWatcher()
            		if err != nil {
            			logging.Log(logging.LevelDebug, "auto-watcher: failed to create watcher: "+err.Error())
            			return
            		}
            		// Register Close first so nil-assignment defer (registered after) runs first (LIFO).
            		defer watcher.Close()
            ```

            Insert the recovery defer as the FIRST statement in the goroutine, before
            the fsnotify.NewWatcher() call:
            ```go
            	go func() {
            		defer func() {
            			if r := recover(); r != nil {
            				logging.Log(logging.LevelError, fmt.Sprintf("startWatcher panic: %v\n%s", r, debug.Stack()))
            			}
            		}()
            		watcher, err := fsnotify.NewWatcher()
            ```

            This positions the recover defer outermost (runs last in LIFO) so it
            catches panics from all subsequent code including the existing defers' cleanup.

            ### Finding 9: context.Background() comment at line 324

            The applyEdit handler uses context.Background() in the readLoop dispatch path.
            Add a comment explaining why. Current code:

            ```go
            				applyCtx, applyCancel := context.WithTimeout(context.Background(), defaultTimeout)
            ```

            Change to:
            ```go
            				// Fresh context: readLoop has no per-request context (it processes
            				// server-initiated requests outside any client call). context.Background()
            				// is intentional — consistent with H4 pattern in server.go.
            				applyCtx, applyCancel := context.WithTimeout(context.Background(), defaultTimeout)
            ```

