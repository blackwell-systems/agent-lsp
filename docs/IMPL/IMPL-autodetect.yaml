pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A forgets to make knownServers iteration deterministic, causing test flakiness
          likelihood: medium
          impact: low
          mitigation: Task explicitly requires sorted iteration over map keys
        - scenario: Agent B modifies ParseArgs logic incorrectly, breaking existing modes
          likelihood: low
          impact: high
          mitigation: Task specifies exact line numbers and before/after code blocks; verification gate runs all existing parse tests
        - scenario: Tests fail because no language servers are installed in CI/developer PATH
          likelihood: high
          impact: low
          mitigation: Tests are PATH-dependent by design (feature requires servers in PATH); document this expectation in test comments
        - scenario: Agent A uses wrong import path for logging package
          likelihood: low
          impact: low
          mitigation: Task lists exact import paths; build verification catches import errors immediately
        - scenario: Agent B accidentally adds AutodetectServers call to wrong branch (e.g., --config path)
          likelihood: low
          impact: medium
          mitigation: Task shows exact before/after code with line number context; verification postcondition checks grep count
