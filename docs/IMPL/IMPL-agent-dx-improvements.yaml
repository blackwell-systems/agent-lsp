            # Expected: 1
            grep -c "safe_apply_edit" cmd/agent-lsp/tools_safe_edit.go
            # Expected: >= 1
            ```

            ### Constraints
            - Do NOT modify internal/tools/simulation.go or internal/tools/workspace.go
            - Do NOT modify files outside your ownership list
          files:
