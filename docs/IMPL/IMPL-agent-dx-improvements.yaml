        - id: B
          task: |
            ## Agent B: explore_symbol Composite Tool

            ### What to Implement

            **Handler: internal/tools/explore.go**

            Create `HandleExploreSymbol` that orchestrates 4 existing LSP client methods in one call:
            1. Hover info (type_info)
            2. Call hierarchy incoming (callers)
            3. Document symbols + innermost symbol (source)
            4. References (count + top files)

            Input args: same as `inspect_symbol` (file_path, line, column, position_pattern, language_id).

            Output structure (JSON):
            ```json
            {
              "type_info": "<hover text>",
              "source": { "symbol_name": "...", "start_line": N, "end_line": N, "source": "..." },
              "callers": [ {"name": "...", "file": "...", "line": N} ],
              "callers_count": N,
              "references": { "count": N, "top_files": ["file1", "file2", ...] },
              "test_callers_count": N
            }
            ```

            Implementation approach:
            - Call LSP client methods directly. Reuse existing helpers:
              - `WithDocument` to open the file once
              - `client.GetInfoOnLocation` for type_info (hover)
              - `client.PrepareCallHierarchy` + `client.GetIncomingCalls` for callers
              - `client.GetDocumentSymbols` + `findInnermostSymbol` for source
              - `client.GetReferences` for references
            - Position resolution: use `ResolvePositionPattern` from position_pattern.go
            - Limit callers to top 10, references top 5 file paths
            - Count test callers separately using `isTestFile` from change_impact.go
            - Use `URIToFilePath` to convert reference location URIs to file paths

            **Registration: cmd/agent-lsp/tools_explore.go**

            Create registration file with:
            - Args struct `ExploreSymbolArgs` (same fields as GetInfoOnLocationArgs)
            - `registerExploreTools(d toolDeps)` function
            - Register tool "explore_symbol"
            - Description: "Deep-dive into a symbol: type info, source code, callers (top 10), references (count + top 5 files), and test caller count in one call. Use when you need full context about a symbol before editing. Accepts file_path + line/column or position_pattern."
            - ReadOnlyHint: true

            ### Interface Contracts

            ```go
            func HandleExploreSymbol(ctx context.Context, client *lsp.LSPClient, args map[string]any) (types.ToolResult, error)
            ```

            ### Tests

            **internal/tools/explore_test.go:**
            - TestHandleExploreSymbol_NilClient: returns "LSP client not initialized" error
            - TestHandleExploreSymbol_MissingFilePath: returns "file_path is required" error
            - TestHandleExploreSymbol_MissingPosition: returns error about line/column required

            ### Verification Gate

            ```bash
            go build ./internal/tools/... ./cmd/agent-lsp/...
            go test ./internal/tools/ -run "TestHandleExploreSymbol" -v
            go vet ./internal/tools/ ./cmd/agent-lsp/
            ```

            Postconditions:
            ```bash
            grep -c "func HandleExploreSymbol" internal/tools/explore.go
            # Expected: 1
            grep -c "explore_symbol" cmd/agent-lsp/tools_explore.go
            # Expected: >= 1
            ```

            ### Constraints
            - Do NOT modify existing files in internal/tools/ (only create new ones)
            - Do NOT duplicate handler logic; call LSP client methods directly or reuse helpers
            - Do NOT modify files outside your ownership list
          files:
