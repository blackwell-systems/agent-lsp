        - id: D
          task: |
            ## Agent D: Proactive Diagnostic Push on File Change

            ### What to Implement

            **Notification channel: internal/notify/diag_change.go**

            Create a `DiagnosticChangeNotifier` that:
            1. Subscribes to diagnostic updates via `DiagnosticSubscriber.SubscribeToDiagnostics`
            2. Tracks previous error counts per URI
            3. When error count INCREASES for a URI, emits a proactive notification
            4. Uses debouncing (500ms) to avoid noise
            5. Only fires when errors increase (not decrease or same)

            Notification payload:
            ```json
            {
              "type": "diagnostic_regression",
              "file": "/path/to/file.go",
              "errors": 3,
              "delta": 2,
              "message": "2 new errors in /path/to/file.go"
            }
            ```

            API:
            ```go
            func SubscribeDiagnosticChanges(hub *Hub, subscriber DiagnosticSubscriber) func()
            ```

            Follow the pattern in internal/notify/diagnostics.go closely.

            **Wire into notifications.go (cmd/agent-lsp/notifications.go)**

            Insert after this exact text:
            ```go
            	// Diagnostic notifications (debounced).
            	stopDiag := notify.SubscribeDiagnostics(hub, client)
            	hub.AddStopFunc(stopDiag)
            ```

            Add:
            ```go
            	// Diagnostic regression detection (fires when new errors appear).
            	stopDiagChange := notify.SubscribeDiagnosticChanges(hub, client)
            	hub.AddStopFunc(stopDiagChange)
            ```

            ### Interface Contracts

            ```go
            func SubscribeDiagnosticChanges(hub *Hub, subscriber DiagnosticSubscriber) func()
            ```

            ### Tests

            **internal/notify/diag_change_test.go:**
            - TestDiagChangeNotifier_FiresOnIncrease: error count goes 0->2, notification sent
            - TestDiagChangeNotifier_SilentOnDecrease: error count goes 3->1, no notification
            - TestDiagChangeNotifier_SilentOnSame: error count stays at 2, no notification
            - TestDiagChangeNotifier_Debounces: rapid updates coalesce into one notification

            ### Verification Gate

            ```bash
            go build ./internal/notify/... ./cmd/agent-lsp/...
            go test ./internal/notify/ -run "TestDiagChange" -v
            go vet ./internal/notify/ ./cmd/agent-lsp/
            ```

            Postconditions:
            ```bash
            grep -c "func SubscribeDiagnosticChanges" internal/notify/diag_change.go
            # Expected: 1
            grep -c "SubscribeDiagnosticChanges" cmd/agent-lsp/notifications.go
            # Expected: 1
            ```

            ### Constraints
            - Do NOT modify internal/notify/diagnostics.go
            - Do NOT modify internal/notify/hub.go
            - Do NOT modify files outside your ownership list
          files:
            - internal/notify/diag_change.go
            - internal/notify/diag_change_test.go
            - cmd/agent-lsp/notifications.go
        - id: E
          task: |
            ## Agent E: Intent Aliases + Indexed Field in Analysis Responses

            ### What to Implement

            **Part 1: Intent aliases (cmd/agent-lsp/tools_aliases.go)**

            Create a new file registering alias tool names. Use `addToolWithPhaseCheck`.

            Aliases:
            - `blast_radius` -> same handler as `get_change_impact` (GetChangeImpactArgs)
            - `callers` -> wraps find_callers, forces direction="incoming"
            - `explore` -> calls `tools.HandleExploreSymbol` (GetInfoOnLocationArgs)
            - `safe_edit` -> calls `tools.HandleSafeApplyEdit` (SafeApplyEditArgs)

            Define `registerAliasTools(d toolDeps)`.

            Note: `tools.HandleExploreSymbol` and `tools.HandleSafeApplyEdit` are created by
            Agents B and C. Code compiles only after merge. Write correct references.

            **Part 2: Add indexed field to analysis responses (cmd/agent-lsp/tools_analysis.go)**

            Modify 3 tool handler wrappers to call `tools.AppendIndexedField`:
            - `get_change_impact`
            - `find_references`
            - `find_symbol`

            Change pattern:
            ```go
            r, err := tools.HandleGetChangeImpact(ctx, d.cs.get(), toolArgsToMap(args))
            r = tools.AppendIndexedField(r, d.cs.get())
            return makeCallToolResult(r), nil, err
            ```

            Note: `tools.AppendIndexedField` is created by Agent A. Compiles after merge.

            ### Verification Gate

            ```bash
            go vet ./cmd/agent-lsp/ 2>&1 || true
            ```

            Postconditions:
            ```bash
