interface_contracts:
    - name: AppendIndexedField
      description: |
        Helper function that appends an "indexed" boolean field to tool response JSON.
        Queries the LSP client's IsWorkspaceLoaded() and injects the field into the
        response content's JSON object.
      definition: |
        func AppendIndexedField(result types.ToolResult, client *lsp.LSPClient) types.ToolResult
      location: internal/tools/indexed.go
    - name: HandleExploreSymbol
      description: |
        Composite handler combining inspect_symbol + find_callers + get_symbol_source +
        find_references into one call. Returns structured JSON with sections: type_info,
        source, callers, references, test_callers.
      definition: |
        func HandleExploreSymbol(ctx context.Context, client *lsp.LSPClient, args map[string]any) (types.ToolResult, error)
      location: internal/tools/explore.go
    - name: HandleSafeApplyEdit
      description: |
        Combines preview_edit + apply_edit when net_delta == 0. Returns applied=true on
        success or applied=false with preview diagnostics when net_delta > 0.
      definition: |
        func HandleSafeApplyEdit(ctx context.Context, client *lsp.LSPClient, sessionMgr *session.SessionManager, args map[string]any) (types.ToolResult, error)
      location: internal/tools/safe_edit.go
    - name: getDiagnosticsForFile
      description: |
        Internal helper that retrieves diagnostics for a file and returns error/warning
        counts. Used by symbol_edit handlers to auto-append diagnostic counts after edits.
      definition: |
        func getDiagnosticsForFile(ctx context.Context, client *lsp.LSPClient, filePath string) (errors int, warnings int)
      location: internal/tools/symbol_edit.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Indexed Indicator + Auto-Diagnostics in Symbol Edit Responses

            ### What to Implement

            **Part 1: Indexed indicator helper (internal/tools/indexed.go)**

            Create `internal/tools/indexed.go` with a helper function `AppendIndexedField` that:
            1. Takes a `types.ToolResult` and an `*lsp.LSPClient`
            2. If client is nil or result is error, returns unchanged
            3. Parses the first content item's text as JSON
            4. Adds `"indexed": true/false` based on `client.IsWorkspaceLoaded()`
            5. Re-serializes and returns the modified result

            ```go
            func AppendIndexedField(result types.ToolResult, client *lsp.LSPClient) types.ToolResult
            ```

            **Part 2: Auto-diagnostics after symbol edits (internal/tools/symbol_edit.go)**

            Add an internal helper `getDiagnosticsForFile` that:
            1. Calls `client.ReopenDocument(ctx, fileURI)` to refresh
            2. Waits briefly for diagnostics (use `lsp.WaitForDiagnostics` with 5000ms timeout)
            3. Collects diagnostics and counts errors (severity==1) and warnings (severity==2)
            4. Returns (errorCount int, warningCount int)

            Then modify the four symbol edit handlers to call this after successful edits:
            - `HandleReplaceSymbolBody`: after the `ApplyWorkspaceEdit` succeeds
            - `HandleInsertAfterSymbol`: after the `ApplyWorkspaceEdit` succeeds
            - `HandleInsertBeforeSymbol`: after the `ApplyWorkspaceEdit` succeeds
            - `HandleSafeDeleteSymbol`: after the delete edit succeeds

            Append `errors_after` and `warnings_after` counts to the response text.
            Change the existing hint from "Use get_diagnostics to verify..." to include
            the counts, e.g.: "errors_after: 0, warnings_after: 1. Run get_diagnostics for details."

            ### Interface Contracts

            ```go
            // internal/tools/indexed.go
            func AppendIndexedField(result types.ToolResult, client *lsp.LSPClient) types.ToolResult

            // internal/tools/symbol_edit.go (unexported)
            func getDiagnosticsForFile(ctx context.Context, client *lsp.LSPClient, filePath string) (errors int, warnings int)
            ```

            ### Tests

            **internal/tools/indexed_test.go:**
            - TestAppendIndexedField_NilClient: returns result unchanged
            - TestAppendIndexedField_ErrorResult: returns result unchanged
            - TestAppendIndexedField_AddsTrue: mock client with IsWorkspaceLoaded() = true
            - TestAppendIndexedField_AddsFalse: mock client with IsWorkspaceLoaded() = false
            - TestAppendIndexedField_NonJSON: returns result unchanged when content is not JSON

            **internal/tools/symbol_edit_test.go (add to existing):**
            - TestGetDiagnosticsForFile_NilClient: returns 0, 0

            ### Verification Gate

            ```bash
            go build ./internal/tools/...
            go test ./internal/tools/ -run "TestAppendIndexed|TestGetDiagnosticsForFile" -v
            go vet ./internal/tools/
            ```

            Postconditions:
            ```bash
            grep -c "func AppendIndexedField" internal/tools/indexed.go
            # Expected: 1
            grep -c "func getDiagnosticsForFile" internal/tools/symbol_edit.go
            # Expected: 1
            grep -c "getDiagnosticsForFile" internal/tools/symbol_edit.go
            # Expected: >= 4
            ```

            ### Constraints
            - Do NOT modify cmd/agent-lsp/tools_analysis.go (owned by Agent E)
            - Do NOT modify cmd/agent-lsp/tools_symbol_edit.go (registration file only)
            - Do NOT modify files outside your ownership list
