        - id: C
          task: |
            ## Agent C: safe_apply_edit Tool

            ### What to Implement

            **Handler: internal/tools/safe_edit.go**

            Create `HandleSafeApplyEdit` that combines preview_edit + apply_edit:

            1. Accept args: file_path, old_text, new_text
            2. Read the file content, locate `old_text` using strings.Index
            3. Compute the positional range (start_line, start_column, end_line, end_column)
            4. Call `HandleSimulateEditAtomic` with computed positional args plus workspace_root from `client.RootDir()` and language from `lsp.LanguageIDFromPath(filePath)`
            5. Parse the preview result JSON to extract `net_delta`
            6. If net_delta == 0: call `HandleApplyEdit` with {file_path, old_text, new_text}, return with `"applied": true`
            7. If net_delta > 0: return the preview result with `"applied": false`

            **Registration: cmd/agent-lsp/tools_safe_edit.go**

            - `registerSafeEditTools(d toolDeps)` function
            - Tool name: "safe_apply_edit"
            - Description: "Preview an edit and apply it only if safe (net_delta == 0). Combines preview_edit + apply_edit into one call. If the edit would introduce errors (net_delta > 0), returns the preview result with applied=false so you can decide."
            - ReadOnlyHint: false, DestructiveHint: true
            - Handler: `tools.HandleSafeApplyEdit(ctx, d.clientForFileWithAutoInit(args.FilePath), d.sessionMgr, toolArgsToMap(args))`

            ### Interface Contracts

            ```go
            func HandleSafeApplyEdit(ctx context.Context, client *lsp.LSPClient, sessionMgr *session.SessionManager, args map[string]any) (types.ToolResult, error)
            ```

            ### Tests

            **internal/tools/safe_edit_test.go:**
            - TestHandleSafeApplyEdit_NilClient: returns init error
            - TestHandleSafeApplyEdit_MissingFilePath: returns error
            - TestHandleSafeApplyEdit_MissingOldText: returns error
            - TestHandleSafeApplyEdit_MissingNewText: returns error

            ### Verification Gate

            ```bash
            go build ./internal/tools/... ./cmd/agent-lsp/...
            go test ./internal/tools/ -run "TestHandleSafeApplyEdit" -v
            go vet ./internal/tools/ ./cmd/agent-lsp/
            ```

            Postconditions:
