               Expected: exit 0.

            ## Constraints
            - Do NOT modify any files outside your ownership list (.github/workflows/ci.yml).
            - Do NOT change the test filter; it must be exactly "TestMultiLanguage/^MongoDB$".
            - Do NOT add continue-on-error: true — failures should be visible.
