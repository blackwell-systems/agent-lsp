quality_gates:
    level: standard
    gates:
        - type: build
          command: GOWORK=off go build ./...
          required: true
        - type: lint
          command: GOWORK=off go vet ./...
          required: true
        - type: test
          command: GOWORK=off go test ./internal/... ./cmd/...
          required: true
pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            mongodb-language-server is not on PATH at test time (locally or in CI)
            because it's an npm package and npm global bin may not be in PATH.
          likelihood: medium
          impact: low
          mitigation: |-
            The test harness calls exec.LookPath(lang.binary) and calls t.Skipf if not
            found, so the test skips gracefully rather than failing. In CI the npm
            install -g step puts the binary in /usr/local/bin (standard npm global bin
            on ubuntu-latest), which is on PATH.
        - scenario: |-
            The fixture positions (hoverLine, completionColumn, etc.) don't align with
            query.mongodb content because agent A changed the line structure or indentation.
          likelihood: low
          impact: high
          mitigation: |-
            The interface contract specifies query.mongodb content line-by-line and
            calibration notes. Agent A's verification gate checks wc -l = 14 and
            checks the exact content of lines 9 and 11 via sed. Agent C uses the
            positions from the interface contract verbatim without re-deriving them.
        - scenario: |-
            The MongoDB langConfig entry is inserted outside the slice return value
            (after the closing brace of buildLanguageConfigs), causing a compile error.
          likelihood: low
          impact: high
          mitigation: |-
            Agent C uses the verbatim anchor text that includes the SQL entry's closing
            brace and the slice terminator, so the Edit tool will match and replace the
            correct location. The build verification gate catches compile errors immediately.
        - scenario: CI job YAML indentation is wrong, causing GitHub Actions to reject the workflow.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B's verification gate runs python3 yaml.safe_load on the file. Invalid
            YAML (including indentation errors) will cause an exception and exit 1,
            surfacing the error before the agent completes.
        - scenario: |-
            mongosh health check command contains unescaped quotes in the YAML options
            field, causing the workflow YAML to be invalid.
          likelihood: medium
          impact: medium
          mitigation: |-
            The interface contract specifies the exact health-cmd string with escaped
            inner quotes. Agent B's verification gate runs yaml.safe_load which will
            catch any quoting issues before the agent completes.
        - scenario: |-
            mongodb-language-server does not provide hover/completion responses for
            .mongodb files and the test fails even when the server starts.
          likelihood: medium
          impact: medium
          mitigation: |-
            The harness does not assert on hover/completion content — it only asserts
            that the tool call does not return IsError=true. The server returning an
            empty result or null hover is treated as a pass at the Tier 1 level.
            Tier 2 tool failures are logged but do not fail the test run (they set
            tier2 status to "fail" which is visible in the summary).
