title: Add MongoDB to multi-language integration test suite
feature_slug: mongodb-integration
verdict: SUITABLE
suitability_assessment: |-
    The work decomposes into three disjoint file sets: (A) MongoDB fixture files under
    test/fixtures/mongodb/, (B) the CI job in .github/workflows/ci.yml, and (C) the
    langConfig entry in test/multi_lang_test.go. Each agent owns distinct files with no
    overlapping modifications. The interface between A and C is the exact fixture file
    paths and calibrated line/column positions — fully specifiable before implementation.
    Agent B only needs the agreed test name "MongoDB" to write the CI job.

    Suitability questions:
    1. File decomposition: 2 new fixture files (agent A), 1 edit to multi_lang_test.go
       (agent C), 1 edit to ci.yml (agent B). Fully disjoint.
    2. Investigation-first: No root cause analysis needed. The mongodb-language-server
       behavior is documented and the test harness pattern is established across 27
       existing languages including the reference SQL pattern.
    3. Interface discoverability: Cross-agent interfaces are the fixture file paths and
       calibrated positions — fully specifiable before implementation by reading the
       fixture content we define here.
    4. Pre-implementation status: No prior MongoDB integration exists. Pure TODO.
       SQL was added as the reference pattern (docs/IMPL/complete/IMPL-sql-integration-test.yaml).
    5. Parallelization value: Three independent agents with disjoint files, moderate
       task complexity (fixture content calibration + Go edit + YAML authoring).
       The test file (>2000 lines) is marked v048_exempt: true.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~3 agents x ~6 min avg = ~6 min with parallelism
    - Merge and verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~3 x 6 min = ~18 min + overhead
    Time savings: marginal on time but coordination value is high — fixture
    calibration is error-prone and benefits from dedicated focused ownership.

    Recommendation: Proceed. Follows the SQL pattern exactly.
test_command: GOWORK=off go test ./test/ -run TestMultiLanguage/^MongoDB$
lint_command: GOWORK=off go vet ./...
file_ownership:
    - file: test/fixtures/mongodb/query.mongodb
      agent: A
      wave: 1
      action: new
    - file: test/fixtures/mongodb/schema.mongodb
      agent: A
      wave: 1
      action: new
    - file: .github/workflows/ci.yml
      agent: B
      wave: 1
      action: modify
    - file: test/multi_lang_test.go
      agent: C
      wave: 2
      action: modify
      v048_exempt: true
interface_contracts:
    - name: MongoDB langConfig entry
      description: |-
        The langConfig struct literal appended to buildLanguageConfigs() in
        test/multi_lang_test.go. All positions are calibrated against query.mongodb.
        Agent C must add this entry verbatim. Agent A's fixture content must
        match these positions exactly.
      definition: |
        langConfig{
            name:               "MongoDB",
            id:                 "mongodb",
            binary:             "mongodb-language-server",
            serverArgs:         []string{"--stdio"},
            fixture:            filepath.Join(fixtureBase, "mongodb"),
            file:               filepath.Join(fixtureBase, "mongodb", "query.mongodb"),
            secondFile:         filepath.Join(fixtureBase, "mongodb", "schema.mongodb"),
            hoverLine:          9,
            hoverColumn:        12,
            definitionLine:     9,
            definitionColumn:   12,
            callSiteLine:       11,
            callSiteColumn:     12,
            referenceLine:      9,
            referenceColumn:    12,
            completionLine:     9,
            completionColumn:   19,
            workspaceSymbol:    "",
            supportsFormatting: false,
            symbolName:         "find",
            highlightLine:      9,
            highlightColumn:    12,
            inlayHintEndLine:   0,
            renameSymbolLine:   0,
            codeActionLine:     9,
            codeActionEndLine:  14,
        }
      location: test/multi_lang_test.go
    - name: MongoDB CI job
      description: |-
        A new GitHub Actions job named multi-lang-mongodb that uses a mongo:7
        service container and runs only the MongoDB subtest. Installs
        @mongodb-js/mongodb-language-server via npm.
      definition: |
        job name: multi-lang-mongodb
        mongo service: image=mongo:7, port 27017:27017,
          health-check: mongosh --eval "db.adminCommand('ping')"
        steps:
          - checkout, setup-go
          - build (GOWORK=off go build ./...)
          - install mongodb-language-server: npm install -g @mongodb-js/mongodb-language-server
          - run test: GOWORK=off go test -v -run "TestMultiLanguage/^MongoDB$" ./test/ -timeout 10m
      location: .github/workflows/ci.yml
    - name: query.mongodb fixture content
      description: |-
        The primary MongoDB fixture file. Line/column positions in langConfig are
        calibrated against this exact content. Agent A must write query.mongodb with
        exactly this content; agent C uses the positions from this spec.
      definition: |
        Line 1:  // Person collection queries
        Line 2:  use('testdb');
        Line 3:  (blank line)
        Line 4:  db.persons.insertMany([
        Line 5:    { name: "Alice", age: 30 },
        Line 6:    { name: "Bob", age: 25 },
        Line 7:  ]);
        Line 8:  (blank line)
        Line 9:  db.persons.find({ age: { $gt: 18 } });
        Line 10: (blank line)
        Line 11: db.persons.aggregate([
        Line 12:   { $match: { age: { $gt: 18 } } },
        Line 13:   { $group: { _id: "$name", count: { $sum: 1 } } },
        Line 14: ]);

        Position calibration (1-indexed lines and columns):
          hoverLine=9, hoverColumn=12:
            Line 9 is "db.persons.find({ age: { $gt: 18 } });"
            "db.persons." is 11 chars; col 12 = 'f' of "find"
            mongodb-language-server provides hover info on method names.
          completionLine=9, completionColumn=19:
            "db.persons.find({" is 17 chars; col 18 = '{'; col 19 = ' ' (inside the filter object)
            This position is inside the query filter object, triggering field-name completions.
          callSiteLine=11, callSiteColumn=12:
            Line 11 is "db.persons.aggregate(["
            "db.persons." is 11 chars; col 12 = 'a' of "aggregate"
          referenceLine=9, referenceColumn=12: same as hover (on "find")
          highlightLine=9, highlightColumn=12: same as hover
          codeActionLine=9, codeActionEndLine=14: spans find + aggregate block
      location: test/fixtures/mongodb/query.mongodb
    - name: schema.mongodb fixture content
      description: |-
        The cross-file MongoDB fixture. Contains a createCollection with $jsonSchema
        validator defining the Person collection schema (name: string, age: int).
        Used as secondFile in the langConfig so the harness opens it in addition
        to the primary fixture.
      definition: |
        Line 1:  // Person schema definition
        Line 2:  use('testdb');
        Line 3:  (blank line)
        Line 4:  db.createCollection('persons', {
        Line 5:    validator: {
        Line 6:      $jsonSchema: {
        Line 7:        bsonType: 'object',
        Line 8:        required: ['name', 'age'],
        Line 9:        properties: {
        Line 10:          name: { bsonType: 'string', description: 'must be a string' },
        Line 11:          age:  { bsonType: 'int',    description: 'must be an integer' },
        Line 12:        },
        Line 13:      },
        Line 14:    },
        Line 15: });
      location: test/fixtures/mongodb/schema.mongodb
waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Role
            MongoDB fixture file author. Creates two .mongodb files under test/fixtures/mongodb/.

            ## What to implement

            ### 1. Create test/fixtures/mongodb/query.mongodb

            File path: /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/query.mongodb

            CRITICAL: Write this content EXACTLY as shown. Line numbers are calibrated
            for the langConfig positions in multi_lang_test.go. Do not reformat,
            reorder, or add/remove lines.

            ```
            // Person collection queries
            use('testdb');

            db.persons.insertMany([
              { name: "Alice", age: 30 },
              { name: "Bob", age: 25 },
            ]);

            db.persons.find({ age: { $gt: 18 } });

            db.persons.aggregate([
              { $match: { age: { $gt: 18 } } },
              { $group: { _id: "$name", count: { $sum: 1 } } },
            ]);
            ```

            The file must have exactly 14 lines. Calibration summary:
            - Line 9: "db.persons.find({ age: { $gt: 18 } });" — hover/completion col 12 = 'f' of "find"
            - Line 11: "db.persons.aggregate([" — callSite col 12 = 'a' of "aggregate"
            - The file uses 2-space indentation throughout; do not change indent to 4-space.

            ### 2. Create test/fixtures/mongodb/schema.mongodb

            File path: /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/schema.mongodb

            Content:
            ```
            // Person schema definition
            use('testdb');

            db.createCollection('persons', {
              validator: {
                $jsonSchema: {
                  bsonType: 'object',
                  required: ['name', 'age'],
                  properties: {
                    name: { bsonType: 'string', description: 'must be a string' },
                    age:  { bsonType: 'int',    description: 'must be an integer' },
                  },
                },
              },
            });
            ```

            ## Verification gate

            1. Both fixture files exist:
               ```
               ls /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/
               ```
               Expected: query.mongodb  schema.mongodb

            2. query.mongodb has exactly 14 lines:
               ```
               wc -l /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/query.mongodb
               ```
               Expected: 14

            3. query.mongodb line 9 contains "find":
               ```
               sed -n '9p' /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/query.mongodb
               ```
               Expected: db.persons.find({ age: { $gt: 18 } });

            4. query.mongodb line 11 contains "aggregate":
               ```
               sed -n '11p' /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/query.mongodb
               ```
               Expected: db.persons.aggregate([

            5. schema.mongodb contains "createCollection":
               ```
               grep -c 'createCollection' /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/schema.mongodb
               ```
               Expected: 1

            6. schema.mongodb contains both name and age fields:
               ```
               grep -c 'bsonType' /Users/dayna.blackwell/code/agent-lsp/test/fixtures/mongodb/schema.mongodb
               ```
               Expected: at least 3

            ## Constraints
            - Do NOT modify any files outside your ownership list (the two fixture files).
            - Do NOT alter the line structure or indentation of query.mongodb — positions are
              calibrated. Even changing two-space indent to four-space would shift column
              numbers and break hover/completion/callSite detection.
            - Do NOT add extra blank lines between sections in query.mongodb — the blank lines
              at lines 3, 8, and 10 are part of the calibration.
            - Do NOT put a trailing blank line after line 14 of query.mongodb (a single
              trailing newline is acceptable; a blank line would make wc -l report 15).
          files:
            - test/fixtures/mongodb/query.mongodb
            - test/fixtures/mongodb/schema.mongodb
        - id: B
          task: |-
            ## Role
            CI job author. Adds a new GitHub Actions job for the MongoDB integration test.

            ## What to implement

            Append a new job to /Users/dayna.blackwell/code/agent-lsp/.github/workflows/ci.yml.

            The last job in ci.yml is `multi-lang-dart`. Find the exact end of the file —
