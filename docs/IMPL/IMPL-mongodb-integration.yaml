            Notes on the positions (calibrated to query.mongodb — do not change them):
            - hoverLine=9 / hoverColumn=12: cursor on 'f' of "find" in "db.persons.find({"
              ("db.persons." is 11 chars, so col 12 is the first char of "find")
            - completionLine=9 / completionColumn=19: cursor inside the filter object
