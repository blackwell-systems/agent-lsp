title: Expose Public pkg/ API
feature_slug: public-pkg-api
verdict: SUITABLE
suitability_assessment: |
    File decomposition: The work decomposes cleanly into 3 independent agents:
    Agent A owns pkg/types (re-export layer), Agent B owns pkg/lsp (re-export layer),
    and Agent C owns pkg/session (re-export layer). Additionally, Agent D owns the
    doc-comment-only pass across all 9 internal packages plus cmd/agent-lsp. These are
    all new files with no overlapping ownership. No same-file conflicts exist.

    Investigation-first: All types, interfaces, and method signatures are already fully
    defined in internal/. No unknown root causes or speculative behavior. Implementation
    is purely additive.

    Interface discoverability: All cross-agent interfaces are the existing internal types.
    The pkg/ packages thin-wrap or re-export — no new APIs need to be designed.

    Pre-implementation status: No prior implementation. pkg/ directory does not exist.
    All 3 target packages are new. Doc comments are absent from 9 of 10 internal
    packages (internal/config already has a package doc comment; others do not).

    Parallelization value: High. Agents A, B, C, D are fully independent in Wave 1.
    Each creates 1-3 new files. Build/test cycle ~10s (GOWORK=off go build ./...).
    Wave 1 runs 4 agents in parallel; no Wave 2 needed (no cross-agent dependencies).

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~15 min (4 agents × ~4 min avg, full parallel)
    - Merge and verification: ~3 min
    Total SAW time: ~33 min

    Sequential baseline: ~25 min (4 × ~6 min sequential)
    Time savings: marginal on pure speed but coordination value is high (interface
    contracts lock in the re-export patterns and prevent inconsistent wrapping choices).

    Recommendation: Proceed. SUITABLE.
