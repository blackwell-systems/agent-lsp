interface_contracts:
    - name: pkg/types package
      description: |
        Re-exports all types from internal/types as the public API surface.
        Uses type aliases (type X = internaltypes.X) so callers can pass values
        interchangeably between pkg/types and internal/types without conversion.
      definition: |
        // In pkg/types/doc.go — package-level doc comment only.
        // In a thin re-export file (can be the doc.go itself, or a separate types.go):
        package types

        import internaltypes "github.com/blackwell-systems/agent-lsp/internal/types"

        type Position                 = internaltypes.Position
        type Range                    = internaltypes.Range
        type Location                 = internaltypes.Location
        type FormattedLocation        = internaltypes.FormattedLocation
        type LSPDiagnostic            = internaltypes.LSPDiagnostic
        type DiagnosticUpdateCallback = internaltypes.DiagnosticUpdateCallback
        type FileChangeEvent          = internaltypes.FileChangeEvent
        type ToolResult               = internaltypes.ToolResult
        type ContentItem              = internaltypes.ContentItem
        type SymbolKind               = internaltypes.SymbolKind
        type SymbolTag                = internaltypes.SymbolTag
        type CallHierarchyItem        = internaltypes.CallHierarchyItem
        type CallHierarchyIncomingCall = internaltypes.CallHierarchyIncomingCall
        type CallHierarchyOutgoingCall = internaltypes.CallHierarchyOutgoingCall
        type TypeHierarchyItem        = internaltypes.TypeHierarchyItem
        type SemanticToken            = internaltypes.SemanticToken
        type TextEdit                 = internaltypes.TextEdit
        type SymbolInformation        = internaltypes.SymbolInformation
        type DocumentSymbol           = internaltypes.DocumentSymbol
        type Command                  = internaltypes.Command
        type CompletionItem           = internaltypes.CompletionItem
        type CompletionList           = internaltypes.CompletionList
        type CodeAction               = internaltypes.CodeAction
        type ToolHandler              = internaltypes.ToolHandler
        type ResourceHandler          = internaltypes.ResourceHandler
        type Extension                = internaltypes.Extension
        type InlayHintKind            = internaltypes.InlayHintKind
        type InlayHintLabelPart       = internaltypes.InlayHintLabelPart
        type InlayHint                = internaltypes.InlayHint
        type DocumentHighlightKind    = internaltypes.DocumentHighlightKind
        type DocumentHighlight        = internaltypes.DocumentHighlight

        // Re-export constants.
        const InlayHintKindType      = internaltypes.InlayHintKindType
        const InlayHintKindParameter = internaltypes.InlayHintKindParameter
        const DocumentHighlightText  = internaltypes.DocumentHighlightText
        const DocumentHighlightRead  = internaltypes.DocumentHighlightRead
        const DocumentHighlightWrite = internaltypes.DocumentHighlightWrite

        // Re-export constructor functions.
        var TextResult  = internaltypes.TextResult
        var ErrorResult = internaltypes.ErrorResult
      location: pkg/types/doc.go
    - name: pkg/lsp package
      description: |
        Re-exports LSPClient, ServerManager, and ClientResolver as the public
        LSP client API. Uses type aliases for concrete types so values are
        interchangeable with internal/ usage. The ClientResolver interface is
        re-declared (not aliased — interfaces cannot be aliased to satisfy the
        same method sets across packages). All constructors are var-aliased.
      definition: |
        // In pkg/lsp/doc.go — package-level doc comment only.
        // In pkg/lsp/lsp.go:
        package lsp

        import internallsp "github.com/blackwell-systems/agent-lsp/internal/lsp"

        // Type aliases for concrete types.
        type LSPClient     = internallsp.LSPClient
        type ServerManager = internallsp.ServerManager

        // ClientResolver is the public interface for resolving LSP clients by file.
        // Matches the method set of internal/lsp.ClientResolver exactly.
        type ClientResolver interface {
            ClientForFile(filePath string) *LSPClient
            DefaultClient() *LSPClient
            AllClients() []*LSPClient
            Shutdown(ctx context.Context) error
        }

        // Constructor aliases.
        var NewLSPClient            = internallsp.NewLSPClient
        var NewSingleServerManager  = internallsp.NewSingleServerManager
        var NewMultiServerManager   = internallsp.NewMultiServerManager
      location: pkg/lsp/lsp.go
    - name: pkg/session package
      description: |
        Re-exports SessionManager, SimulationSession, and all session-related
        types as the public speculative-execution API. Type aliases keep values
        interchangeable with internal/session. SessionExecutor interface is
        re-declared (not aliased). All constructors are var-aliased.
      definition: |
        // In pkg/session/doc.go — package-level doc comment only.
        // In pkg/session/session.go:
        package session

        import internalsession "github.com/blackwell-systems/agent-lsp/internal/session"

        // Type aliases.
        type SessionManager     = internalsession.SessionManager
        type SimulationSession  = internalsession.SimulationSession
        type SessionStatus      = internalsession.SessionStatus
        type Confidence         = internalsession.Confidence
        type AppliedEdit        = internalsession.AppliedEdit
        type DiagnosticsSnapshot = internalsession.DiagnosticsSnapshot
        type EvaluationResult   = internalsession.EvaluationResult
        type DiagnosticEntry    = internalsession.DiagnosticEntry
        type EditResult         = internalsession.EditResult
        type ChainEdit          = internalsession.ChainEdit
        type ChainStepResult    = internalsession.ChainStepResult
        type ChainResult        = internalsession.ChainResult
        type CommitResult       = internalsession.CommitResult

        // SessionExecutor is the public interface for session locking.
        // Matches the method set of internal/session.SessionExecutor exactly.
        type SessionExecutor interface {
            Acquire(ctx context.Context, session *SimulationSession) error
            Release(session *SimulationSession)
        }

        // Status constants.
        const StatusCreated    = internalsession.StatusCreated
        const StatusMutated    = internalsession.StatusMutated
        const StatusEvaluating = internalsession.StatusEvaluating
        const StatusEvaluated  = internalsession.StatusEvaluated
        const StatusCommitted  = internalsession.StatusCommitted
        const StatusDiscarded  = internalsession.StatusDiscarded
        const StatusDirty      = internalsession.StatusDirty
        const StatusDestroyed  = internalsession.StatusDestroyed

        // Confidence constants.
        const ConfidenceHigh     = internalsession.ConfidenceHigh
        const ConfidencePartial  = internalsession.ConfidencePartial
        const ConfidenceEventual = internalsession.ConfidenceEventual

        // Constructor aliases.
        var NewSessionManager     = internalsession.NewSessionManager
        var NewSerializedExecutor = internalsession.NewSerializedExecutor
      location: pkg/session/session.go
waves:
