      agents:
        - id: A
          task: |
            ## Role
            Create the `pkg/types` public re-export package.

            ## Context
            The goal is pkg.go.dev discoverability: external Go programs should be able to
            import `github.com/blackwell-systems/agent-lsp/pkg/types` and get fully typed
            access to all LSP/tool types without importing the internal package path.

            ## What to implement

            Create `pkg/types/doc.go`. This single file serves two purposes:
            1. The package-level doc comment (required for pkg.go.dev indexing).
            2. All type alias declarations re-exporting internal/types.

            Use Go type aliases (`type X = internalX`) — NOT new type definitions. Aliases
            allow callers to pass `pkg/types.Position` values directly to internal functions
            that accept `internal/types.Position` without any conversion.

            ### File: pkg/types/doc.go

            The file must contain:

            A package doc comment. Use this text:
            ```
            // Package types provides the public type definitions for agent-lsp's LSP client
            // and MCP tool layer. It re-exports all types from the internal implementation
            // package as type aliases, so values are interchangeable with internal usage.
            //
            // Importers of agent-lsp as a library should use this package rather than
            // the internal/types path, which is not covered by the Go module's public API
            // stability guarantees.
            //
            // Key types:
            //
            //   - Position, Range, Location: LSP coordinate types (0-based, LSP convention)
            //   - LSPDiagnostic: diagnostic returned by the language server
            //   - DocumentSymbol, SymbolInformation: symbol shapes from documentSymbol/workspaceSymbol
            //   - CallHierarchyItem, TypeHierarchyItem: call/type hierarchy nodes
            //   - CompletionItem, CompletionList: completion response types
            //   - CodeAction, TextEdit: edit and action types
            //   - InlayHint, DocumentHighlight, SemanticToken: display annotation types
            //   - ToolResult, ContentItem: MCP tool response envelope
            //   - Extension: interface for per-language extension packages
            package types
            ```

            Then the import:
            ```go
            import internaltypes "github.com/blackwell-systems/agent-lsp/internal/types"
            ```

            Then all type alias declarations (one per line, exported name on left,
            internal alias on right):
            - All struct types: Position, Range, Location, FormattedLocation,
              LSPDiagnostic, FileChangeEvent, ToolResult, ContentItem,
              CallHierarchyItem, CallHierarchyIncomingCall, CallHierarchyOutgoingCall,
              TypeHierarchyItem, SemanticToken, TextEdit, SymbolInformation,
              DocumentSymbol, Command, CompletionItem, CompletionList, CodeAction,
              InlayHintLabelPart, InlayHint, DocumentHighlight
            - All function types: DiagnosticUpdateCallback, ToolHandler, ResourceHandler
            - All interface types: Extension
            - All integer types: SymbolKind, SymbolTag, InlayHintKind, DocumentHighlightKind

            Then const re-exports:
            ```go
            const (
                InlayHintKindType      = internaltypes.InlayHintKindType
                InlayHintKindParameter = internaltypes.InlayHintKindParameter
                DocumentHighlightText  = internaltypes.DocumentHighlightText
                DocumentHighlightRead  = internaltypes.DocumentHighlightRead
                DocumentHighlightWrite = internaltypes.DocumentHighlightWrite
            )
            ```

            Then constructor re-exports (use var, not func wrappers):
            ```go
            var (
                TextResult  = internaltypes.TextResult
                ErrorResult = internaltypes.ErrorResult
            )
            ```

            ## Verification gate

            1. Build succeeds:
               ```
               GOWORK=off go build ./pkg/types/...
               ```
            2. Vet passes:
               ```
               GOWORK=off go vet ./pkg/types/...
               ```
            3. Postcondition — verify aliases exist (grep should find matches):
               ```
               grep -c "type Position " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/types/doc.go
               # expected output: 1
               grep -c "type LSPDiagnostic " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/types/doc.go
               # expected output: 1
               grep -c "type Extension " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/types/doc.go
               # expected output: 1
               ```

            ## Constraints
            - Do NOT define any new types with new fields. Every declaration must be a
              type alias (`= internaltypes.X`), not a new type definition.
            - Do NOT modify any file in internal/ — that is Agent D's scope for doc
              comments only.
            - Do NOT create any file other than pkg/types/doc.go.
            - Do NOT modify files outside your ownership list.
          files:
            - pkg/types/doc.go
        - id: B
          task: |
            ## Role
            Create the `pkg/lsp` public re-export package exposing LSPClient,
            ServerManager, and the ClientResolver interface.

            ## Context
            External Go programs need to import `github.com/blackwell-systems/agent-lsp/pkg/lsp`
            to use the LSP subprocess client without running the MCP server. The pkg/ layer
            provides a stable, public-API path on pkg.go.dev.

            ## What to implement

            Create two files: `pkg/lsp/doc.go` (package doc comment only) and
            `pkg/lsp/lsp.go` (re-exports and interface declaration).

            ### File: pkg/lsp/doc.go

            Content:
            ```go
            // Package lsp provides a public API for spawning and communicating with
            // Language Server Protocol (LSP) subprocesses from Go programs.
            //
            // The primary type is [LSPClient], which manages the lifecycle of a single
            // LSP server process: spawning, Content-Length framing, request/response
            // correlation, server-initiated request handling, diagnostic subscriptions,
            // and workspace file watching.
            //
            // [ServerManager] routes file-specific operations to the correct language
            // server in multi-server configurations. [ClientResolver] is the interface
            // that ServerManager implements; it allows callers to inject alternative
            // routing implementations.
            //
            // Typical single-server usage:
            //
            //	client := lsp.NewLSPClient("gopls", []string{})
            //	if err := client.Initialize(ctx, "/path/to/workspace"); err != nil {
            //	    log.Fatal(err)
            //	}
            //	defer client.Shutdown(ctx)
            //	locs, err := client.GetDefinition(ctx, fileURI, pos)
            //
            // All types in this package are type aliases of the internal implementation;
            // values are interchangeable with internal/lsp without conversion.
            package lsp
            ```

            ### File: pkg/lsp/lsp.go

            Content skeleton:
            ```go
            package lsp

            import (
                "context"

                internallsp "github.com/blackwell-systems/agent-lsp/internal/lsp"
                "github.com/blackwell-systems/agent-lsp/internal/config"
            )

            // LSPClient is the core LSP subprocess client. See [internallsp.LSPClient]
            // for full documentation.
            type LSPClient = internallsp.LSPClient

            // ServerManager manages one or more LSP server instances and implements
            // [ClientResolver]. See [internallsp.ServerManager] for full documentation.
            type ServerManager = internallsp.ServerManager

            // ClientResolver resolves the appropriate [LSPClient] for a given file path.
            // Implemented by [ServerManager].
            type ClientResolver interface {
                ClientForFile(filePath string) *LSPClient
                DefaultClient() *LSPClient
                AllClients() []*LSPClient
                Shutdown(ctx context.Context) error
            }

            // NewLSPClient creates a new, unstarted LSP client.
            // Call [LSPClient.Initialize] to start the subprocess and complete the handshake.
            var NewLSPClient = internallsp.NewLSPClient

            // NewSingleServerManager wraps a single [LSPClient] to satisfy [ClientResolver].
            var NewSingleServerManager = internallsp.NewSingleServerManager

            // NewMultiServerManager creates a [ServerManager] from multiple ServerEntry configs.
            // Does NOT start servers — call [ServerManager.StartAll] separately.
            var NewMultiServerManager = internallsp.NewMultiServerManager

            // ServerEntry is the configuration type for a single language server entry.
            // Re-exported from internal/config for callers who use NewMultiServerManager.
            type ServerEntry = config.ServerEntry
            ```

            Note: The `ClientResolver` interface in this file must exactly match the method
            set of `internal/lsp.ClientResolver`:
            - `ClientForFile(filePath string) *LSPClient`
            - `DefaultClient() *LSPClient`
            - `AllClients() []*LSPClient`
            - `Shutdown(ctx context.Context) error`

            Verify the current internal interface by reading:
            `/Users/dayna.blackwell/workspace/code/agent-lsp/internal/lsp/resolver.go`
            before writing the file. If the method set has changed from the above, match
            whatever is in that file — do not invent methods.

            ## Verification gate

            1. Build succeeds:
               ```
               GOWORK=off go build ./pkg/lsp/...
               ```
            2. Vet passes:
               ```
               GOWORK=off go vet ./pkg/lsp/...
               ```
            3. Postconditions:
               ```
               grep -c "type LSPClient " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/lsp/lsp.go
               # expected: 1
               grep -c "type ServerManager " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/lsp/lsp.go
               # expected: 1
               grep -c "type ClientResolver interface" /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/lsp/lsp.go
               # expected: 1
               ```

            ## Constraints
            - Do NOT duplicate logic from internal/lsp. Every method must be re-exported,
              not re-implemented.
            - Do NOT modify any internal/ files.
            - Do NOT create any file other than pkg/lsp/doc.go and pkg/lsp/lsp.go.
            - Do NOT import internal/session or internal/tools in this package.
            - Do NOT modify files outside your ownership list.
          files:
            - pkg/lsp/doc.go
            - pkg/lsp/lsp.go
        - id: C
          task: |
            ## Role
            Create the `pkg/session` public re-export package exposing SessionManager
            and all speculative-execution session types.

            ## Context
            External Go programs need to import
            `github.com/blackwell-systems/agent-lsp/pkg/session` to use the speculative
            edit/evaluate/commit workflow without running the MCP server. The pkg/ layer
            provides a stable, importable, pkg.go.dev-indexed path.

            ## What to implement

            Create two files: `pkg/session/doc.go` (package doc comment only) and
            `pkg/session/session.go` (re-exports and interface declaration).

            ### File: pkg/session/doc.go

            Content:
            ```go
            // Package session provides a public API for speculative code editing:
            // applying LSP-validated edits in memory, evaluating their diagnostic
            // impact, and committing or discarding the result.
            //
            // The primary type is [SessionManager], which manages the lifecycle of
            // simulation sessions. A session is a transactional unit of work:
            //
            //  1. Create a session with [SessionManager.CreateSession].
            //  2. Apply in-memory edits with [SessionManager.ApplyEdit] or a chain of
            //     edits with [SessionManager.SimulateChain].
            //  3. Evaluate the net diagnostic delta with [SessionManager.Evaluate].
            //  4. Either commit the edits to disk with [SessionManager.Commit] or
            //     revert with [SessionManager.Discard].
            //
            // [SessionStatus] tracks the lifecycle state of each session.
            // [EvaluationResult] reports introduced and resolved diagnostics relative to
            // a baseline snapshot captured at the start of each file's first edit.
            //
            // All types in this package are type aliases of the internal implementation;
            // values are interchangeable with internal/session without conversion.
            package session
            ```

            ### File: pkg/session/session.go

            Content skeleton:
            ```go
            package session

            import (
                "context"

                internalsession "github.com/blackwell-systems/agent-lsp/internal/session"
            )

            // SessionManager manages the lifecycle of simulation sessions.
            // All public methods are thread-safe.
            type SessionManager = internalsession.SessionManager

            // SimulationSession holds per-session state.
            type SimulationSession = internalsession.SimulationSession

            // SessionStatus represents the lifecycle phase of a simulation session.
            type SessionStatus = internalsession.SessionStatus

            // Confidence indicates diagnostic reliability.
            type Confidence = internalsession.Confidence

            // AppliedEdit records a single edit applied within a session.
            type AppliedEdit = internalsession.AppliedEdit

            // DiagnosticsSnapshot is a frozen copy of diagnostics for a URI at baseline time.
            type DiagnosticsSnapshot = internalsession.DiagnosticsSnapshot

            // EvaluationResult is the structured output of SessionManager.Evaluate.
            type EvaluationResult = internalsession.EvaluationResult

            // DiagnosticEntry is a single diagnostic in an evaluation result.
            type DiagnosticEntry = internalsession.DiagnosticEntry

            // EditResult is the response from SessionManager.ApplyEdit.
            type EditResult = internalsession.EditResult

            // ChainEdit is a single edit in a SimulateChain request.
            type ChainEdit = internalsession.ChainEdit

            // ChainStepResult is one step in a SimulateChain response.
            type ChainStepResult = internalsession.ChainStepResult

            // ChainResult is the response from SessionManager.SimulateChain.
            type ChainResult = internalsession.ChainResult

            // CommitResult is the response from SessionManager.Commit.
            type CommitResult = internalsession.CommitResult

            // SessionExecutor abstracts how a session acquires and releases LSP access.
            type SessionExecutor interface {
                Acquire(ctx context.Context, session *SimulationSession) error
                Release(session *SimulationSession)
            }

            // Session status constants.
            const (
                StatusCreated    = internalsession.StatusCreated
                StatusMutated    = internalsession.StatusMutated
                StatusEvaluating = internalsession.StatusEvaluating
                StatusEvaluated  = internalsession.StatusEvaluated
                StatusCommitted  = internalsession.StatusCommitted
                StatusDiscarded  = internalsession.StatusDiscarded
                StatusDirty      = internalsession.StatusDirty
                StatusDestroyed  = internalsession.StatusDestroyed
            )

            // Confidence level constants.
            const (
                ConfidenceHigh     = internalsession.ConfidenceHigh
                ConfidencePartial  = internalsession.ConfidencePartial
                ConfidenceEventual = internalsession.ConfidenceEventual
            )

            // NewSessionManager creates a new SessionManager with the given ClientResolver.
            // The resolver is used to route session operations to the correct LSP client
            // based on the session's language.
            //
            // resolver must satisfy the ClientResolver interface from pkg/lsp or
            // internal/lsp — either works because LSPClient is a type alias.
            var NewSessionManager = internalsession.NewSessionManager

            // NewSerializedExecutor creates a new per-session serialized executor.
            var NewSerializedExecutor = internalsession.NewSerializedExecutor
            ```

            The `SessionExecutor` interface must exactly match the method set of
            `internal/session.SessionExecutor`. Verify by reading:
            `/Users/dayna.blackwell/workspace/code/agent-lsp/internal/session/types.go`
            before writing the file.

            ## Verification gate

            1. Build succeeds:
               ```
               GOWORK=off go build ./pkg/session/...
               ```
            2. Vet passes:
               ```
               GOWORK=off go vet ./pkg/session/...
               ```
            3. Postconditions:
               ```
               grep -c "type SessionManager " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/session/session.go
               # expected: 1
               grep -c "type EvaluationResult " /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/session/session.go
               # expected: 1
               grep -c "type SessionExecutor interface" /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/session/session.go
               # expected: 1
               grep -c "StatusCreated" /Users/dayna.blackwell/workspace/code/agent-lsp/pkg/session/session.go
               # expected: 1
               ```

            ## Constraints
            - Do NOT re-implement any logic. Every declaration must be an alias or const
              re-export from internal/session.
            - Do NOT import internal/lsp directly — use the type alias path:
              `internalsession.NewSessionManager` already accepts `lsp.ClientResolver`
              (the internal one), which is assignable from pkg/lsp.ClientResolver because
              LSPClient is a type alias.
            - Do NOT modify any internal/ files.
            - Do NOT create any file other than pkg/session/doc.go and pkg/session/session.go.
            - Do NOT modify files outside your ownership list.
          files:
            - pkg/session/doc.go
            - pkg/session/session.go
        - id: D
          task: |
            ## Role
            Add package-level doc comments to the 9 internal packages missing them,
            add a doc comment to cmd/agent-lsp, update docs/architecture.md to describe
            the new pkg/ layer, and update README.md to add a Library Usage section.

            ## Context
            pkg.go.dev indexes package documentation. The internal packages need
            `// Package X ...` doc comments so that when pkg.go.dev renders
            pkg/types, pkg/lsp, and pkg/session, the linked internal types also have
            good descriptions in the "Go reference documentation" sense.

            Additionally, docs/architecture.md must be updated to reflect the new
            public pkg/ layer, and README.md needs a Library Usage section.

            ## What to implement

            Create one `doc.go` per package. Each file contains only the package clause
            with its doc comment. Do NOT add any imports or declarations.

            ### 1. internal/lsp/doc.go

            ```go
            // Package lsp implements a JSON-RPC 2.0 client for Language Server Protocol
            // (LSP) subprocesses. LSPClient manages the full lifecycle of a single LSP
            // server: spawning, Content-Length framing, request/response correlation,
            // server-initiated request handling (workspace/applyEdit,
            // workspace/configuration, client/registerCapability), diagnostic
            // subscriptions, workspace progress tracking, and optional file watching.
            //
            // ServerManager handles multi-server configurations, routing file operations
            // to the correct language server by file extension. ClientResolver is the
            // interface that ServerManager implements.
            //
            // This package is the internal implementation. External callers should use
            // github.com/blackwell-systems/agent-lsp/pkg/lsp for a stable public API.
            package lsp
            ```

            ### 2. internal/session/doc.go

            ```go
            // Package session implements speculative code editing: applying LSP-validated
