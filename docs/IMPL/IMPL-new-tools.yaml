            Handler signature:
            ```go
            func HandleGetChangeImpact(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)
            ```

            Arguments (decode with ok-check pattern from `args map[string]interface{}`):
            - `changed_files` (required) — decode as `args["changed_files"].([]interface{})`, then
              convert each element to string. Return `types.ErrorResult("changed_files is required")` if missing or empty.
            - `include_transitive` (bool, optional) — `args["include_transitive"].(bool)` with ok-check, default false.

            Algorithm:
            1. `CheckInitialized(client)` — return error result if nil.
            2. Define a package-level helper `isTestFile(path string) bool`:
               - returns true if `strings.HasSuffix(path, "_test.go")` (Go)
               - OR `strings.Contains(path, ".test.")` OR `strings.Contains(path, ".spec.")` (JS/TS)
               - OR `strings.HasPrefix(filepath.Base(path), "test_")` (Python)
            3. Define a package-level helper `langIDFromPath(path string) string`:
               - maps `.go` → `"go"`, `.ts`/`.tsx` → `"typescript"`, `.js`/`.jsx` → `"javascript"`,
                 `.py` → `"python"`, `.rs` → `"rust"`, default → `"plaintext"`
            4. Result accumulators:
               ```go
               type symbolRef struct {
                   Name string `json:"name"`
                   File string `json:"file"`
                   Line int    `json:"line"`
               }
               var changedSymbols []symbolRef
               testFilesSet := map[string]bool{}
               var testFunctions []symbolRef
               var nonTestCallers []symbolRef
               ```
            5. For each file in changed_files:
               a. langID := langIDFromPath(file)
               b. Open doc and get symbols:
                  ```go
                  symbols, err := WithDocument[[]types.DocumentSymbol](ctx, client, file, langID, func(fURI string) ([]types.DocumentSymbol, error) {
                      return client.GetDocumentSymbols(ctx, fURI)
                  })
                  ```
                  If error: include a warning in summary but continue to next file.
               c. Collect exported symbols (Go: name[0] is uppercase; other languages: all symbols).
                  Walk children recursively via a local recursive helper.
                  For each exported symbol, append to changedSymbols with its file path and
                  `SelectionRange.Start.Line + 1` (LSP is 0-indexed).
               d. For each exported symbol, call GetReferences:
                  ```go
                  pos := types.Position{
                      Line:      sym.SelectionRange.Start.Line,      // already 0-indexed
                      Character: sym.SelectionRange.Start.Character,
                  }
                  locs, _ := WithDocument[[]types.Location](ctx, client, file, langID, func(fURI string) ([]types.Location, error) {
                      return client.GetReferences(ctx, fURI, pos, false)
                  })
                  ```
                  Ignore errors from GetReferences (symbol may have no references).
               e. For each location in locs:
                  - Convert URI to path via URIToFilePath; skip on error.
                  - If isTestFile(refPath): add to testFilesSet, then find enclosing function:
                    call `GetDocumentSymbols` on that file (via WithDocument), walk tree to find
                    smallest symbol range containing loc.Range.Start.Line, append to testFunctions.
                  - Else: append symbolRef{Name: sym.Name, File: refPath, Line: loc.Range.Start.Line+1}
                    to nonTestCallers.
               f. If include_transitive: for each nonTestCaller, call GetReferences on the caller's
                  position (use loc.Range.Start as the position, file = refPath). For any NEW test
                  files found in transitive refs, add to testFilesSet. Do not recursively call
                  transitive again (one level only).
            6. Build testFiles []string from testFilesSet keys.
            7. Marshal response:
               ```json
               {
                 "changed_symbols": [...],
                 "test_files": [...],
                 "test_functions": [...],
                 "non_test_callers": [...],
                 "summary": "Found N changed symbols with M test references across K test files."
               }
               ```
            8. Return `types.TextResult(string(data)), nil`.

