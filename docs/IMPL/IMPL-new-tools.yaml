            Required sections:

            **Title:** `# Refactor Preview with simulate_chain`

            **Intro paragraph:** Explain that simulate_chain chains in-memory edits and evaluates
            diagnostics after each step, making it ideal for safe refactor preview before committing.
            Mention the key signal: `cumulative_delta == 0` at the final step means the refactor
            is safe to commit.

            **Section: Safe rename preview**
            Show the workflow for renaming a function:
            1. `create_simulation_session(workspace_root=..., language="go")`
            2. `simulate_chain(session_id=..., steps=[rename definition, rename call site])`
            3. Check `steps[-1].cumulative_delta == 0`
            4. If zero: `commit_session(session_id=..., apply=true)`; if non-zero: `discard_session`
               and investigate which step first showed `net_delta > 0`.
            Use placeholder values like `<session_id>`, `<line>`, `<column>` for runtime values.

            **Section: Change impact preview**
            Show applying a speculative interface change in step 1, observing which steps
            introduce errors (net_delta > 0 means errors added), identifying call sites that
            need updating, then discarding. This is a read-only workflow — commit is never called.

            **Section: Multi-file refactor with checkpoint**
            Show chaining 3 edits across 3 files, using the `safe_through_step` field to
            identify the largest safe partial application, committing only through that step.

            **Section: Key response fields**
            Table or bullet list:
            - `steps[i].net_delta` — error count change after step i (negative = errors resolved)
            - `steps[i].cumulative_delta` — total error delta from baseline through step i
            - `safe_through_step` — index of last step where cumulative_delta == 0
            - Commit with `apply=true` writes all edits to disk atomically; `apply=false` returns a diff

