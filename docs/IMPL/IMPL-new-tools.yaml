pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Wave 2 Agent D cannot compile because HandleGetChangeImpact or HandleGetCrossRepoReferences
            are not found. This would happen if Wave 1 agents failed or their files were not merged
            before Wave 2 launched.
          likelihood: low
          impact: high
          mitigation: |
            Wave 2 is a type: integration wave that runs after Wave 1 completes and merges.
            The orchestrator verifies Wave 1 merges before launching Wave 2. Agent D's verification
            gate includes go build, which will surface this immediately.
        - scenario: |
            changed_files and consumer_roots arguments are typed []string in the Args structs
            but arrive as []interface{} in the handler via toolArgsToMap JSON round-trip. Agent A
            or B type-asserts as []string and panics at runtime.
          likelihood: medium
          impact: medium
          mitigation: |
            Both Agent A and B task prompts explicitly state: decode as []interface{}, not []string.
            The constraint section of each agent reiterates this. If a panic occurs, the error will
            be surfaced immediately in integration tests.
        - scenario: |
            Agent C accidentally edits cmd/agent-lsp/server.go in Wave 1 (the simulate_chain
            description update), creating a conflict when Agent D makes the same change in Wave 2.
          likelihood: low
          impact: medium
          mitigation: |
            Agent C's task explicitly says "Do NOT touch server.go in Wave 1". Agent C's file
            ownership list contains only docs/refactor-preview.md and README.md. Agent D owns
            server.go in Wave 2.
        - scenario: |
            Agent A defines isTestFile or langIDFromPath as package-level functions, and a
            future agent in another file in the same package also defines one of those names,
            causing a duplicate function error.
          likelihood: low
          impact: low
          mitigation: |
            Both are unexported helpers with descriptive names unlikely to collide. The package
            already has many unexported helpers (toInt, extractPosition, etc.) without conflicts.
            Agent A's vet check will catch any duplicate if it occurs.
        - scenario: |
            Agent D's safeFirstFile helper is placed inside the Run() function closure instead
            of at package level, making it unavailable to other package-level functions or causing
            compile error if used outside Run's scope.
          likelihood: low
          impact: low
          mitigation: |
            Agent D's task explicitly states safeFirstFile goes at package level near clientForFile
            (line ~138), not inside Run. The exact insertion anchor is the clientForFile function
            signature, which is at package level.
