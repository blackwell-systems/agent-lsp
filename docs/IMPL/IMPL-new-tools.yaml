title: 'New MCP Tools: get_change_impact, get_cross_repo_references, and simulate_chain refactor-preview docs'
feature_slug: new-tools
verdict: SUITABLE
suitability_assessment: |
    Three largely independent features. File ownership analysis:

    Feature 1 (get_change_impact): new handler file + server.go registration
    Feature 2 (get_cross_repo_references): new handler file + server.go registration
    Feature 3 (simulate_chain docs): server.go description update + new docs/refactor-preview.md + README.md update

    server.go is shared across all three features. To maintain strict I1 (disjoint ownership),
    wave structure is two waves:
    - Wave 1: Agents A and B implement handlers in their own new files. Agent C writes docs
      (refactor-preview.md + README.md). No server.go touches in Wave 1.
    - Wave 2: Single integration agent D wires both handlers into server.go (two new AddTool
      registrations) and updates the simulate_chain description. This is a known-wiring
      integration wave — no worktree isolation needed.

    This structure gives maximum parallelism in Wave 1 (three agents, fully disjoint) and
    a single clean server.go edit in Wave 2.

    Parallelization value: moderate. Build + test cycle is fast for Go. Primary value is
    clean coordination and audit trail.

    Estimated times:
    - Scout: ~15 min
    - Wave 1 agents: ~3 x 12 min avg in parallel = ~12 min
    - Wave 2 integration: ~10 min (single agent, serial)
    - Merge & verification: ~5 min
    Total SAW time: ~42 min
    Sequential baseline: ~55 min
    Recommendation: Clear speedup from Wave 1 parallelism; proceed.
