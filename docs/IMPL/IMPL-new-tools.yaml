interface_contracts:
    - name: HandleGetChangeImpact
      description: |
        Handler for the get_change_impact MCP tool. Enumerates exported symbols in each
        changed file via GetDocumentSymbols, calls GetReferences for each symbol, partitions
        results into test files vs non-test callers, and extracts enclosing test function
        names for test references.
      definition: |
        func HandleGetChangeImpact(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/change_impact.go
    - name: HandleGetCrossRepoReferences
      description: |
        Handler for the get_cross_repo_references MCP tool. Adds each consumer_root as a
        workspace folder, calls GetReferences on the symbol, then partitions results by which
        consumer_root prefix they belong to.
      definition: |
        func HandleGetCrossRepoReferences(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/cross_repo.go
