            ### position_pattern.go

            Package: `tools`. New file — do NOT modify existing files.

            The `@@` string is the cursor position marker. It indicates that the cursor
            is placed at the character immediately following `@@` in the pattern.

            Implement:

            1. `ResolvePositionPattern(filePath, pattern string) (line, col int, err error)`

            Algorithm:
            - Validate pattern contains "@@"; if not: return error "position_pattern must contain @@ marker"
            - Read file content with os.ReadFile(filePath)
            - Split pattern on "@@" -> prefix, suffix. searchText = prefix + suffix
            - Find searchText in fileContent using strings.Index
            - If not found: return error fmt.Errorf("position_pattern not found in file: %q", pattern)
            - offset = matchStart + len(prefix)  // byte offset of the @@ cursor position
            - Count lines: line = strings.Count(fileContent[:offset], "\n") + 1  (1-indexed)
            - Col = offset - strings.LastIndex(fileContent[:offset], "\n") (1-indexed; handle no newline case)
            - Return line, col, nil

            2. `ExtractPositionWithPattern(args map[string]interface{}, filePath string) (line, col int, err error)`

            - pp, _ := args["position_pattern"].(string)
            - If pp != "": return ResolvePositionPattern(filePath, pp)
            - Else: return extractPosition(args)

            Imports: `fmt`, `os`, `strings`

            ### position_pattern_test.go

            Package: `tools`. Use t.TempDir() and os.WriteFile for temp files.

            Tests:
            1. `TestResolvePositionPattern_Basic` — single-line file "hello world@@end",
               pattern "hello world@@end", expect line=1, col=12
            2. `TestResolvePositionPattern_MultiLine` — 3-line file, pattern on line 2,
               verify correct line/col
            3. `TestResolvePositionPattern_NoMarker` — pattern without "@@" -> error
            4. `TestResolvePositionPattern_NotFound` — pattern not in file -> error
            5. `TestResolvePositionPattern_MarkerAtStart` — pattern "@@firstword" -> col=1
            6. `TestExtractPositionWithPattern_WithPattern` — args has position_pattern,
               expect ResolvePositionPattern result (write temp file, put pattern in args)
            7. `TestExtractPositionWithPattern_Fallback` — args has line=5, column=3 (no pattern),
               expect line=5, col=3

            ### Constraints
