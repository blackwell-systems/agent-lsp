pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent G modifies analysis.go or navigation.go to wire ExtractPositionWithPattern, violating I1 (those files are not in its ownership). Causes conflict on merge.
          likelihood: medium
          impact: high
          mitigation: |
            Agent G brief explicitly says "Do NOT modify analysis.go or navigation.go." Position_pattern wiring in handlers is explicitly deferred. Agent G only adds PositionPattern fields to arg structs in server.go (structural documentation) and dry_run logic to workspace.go.
        - scenario: |
            HandleGoToSymbol (Agent A) fails to open the candidate file before calling GetDefinition, causing "document not open" errors at runtime.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A brief specifies opening via WithDocument before calling GetDefinition, and falling back to candidate Location if GetDefinition returns empty. The pattern is identical to HandleGoToDefinition in navigation.go.
        - scenario: |
            position_pattern line counting uses byte offsets incorrectly for multibyte UTF-8 characters, returning wrong column values.
          likelihood: low
          impact: low
          mitigation: |
            ResolvePositionPattern algorithm uses strings.Count and strings.LastIndex which operate on bytes. Col calculation: offset - strings.LastIndex(content[:offset], "\n"). This is consistent with how LSP character offsets work in ASCII/ASCII-dominant code. Brief specifies this algorithm explicitly.
        - scenario: |
            PATTERNS.md not present when Wave 2 skill agents read it (scaffold agent not yet run). Agents fail to reference the shared format.
          likelihood: low
          impact: low
          mitigation: |
            PATTERNS.md is a scaffold file. The scaffold agent runs before Wave 1 is launched (per SAW protocol). If scaffold agent fails, wave launch is blocked until scaffold is committed.
        - scenario: |
            lsp-rename skill written as single-phase (no dry_run preview), missing the defining safety property.
          likelihood: low
          impact: high
          mitigation: |
            Agent E brief calls the two-phase structure "NOT optional." Verification gate checks for Phase/phase occurrences >= 2 and dry_run mention >= 1.
