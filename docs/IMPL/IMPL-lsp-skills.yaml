            ## Role: position_pattern utility author

            Create `internal/tools/position_pattern.go` and `internal/tools/position_pattern_test.go`
            in `/Users/dayna.blackwell/workspace/code/LSP-MCP-GO`. Work on the `develop` branch.

            ### Read first

