interface_contracts:
    - name: HandleGoToSymbol
      description: Resolve a symbol path to its definition location without needing file_path or line/column
      definition: |
        func HandleGoToSymbol(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)

        // args["symbol_path"]: string, dot notation e.g. "MyClass.method", "pkg.Function"
        // args["workspace_root"]: string, optional scope
        // args["language"]: string, optional filter
        //
        // Algorithm:
        //   1. Split symbol_path on "." to get leaf name (last component)
        //   2. client.GetWorkspaceSymbols(ctx, leafName) -> candidates
        //   3. Filter: if dotted, prefer where ContainerName matches parent; else use first
        //   4. For best match: open file via WithDocument, call client.GetDefinition
        //      at candidate position; if empty, use candidate Location directly
        //   5. Return locationsResult (1-indexed FormattedLocation)
      location: internal/tools/symbol_path.go
    - name: ResolvePositionPattern
      description: Resolve @@ cursor marker in a text pattern to 1-indexed line/col in a file
      definition: |
        func ResolvePositionPattern(filePath, pattern string) (line, col int, err error)

        // pattern must contain "@@" — the cursor position marker.
        // Returns 1-indexed line and col of the character immediately after @@.
        // Error if pattern lacks "@@" or searchText not found in file.

        func ExtractPositionWithPattern(args map[string]interface{}, filePath string) (line, col int, err error)

        // If args["position_pattern"] is non-empty: calls ResolvePositionPattern.
        // Otherwise: falls through to extractPosition(args).
      location: internal/tools/position_pattern.go
    - name: GoToSymbolArgs
      description: Server-side arg struct for go_to_symbol tool
      definition: |
        type GoToSymbolArgs struct {
            SymbolPath    string `json:"symbol_path"`
            WorkspaceRoot string `json:"workspace_root,omitempty"`
            Language      string `json:"language,omitempty"`
        }
      location: cmd/lsp-mcp-go/server.go
    - name: position_pattern field on existing arg structs
      description: New optional field added to three arg structs in server.go
      definition: |
        // Added to GetInfoOnLocationArgs, GetReferencesArgs, GoToDefinitionArgs:
        PositionPattern string `json:"position_pattern,omitempty"`

        // Note: handlers do not yet call ExtractPositionWithPattern in this wave.
        // The field documents the parameter; handler wiring is a follow-up task.
      location: cmd/lsp-mcp-go/server.go
    - name: RenameSymbolArgs with dry_run
      description: Updated arg struct for rename_symbol with dry_run and position_pattern
      definition: |
        type RenameSymbolArgs struct {
            FilePath        string `json:"file_path"`
            LanguageID      string `json:"language_id,omitempty"`
            Line            int    `json:"line"`
            Column          int    `json:"column"`
            NewName         string `json:"new_name"`
            PositionPattern string `json:"position_pattern,omitempty"`
            DryRun          bool   `json:"dry_run,omitempty"`
        }

        // dry_run=true: HandleRenameSymbol wraps result in preview envelope:
        //   { "workspace_edit": {...}, "preview": { "note": "..." } }
        // dry_run=false (default): existing behavior unchanged.
      location: cmd/lsp-mcp-go/server.go and internal/tools/workspace.go
    - name: DiagnosticDiffFormat
      description: Shared output format for before/after diagnostic comparison
      definition: |
        ## Diagnostic Summary
        - Errors introduced:   N  (each as: file:line - message)
        - Errors resolved:     N  (each as: file:line - message)
        - Net change:         +N / -N / 0
      location: skills/PATTERNS.md
