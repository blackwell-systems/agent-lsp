            ### symbol_path.go

            Package: `tools`. New file — do NOT modify existing files.

            Implement:

            1. `HandleGoToSymbol(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)`

            Algorithm:
            - CheckInitialized(client) guard
            - Extract symbol_path from args; error if empty
            - Extract leaf name: last component after splitting on "."
            - Call client.GetWorkspaceSymbols(ctx, leafName)
            - Call bestSymbolMatch(syms, symbolPath) to pick best candidate
            - If no match: return "no symbols found for symbol_path: <path>"
            - Open candidate file with WithDocument, call client.GetDefinition at
              candidate position (0-indexed: sym.Location.Range.Start.Line,
              sym.Location.Range.Start.Character)
            - If GetDefinition returns non-empty locs: return locationsResult(locs)
            - Else: format candidate Location as FormattedLocation (1-indexed) and return

            2. `bestSymbolMatch(candidates []types.SymbolInformation, symbolPath string) *types.SymbolInformation`

            - If symbolPath has no ".": return &candidates[0] (first match)
            - If symbolPath has ".": split on ".", parent = everything before last dot
              Prefer first candidate where sym.ContainerName != nil && *sym.ContainerName == parent (case-sensitive)
              If no ContainerName match: return &candidates[0]

