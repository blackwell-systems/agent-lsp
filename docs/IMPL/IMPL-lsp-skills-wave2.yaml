            # Wave 1 Agent B: lsp-impact skill

            You are Wave 1 Agent B. Create the lsp-impact skill directory with SKILL.md
            and a references/patterns.md file covering blast-radius analysis before
            touching a symbol.

            ## 0. Isolation Verification

            Verify you are on the correct branch:
            ```bash
            git -C $SAW_AGENT_WORKTREE branch --show-current
            # Expected: saw/lsp-skills-wave2/wave1-agent-B
            ```

            ## 1. File Ownership

            You own ONLY these files (creating them new):
            - `skills/lsp-impact/SKILL.md`
            - `skills/lsp-impact/references/patterns.md`

            Do NOT touch any other files.

            ## 2. Interfaces You Must Implement

            A Claude Code Agent Skill conforming to the spec:
            - YAML frontmatter: `name`, `description` (≤250 chars, "Use when" trigger),
              optional `argument-hint`, `allowed-tools`
            - Markdown body: step-by-step workflow
            - references/patterns.md: supplementary reference detail

            Style conventions: match existing skills under skills/ (see edit-export and symbol-renaming skill for reference)

            ## 3. Interfaces You May Call (tool parameters — verified from server.go)

            ```
            call_hierarchy(
              file_path, line, column,
              direction: "incoming" | "outgoing" | "both" (default),
              language_id?
            ) -> { item: CallHierarchyItem, incoming: [...], outgoing: [...] }
            # Requires go_to_symbol or go_to_definition first to get file/line/column.
            # Returns "No call hierarchy item found at ..." when no symbol found.
            # Returns error if server does not declare callHierarchyProvider.

            type_hierarchy(
              file_path, line, column,
              direction: "supertypes" | "subtypes" | "both" (default),
              language_id?
            ) -> { item: TypeHierarchyItem, supertypes: [...], subtypes: [...] }
            # Requires LSP 3.17. Use get_server_capabilities to check support.
            # Returns error if server does not declare typeHierarchyProvider.

            get_references(
              file_path, line, column,
              include_declaration: bool (default false),
              language_id?,
              position_pattern?   # "prefix@@symbol" format; replaces line/column when provided
            ) -> [{ file, line, column, end_line, end_column }]
            # All output coords 1-based. Returns [] if workspace still indexing.

            go_to_symbol(
              symbol_path,       # dot notation: "Package.Symbol" or just "Symbol"
              workspace_root?,
              language?
            ) -> FormattedLocation with file, line, column (1-indexed)
            # Use this to locate a symbol when you have its name but not its file/line.

            get_server_capabilities()
            # Returns { supported_tools: [...], unsupported_tools: [...] }
            # Check before calling call_hierarchy or type_hierarchy (not all servers support them)
            ```

            ## 4. What to Implement

            ### skills/lsp-impact/SKILL.md

            Frontmatter:
            - `name: lsp-impact`
            - `argument-hint: "[symbol-name]"`
            - `description`: ≤250 chars, include "Use when" trigger. Suggested:
              "Blast-radius analysis for a symbol — shows all callers, type supertypes/subtypes,
              and reference count before you change it. Use when refactoring, deleting, or
              changing the signature of any function, type, or method."
            - `allowed-tools`:
              `mcp__lsp__go_to_symbol mcp__lsp__call_hierarchy mcp__lsp__type_hierarchy
              mcp__lsp__get_references mcp__lsp__get_server_capabilities`

            **Invocation**: User provides `symbol_name` (dot-notation accepted,
            e.g. `"codec.Encode"`, `"Buffer.Reset"`). Optionally `workspace_root`.

            Skill body — cover these sections:

            **Prerequisites**
            - LSP initialized: `start_lsp(root_dir: "/your/workspace")`
            - Check server capabilities (call_hierarchy and type_hierarchy are optional
              LSP features — not all servers support them):
              ```
              get_server_capabilities()
              ```
              Proceed differently based on what is supported (see Step 3 notes).

            **Step 1 — Locate the symbol**
            Use `go_to_symbol` with the symbol_name provided by user:
            ```
            go_to_symbol(
              symbol_path: "Package.SymbolName",
              workspace_root: "/abs/path"   # optional
            )
            → returns: file, line, column (1-indexed)
            ```
            Record file, line, column for use in subsequent steps.

            **Step 2 — Enumerate all direct references (always available)**
            Call `get_references` with `include_declaration: false`:
            ```
            get_references(
              file_path: "<file from Step 1>",
              position_pattern: "func @@SymbolName(",   # or type/method equivalent
              include_declaration: false
            )
            ```
            Collect all reference locations. Group by file. Record count.

            **Step 3 — Call hierarchy (callers and callees)**
            If server supports `call_hierarchy` (from get_server_capabilities):
            ```
            call_hierarchy(
              file_path: "<file from Step 1>",
              line: <line>,
              column: <column>,
              direction: "incoming"   # callers only; use "both" if callees also needed
            )
            ```
            If not supported, skip this step and note in the report.

            **Step 4 — Type hierarchy (supertypes and subtypes)**
            Only applicable when the symbol is a type/interface/class (not a function).
            If server supports `type_hierarchy` (LSP 3.17+):
            ```
            type_hierarchy(
              file_path: "<file from Step 1>",
              line: <line>,
              column: <column>,
              direction: "both"
            )
            ```
            For functions/methods: skip this step; note "not applicable (function)".
            If not supported by server: skip and note.

            **Step 5 — Report impact surface**
            Produce the Impact Report (format in references/patterns.md).

            Show the full impact report, including:
            - Symbol name, kind, definition location
            - Reference count and files
            - Callers (from call_hierarchy incoming) if available
            - Supertypes / subtypes (from type_hierarchy) if applicable
            - Overall blast radius: count of distinct files affected

            **Decision guide**
            | Blast radius | Recommendation |
            |---|---|
            | 0 references | Likely dead code. Confirm with lsp-dead-code before deleting. |
            | 1–5 files | Low risk. Proceed. Update all callers. |
            | 6–20 files | Medium risk. Plan changes carefully. Stage in waves. |
            | > 20 files | High risk. Consider a deprecation path or feature flag. |

            Note: always run this skill BEFORE lsp-edit-export — impact tells you what
            exists; lsp-edit-export tells you how to change it safely.

            ### skills/lsp-impact/references/patterns.md

            Reference patterns file. Include:

            1. **Impact Report format** — the canonical output format:
               ```
               ## Impact Report: SymbolName

               - Kind:         function | method | type | interface | ...
               - Definition:   path/to/file.go:line:column
               - References:   N across M files

               ### Direct References
               - path/to/file1.go  lines: 12, 45
               - path/to/file2.go  line: 3

               ### Callers (call_hierarchy incoming)
               <call tree or "not supported by this server">

               ### Type Hierarchy
               Supertypes: <list or "not applicable">
               Subtypes:   <list or "not applicable">

               ### Blast Radius Summary
               - Total files affected: M
               - Distinct callers: N
               - Risk level: low | medium | high
               ```

            2. **Capability check pattern** — how to handle unsupported features:
               "If `call_hierarchy` is not in `supported_tools`, skip Step 3 and note
               'call hierarchy not supported by this server' in the report. Do not error."
               Same for `type_hierarchy`.

            3. **position_pattern for get_references** — @@ marker examples for common
               language constructs (Go function, Go type, TypeScript export function,
               Python class, Rust pub fn). Reference the shared patterns.md pattern.

            4. **Relationship to lsp-edit-export** — brief note: lsp-impact is read-only
