            # Wave 1 Agent A: lsp-simulate skill

            You are Wave 1 Agent A. Create the lsp-simulate skill directory with SKILL.md
            and a references/patterns.md file covering the speculative editing session workflow.

            ## 0. Isolation Verification

            Verify you are on the correct branch:
            ```bash
            git -C $SAW_AGENT_WORKTREE branch --show-current
            # Expected: saw/lsp-skills-wave2/wave1-agent-A
            ```

            ## 1. File Ownership

            You own ONLY these files (creating them new):
            - `skills/lsp-simulate/SKILL.md`
            - `skills/lsp-simulate/references/patterns.md`

            Do NOT touch any other files.

            ## 2. Interfaces You Must Implement

            A Claude Code Agent Skill conforming to the spec:
            - YAML frontmatter: `name`, `description` (≤250 chars, "Use when" trigger),
              optional `argument-hint`, `allowed-tools` (space-separated MCP tool names)
            - Markdown body: step-by-step workflow Claude follows
            - references/patterns.md: supplementary reference detail

            Style conventions derived from the four existing skills under skills/ (safe-edit, symbol-renaming, edit-export, verify):

            - Start with `> Requires the lsp-mcp-go MCP server.`
            - Steps use `**Step N — description**` headers
            - Tool calls shown as code blocks using bare parameter names (no json syntax)
            - Decision tables and output format tables where appropriate
            - Prerequisite / start_lsp guard near the top

            ## 3. Interfaces You May Call (tool parameters — verified from server.go)

            ```
            create_simulation_session(workspace_root, language) -> { session_id }

            simulate_edit(session_id, file_path, start_line, start_column,
                          end_line, end_column, new_text)
              # All positions 1-indexed. Returns: { session_id, edit_applied, version_after }

            simulate_chain(session_id, edits[], timeout_ms?)
              # edits is array of {file_path, start_line, start_column, end_line, end_column, new_text}
              # Returns: { steps[], safe_to_apply_through_step, cumulative_delta }

            evaluate_session(session_id, scope?, timeout_ms?)
              # scope: "file" (default, confidence: "high") | "workspace" (confidence: "eventual")
              # Returns: { errors_introduced[], errors_resolved[], net_delta, confidence,
              #            affected_symbols, edit_risk_score, timeout, duration_ms }

            commit_session(session_id, target?, apply?)
              # apply=false (default): returns patch only, no disk write
              # apply=true: writes to disk + returns patch

            discard_session(session_id)   # revert in-memory state, no disk write

            destroy_session(session_id)   # release resources; call after commit or discard

            simulate_edit_atomic(workspace_root, language, file_path,
                                 start_line, start_column, end_line, end_column, new_text,
                                 scope?, timeout_ms?)
              # One-shot: create → edit → evaluate → destroy. Returns evaluation result.
              # net_delta: 0 means safe to apply.
            ```

            ## 4. What to Implement

            ### skills/lsp-simulate/SKILL.md

            Frontmatter:
            - `name: lsp-simulate`
            - `description`: ≤250 chars, include "Use when" trigger. Suggested:
              "Speculative code editing session — simulate changes in memory before touching
              disk. Use when planning edits that might break things, exploring refactors
              across multiple files, or verifying an edit is safe before applying."
            - `allowed-tools`: space-separated list of all simulation tool names:
              `mcp__lsp__start_lsp mcp__lsp__create_simulation_session mcp__lsp__simulate_edit
              mcp__lsp__simulate_chain mcp__lsp__evaluate_session mcp__lsp__commit_session
              mcp__lsp__discard_session mcp__lsp__destroy_session mcp__lsp__simulate_edit_atomic`

            Skill body — cover these sections:

            **Prerequisites**
            - LSP must be initialized: `start_lsp(root_dir: "/your/workspace")`
            - Auto-inference note (same as other skills)

            **Quick start (single edit)**
            Show `simulate_edit_atomic` as the simplest entry point:
            ```
            simulate_edit_atomic(
              workspace_root: "/your/workspace",
              language: "go",
              file_path: "/abs/path/to/file.go",
              start_line: 42, start_column: 1,
              end_line: 42, end_column: 20,
              new_text: "replacement text"
            )
            → { net_delta: 0 }  -- safe to apply
            ```
            State: `net_delta: 0` = no new errors introduced (safe). Positive = errors introduced.

            **Full session workflow (multiple edits)**
            Steps:
            1. `create_simulation_session` → get session_id
            2. `simulate_edit` (one or more times, all edits in-memory)
            3. `evaluate_session` → check net_delta, confidence
            4. Decision gate: if net_delta == 0, proceed to step 5; else discard
            5. `commit_session` (apply=false returns patch, apply=true writes to disk)
            6. `destroy_session` (always call to release resources)

            Show each step with a concrete tool call example.

            **Chained mutations (simulate_chain)**
            Brief section: when to use simulate_chain vs multiple simulate_edit calls.
            simulate_chain evaluates after EACH step — use it to find the safe-to-apply-through
            point when a multi-step change has some risky steps.
            Show example with edits array and interpreting `safe_to_apply_through_step`.

            **Decision guide table**
            | net_delta | confidence | Action |
            |-----------|------------|--------|
            | 0         | high       | Safe. Commit or apply. |
            | 0         | eventual   | Likely safe. Workspace scope — re-evaluate if risk matters. |
            | > 0       | any        | Do NOT apply. Inspect errors_introduced. Discard session. |
            | > 0       | partial    | Timeout. Results may be incomplete. Discard and retry with smaller scope. |

            **Session states**
            Brief table: created → mutated → evaluated → committed/discarded → destroyed
            Note: dirty state (from revert failure or version mismatch) requires destroy.

            **Cleanup rule**
            Always call `destroy_session` after commit or discard, even on error paths.
            Show a note about what happens to sessions on MCP server restart (ephemeral —
            IDs become invalid; use commit_session to get a portable patch before restart).

            ### skills/lsp-simulate/references/patterns.md

            Reference patterns file. Include:

            1. **Session lifecycle state machine** — the full state diagram in text form:
               created → mutated → evaluated → committed → destroyed
               created → mutated → evaluated → discarded → destroyed
               any → dirty (revert failure) → must destroy

            2. **evaluate_session response fields** — table of all fields:
               | Field | Type | Meaning |
               |-------|------|---------|
               | net_delta | int | +N = errors introduced, -N = resolved, 0 = safe |
               | confidence | string | "high"=file-scoped settled, "eventual"=workspace, "partial"=timeout, "stale"=concurrent mutation |
               | errors_introduced | array | each: { line, col, message, severity } |
               | errors_resolved | array | same shape |
               | edit_risk_score | float | 0.0 (safe) to 1.0 (risky); higher for exported symbol errors |
               | timeout | bool | true if diagnostics didn't settle within timeout_ms |
               | affected_symbols | array | symbol names whose type errors changed |

            3. **simulate_edit_atomic for quick checks** — when to use it vs full session:
               Use atomic for single what-if checks (no session management).
               Use full session when applying multiple edits that build on each other,
               or when you need to inspect the patch before deciding whether to write.

            4. **Confidence interpretation** — brief prose on each confidence level
               and recommended action.

            5. **Position convention** — all start_line/end_line/start_column/end_column
               are 1-indexed (matching editor line numbers and `cat -n` output).

            ## 5. Tests to Write

            This is a documentation-only skill (markdown files). No test suite exists for
            skills — verification is structural (file exists, frontmatter valid, tool names correct).
            No test files to create.

            ## 6. Verification Gate

            ```bash
            # 1. Files exist
            ls skills/lsp-simulate/SKILL.md
            ls skills/lsp-simulate/references/patterns.md

            # 2. Frontmatter has required fields
            grep -c "^name:" skills/lsp-simulate/SKILL.md
            # Expected: 1

            grep -c "^description:" skills/lsp-simulate/SKILL.md
            # Expected: 1

            grep -c "^allowed-tools:" skills/lsp-simulate/SKILL.md
            # Expected: 1

            # 3. All required simulation tools referenced in allowed-tools line
            grep "create_simulation_session" skills/lsp-simulate/SKILL.md
            # Expected: at least 1 match

            grep "simulate_edit_atomic" skills/lsp-simulate/SKILL.md
            # Expected: at least 1 match

            grep "evaluate_session" skills/lsp-simulate/SKILL.md
            # Expected: at least 1 match

            # 4. Description is ≤250 chars (measure the description value)
            awk '/^description:/{print length($0)}' skills/lsp-simulate/SKILL.md
            # Expected: ≤260 (allowing for "description: " prefix)
            ```

            ## 7. Constraints

            - Do NOT modify any existing skill files.
            - Do NOT create any Go source files.
            - The `description` frontmatter field must be ≤250 characters total.
            - Tool names in `allowed-tools` must use `mcp__lsp__` prefix with double underscores,
              matching the exact registration names in server.go.
            - All tool call examples in the skill body must use exact parameter names from the
