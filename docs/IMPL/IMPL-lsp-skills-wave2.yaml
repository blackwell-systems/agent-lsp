            - Follow the visual style of existing skills: backtick code blocks for tool calls,
              `**Step N — description**` headers, decision tables where appropriate.
            - references/patterns.md is a standalone reference document (no frontmatter, just markdown).

            ## 8. Report

            Commit your changes, then write your completion report to
            `/Users/dayna.blackwell/code/LSP-MCP-GO/docs/IMPL/IMPL-lsp-skills-wave2.yaml`
            under `### Agent A - Completion Report`.

            ```bash
            cd $SAW_AGENT_WORKTREE
            git add skills/lsp-simulate/
            git commit -m "wave1-agent-A: add lsp-simulate skill"
            ```
