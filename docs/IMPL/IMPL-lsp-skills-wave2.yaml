interface_contracts:
    - name: skill-frontmatter
      description: YAML frontmatter schema for all skill SKILL.md files
      definition: |
        ---
        name: <skill-name>
        description: <one-sentence description ≤250 chars, starting "Use when ...">
        argument-hint: "[optional argument hint]"   # omit if not needed
        allowed-tools: mcp__lsp__tool1 mcp__lsp__tool2 ...
        ---
      location: skills/lsp-safe-edit/SKILL.md
    - name: create_simulation_session-params
      description: Parameters for create_simulation_session tool
      definition: |
        create_simulation_session(
          workspace_root: string,  # absolute path to workspace root
          language: string         # language identifier, e.g. "go", "typescript"
        ) -> { session_id: string }
      location: cmd/lsp-mcp-go/server.go
    - name: simulate_edit-params
      description: Parameters for simulate_edit tool (all positions 1-indexed)
      definition: |
        simulate_edit(
          session_id: string,
          file_path: string,
          start_line: int,    # 1-indexed
          start_column: int,  # 1-indexed
          end_line: int,      # 1-indexed
          end_column: int,    # 1-indexed
          new_text: string
        ) -> { session_id: string, edit_applied: bool, version_after: int }
      location: cmd/lsp-mcp-go/server.go
    - name: evaluate_session-params
      description: Parameters for evaluate_session tool
      definition: |
        evaluate_session(
          session_id: string,
          scope: string,      # optional: "file" (default) or "workspace"
          timeout_ms: int     # optional: default 3000 (file), 8000 (workspace)
        ) -> {
          session_id: string,
          errors_introduced: [{ line, col, message, severity }],
          errors_resolved: [{ line, col, message, severity }],
          net_delta: int,
          affected_symbols: [string],
          edit_risk_score: float,
          scope: string,
          confidence: "high" | "partial" | "stale" | "eventual",
          timeout: bool,
          duration_ms: int
        }
      location: cmd/lsp-mcp-go/server.go
    - name: simulate_chain-params
      description: Parameters for simulate_chain tool
      definition: |
        simulate_chain(
          session_id: string,
          edits: [{ file_path, start_line, start_column, end_line, end_column, new_text }],
          timeout_ms: int  # optional
        ) -> {
          steps: [{ step: int, net_delta: int, errors_introduced: [...] }],
          safe_to_apply_through_step: int,
          cumulative_delta: int
        }
      location: cmd/lsp-mcp-go/server.go
    - name: commit_session-params
      description: Parameters for commit_session tool
      definition: |
        commit_session(
          session_id: string,
          target: string,  # optional: path to write to
          apply: bool      # optional: if true, writes to disk; default false (returns patch)
        ) -> workspace_edit patch
      location: cmd/lsp-mcp-go/server.go
    - name: discard_session-params
      description: Parameters for discard_session tool
      definition: |
        discard_session(session_id: string) -> ok
      location: cmd/lsp-mcp-go/server.go
    - name: destroy_session-params
      description: Parameters for destroy_session tool
      definition: |
        destroy_session(session_id: string) -> ok
      location: cmd/lsp-mcp-go/server.go
    - name: simulate_edit_atomic-params
      description: Parameters for simulate_edit_atomic one-shot tool
      definition: |
        simulate_edit_atomic(
          session_id: string,      # optional: reuse existing session
          workspace_root: string,  # optional if session_id provided
          language: string,        # optional if session_id provided
          file_path: string,
          start_line: int,         # 1-indexed
          start_column: int,       # 1-indexed
          end_line: int,           # 1-indexed
          end_column: int,         # 1-indexed
          new_text: string,
          scope: string,           # optional: "file" or "workspace"
          timeout_ms: int          # optional
        ) -> evaluation_result (same shape as evaluate_session)
      location: cmd/lsp-mcp-go/server.go
    - name: call_hierarchy-params
      description: Parameters for call_hierarchy tool
      definition: |
        call_hierarchy(
          file_path: string,
          line: int,          # 1-indexed (output from go_to_symbol + 1 if 0-based)
          column: int,        # 1-indexed
          direction: string,  # optional: "incoming" | "outgoing" | "both" (default)
          language_id: string # optional
        ) -> { item: CallHierarchyItem, incoming: [...], outgoing: [...] }
      location: cmd/lsp-mcp-go/server.go
    - name: type_hierarchy-params
      description: Parameters for type_hierarchy tool
      definition: |
        type_hierarchy(
          file_path: string,
          line: int,          # 1-indexed
          column: int,        # 1-indexed
          direction: string,  # optional: "supertypes" | "subtypes" | "both" (default)
          language_id: string # optional
        ) -> { item: TypeHierarchyItem, supertypes: [...], subtypes: [...] }
      location: cmd/lsp-mcp-go/server.go
    - name: get_references-params
      description: Parameters for get_references tool
      definition: |
        get_references(
          file_path: string,
          line: int,                  # 1-indexed
          column: int,                # 1-indexed
          include_declaration: bool,  # optional, default false
          language_id: string,        # optional
          position_pattern: string    # optional: "prefix@@symbol" cursor marker
        ) -> [{ file: string, line: int, column: int, end_line: int, end_column: int }]
        # Returns [] if workspace still indexing. Output coords are 1-based.
      location: cmd/lsp-mcp-go/server.go
    - name: get_document_symbols-params
      description: Parameters for get_document_symbols tool
      definition: |
        get_document_symbols(
          file_path: string,
          language_id: string  # optional
        ) -> DocumentSymbol[] | SymbolInformation[]
        # DocumentSymbol has: name, kind (int), range, selectionRange, children
        # kind values: 5=Class, 6=Method, 11=Interface, 12=Function, 13=Variable, etc.
        # Coords are 0-based (LSP native) — add 1 when passing to other tools.
      location: cmd/lsp-mcp-go/server.go
