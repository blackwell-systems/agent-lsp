suitability_assessment: |-
    All five suitability questions resolve cleanly.

    1. File decomposition: Work touches five distinct files with clean disjoint ownership.
       Agent A owns the dispatch table additions in runner.go (4 new entries) and the
       parser additions in build.go (parsers + FindTestFiles cases). Agent B owns the
       unit test additions in internal/tools/build_test.go (new test functions for dispatch
       entries and parsers). Agent C owns the integration test update in
       test/build_tools_test.go (switch case expansion from 4 to 8 languages). No two
       agents touch the same file.

    2. No investigation-first work. All four language formats (MSBuild, Swift, Zig,
       Kotlin/Gradle) are documented in the feature spec. The dispatch pattern is fully
       established by the five existing entries. No root cause analysis needed.

    3. Interface contracts are fully discoverable. The languageRunner struct is already
       defined; new entries are additive. Parser functions follow the exact pattern of
       existing parseBuildErrors/parseTestFailures cases. FindTestFiles switch follows
       the same glob pattern approach. All contracts can be defined before implementation.

    4. Pre-implementation status check against current codebase:
       - Dispatch table: csharp, swift, zig, kotlin — NOT present in runners map (TODO)
       - parseBuildErrors: no cases for csharp/swift/zig/kotlin (TODO)
       - parseTestFailures: no cases for csharp/swift/zig/kotlin (TODO)
       - FindTestFiles: no cases for csharp/swift/zig/kotlin (TODO)
       - build_test.go: no tests for new languages (TODO)
       - build_tools_test.go switch: covers only go/typescript/python/rust (TODO)
       - Fixtures: all four directories exist with correct project files:
           csharp/ has CSharpFixture.csproj (dotnet build will work)
           swift/ has Package.swift with Sources/swift-fixture/ target (swift build will work)
           zig/ has build.zig with src/main.zig (zig build will work)
           kotlin/ has build.gradle.kts + settings.gradle.kts (gradle build --quiet will work)
       - Known fixture gap: none of the four fixtures have test files. dotnet test,
         swift test, zig build test, and gradle test will succeed (exit 0) with no tests
         but produce no failures. This is acceptable for smoke testing the dispatch path.

    5. Parallelization value: Go build/test cycle is fast (~5-10s). Agent A and Agent B
       can run in parallel (disjoint files). Agent C is also disjoint from A and B and
       can run in the same wave. Three parallel agents for moderate-complexity work in
       a fast build system is clear speedup over sequential.

       Estimated times:
       - Scout phase: ~15 min
       - Agent execution: ~10 min (A+B+C in parallel Wave 1)
       - Merge & verification: ~3 min
       Total SAW time: ~28 min

       Sequential baseline: ~40 min (3 agents × ~13 min avg)
       Time savings: ~12 min (~30% faster)

       Recommendation: Clear speedup. Proceed.
