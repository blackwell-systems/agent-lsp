               TestFailure.Location.URI starts with "file://" and
               TestFailure.Location.Range.Start.Line == 41 (0-indexed)
            9. TestBuildResultShape — call RunBuild with a command that exits 0 (e.g.
               language="go", a valid go.mod dir); verify result.Success==true and
               result.Raw is a string (may be empty if no output)

            ## Constraints
            - Do NOT add a *lsp.LSPClient parameter to any handler function. Agent B's
              registration calls them as tools.HandleRunBuild(ctx, toolArgsToMap(args)) — no client.
            - Do NOT modify cmd/lsp-mcp-go/server.go (Agent B).
