pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A adds a *lsp.LSPClient parameter to HandleRunBuild, HandleRunTests,
            or HandleGetTestsForFile. Agent B's registration calls them without a client
            argument and the binary fails to compile.
          likelihood: medium
          impact: high
          mitigation: |
            Interface contracts explicitly define no LSPClient parameter. Agent A's
            Constraints section lists this as the top "Do NOT" item. Agent B's verification
            gate builds the full binary and catches any mismatch immediately.
        - scenario: |
            Agent D creates test/build_tools_test.go in `package main` instead of
            `package main_test`, causing duplicate symbol errors when linked with
            multi_lang_test.go.
          likelihood: low
          impact: high
          mitigation: |
            Agent D's task explicitly states "MUST use package main_test" and provides
            the exact package declaration. The verification gate `go build ./test/...`
            catches this at compile time.
        - scenario: |
            LSP Location normalization in TestFailure uses 1-based line numbers instead
            of 0-based LSP convention. Agents calling go_to_definition with the location
            get off-by-one position misses.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A's task states explicitly: "Location.Range.Start.Line = failure.Line - 1
            (0-indexed per LSP spec)". Unit test TestLocationNormalization verifies
            Line=42 maps to Location.Range.Start.Line=41.
        - scenario: |
            Agent C updates the tool count to 44 (forgetting get_tests_for_file makes
            it 45), creating a mismatch between README badge and actual tool count.
          likelihood: medium
          impact: low
          mitigation: |
            Agent C's brief explicitly states "42 + 3 = 45". Agent B independently sets
            the server.go comment to 45. Verification greps check for "45 tools" in README
            and "Register all 45" in server.go. These are caught at merge time.
        - scenario: |
            The fixture directories for TypeScript and Python lack a working tsconfig.json
            or pytest configuration, causing testRunBuild/testRunTests to return IsError
            in CI and appear as failures rather than skips.
          likelihood: low
          impact: low
          mitigation: |
            Agent D's test functions return "skip" status (not "fail") when IsError=true.
            This matches the existing testDetectLspServers pattern. CI failures are blocked
            only on "fail" status results, not "skip".
