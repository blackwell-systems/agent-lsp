            ### internal/tools/runner.go (scaffold extension)
            The scaffold file already defines the five output types. Do NOT redefine them.
            Add the language dispatch table BELOW the type definitions:

            ```go
            // languageRunner maps a language ID to its build and test commands.
            type languageRunner struct {
                buildCmd  string
                buildArgs []string // template args; "{path}" is replaced at runtime
                testCmd   string
                testArgs  []string // template args; "{path}" is replaced at runtime
            }

            // runners is the dispatch table for language-specific build and test commands.
            var runners = map[string]languageRunner{
                "go": {
                    buildCmd:  "go",
                    buildArgs: []string{"build", "{path}"},
                    testCmd:   "go",
                    testArgs:  []string{"test", "-json", "{path}"},
                },
                "typescript": {
                    buildCmd:  "tsc",
                    buildArgs: []string{"--noEmit"},
                    testCmd:   "npm",
                    testArgs:  []string{"test"},
                },
                "javascript": {
                    buildCmd:  "eslint",
                    buildArgs: []string{"."},
                    testCmd:   "npm",
                    testArgs:  []string{"test"},
                },
                "python": {
                    buildCmd:  "mypy",
                    buildArgs: []string{"{path}"},
                    testCmd:   "pytest",
                    testArgs:  []string{"--tb=json", "-q", "{path}"},
                },
                "rust": {
                    buildCmd:  "cargo",
                    buildArgs: []string{"build"},
                    testCmd:   "cargo",
                    testArgs:  []string{"test", "--message-format=json"},
                },
            }
            ```

            Default path values when path param is empty:
            - Go: `./...`
            - Python: `.`
            - TypeScript: (no path arg for tsc)
            - Rust: (no path narrowing for cargo build)

            ### internal/tools/build.go (six exported/unexported functions)

            **Package declaration and imports:**
            Use `package tools`. Import context, encoding/json, fmt, os/exec,
            path/filepath, strings, and the internal packages.

            **1. HandleRunBuild(ctx, args)**
            - Extract workspace_dir (required string) and path, language (optional strings)
            - If language not provided: call config.InferWorkspaceRoot(workspace_dir) to detect
            - If workspace_dir empty: return types.ErrorResult("workspace_dir is required")
            - Look up runner in runners map; if not found: return types.ErrorResult("unsupported language: <lang>")
            - Call RunBuild(ctx, root, lang, path)
            - Marshal BuildResult to JSON, return types.TextResult(json)

            **2. HandleRunTests(ctx, args)**
            - Same pattern as HandleRunBuild but calls RunTests and returns TestResult JSON

            **3. HandleGetTestsForFile(ctx, args)**
            - Extract file_path (required string)
            - If empty: return types.ErrorResult("file_path is required")
            - Call config.InferWorkspaceRoot(file_path) to get root+lang
            - Call FindTestFiles(ctx, root, lang, file_path)
            - Marshal TestFileResult to JSON, return types.TextResult(json)

            **4. RunBuild(ctx, root, lang, path string) (BuildResult, error)**
            - Look up runner; replace "{path}" placeholder with path (default to "./..." for Go, "." for others)
            - exec.CommandContext(ctx, cmd.buildCmd, buildArgs...) with Dir=root
            - Capture CombinedOutput()
            - Parse output into BuildErrors based on language:
              - Go: regex `^([^:]+):(\d+):(\d+):\s+(.+)$` on each stderr line
              - TypeScript tsc: regex `^([^(]+)\((\d+),(\d+)\): error TS\d+: (.+)$`
              - Rust: multi-line; look for "error[" lines, then "--> file:line:col" on next line
              - Python mypy: regex `^([^:]+):(\d+):\s+error:\s+(.+)$`
              - Others: no structured parsing
            - Return BuildResult{Success: exitCode==0, Errors: parsed, Raw: string(output)}

            **5. RunTests(ctx, root, lang, path string) (TestResult, error)**
            - Execute test command with Dir=root
            - Parse output into TestFailures:
              - Go (go test -json): parse JSON lines; for lines where Action=="fail" and Test!="",
                extract test name from Test field; scan surrounding Output lines for file:line patterns
              - Rust (cargo test --message-format=json): parse lines where type=="test" and event=="failed";
                TestName from "name"; message from "stdout" field
              - Python (pytest --tb=json): attempt JSON parse; extract failures[].longrepr for message,
                failures[].nodeid for test name; fallback to raw output
              - TypeScript/JavaScript: raw output only, no structured parsing
            - LSP Location normalization for each TestFailure where File != "" and Line > 0:
              ```go
              absPath, _ := filepath.Abs(filepath.Join(root, failure.File))
              failure.Location = &types.Location{
                  URI: "file://" + absPath,
                  Range: types.Range{
                      Start: types.Position{Line: failure.Line - 1, Character: 0},
                      End:   types.Position{Line: failure.Line - 1, Character: 0},
                  },
              }
              ```
            - Return TestResult{Passed: exitCode==0, Failures: parsed, Raw: string(output)}

            **6. FindTestFiles(ctx, root, lang, sourceFile string) (TestFileResult, error)**
            - Static lookup, no subprocess:
              - Go: filepath.Glob(filepath.Join(filepath.Dir(sourceFile), "*_test.go"))
              - Python: glob test_*.py and *_test.py in same dir; also check tests/ sibling dir
              - TypeScript/JavaScript: glob *.test.ts, *.spec.ts, *.test.js, *.spec.js in same dir
              - Rust: return []string{sourceFile} (tests are inline in Rust)
              - Others: return []string{}
            - Clean the sourceFile path with filepath.Abs() before returning
            - Return TestFileResult{SourceFile: absPath, TestFiles: found}

