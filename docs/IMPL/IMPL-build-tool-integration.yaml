interface_contracts:
    - name: BuildError
      description: A single compilation error/warning with location info
      definition: |
        type BuildError struct {
            File    string `json:"file"`
            Line    int    `json:"line"`
            Column  int    `json:"column"`
            Message string `json:"message"`
        }
      location: internal/tools/runner.go
    - name: BuildResult
      description: Structured output type for run_build tool
      definition: |
        type BuildResult struct {
            Success bool         `json:"success"`
            Errors  []BuildError `json:"errors"`
            Raw     string       `json:"raw"`
        }
      location: internal/tools/runner.go
    - name: TestFailure
      description: |
        A single test failure with location and test name.
        Location field is LSP-normalized (file URI + zero-based range) so callers
        can pass it directly to go_to_definition or get_references without conversion.
      definition: |
        type TestFailure struct {
            File     string          `json:"file"`
            Line     int             `json:"line"`
            TestName string          `json:"test_name"`
            Message  string          `json:"message"`
            Location *types.Location `json:"location,omitempty"`
        }
      location: internal/tools/runner.go
    - name: TestResult
      description: Structured output type for run_tests tool
      definition: |
        type TestResult struct {
            Passed   bool          `json:"passed"`
            Failures []TestFailure `json:"failures"`
            Raw      string        `json:"raw"`
        }
      location: internal/tools/runner.go
    - name: TestFileResult
      description: Structured output type for get_tests_for_file tool
      definition: |
        type TestFileResult struct {
            SourceFile string   `json:"source_file"`
            TestFiles  []string `json:"test_files"`
        }
      location: internal/tools/runner.go
    - name: HandleRunBuild
      description: |
        MCP tool handler for run_build. No *lsp.LSPClient parameter — runs shell
        commands independently of any LSP session.
      definition: |
        func HandleRunBuild(ctx context.Context, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/build.go
    - name: HandleRunTests
      description: |
        MCP tool handler for run_tests. No *lsp.LSPClient parameter.
      definition: |
        func HandleRunTests(ctx context.Context, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/build.go
    - name: HandleGetTestsForFile
      description: |
        MCP tool handler for get_tests_for_file. No *lsp.LSPClient parameter.
        Returns test files that exercise the given source file.
      definition: |
        func HandleGetTestsForFile(ctx context.Context, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/build.go
    - name: RunBuild
      description: Internal function called by HandleRunBuild
      definition: |
        func RunBuild(ctx context.Context, root, lang, path string) (BuildResult, error)
      location: internal/tools/build.go
    - name: RunTests
      description: Internal function called by HandleRunTests
      definition: |
        func RunTests(ctx context.Context, root, lang, path string) (TestResult, error)
      location: internal/tools/build.go
    - name: FindTestFiles
      description: |
        Internal function called by HandleGetTestsForFile. Performs static file lookup
        without running the test suite.
      definition: |
        func FindTestFiles(ctx context.Context, root, lang, sourceFile string) (TestFileResult, error)
      location: internal/tools/build.go
