name: destroy_session returns already_destroyed for invalid session ID
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
assert:
  tool: destroy_session
  args:
    session_id: "nonexistent-session"
  expect:
    not_error: true
    contains: ["already_destroyed"]
timeout: 30s
