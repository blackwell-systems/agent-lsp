# Trajectory assertion: validates the /lsp-docs skill protocol.
# Tier 1: inspect_symbol must be called first (hover lookup).
# Tier 2: get_symbol_documentation is the fallback for empty hover.
# Tier 3: go_to_definition + get_symbol_source is the last-resort path.
# Read-only — apply_edit must NOT appear.
name: lsp-docs follows skill protocol
trace:
  - tool: inspect_symbol
    args:
      file_path: "fixtures/go/main.go"
      line: 6
      column: 8
  - tool: get_symbol_documentation
    args:
      symbol: "fmt.Println"
      language_id: "go"
  - tool: go_to_definition
    args:
      file_path: "fixtures/go/main.go"
      line: 6
      column: 8
  - tool: get_symbol_source
    args:
      file_path: "fixtures/go/main.go"
      line: 6
trajectory:
  - type: order
    tools: ["inspect_symbol", "get_symbol_documentation"]
  - type: presence
    tools: ["inspect_symbol"]
  - type: absence
    tools: ["apply_edit", "rename_symbol"]
