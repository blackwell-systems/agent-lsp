name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/blackwell-systems/agent-lsp

jobs:
  # Build and push the base image
  base:
    runs-on: ubuntu-latest
    outputs:
      base-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=base
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push base
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Per-language image builds
  # Languages with package_mgr=manual (rust/cargo-binstall, java, kotlin, swift, scala,
  # lua, elixir, clojure, zig, haskell) are excluded here because Dockerfile.lang
  # exits 1 for unrecognized package managers. Those languages are best served via
  # the LSP_SERVERS runtime install mechanism in the base image.
  per-language:
    runs-on: ubuntu-latest
    needs: base
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: go
            lsp_package: golang.org/x/tools/gopls@latest
            lsp_binary: gopls
            package_mgr: go
          - lang: typescript
            lsp_package: "typescript-language-server typescript"
            lsp_binary: typescript-language-server
            package_mgr: npm
          - lang: python
            lsp_package: pyright
            lsp_binary: pyright-langserver
            package_mgr: npm
          - lang: ruby
            lsp_package: solargraph
            lsp_binary: solargraph
            package_mgr: gem
          - lang: cpp
            lsp_package: clangd
            lsp_binary: clangd
            package_mgr: apt
          - lang: csharp
            lsp_package: csharp-ls
            lsp_binary: csharp-ls
            package_mgr: dotnet
          - lang: php
            lsp_package: intelephense
            lsp_binary: intelephense
            package_mgr: npm
          - lang: dart
            lsp_package: dart
            lsp_binary: dart
            package_mgr: apt

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.lang }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lang
          push: true
          tags: ${{ env.IMAGE }}:${{ matrix.lang }}
          platforms: linux/amd64
          build-args: |
            BASE_TAG=base
            LANG=${{ matrix.lang }}
            LSP_PACKAGE=${{ matrix.lsp_package }}
            PACKAGE_MGR=${{ matrix.package_mgr }}
            LSP_BINARY=${{ matrix.lsp_binary }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Combo images: web, backend, fullstack
  # Built from the base image with npm packages pre-installed inline.
  # Uses docker buildx build with an inline Dockerfile written via heredoc.
  combos:
    runs-on: ubuntu-latest
    needs: [base, per-language]
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: web
            npm_packages: "typescript-language-server typescript pyright"
            go_packages: ""
            description: "TypeScript + Python language servers"
          - tag: backend
            npm_packages: "pyright"
            go_packages: "golang.org/x/tools/gopls@latest"
            description: "Go + Python language servers"
          - tag: fullstack
            npm_packages: "typescript-language-server typescript pyright"
            go_packages: "golang.org/x/tools/gopls@latest"
            description: "Go + TypeScript + Python language servers"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.tag }} (${{ matrix.description }})
        run: |
          # Write an inline Dockerfile for this combo image
          cat > /tmp/Dockerfile.combo <<'DOCKERFILE'
          ARG BASE_TAG=base
          FROM ghcr.io/blackwell-systems/agent-lsp:${BASE_TAG}
          ARG NPM_PACKAGES
          ARG GO_PACKAGES
          RUN if [ -n "$NPM_PACKAGES" ]; then npm install -g $NPM_PACKAGES; fi
          RUN if [ -n "$GO_PACKAGES" ]; then go install $GO_PACKAGES; fi
          DOCKERFILE

          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag ${{ env.IMAGE }}:${{ matrix.tag }} \
            --build-arg BASE_TAG=base \
            --build-arg NPM_PACKAGES="${{ matrix.npm_packages }}" \
            --build-arg GO_PACKAGES="${{ matrix.go_packages }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file /tmp/Dockerfile.combo \
            .

  # Full image: all supported language servers baked in via Dockerfile.full
  full:
    runs-on: ubuntu-latest
    needs: base
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.full
          push: true
          tags: ${{ env.IMAGE }}:full
          platforms: linux/amd64
          build-args: BASE_TAG=base
          cache-from: type=gha
          cache-to: type=gha,mode=max
