name: Docker

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/blackwell-systems/agent-lsp
  HUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/agent-lsp

jobs:
  # Build and push the base image
  base:
    runs-on: ubuntu-latest
    outputs:
      base-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.HUB_IMAGE }}
          tags: |
            type=raw,value=base
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push base
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Per-language image builds
  # Languages with package_mgr=manual (rust/cargo-binstall, java, kotlin, swift, scala,
  # lua, elixir, clojure, zig, haskell) are excluded here because Dockerfile.lang
  # exits 1 for unrecognized package managers. Those languages are best served via
  # the LSP_SERVERS runtime install mechanism in the base image.
  per-language:
    runs-on: ubuntu-latest
    needs: base
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: go
            lsp_package: golang.org/x/tools/gopls@latest
            lsp_binary: gopls
            package_mgr: go
          - lang: typescript
            lsp_package: "typescript-language-server typescript"
            lsp_binary: typescript-language-server
            package_mgr: npm
          - lang: python
            lsp_package: pyright
            lsp_binary: pyright-langserver
            package_mgr: npm
          - lang: ruby
            lsp_package: solargraph
            lsp_binary: solargraph
            package_mgr: gem
          - lang: cpp
            lsp_package: clangd
            lsp_binary: clangd
            package_mgr: apt
          # csharp: csharp-ls NuGet package lacks DotnetToolSettings.xml; use LSP_SERVERS=csharp-ls at runtime
          - lang: php
            lsp_package: intelephense
            lsp_binary: intelephense
            package_mgr: npm
          # dart: not in standard bookworm repos; use LSP_SERVERS=dart at runtime

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.lang }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.lang
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ matrix.lang }}
            ${{ env.HUB_IMAGE }}:${{ matrix.lang }}
          platforms: linux/amd64
          build-args: |
            BASE_TAG=base
            LANG=${{ matrix.lang }}
            LSP_PACKAGE=${{ matrix.lsp_package }}
            PACKAGE_MGR=${{ matrix.package_mgr }}
            LSP_BINARY=${{ matrix.lsp_binary }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Combo images: web, backend, fullstack
  # Built from the base image with npm packages pre-installed inline.
  # Uses docker buildx build with an inline Dockerfile written via heredoc.
  combos:
    runs-on: ubuntu-latest
    needs: [base, per-language]
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: web
            npm_packages: "typescript-language-server typescript pyright"
            go_packages: ""
            description: "TypeScript + Python language servers"
          - tag: backend
            npm_packages: "pyright"
            go_packages: "golang.org/x/tools/gopls@latest"
            description: "Go + Python language servers"
          - tag: fullstack
            npm_packages: "typescript-language-server typescript pyright"
            go_packages: "golang.org/x/tools/gopls@latest"
            description: "Go + TypeScript + Python language servers"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.tag }} (${{ matrix.description }})
        run: |
          # Write an inline Dockerfile for this combo image
          cat > /tmp/Dockerfile.combo <<'DOCKERFILE'
          ARG BASE_TAG=base
          FROM ghcr.io/blackwell-systems/agent-lsp:${BASE_TAG}
          ARG NPM_PACKAGES
          ARG GO_PACKAGES
          RUN if [ -n "${NPM_PACKAGES}" ]; then \
                apt-get update && apt-get install -y --no-install-recommends nodejs npm && \
                npm install -g ${NPM_PACKAGES} && \
                rm -rf /var/lib/apt/lists/*; \
              fi
          RUN if [ -n "${GO_PACKAGES}" ]; then \
                LATEST_GO=$(curl -fsSL "https://go.dev/VERSION?m=text" | head -1) && \
                curl -fsSL "https://dl.google.com/go/${LATEST_GO}.linux-amd64.tar.gz" -o /tmp/go.tar.gz && \
                tar -C /usr/local -xzf /tmp/go.tar.gz && \
                rm /tmp/go.tar.gz && \
                GOPATH=/usr/local /usr/local/go/bin/go install ${GO_PACKAGES}; \
              fi
          ENV PATH=$PATH:/usr/local/go/bin
          DOCKERFILE

          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag ${{ env.GHCR_IMAGE }}:${{ matrix.tag }} \
            --tag ${{ env.HUB_IMAGE }}:${{ matrix.tag }} \
            --build-arg BASE_TAG=base \
            --build-arg NPM_PACKAGES="${{ matrix.npm_packages }}" \
            --build-arg GO_PACKAGES="${{ matrix.go_packages }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file /tmp/Dockerfile.combo \
            .

  # Full image: all supported language servers baked in via Dockerfile.full
  full:
    runs-on: ubuntu-latest
    needs: base
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push full
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.full
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:full
            ${{ env.HUB_IMAGE }}:full
          platforms: linux/amd64
          build-args: BASE_TAG=base
          cache-from: type=gha
          cache-to: type=gha,mode=max
