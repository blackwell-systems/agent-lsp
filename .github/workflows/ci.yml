name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: GOWORK=off go build ./...

      - name: Vet
        run: GOWORK=off go vet ./...

      - name: Install TypeScript language server
        run: npm install -g typescript-language-server typescript

      - name: Run unit tests
        run: GOWORK=off go test -run TestBinary ./...

  multi-lang-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: GOWORK=off go build ./...

      - name: Install TypeScript language server
        run: npm install -g typescript-language-server typescript

      - name: Install Pyright
        run: npm install -g pyright

      - name: Install intelephense
        run: npm install -g intelephense

      - name: Install clangd
        run: sudo apt-get install -y clangd

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install Rust toolchain + rust-analyzer
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Install jdtls
        continue-on-error: true
        run: |
          wget -q "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" -O /tmp/jdtls.tar.gz
          sudo mkdir -p /opt/jdtls /tmp/jdtls-data
          sudo tar -xzf /tmp/jdtls.tar.gz -C /opt/jdtls
          LAUNCHER=$(ls /opt/jdtls/plugins/org.eclipse.equinox.launcher_*.jar | head -1)
          printf '#!/bin/bash\nexec java \\\n  -Declipse.application=org.eclipse.jdt.ls.core.id1 \\\n  -Dosgi.bundles.defaultStartLevel=4 \\\n  -Declipse.product=org.eclipse.jdt.ls.core.product \\\n  -Dlog.level=ERROR \\\n  -Xmx1G \\\n  --add-modules=ALL-SYSTEM \\\n  --add-opens java.base/java.util=ALL-UNNAMED \\\n  --add-opens java.base/java.lang=ALL-UNNAMED \\\n  -jar %s \\\n  -configuration /opt/jdtls/config_linux \\\n  -data /tmp/jdtls-data "$@"\n' "$LAUNCHER" | sudo tee /usr/local/bin/jdtls > /dev/null
          sudo chmod +x /usr/local/bin/jdtls

      - name: Install solargraph (Ruby)
        run: gem install solargraph

      - name: Install yaml-language-server
        run: npm install -g yaml-language-server

      - name: Install vscode-json-language-server
        run: npm install -g vscode-json-language-server

      - name: Install dockerfile-language-server-nodejs
        run: npm install -g dockerfile-language-server-nodejs

      - name: Run multi-language tests
        run: GOWORK=off go test -v -run TestMultiLanguage ./test/ -timeout 15m
