# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup environment
        run: |
          echo "Setting up build environment"
          mkdir -p build

      - name: Run tests
        run: echo "Running tests"
