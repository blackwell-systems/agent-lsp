version: 2

project_name: agent-lsp

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-lsp
    main: ./cmd/agent-lsp
    binary: agent-lsp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: agent-lsp
    ids:
      - agent-lsp
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: agent-lsp
    repository:
      owner: blackwell-systems
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blackwell-systems/agent-lsp"
    description: "MCP server exposing 50+ language server protocol tools to AI agents"
    license: "MIT"
    install: |
      bin.install "agent-lsp"
    test: |
      system "#{bin}/agent-lsp", "--version"

release:
  github:
    owner: blackwell-systems
    name: agent-lsp
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
