version: 2

project_name: agent-lsp

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-lsp
    main: ./cmd/agent-lsp
    binary: agent-lsp
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: agent-lsp
    ids:
      - agent-lsp
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: agent-lsp
    repository:
      owner: blackwell-systems
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blackwell-systems/agent-lsp"
    description: "MCP server exposing 50+ language server protocol tools to AI agents"
    license: "MIT"
    install: |
      bin.install "agent-lsp"
    caveats: |
      Run the setup wizard to auto-detect language servers and configure your AI tool:

        agent-lsp init

      Or manually install language servers and add to .mcp.json:

        go install golang.org/x/tools/gopls@latest
        npm install -g typescript-language-server typescript

        {
          "mcpServers": {
            "lsp": {
              "type": "stdio",
              "command": "agent-lsp",
              "args": ["go:gopls", "typescript:typescript-language-server,--stdio"]
            }
          }
        }

      Documentation: https://github.com/blackwell-systems/agent-lsp
    test: |
      system "#{bin}/agent-lsp", "--version"

dockers:
  # ── Base image ──────────────────────────────────────────────────────────────
  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:base"
      - "ghcr.io/blackwell-systems/agent-lsp:latest"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Version }}"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Major }}.{{ .Minor }}"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:base"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:latest"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Version }}"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Major }}.{{ .Minor }}"
    dockerfile: docker/Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  # ── Per-language images ─────────────────────────────────────────────────────
  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:go"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:go"
    dockerfile: docker/Dockerfile.lang
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=LANG=go"
      - "--build-arg=LSP_PACKAGE=golang.org/x/tools/gopls@latest"
      - "--build-arg=PACKAGE_MGR=go"
      - "--build-arg=LSP_BINARY=gopls"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:typescript"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:typescript"
    dockerfile: docker/Dockerfile.lang
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=LANG=typescript"
      - "--build-arg=LSP_PACKAGE=typescript-language-server typescript"
      - "--build-arg=PACKAGE_MGR=npm"
      - "--build-arg=LSP_BINARY=typescript-language-server"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:python"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:python"
    dockerfile: docker/Dockerfile.lang
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=LANG=python"
      - "--build-arg=LSP_PACKAGE=pyright"
      - "--build-arg=PACKAGE_MGR=npm"
      - "--build-arg=LSP_BINARY=pyright-langserver"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:ruby"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:ruby"
    dockerfile: docker/Dockerfile.lang
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=LANG=ruby"
      - "--build-arg=LSP_PACKAGE=solargraph"
      - "--build-arg=PACKAGE_MGR=gem"
      - "--build-arg=LSP_BINARY=solargraph"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:cpp"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:cpp"
    dockerfile: docker/Dockerfile.lang
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=LANG=cpp"
      - "--build-arg=LSP_PACKAGE=clangd"
      - "--build-arg=PACKAGE_MGR=apt"
      - "--build-arg=LSP_BINARY=clangd"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:php"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:php"
    dockerfile: docker/Dockerfile.lang
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=LANG=php"
      - "--build-arg=LSP_PACKAGE=intelephense"
      - "--build-arg=PACKAGE_MGR=npm"
      - "--build-arg=LSP_BINARY=intelephense"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  # ── Combo images ────────────────────────────────────────────────────────────
  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:web"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:web"
    dockerfile: docker/Dockerfile.combo
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=NPM_PACKAGES=typescript-language-server typescript pyright"
      - "--build-arg=GO_PACKAGES="
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:backend"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:backend"
    dockerfile: docker/Dockerfile.combo
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=NPM_PACKAGES=pyright"
      - "--build-arg=GO_PACKAGES=golang.org/x/tools/gopls@latest"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:fullstack"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:fullstack"
    dockerfile: docker/Dockerfile.combo
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--build-arg=NPM_PACKAGES=typescript-language-server typescript pyright"
      - "--build-arg=GO_PACKAGES=golang.org/x/tools/gopls@latest"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  # ── Full image ──────────────────────────────────────────────────────────────
  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:full"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:full"
    dockerfile: docker/Dockerfile.full
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=BASE_TAG=base"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

winget:
  - name: agent-lsp
    publisher: BlackwellSystems
    publisher_url: https://github.com/blackwell-systems
    publisher_support_url: https://github.com/blackwell-systems/agent-lsp/issues
    package_identifier: BlackwellSystems.agent-lsp
    license: MIT
    license_url: https://github.com/blackwell-systems/agent-lsp/blob/main/LICENSE
    copyright: Blackwell Systems and Dayna Blackwell
    homepage: https://github.com/blackwell-systems/agent-lsp
    short_description: MCP server giving AI agents reliable access to language server protocol
    description: |
      agent-lsp is a stateful MCP server over real language servers. It keeps the
      language server's semantic index warm and adds a skill layer that turns
      multi-step code operations into single, correct workflows. 50 tools, 30
      languages, persistent sessions.
    tags:
      - lsp
      - mcp
      - ai
      - developer-tools
      - language-server
    skip_upload: "{{ if .IsSnapshot }}true{{ else }}false{{ end }}"
    repository:
      owner: microsoft
      name: winget-pkgs
      branch: "agent-lsp-{{.Version}}"
      token: "{{ .Env.WINGET_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  github:
    owner: blackwell-systems
    name: agent-lsp
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
