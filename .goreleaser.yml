version: 2

project_name: agent-lsp

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-lsp
    main: ./cmd/agent-lsp
    binary: agent-lsp
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: agent-lsp
    ids:
      - agent-lsp
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: agent-lsp
    repository:
      owner: blackwell-systems
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blackwell-systems/agent-lsp"
    description: "MCP server exposing 50+ language server protocol tools to AI agents"
    license: "MIT"
    install: |
      bin.install "agent-lsp"
    caveats: |
      Run the setup wizard to auto-detect language servers and configure your AI tool:

        agent-lsp init

      Or manually install language servers and add to .mcp.json:

        go install golang.org/x/tools/gopls@latest
        npm install -g typescript-language-server typescript

        {
          "mcpServers": {
            "lsp": {
              "type": "stdio",
              "command": "agent-lsp",
              "args": ["go:gopls", "typescript:typescript-language-server,--stdio"]
            }
          }
        }

      Documentation: https://github.com/blackwell-systems/agent-lsp
    test: |
      system "#{bin}/agent-lsp", "--version"

dockers:
  # ── Base image (amd64) ─────────────────────────────────────────────────────
  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:base-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:latest-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Version }}-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Major }}.{{ .Minor }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:base-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:latest-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Major }}.{{ .Minor }}-amd64"
    goarch: amd64
    dockerfile: docker/Dockerfile.release
    extra_files:
      - docker/entrypoint.sh
      - docker/lsp-servers.yaml
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  # ── Base image (arm64) ─────────────────────────────────────────────────────
  - image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:base-arm64"
      - "ghcr.io/blackwell-systems/agent-lsp:latest-arm64"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Version }}-arm64"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Major }}.{{ .Minor }}-arm64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:base-arm64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:latest-arm64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Version }}-arm64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Major }}.{{ .Minor }}-arm64"
    goarch: arm64
    dockerfile: docker/Dockerfile.release
    extra_files:
      - docker/entrypoint.sh
      - docker/lsp-servers.yaml
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"

  # Language/combo/full images are built by the docker-images job in release.yml
  # using a matrix strategy for parallel builds across separate runners.

docker_manifests:
  # ── Base / latest / versioned (GoReleaser-managed) ─────────────────────────
  - name_template: "ghcr.io/blackwell-systems/agent-lsp:base"
    image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:base-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:base-arm64"
  - name_template: "ghcr.io/blackwell-systems/agent-lsp:latest"
    image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:latest-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:latest-arm64"
  - name_template: "ghcr.io/blackwell-systems/agent-lsp:{{ .Version }}"
    image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Version }}-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Version }}-arm64"
  - name_template: "ghcr.io/blackwell-systems/agent-lsp:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/blackwell-systems/agent-lsp:{{ .Major }}.{{ .Minor }}-arm64"
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:base"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:base-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:base-arm64"
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:latest"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:latest-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:latest-arm64"
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Version }}-arm64"
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Major }}.{{ .Minor }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/agent-lsp:{{ .Major }}.{{ .Minor }}-arm64"

release:
  github:
    owner: blackwell-systems
    name: agent-lsp
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
